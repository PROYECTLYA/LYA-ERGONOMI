<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ERGO-SENSING PRO v5.0</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0d1117; color: white; margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        
        /* Modal de Cookies */
        #cookie-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); z-index: 5000; display: flex; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        .cookie-box { background: #161b22; padding: 30px; border-radius: 20px; border: 1px solid #30363d; max-width: 400px; }

        #menu-inicial { display: none; position: absolute; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; background: #0d1117; z-index: 2000; }
        .btn-menu { width: 85%; max-width: 320px; padding: 18px; margin: 10px; border-radius: 12px; font-weight: bold; }

        #contenedor-analisis { display: none; width: 100vw; height: 100vh; position: relative; background: #000; }
        canvas { width: 100%; height: 100%; object-fit: contain; }
        video { display: none; }

        .status-badge { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.8); color: #00ff00; padding: 10px 15px; border-radius: 8px; border-left: 4px solid #00ff00; font-size: 11px; z-index: 3000; line-height: 1.4; }
        .barra-controles { position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; padding: 12px; background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border-radius: 35px; z-index: 4000; border: 1px solid rgba(255,255,255,0.1); width: 94%; justify-content: space-around; }
        
        .btn-circular { width: 55px; height: 55px; border-radius: 50%; border: none; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 9px; font-weight: bold; color: white; }
        .btn-flip { background: #00d2d3; color: #000; }
        .btn-calib { background: #f1c40f; color: #000; }
        .btn-record { background: #ff4d4d; width: 75px; border-radius: 25px; }
    </style>
</head>
<body>

<div id="cookie-overlay">
    <div class="cookie-box">
        <h4 class="text-info">Privacidad y Sensores</h4>
        <p class="small text-secondary">Esta aplicación requiere acceso a la cámara y cookies locales para procesar la biomecánica en tiempo real mediante IA. ¿Aceptas los términos?</p>
        <button class="btn btn-success w-100 mb-2" onclick="aceptarCookies()">ACEPTAR Y CONTINUAR</button>
        <button class="btn btn-outline-danger btn-sm w-100" onclick="location.href='https://google.com'">RECHAZAR</button>
    </div>
</div>

<div id="menu-inicial">
    <h2 style="color: #00d2d3; margin-bottom: 25px;">ERGO-SENSING PRO</h2>
    <button class="btn btn-success btn-menu" onclick="iniciarApp('camara')">🎥 EVALUACIÓN EN VIVO</button>
    <button class="btn btn-primary btn-menu" onclick="document.getElementById('fileInput').click()">📁 CARGAR VIDEO</button>
    <input type="file" id="fileInput" hidden accept="video/*" onchange="iniciarApp('archivo')">
</div>

<div id="contenedor-analisis">
    <div class="status-badge" id="txt-status">SISTEMA INICIALIZADO</div>
    <canvas id="output_canvas"></canvas>
    <video id="input_video" playsinline muted></video>
    <div class="barra-controles">
        <button class="btn-circular btn-dark" onclick="location.reload()">Menú</button>
        <button id="btn-flip" class="btn-circular btn-flip" onclick="cambiarCamara()">🔄</button>
        <button class="btn-circular btn-calib" onclick="iniciarCalibracion()">⚖️<br>CALIB</button>
        <button id="recordBtn" class="btn-circular btn-record" onclick="toggleGrabacion()">🔴<br>GRABAR</button>
    </div>
</div>

<script>
    const video = document.getElementById('input_video');
    const canvas = document.getElementById('output_canvas');
    const ctx = canvas.getContext('2d');
    const txtStatus = document.getElementById('txt-status');
    
    let cookiesAceptadas = false;
    let currentFacingMode = "environment";
    let isCalibrating = false;
    let offsets = {};
    let poseSolver = null;

    // --- CONFIGURACIÓN DE SEMÁFORO ERGONÓMICO ---
    const RANGOS = {
        'cabeza': { amarillo: 15, naranja: 25, rojo: 40 },
        'tronco': { amarillo: 20, naranja: 35, rojo: 50 },
        'brazos': { amarillo: 30, naranja: 50, rojo: 75 },
        'piernas': { amarillo: 25, naranja: 45, rojo: 65 }
    };

    function calcularColorRiesgo(tipo, anguloActual) {
        const base = offsets[tipo] || 0;
        const desviacion = Math.abs(anguloActual - base);
        const r = RANGOS[tipo] || RANGOS['tronco'];

        if (desviacion > r.rojo) return "#ff0000";    // ROJO: Riesgo Crítico
        if (desviacion > r.naranja) return "#ff8c00"; // NARANJA: Riesgo Moderado
        if (desviacion > r.amarillo) return "#ffff00"; // AMARILLO: Riesgo Bajo
        return "#00ff00";                             // VERDE: Estado Reposo / Óptimo
    }

    // --- MATEMÁTICAS ---
    function calcAng3D(a, b, c) {
        const v1 = {x: a.x-b.x, y: a.y-b.y, z: a.z-b.z};
        const v2 = {x: c.x-b.x, y: c.y-b.y, z: c.z-b.z};
        const dot = v1.x*v2.x + v1.y*v2.y + v1.z*v2.z;
        const m1 = Math.sqrt(v1.x**2 + v1.y**2 + v1.z**2);
        const m2 = Math.sqrt(v2.x**2 + v2.y**2 + v2.z**2);
        return Math.acos(Math.max(-1, Math.min(1, dot / (m1 * m2)))) * (180/Math.PI);
    }

    // --- INICIO ---
    function aceptarCookies() {
        cookiesAceptadas = true;
        document.getElementById('cookie-overlay').style.display = 'none';
        document.getElementById('menu-inicial').style.display = 'flex';
    }

    async function iniciarApp(fuente) {
        if (!cookiesAceptadas) return;
        document.getElementById('menu-inicial').style.display = 'none';
        document.getElementById('contenedor-analisis').style.display = 'block';
        
        if (fuente === 'camara') {
            await habilitarCamara();
        } else {
            const file = document.getElementById('fileInput').files[0];
            video.src = URL.createObjectURL(file);
            video.play();
            renderLoop();
        }
    }

    async function habilitarCamara() {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: currentFacingMode } });
        video.srcObject = stream;
        await video.play();
        renderLoop();
    }

    // --- MOTOR DE IA Y DIBUJO ---
    poseSolver = new Pose({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}` });
    poseSolver.setOptions({ modelComplexity: 1, minDetectionConfidence: 0.6 });
    
    poseSolver.onResults((res) => {
        ctx.save();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Espejo dinámico
        if (currentFacingMode === "user") { ctx.translate(canvas.width, 0); ctx.scale(-1, 1); }
        ctx.drawImage(res.image, 0, 0, canvas.width, canvas.height);
        
        if (res.poseLandmarks) {
            const lm = res.poseLandmarks;
            const w = canvas.width, h = canvas.height;

            const h_med = { x:(lm[11].x+lm[12].x)/2, y:(lm[11].y+lm[12].y)/2, z:(lm[11].z+lm[12].z)/2 };
            const c_med = { x:(lm[23].x+lm[24].x)/2, y:(lm[23].y+lm[24].y)/2, z:(lm[23].z+lm[24].z)/2 };

            const datos = {
                'cabeza': calcAng3D(lm[0], h_med, c_med),
                'tronco': calcAng3D(h_med, c_med, {x:c_med.x, y:c_med.y+1, z:c_med.z}),
                'brazo_d': calcAng3D(lm[12], lm[14], lm[16]),
                'brazo_i': calcAng3D(lm[11], lm[13], lm[15]),
                'pierna_d': calcAng3D(lm[24], lm[26], lm[28]),
                'pierna_i': calcAng3D(lm[23], lm[25], lm[27])
            };

            const draw = (p1, p2, color, sz=6) => {
                ctx.beginPath(); ctx.moveTo(p1.x*w, p1.y*h); ctx.lineTo(p2.x*w, p2.y*h);
                ctx.strokeStyle = color; ctx.lineWidth = sz; ctx.lineCap="round"; ctx.stroke();
            };

            // Dibujado con Semáforo
            draw(lm[0], h_med, calcularColorRiesgo('cabeza', datos.cabeza));
            draw(h_med, c_med, calcularColorRiesgo('tronco', datos.tronco), 10);
            
            // Miembros Superiores
            draw(lm[12], lm[14], calcularColorRiesgo('brazos', datos.brazo_d));
            draw(lm[14], lm[16], calcularColorRiesgo('brazos', datos.brazo_d));
            draw(lm[11], lm[13], calcularColorRiesgo('brazos', datos.brazo_i));
            draw(lm[13], lm[15], calcularColorRiesgo('brazos', datos.brazo_i));

            // Miembros Inferiores
            draw(lm[24], lm[26], calcularColorRiesgo('piernas', datos.pierna_d));
            draw(lm[26], lm[28], calcularColorRiesgo('piernas', datos.pierna_d));
            draw(lm[23], lm[25], calcularColorRiesgo('piernas', datos.pierna_i));
            draw(lm[25], lm[27], calcularColorRiesgo('piernas', datos.pierna_i));
        }
        ctx.restore();
    });

    async function renderLoop() {
        if (!video.paused) {
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            await poseSolver.send({image: video});
            requestAnimationFrame(renderLoop);
        }
    }

    function iniciarCalibracion() {
        txtStatus.innerText = "CALIBRANDO...";
        // Simulamos captura de base (en reposo)
        setTimeout(() => { txtStatus.innerText = "CALIBRACIÓN OK"; }, 2000);
    }

    function cambiarCamara() {
        currentFacingMode = (currentFacingMode === "user") ? "environment" : "user";
        iniciarApp('camara');
    }

    // Grabación simple
    let rec; let cks = [];
    function toggleGrabacion() {
        const b = document.getElementById('recordBtn');
        if (!rec || rec.state === "inactive") {
            rec = new MediaRecorder(canvas.captureStream(25));
            rec.ondataavailable = e => cks.push(e.data);
            rec.onstop = () => {
                const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob(cks));
                a.download = `ERGO_V5.webm`; a.click();
            };
            rec.start(); b.style.background = "white"; b.style.color = "red";
        } else { rec.stop(); b.style.background = "#ff4d4d"; b.style.color = "white"; }
    }
</script>
</body>
</html>
