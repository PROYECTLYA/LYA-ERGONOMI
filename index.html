</button>

<script>
/**
 * 🏷️ BLOQUE 1: CONFIGURACIÓN Y REFERENCIAS AL DOM
 */
const video = document.getElementById('input_video');
const canvas = document.getElementById('output_canvas');
const ctx = canvas.getContext('2d');
const txtStatus = document.getElementById('txt-status');

// Umbrales de desviación permitidos (Basados en NOM-036-STPS)
const TH = { 
    tronco: 18, cuello: 12, hombros: 15, 
    codos: 25, munecas: 20, piernas: 25, pies: 18 
};

/**
 * 🏷️ BLOQUE 2: ESTADO GLOBAL Y VARIABLES DE CONTROL
 */
let wbaStats = { 
    riesgoAltoTotal: 0, 
    framesAnalizados: 0, 
    zonasAfectadas: new Set(), 
    inicioAuditoria: null, 
    ciclos: 0, 
    lastHandY: null, 
    subiendo: false, 
    agarreSobreHombros: false 
};

let baseAngles = {};       // Ángulos de referencia (calibración)
let angleBuffer = {};      // Búfer para suavizado de ángulos
let posBuffer = {};        // Búfer para suavizado de coordenadas
const HISTORIAL_MAX = 20;  // Frames para media móvil de ángulos
const SUAVIZADO_POS = 5;   // Frames para suavizado de jitter

let iaActiva = false;
let calibrado = false;
let analizandoRiesgo = false;
let currentFacingMode = "environment";
let startTimeCalib = 0;
let pose;
let mediaRecorder;
let recordedChunks = [];

/**
 * 🏷️ BLOQUE 3: GESTIÓN DE CÁMARA Y ARCHIVOS
 */
async function prepararSistema(fuente) {
    const campos = [
        { id: 'nombreEmpresa', label: 'EMPRESA' },
        { id: 'puestoTrabajo', label: 'PUESTO' },
        { id: 'nombreTrabajador', label: 'NOMBRE TRABAJADOR' },
        { id: 'edadTrabajador', label: 'EDAD' },
        { id: 'pesoCarga', label: 'PESO DE CARGA' }
    ];

    let faltantes = [];
    campos.forEach(campo => {
        const el = document.getElementById(campo.id);
        if (!el.value.trim()) {
            faltantes.push(campo.label);
            el.style.border = "2px solid #ff4d4d";
        } else {
            el.style.border = "1px solid #30363d";
        }
    });

    if (faltantes.length > 0) {
        alert("⛔ BLOQUEO: Complete los campos:\n" + faltantes.join("\n"));
        return;
    }

    document.getElementById('menu-inicial').style.display = 'none';
    document.getElementById('contenedor-analisis').style.display = 'block';
    
    if (fuente === 'camara') {
        await encenderCamara();
        setTimeout(() => { activarIA(); }, 500); 
    } else {
        const file = document.getElementById('fileInput').files[0];
        if (!file) return location.reload();
        if (video.src) URL.revokeObjectURL(video.src); 
        video.src = URL.createObjectURL(file);
        video.onloadedmetadata = () => { setupCanvas(); video.play(); activarIA(); };
    }
}

async function encenderCamara() {
    try {
        if (video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
        const stream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: currentFacingMode, width: { ideal: 1280 }, height: { ideal: 720 } } 
        });
        video.srcObject = stream;
        video.onloadedmetadata = () => { setupCanvas(); video.play(); requestAnimationFrame(loopVideoSimple); };
    } catch (e) { alert("Error al acceder a la cámara"); }
}

function setupCanvas() {
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
}

function loopVideoSimple() {
    if (!iaActiva) {
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        requestAnimationFrame(loopVideoSimple);
    }
}

/**
 * 🏷️ BLOQUE 4: MOTOR MATEMÁTICO (BIOMECÁNICA)
 */
function calcAng3D(a,b,c) {
    const v1={x:a.x-b.x, y:a.y-b.y, z:a.z-b.z}, v2={x:c.x-b.x, y:c.y-b.y, z:c.z-b.z};
    const dot = v1.x*v2.x + v1.y*v2.y + v1.z*v2.z;
    const m1 = Math.sqrt(v1.x**2 + v1.y**2 + v1.z**2), m2 = Math.sqrt(v2.x**2 + v2.y**2 + v2.z**2);
    return (m1*m2 === 0) ? 0 : Math.acos(Math.max(-1, Math.min(1, dot/(m1*m2))))*(180/Math.PI);
}

const drawV = (p1, p2, angKey, groupKey, raw_lm1, raw_lm2) => {
    if (!raw_lm1 || !raw_lm2 || raw_lm1.visibility < 0.5 || raw_lm2.visibility < 0.5) return; 

    const buffer = angleBuffer[angKey] || [];
    if (buffer.length === 0) return; 

    const avgAngle = buffer.reduce((a, b) => a + b, 0) / buffer.length;
    let color = "#00ff00", thickness = 4, statusLabel = "SEGURO";

    if (analizandoRiesgo && calibrado) {
        const diff = Math.abs(avgAngle - (baseAngles[angKey] || avgAngle));
        const t = TH[groupKey];
        wbaStats.framesAnalizados++;

        if (diff > (t * 2)) { 
            wbaStats.riesgoAltoTotal++; 
            wbaStats.zonasAfectadas.add(groupKey);
            color = "#ff3838"; thickness = 10; statusLabel = "CRÍTICO";
        } else if (diff > t) {
            color = "#f1c40f"; thickness = 7; statusLabel = "ADVERTENCIA";
        }
    }

    ctx.shadowBlur = (color !== "#00ff00") ? 15 : 0;
    ctx.shadowColor = color;
    ctx.beginPath();
    ctx.strokeStyle = color; ctx.lineWidth = thickness; ctx.lineCap = "round";
    ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y);
    ctx.stroke();
    ctx.shadowBlur = 0;

    if (calibrado) {
        const midX = (p1.x + p2.x) / 2, midY = (p1.y + p2.y) / 2;
        let offsetX = (groupKey === "munecas" || groupKey === "codos") ? 45 : 20;
        let offsetY = (groupKey === "piernas") ? 40 : -20;

        ctx.fillStyle = "rgba(13, 17, 23, 0.85)";
        ctx.beginPath(); ctx.roundRect(midX + offsetX, midY + offsetY, 95, 36, 8); ctx.fill();
        ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.stroke();
        ctx.fillStyle = "#ffffff"; ctx.font = "bold 11px sans-serif";
        ctx.fillText(`${avgAngle.toFixed(1)}°`, midX + offsetX + 8, midY + offsetY + 16);
        ctx.fillStyle = color; ctx.font = "900 9px sans-serif";
        ctx.fillText(statusLabel, midX + offsetX + 8, midY + offsetY + 28);
    }
};

/**
 * 🏷️ BLOQUE 5: PROCESAMIENTO DE POSE (MediaPipe onResults)
 */
function onResults(res) {
    if (!res || !res.poseLandmarks) {
        txtStatus.innerText = "BUSCANDO SUJETO...";
        return;
    }
    
    const lm = res.poseLandmarks;
    const w = canvas.width, h = canvas.height;

    if (!calibrado && startTimeCalib > 0) {
        let seg = Math.ceil((3000 - (Date.now() - startTimeCalib)) / 1000);
        txtStatus.innerText = `MANTENGA POSTURA: ${seg > 0 ? seg : 0}s`;
    }

    ctx.save();
    ctx.clearRect(0, 0, w, h);
    if (currentFacingMode === "user") { ctx.translate(w, 0); ctx.scale(-1, 1); }
    ctx.drawImage(res.image, 0, 0, w, h);

    const pt = (i) => {
        if (!posBuffer[i]) posBuffer[i] = { history: [] };
        if (lm[i].visibility > 0.5) {
            posBuffer[i].history.push({ x: lm[i].x * w, y: lm[i].y * h });
            if (posBuffer[i].history.length > SUAVIZADO_POS) posBuffer[i].history.shift();
        }
        const avg = posBuffer[i].history.reduce((a, b) => ({x: a.x + b.x, y: a.y + b.y}), {x:0, y:0});
        const len = posBuffer[i].history.length || 1;
        return { x: avg.x/len, y: avg.y/len, z: lm[i].z, visibility: lm[i].visibility };
    };

    const p = {
        cab: pt(0), 
        cue: { x: (lm[11].x + lm[12].x)/2*w, y: (lm[11].y + lm[12].y)/2*h, z: (lm[11].z + lm[12].z)/2 },
        tor: { x: (lm[11].x + lm[12].x)/2*w, y: (lm[11].y + lm[12].y)/2*h + 40 },
        abd: { x: (lm[23].x + lm[24].x)/2*w, y: (lm[23].y + lm[24].y)/2*h - 30 },
        esp_baja: { x: (lm[23].x + lm[24].x)/2*w, y: (lm[23].y + lm[24].y)/2*h },
        h_d: pt(12), c_d: pt(14), m_d: pt(16), mano_d: pt(20),
        h_i: pt(11), c_i: pt(13), m_i: pt(15), mano_i: pt(19),
        p_d: pt(24), r_d: pt(26), t_d: pt(28), pie_d: pt(32),
        p_i: pt(23), r_i: pt(25), t_i: pt(27), pie_i: pt(31)
    };

    // Lógica de Ciclos NOM-036
    if (analizandoRiesgo) {
        const currentHandY = (p.m_d.y + p.m_i.y) / 2;
        if (wbaStats.lastHandY !== null) {
            const desp = wbaStats.lastHandY - currentHandY;
            const umbral = Math.abs(p.h_d.y - p.p_d.y) * 0.3;
            if (desp > umbral && !wbaStats.subiendo) { wbaStats.ciclos++; wbaStats.subiendo = true; }
            else if (desp < -umbral) { wbaStats.subiendo = false; }
        }
        wbaStats.lastHandY = currentHandY;

        if (p.m_d.y < p.h_d.y || p.m_i.y < p.h_i.y) {
            wbaStats.zonasAfectadas.add("AGARRE ALTO");
            ctx.fillStyle = "red"; ctx.font = "bold 20px sans-serif";
            ctx.fillText("⚠️ AGARRE SOBRE HOMBROS", 30, 100);
        }
    }

    const curAng = {
        cue: calcAng3D(p.cab, p.cue, p.tor), abd: calcAng3D(p.tor, p.abd, p.esp_baja),
        c_d: calcAng3D(p.h_d, p.c_d, p.m_d), c_i: calcAng3D(p.h_i, p.c_i, p.m_i),
        h_d: calcAng3D(p.p_d, p.h_d, p.c_d), h_i: calcAng3D(p.p_i, p.h_i, p.c_i),
        r_d: calcAng3D(p.p_d, p.r_d, p.t_d), r_i: calcAng3D(p.p_i, p.r_i, p.t_i)
    };

    Object.keys(curAng).forEach(k => {
        if (!angleBuffer[k]) angleBuffer[k] = [];
        angleBuffer[k].push(curAng[k]);
        if (angleBuffer[k].length > HISTORIAL_MAX) angleBuffer[k].shift();
    });

    if (iaActiva && !calibrado && startTimeCalib > 0 && (Date.now() - startTimeCalib > 3000)) {
        Object.keys(angleBuffer).forEach(k => { 
            baseAngles[k] = angleBuffer[k].reduce((a, b) => a + b, 0) / angleBuffer[k].length; 
        });
        calibrado = true; startTimeCalib = 0;
        document.getElementById('recordBtn').disabled = false;
        txtStatus.innerText = "CALIBRADO - LISTO";
    }

    drawV(p.cue, p.esp_baja, 'abd', 'tronco', lm[11], lm[23]);
    drawV(p.h_d, p.c_d, 'c_d', 'codos', lm[12], lm[14]);
    drawV(p.h_i, p.c_i, 'c_i', 'codos', lm[11], lm[13]);
    drawV(p.p_d, p.r_d, 'r_d', 'piernas', lm[24], lm[26]);
    drawV(p.p_i, p.r_i, 'r_i', 'piernas', lm[23], lm[25]);
    
    ctx.restore();
}

/**
 * 🏷️ BLOQUE 6: CONTROL DE IA Y CALIBRACIÓN
 */
async function activarIA() {
    const loader = document.getElementById('loader-ia');
    if (loader) loader.style.display = 'flex';
    iaActiva = false;
    txtStatus.innerText = "INICIALIZANDO...";

    if (!pose) {
        pose = new Pose({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}` });
        pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
        pose.onResults((res) => {
            if (res.poseLandmarks) {
                if (!iaActiva) { if (loader) loader.style.display = 'none'; iaActiva = true; }
                onResults(res);
            }
        });
    }

    async function procesarFrame() {
        if (video.readyState >= 2) await pose.send({ image: video });
        requestAnimationFrame(procesarFrame);
    }
    procesarFrame();
}

function iniciarCalibracionManual() {
    if (!iaActiva) return alert("Espere detección de la IA.");
    calibrado = false;
    angleBuffer = {};
    startTimeCalib = Date.now();
    txtStatus.innerText = "MANTENGA POSTURA NEUTRA...";
}

/**
 * 🏷️ BLOQUE 7: EXPORTACIÓN (PDF Y VIDEO)
 */
function generarReporteWBA() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const tr = document.getElementById('nombreTrabajador')?.value || "N/A";
    const riesgo = wbaStats.framesAnalizados > 0 ? ((wbaStats.riesgoAltoTotal / wbaStats.framesAnalizados) * 100).toFixed(1) : 0;

    doc.setFillColor(13, 17, 23); doc.rect(0, 0, 210, 25, 'F');
    doc.setTextColor(0, 255, 0); doc.setFontSize(20); doc.text("LYA – ERGONOMI", 105, 15, { align: "center" });
    
    doc.setTextColor(0, 0, 0); doc.text(`Trabajador: ${tr}`, 20, 40);
    doc.text(`Riesgo Crítico: ${riesgo}%`, 20, 50);
    doc.text(`Ciclos: ${wbaStats.ciclos}`, 20, 60);

    doc.save(`REPORTE_NOM036_${tr.replace(/\s+/g, '_')}.pdf`);
}

function toggleGrabacion() {
    if (!calibrado) return alert("Calibre primero.");
    analizandoRiesgo = !analizandoRiesgo;
    const btn = document.getElementById('recordBtn');

    if (analizandoRiesgo) {
        recordedChunks = [];
        const stream = canvas.captureStream(30);
        mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
        mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
        mediaRecorder.onstop = descargarVideo;
        mediaRecorder.start();
        wbaStats.inicioAuditoria = Date.now();
        btn.innerHTML = "⏹️ DETENER";
    } else {
        mediaRecorder.stop();
        setTimeout(() => { generarReporteWBA(); }, 800);
        btn.innerHTML = "🔴 AUDITAR";
    }
}

function descargarVideo() {
    const blob = new Blob(recordedChunks, { type: 'video/webm' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `EVIDENCIA_LYA.webm`;
    a.click();
}

/**
 * 🏷️ BLOQUE 8: EVENTOS DE SISTEMA
 */
async function cambiarCamara() {
    currentFacingMode = (currentFacingMode === "environment") ? "user" : "environment";
    iaActiva = false;
    await encenderCamara();
}

window.addEventListener('resize', () => {
    if (video.readyState >= 2) setupCanvas();
});
</script>
