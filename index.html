<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ERGO-SENSING PRO v11.0</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0d1117; color: white; margin: 0; overflow: hidden; font-family: sans-serif; }
        
        /* Pantalla de Inicio */
        #menu-inicial { display: flex; width: 100%; height: 100vh; flex-direction: column; align-items: center; justify-content: center; background: #0d1117; position: fixed; z-index: 5000; }
        .btn-inicio { width: 85%; max-width: 320px; padding: 18px; margin: 10px; border-radius: 12px; font-weight: bold; border: none; }

        /* Contenedor de Análisis */
        #contenedor-analisis { display: none; width: 100vw; height: 100vh; position: relative; background: #000; }
        canvas { width: 100%; height: 100%; object-fit: contain; }
        video { display: none; }

        /* HUD y Controles */
        .status-badge { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.85); color: #fff; padding: 12px; border-radius: 10px; border-left: 5px solid #00ff00; font-size: 11px; z-index: 3000; }
        .barra-controles { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 12px; z-index: 4000; width: 95%; justify-content: center; }
        
        .btn-circular { width: 62px; height: 62px; border-radius: 50%; border: none; font-size: 10px; font-weight: bold; color: white; display: flex; align-items: center; justify-content: center; flex-direction: column; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .rec-active { background: #fff !important; color: #f00 !important; border: 2px solid #f00 !important; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.6; } }
    </style>
</head>
<body>

<div id="menu-inicial">
    <h1 style="color: #00ff00; margin-bottom: 5px;">ERGO-SENSING PRO</h1>
    <p style="color: #8b949e; margin-bottom: 30px;">v11.0 - Full Features</p>
    
    <button class="btn-inicio" style="background:#27ae60; color:white;" onclick="prepararSistema('camara')">🎥 USAR CÁMARA</button>
    <button class="btn-inicio" style="background:#2980b9; color:white;" onclick="document.getElementById('fileInput').click()">📁 SUBIR VIDEO</button>
    
    <input type="file" id="fileInput" hidden accept="video/*" onchange="prepararSistema('archivo')">
</div>

<div id="contenedor-analisis">
    <div class="status-badge" id="txt-status">PASO 1: POSICIONE AL SUJETO</div>
    <canvas id="output_canvas"></canvas>
    <video id="input_video" playsinline muted></video>
    
    <div class="barra-controles">
        <button class="btn-circular btn-dark" onclick="location.reload()">MENÚ</button>
        <button class="btn-circular" style="background:#00d2d3; color:#000;" onclick="cambiarCamara()">🔄<br>CAM</button>
        <button id="btn-calib" class="btn-circular" style="background:#f1c40f; color:#000;" onclick="activarIA()">⚖️<br>CALIB</button>
        <button id="recordBtn" class="btn-circular" style="background:#ff4d4d; opacity: 0.3;" onclick="toggleGrabacion()">🔴<br>REC</button>
    </div>
</div>

<script>
    const video = document.getElementById('input_video');
    const canvas = document.getElementById('output_canvas');
    const ctx = canvas.getContext('2d');
    const txtStatus = document.getElementById('txt-status');
    
    let pose = null;
    let streamActual = null;
    let currentFacingMode = "environment";
    
    // Estados de flujo
    let iaActiva = false;
    let calibrado = false;
    let analizandoRiesgo = false;
    
    let startTimeCalib = 0;
    let baseAngles = {};
    const THRESHOLDS = { 'cabeza': { amar: 15, rojo: 25 }, 'abdomen': { amar: 20, rojo: 40 }, 'ext': { amar: 30, rojo: 55 } };

    async function prepararSistema(fuente) {
        document.getElementById('menu-inicial').style.display = 'none';
        document.getElementById('contenedor-analisis').style.display = 'block';

        if (fuente === 'camara') {
            await encenderCamara();
        } else {
            const file = document.getElementById('fileInput').files[0];
            if (file) {
                video.src = URL.createObjectURL(file);
                video.onloadedmetadata = () => {
                    video.play();
                    requestAnimationFrame(loopVideoSimple);
                };
            }
        }
    }

    async function encenderCamara() {
        try {
            if (streamActual) streamActual.getTracks().forEach(t => t.stop());
            
            streamActual = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: currentFacingMode } 
            });
            video.srcObject = streamActual;
            video.onloadedmetadata = () => {
                video.play();
                requestAnimationFrame(loopVideoSimple);
            };
        } catch (e) {
            alert("Error al acceder a la cámara seleccionada.");
            location.reload();
        }
    }

    function loopVideoSimple() {
        if (!video.paused && !iaActiva) {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            requestAnimationFrame(loopVideoSimple);
        }
    }

    function activarIA() {
        if (iaActiva) return;
        txtStatus.innerText = "INICIALIZANDO IA...";
        
        pose = new Pose({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}` });
        pose.setOptions({ modelComplexity: 0, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
        pose.onResults(onResults);
        
        iaActiva = true;
        startTimeCalib = Date.now();
        requestAnimationFrame(loopIA);
    }

    async function loopIA() {
        if (!video.paused && iaActiva) {
            await pose.send({image: video});
            requestAnimationFrame(loopIA);
        }
    }

    function onResults(res) {
        if (!res.poseLandmarks) return;
        
        ctx.save();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Efecto espejo solo si es cámara frontal
        if (currentFacingMode === "user") {
            ctx.translate(canvas.width, 0);
            ctx.scale(-1, 1);
        }
        
        ctx.drawImage(res.image, 0, 0, canvas.width, canvas.height);

        const lm = res.poseLandmarks;
        const w = canvas.width, h = canvas.height;
        const pt = (i) => ({ x: lm[i].x * w, y: lm[i].y * h });
        
        const h_m = { x:(lm[11].x+lm[12].x)/2, y:(lm[11].y+lm[12].y)/2 };
        const c_m = { x:(lm[23].x+lm[24].x)/2, y:(lm[23].y+lm[24].y)/2 };

        // Calibración
        if (!calibrado) {
            const segs = Math.max(0, Math.ceil((5000 - (Date.now() - startTimeCalib)) / 1000));
            txtStatus.innerText = `CALIBRANDO POSTURA: ${segs}s`;
            if (Date.now() - startTimeCalib > 5000) {
                baseAngles['cab'] = calcAng(lm[0], h_m, c_m);
                baseAngles['abd'] = calcAng(h_m, c_m, {x:c_m.x, y:c_m.y+1});
                calibrado = true;
                txtStatus.innerText = "CALIBRACIÓN OK. LISTO PARA GRABAR.";
                document.getElementById('recordBtn').style.opacity = "1";
            }
        }

        // Dibujo de Vectores
        const ph = {x:h_m.x*w, y:h_m.y*h}, pc = {x:c_m.x*w, y:c_m.y*h};
        
        const drawV = (p1, p2, k) => {
            ctx.lineWidth = 6; ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y);
            
            if (analizandoRiesgo) {
                const ang = (k==='cab') ? calcAng(lm[0], h_m, c_m) : calcAng(h_m, c_m, {x:c_m.x, y:c_m.y+1});
                const diff = Math.abs(ang - baseAngles[k]);
                const t = THRESHOLDS[k === 'cab' ? 'cabeza' : 'abdomen'];
                ctx.strokeStyle = diff > t.rojo ? "#f00" : diff > t.amar ? "#ff0" : "#0f0";
            } else {
                ctx.strokeStyle = calibrado ? "#0f0" : "#888";
            }
            ctx.stroke();
        };

        drawV(pt(0), ph, 'cab');
        drawV(ph, pc, 'abd');
        
        ctx.restore();
    }

    function calcAng(a,b,c) {
        const v1={x:a.x-b.x, y:a.y-b.y}, v2={x:c.x-b.x, y:c.y-b.y};
        const dot = v1.x*v2.x + v1.y*v2.y;
        const m1 = Math.sqrt(v1.x**2 + v1.y**2), m2 = Math.sqrt(v2.x**2 + v2.y**2);
        return Math.acos(Math.max(-1, Math.min(1, dot/(m1*m2+1e-6))))*(180/Math.PI);
    }

    async function cambiarCamara() {
        currentFacingMode = (currentFacingMode === "environment") ? "user" : "environment";
        iaActiva = false; // Reset IA para que no choque con el cambio de sensor
        calibrado = false;
        await encenderCamara();
    }

    function toggleGrabacion() {
        if (!calibrado) return;
        analizandoRiesgo = !analizandoRiesgo;
        const btn = document.getElementById('recordBtn');
        if (analizandoRiesgo) {
            btn.classList.add('rec-active');
            txtStatus.innerText = "GRABANDO Y ANALIZANDO RIESGO...";
        } else {
            btn.classList.remove('rec-active
