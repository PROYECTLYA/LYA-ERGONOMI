<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LYA-ERGO v20.8 | FIX CALCULUS</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body, html { background-color: #0d1117; color: white; margin: 0; overflow: hidden; width: 100vw; height: 100vh; font-family: 'Segoe UI', sans-serif; }
        #menu-inicial { display: flex; width: 100%; height: 100vh; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle, #161b22 0%, #0d1117 100%); position: fixed; z-index: 5000; }
        #contenedor-analisis { display: none; width: 100vw; height: 100vh; position: relative; background: #000; }
        canvas { width: 100%; height: 100%; object-fit: contain; display: block; }
        video { display: none; }
        .status-badge { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.8); padding: 12px 20px; border-radius: 8px; border-left: 4px solid #00ff00; font-size: 11px; z-index: 3000; font-weight: bold; font-family: monospace; }
        .barra-controles { position: absolute; bottom: 35px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; z-index: 4000; }
        .btn-circular { width: 70px; height: 70px; border-radius: 50%; border: none; font-size: 10px; font-weight: 900; color: white; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .rec-active { background: #fff !important; color: #f00 !important; border: 3px solid #f00 !important; animation: pulse-red 1.5s infinite; }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(255, 0, 0, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0); } }
    </style>
</head>
<body>

<div id="menu-inicial">
    <h1 style="color:#00ff00; letter-spacing: 5px; font-weight: 800;">LYA-ERGO</h1>
    <p style="color:#8b949e; letter-spacing: 2px;">V20.8 | ENGINE RECOVERY</p>
    <button class="btn btn-success btn-lg mb-3" style="width:250px" onclick="prepararSistema('camara')">VISTA EN VIVO</button>
    <button class="btn btn-primary btn-lg" style="width:250px" onclick="document.getElementById('fileInput').click()">SUBIR ARCHIVO</button>
    <input type="file" id="fileInput" hidden accept="video/*" onchange="prepararSistema('archivo')">
</div>

<div id="contenedor-analisis">
    <div class="status-badge" id="txt-status">SISTEMA: LISTO</div>
    <canvas id="output_canvas"></canvas>
    <video id="input_video" playsinline muted crossorigin="anonymous"></video>
    <div class="barra-controles">
        <button class="btn-circular btn-dark" onclick="location.reload()">SALIR</button>
        <button id="btn-calib" class="btn-circular" style="background:#f1c40f; color:#000;" onclick="activarIA()">CALIBRAR</button>
        <button id="recordBtn" class="btn-circular" style="background:#ff4d4d; opacity: 0.5;" onclick="toggleGrabacion()">AUDITAR</button>
    </div>
</div>

<script>
    const video = document.getElementById('input_video');
    const canvas = document.getElementById('output_canvas');
    const ctx = canvas.getContext('2d');
    const txtStatus = document.getElementById('txt-status');
    
    let pose = null, iaActiva = false, calibrado = false, analizandoRiesgo = false;
    let baseAngles = {}, smoothedAngles = {};
    let mediaRecorder, recordedChunks = [];

    // Umbrales Ergonómicos RULA/REBA simplificados
    const TH = { tronco: 20, cuello: 15, hombros: 30, codos: 20 };

    async function prepararSistema(fuente) {
        document.getElementById('menu-inicial').style.display = 'none';
        document.getElementById('contenedor-analisis').style.display = 'block';
        if (fuente === 'camara') {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: 1280, height: 720 } });
            video.srcObject = stream;
        } else {
            video.src = URL.createObjectURL(document.getElementById('fileInput').files[0]);
        }
        video.onloadeddata = () => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            video.play();
            requestAnimationFrame(renderLoop);
        };
    }

    function renderLoop() {
        if (!iaActiva) {
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            requestAnimationFrame(renderLoop);
        }
    }

    async function activarIA() {
        pose = new Pose({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}` });
        pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
        pose.onResults(onResults);
        iaActiva = true;
        txtStatus.innerText = "IA: INICIALIZANDO...";
        
        const loop = async () => {
            if (iaActiva) {
                await pose.send({ image: video });
                requestAnimationFrame(loop);
            }
        };
        loop();
        
        setTimeout(() => { calibrarBiotipo(); }, 3000);
    }

    function calibrarBiotipo() {
        calibrado = true;
        txtStatus.innerText = "CALIBRACIÓN COMPLETA";
        document.getElementById('recordBtn').style.opacity = "1";
    }

    function onResults(res) {
        if (!res.poseLandmarks) return;
        ctx.save();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(res.image, 0, 0, canvas.width, canvas.height);

        const lm = res.poseLandmarks;
        const w = canvas.width, h = canvas.height;
        
        // Función de mapeo corregida (Normalizado -> Pixel)
        const getPt = (i) => ({ 
            x: lm[i].x * w, 
            y: lm[i].y * h, 
            v: lm[i].visibility 
        });

        // Puntos de Control
        const p = {
            nariz: getPt(0),
            h_izq: getPt(11), h_der: getPt(12),
            c_izq: getPt(13), c_der: getPt(14),
            m_izq: getPt(15), m_der: getPt(16),
            cad_izq: getPt(23), cad_der: getPt(24)
        };

        // Puntos medios calculados para estabilidad
        const cuello = { x: (p.h_izq.x + p.h_der.x) / 2, y: (p.h_izq.y + p.h_der.y) / 2 };
        const pelvis = { x: (p.cad_izq.x + p.cad_der.x) / 2, y: (p.cad_izq.y + p.cad_der.y) / 2 };

        // Motor de Ángulos (Cálculo vectorial 2D estable)
        const calcAngle = (a, b, c) => {
            const v1 = { x: a.x - b.x, y: a.y - b.y };
            const v2 = { x: c.x - b.x, y: c.y - b.y };
            const dot = v1.x * v2.x + v1.y * v2.y;
            const mag = Math.sqrt(v1.x**2 + v1.y**2) * Math.sqrt(v2.x**2 + v2.y**2);
            return Math.acos(Math.max(-1, Math.min(1, dot / mag))) * (180 / Math.PI);
        };

        const currentAngles = {
            cuello: calcAngle(p.nariz, cuello, pelvis),
            tronco: calcAngle(cuello, pelvis, { x: pelvis.x, y: pelvis.y + 100 }),
            h_der: calcAngle(pelvis, p.h_der, p.c_der),
            h_izq: calcAngle(pelvis, p.h_izq, p.c_izq)
        };

        if (calibrado && Object.keys(baseAngles).length === 0) baseAngles = {...currentAngles};

        // Renderizado de semaforización
        const drawLink = (a, b, angleKey, thresholdGroup) => {
            if (a.v < 0.5 || b.v < 0.5) return;
            ctx.beginPath();
            ctx.lineWidth = 8;
            ctx.lineCap = "round";
            ctx.moveTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);

            if (analizandoRiesgo) {
                const delta = Math.abs(currentAngles[angleKey] - baseAngles[angleKey]);
                const limit = TH[thresholdGroup];
                ctx.strokeStyle = delta > limit ? (delta > limit * 2 ? "#ff0000" : "#ffff00") : "#00ff00";
            } else {
                ctx.strokeStyle = "#00ff00";
            }
            ctx.stroke();
        };

        // Dibujar esquema corregido
        drawLink(p.nariz, cuello, 'cuello', 'cuello');
        drawLink(cuello, pelvis, 'tronco', 'tronco');
        drawLink(p.h_der, p.c_der, 'h_der', 'hombros');
        drawLink(p.c_der, p.m_der, 'h_der', 'codos');
        drawLink(p.h_izq, p.c_izq, 'h_izq', 'hombros');
        drawLink(p.c_izq, p.m_izq, 'h_izq', 'codos');

        ctx.restore();
    }

    function toggleGrabacion() {
        if (!calibrado) return;
        analizandoRiesgo = !analizandoRiesgo;
        const btn = document.getElementById('recordBtn');
        btn.classList.toggle('rec-active');
        
        if (analizandoRiesgo) {
            recordedChunks = [];
            mediaRecorder = new MediaRecorder(canvas.captureStream(30), { mimeType: 'video/webm' });
            mediaRecorder.ondataavailable = (e) => recordedChunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = `LYA_RECOVERY_${Date.now()}.webm`; a.click();
            };
            mediaRecorder.start();
            txtStatus.innerText = "ESTADO: AUDITANDO...";
        } else {
            mediaRecorder.stop();
            txtStatus.innerText = "AUDITORÍA FINALIZADA";
        }
    }
</script>
</body>
</html>
