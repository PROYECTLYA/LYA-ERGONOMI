<!DOCTYPE html> 
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LYA-ERGO v20.2 | AUDITORÍA CERVECERA HIERÁRQUICA</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body { background-color: #0d1117; color: white; margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #menu-inicial { display: flex; width: 100%; height: 100vh; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle, #161b22 0%, #0d1117 100%); position: fixed; z-index: 5000; }
        .logo-text { color: #00ff00; font-weight: 800; letter-spacing: 3px; margin-bottom: 0; }
        .sub-text { color: #8b949e; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 40px; }
        .btn-inicio { width: 85%; max-width: 320px; padding: 18px; margin: 10px; border-radius: 12px; font-weight: bold; border: none; font-size: 1.1rem; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        #loader-ia { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(13, 17, 23, 0.98); z-index: 6000; flex-direction: column; align-items: center; justify-content: center; }
        .progress-bar { width: 0%; height: 6px; background: #00ff00; transition: 0.4s; box-shadow: 0 0 20px #00ff00; margin-top: 25px; border-radius: 10px; }
        #contenedor-analisis { display: none; width: 100vw; height: 100vh; position: relative; background: #000; }
        canvas { width: 100%; height: 100%; object-fit: contain; }
        video { display: none; }
        .status-badge { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.8); padding: 12px 20px; border-radius: 8px; border-left: 4px solid #00ff00; font-size: 10px; z-index: 3000; font-weight: bold; }
        .barra-controles { position: absolute; bottom: 35px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; z-index: 4000; width: 95%; justify-content: center; }
        .btn-circular { width: 68px; height: 68px; border-radius: 50%; border: none; font-size: 9px; font-weight: 900; color: white; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .rec-active { background: #fff !important; color: #f00 !important; border: 3px solid #f00 !important; animation: pulse-red 1.5s infinite; }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(255, 0, 0, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0); } }
    </style>
</head>
<body>

<div id="loader-ia">
    <h3 style="color:#00ff00; letter-spacing: 4px; font-weight: 900;">LYA-AUDITOR ENGINE</h3>
    <div style="width: 75%; height: 6px; background: #21262d; border-radius: 10px; margin-top: 25px; overflow: hidden;">
        <div id="bar-id" class="progress-bar"></div>
    </div>
</div>


<div id="menu-inicial">
    <h1 class="logo-text">LYA-ERGO</h1>
    <p class="sub-text">Auditoría de Procesos NOM-036 (Vectorización Jerárquica)</p>
    
    <div style="width: 90%; max-width: 450px; background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1);">
        <div class="row">
            <div class="col-12 mb-3">
                <label style="color: #8b949e; font-size: 0.7rem; text-align: left; display: block;">EMPRESA / PLANTA:</label>
                <input type="text" id="nombreEmpresa" placeholder="Ej: Cervecería Modelo" style="width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #30363d; background: #0d1117; color: white;">
            </div>
            
            <div class="col-md-6 mb-3">
                <label style="color: #8b949e; font-size: 0.7rem; display: block;">PUESTO DE TRABAJO:</label>
                <input type="text" id="puestoTrabajo" placeholder="Ej: Estibador" style="width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #30363d; background: #0d1117; color: white;">
            </div>
            <div class="col-md-6 mb-3">
                <label style="color: #8b949e; font-size: 0.7rem; display: block;">ID / NOMBRE TRABAJADOR:</label>
                <input type="text" id="nombreTrabajador" placeholder="Ej: Juan Pérez" style="width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #30363d; background: #0d1117; color: white;">
            </div>

            <div class="col-md-6 mb-3">
                <label style="color: #8b949e; font-size: 0.7rem; display: block;">GÉNERO:</label>
                <select id="generoTrabajador" style="width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #30363d; background: #0d1117; color: white;">
                    <option value="H">Hombre</option>
                    <option value="M">Mujer</option>
                </select>
            </div>
            <div class="col-md-6 mb-3">
                <label style="color: #8b949e; font-size: 0.7rem; display: block;">EDAD:</label>
                <input type="number" id="edadTrabajador" min="15" max="80" placeholder="Años" style="width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #30363d; background: #0d1117; color: white;">
            </div>

            <div class="col-12">
                <label style="color: #27ae60; font-size: 0.7rem; display: block; font-weight: bold;">PESO DE LA CARGA (KG):</label>
                <input type="number" id="pesoCarga" min="1" max="50" placeholder="Ej: 10" style="width: 100%; padding: 10px; border-radius: 8px; border: 2px solid #27ae60; background: #0d1117; color: white;">
            </div>
        </div>
    </div>

    <div class="d-flex gap-2">
        <button class="btn-inicio" style="background:#27ae60; color:white; width: 180px;" onclick="prepararSistema('camara')">🎥 VIVO</button>
        <button class="btn-inicio" style="background:#2980b9; color:white; width: 180px;" onclick="document.getElementById('fileInput').click()">📁 ARCHIVO</button>
    </div>
    <input type="file" id="fileInput" hidden accept="video/*" onchange="prepararSistema('archivo')">
</div>
    
<div id="contenedor-analisis">
    <div class="status-badge" id="txt-status">SISTEMA READY</div>
    
    <canvas id="output_canvas"></canvas>
    
    <video id="input_video" playsinline muted style="display:none;"></video>
    
    <div class="barra-controles">
        <button class="btn-circular btn-dark" onclick="location.reload()" title="Cerrar auditoría">
            <span>✖</span><br>SALIR
        </button>
        
        <button class="btn-circular" style="background:#00d2d3; color:#000;" onclick="cambiarCamara()">
            <span>🔄</span><br>GIRAR
        </button>
        
        <button id="btn-calib" class="btn-circular" style="background:#f1c40f; color:#000;" onclick="activarIA()">
            <span>⚖️</span><br>CALIBRAR
        </button>
        
        <button id="recordBtn" class="btn-circular" style="background:#ff4d4d; opacity: 0.3;" onclick="toggleGrabacion()" disabled>
            <span>🔴</span><br>AUDITAR
        </button>
    </div>
</div>

<script>
/**
 * 🏷️ BLOQUE 1: REFERENCIAS AL DOM Y CONFIGURACIÓN BASE
 * Selección de elementos de interfaz y definición de umbrales NOM-036.
 */
    const video = document.getElementById('input_video');
    const canvas = document.getElementById('output_canvas');
    const ctx = canvas.getContext('2d');
    const txtStatus = document.getElementById('txt-status');

    // Umbrales de desviación permitidos (Grados)
    const TH = { tronco: 18, cuello: 12, hombros: 28, codos: 25, munecas: 20, piernas: 25, pies: 18 };

/**
 * 🏷️ BLOQUE 2: ESTADO GLOBAL Y VARIABLES DE CONTROL
 * Gestión de banderas de IA, calibración y almacenamiento temporal de ángulos.
 */
    let wbaStats = { riesgoAltoTotal: 0, framesAnalizados: 0, zonasAfectadas: new Set(), inicioAuditoria: null, ciclos: 0, lastHandY: null, subiendo: false };
    
    let baseAngles = {}, angleBuffer = {};
    const HISTORIAL_MAX = 20; // Para suavizado de movimiento
    let iaActiva = false, calibrado = false, analizandoRiesgo = false;
    let currentFacingMode = "environment", startTimeCalib = 0;
    let pose;

/**
 * 🏷️ BLOQUE 3: GESTIÓN DE FUENTES DE VIDEO
 * Configuración de cámara del dispositivo o carga de archivos locales.
 */
    async function prepararSistema(fuente) {
        document.getElementById('menu-inicial').style.display = 'none';
        document.getElementById('contenedor-analisis').style.display = 'block';
        if (fuente === 'camara') await encenderCamara();
        else {
            const file = document.getElementById('fileInput').files[0];
            if (!file) return;
            if (video.src) URL.revokeObjectURL(video.src); 
            video.src = URL.createObjectURL(file);
            video.onloadedmetadata = () => { setupCanvas(); video.play(); requestAnimationFrame(loopVideoSimple); };
        }
    }

    function setupCanvas() {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
    }

    async function encenderCamara() {
        try {
            if (video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: currentFacingMode, width: { ideal: 1280 }, height: { ideal: 720 } } 
            });
            video.srcObject = stream;
            video.onloadedmetadata = () => { setupCanvas(); video.play(); requestAnimationFrame(loopVideoSimple); };
        } catch (e) { alert("Error al acceder a la cámara"); }
    }

    function loopVideoSimple() {
        if (!iaActiva) {
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            requestAnimationFrame(loopVideoSimple);
        }
    }

/**
 * 🏷️ BLOQUE 4: MOTOR MATEMÁTICO Y RENDERIZADO VISUAL
 * Cálculo de ángulos en 3D y dibujo de indicadores (semáforo) sobre el cuerpo.
 */
    function calcAng3D(a,b,c) {
        const v1={x:a.x-b.x, y:a.y-b.y, z:a.z-b.z}, v2={x:c.x-b.x, y:c.y-b.y, z:c.z-b.z};
        const dot = v1.x*v2.x + v1.y*v2.y + v1.z*v2.z;
        const m1 = Math.sqrt(v1.x**2 + v1.y**2 + v1.z**2), m2 = Math.sqrt(v2.x**2 + v2.y**2 + v2.z**2);
        return (m1*m2 === 0) ? 0 : Math.acos(Math.max(-1, Math.min(1, dot/(m1*m2))))*(180/Math.PI);
    }

    const drawV = (p1, p2, angKey, groupKey, raw_lm1, raw_lm2) => {
        ctx.beginPath();
        ctx.lineCap = "round";
        ctx.moveTo(p1.x, p1.y);
        ctx.lineTo(p2.x, p2.y);

        if (!raw_lm1 || !raw_lm2 || raw_lm1.visibility < 0.6 || raw_lm2.visibility < 0.6) {
            ctx.strokeStyle = "#4b4b4b"; ctx.lineWidth = 4; ctx.stroke();
            return; 
        }

        const avgAngle = angleBuffer[angKey].reduce((a, b) => a + b, 0) / angleBuffer[angKey].length;
        let color = "#00ff00", thickness = 4, statusLabel = "SEGURO";

        if (analizandoRiesgo && calibrado) {
            const diff = Math.abs(avgAngle - (baseAngles[angKey] || avgAngle));
            const t = TH[groupKey];
            wbaStats.framesAnalizados++;
            if (diff > (t * 2)) { 
                wbaStats.riesgoAltoTotal++; wbaStats.zonasAfectadas.add(groupKey);
                color = "#ff3838"; thickness = 10; statusLabel = "CRÍTICO";
            } else if (diff > t) {
                color = "#f1c40f"; thickness = 7; statusLabel = "ADVERTENCIA";
            }
        }

        ctx.strokeStyle = color; ctx.lineWidth = thickness; ctx.stroke();

        if (calibrado) {
            const midX = (p1.x + p2.x) / 2, midY = (p1.y + p2.y) / 2;
            let offsetX = (groupKey === "munecas") ? 45 : 15;
            let offsetY = (groupKey === "munecas") ? 20 : -15;
            ctx.fillStyle = "rgba(0, 0, 0, 0.75)";
            ctx.beginPath(); ctx.roundRect(midX + offsetX, midY + offsetY, 90, 34, 5); ctx.fill();
            ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.stroke();
            ctx.fillStyle = "#ffffff"; ctx.font = "bold 10px Segoe UI";
            ctx.fillText(`${avgAngle.toFixed(1)}°`, midX + offsetX + 5, midY + offsetY + 15);
            ctx.fillStyle = color; ctx.font = "900 8px Segoe UI";
            ctx.fillText(statusLabel, midX + offsetX + 5, midY + offsetY + 27);
        }
    };

/**
 * 🏷️ BLOQUE 5: PROCESAMIENTO DE PUNTOS CLAVE (onResults)
 * Mapeo de articulaciones MediaPipe y lógica de conteo de ciclos/levantamientos.
 */
    function onResults(res) {
        if (!res.poseLandmarks) return;
        ctx.save();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (currentFacingMode === "user") { ctx.translate(canvas.width, 0); ctx.scale(-1, 1); }
        ctx.drawImage(res.image, 0, 0, canvas.width, canvas.height);

        const lm = res.poseLandmarks, w = canvas.width, h = canvas.height;
        const pt = (i) => ({ x: lm[i].x * w, y: lm[i].y * h, z: lm[i].z });
        
        const p = {
            cab: pt(0), 
            cue: { x: (lm[11].x+lm[12].x)/2*w, y:(lm[11].y+lm[12].y)/2*h, z:(lm[11].z+lm[12].z)/2 },
            tor: { x: (lm[11].x+lm[12].x)/2*w, y:(lm[11].y+lm[12].y)/2*h + 40, z:(lm[11].z+lm[12].z)/2 },
            abd: { x: (lm[23].x+lm[24].x)/2*w, y:(lm[23].y+lm[24].y)/2*h - 30, z:(lm[23].z+lm[24].z)/2 },
            esp_baja: { x: (lm[23].x+lm[24].x)/2*w, y:(lm[23].y+lm[24].y)/2*h, z:(lm[23].z+lm[24].z)/2 },
            h_d: pt(12), c_d: pt(14), m_d: pt(16), mano_d: pt(20),
            h_i: pt(11), c_i: pt(13), m_i: pt(15), mano_i: pt(19),
            p_d: pt(24), r_d: pt(26), t_d: pt(28), pie_d: pt(32),
            p_i: pt(23), r_i: pt(25), t_i: pt(27), pie_i: pt(31)
        };

        if (analizandoRiesgo) {
            const alturaTorso = Math.abs(p.h_d.y - p.p_d.y);
            const currentHandY = (p.m_d.y + p.m_i.y) / 2;
            const umbralMovimiento = alturaTorso * 0.3; 

            if (wbaStats.lastHandY !== null) {
                const desplazamiento = wbaStats.lastHandY - currentHandY;
                if (desplazamiento > umbralMovimiento && !wbaStats.subiendo) {
                    wbaStats.ciclos++; wbaStats.subiendo = true;
                } else if (desplazamiento < -umbralMovimiento) {
                    wbaStats.subiendo = false;
                }
            }
            wbaStats.lastHandY = currentHandY;
        }

        const currentAngles = {
            cue: calcAng3D(p.cab, p.cue, p.tor), abd: calcAng3D(p.tor, p.abd, p.esp_baja),
            c_d: calcAng3D(p.h_d, p.c_d, p.m_d), c_i: calcAng3D(p.h_i, p.c_i, p.m_i),
            m_d: calcAng3D(p.c_d, p.m_d, p.mano_d), m_i: calcAng3D(p.c_i, p.m_i, p.mano_i),
            h_d: calcAng3D(p.p_d, p.h_d, p.c_d), h_i: calcAng3D(p.p_i, p.h_i, p.c_i),
            r_d: calcAng3D(p.p_d, p.r_d, p.t_d), r_i: calcAng3D(p.p_i, p.r_i, p.t_i),
            t_d: calcAng3D(p.r_d, p.t_d, p.pie_d), t_i: calcAng3D(p.r_i, p.t_i, p.pie_i)
        };

        Object.keys(currentAngles).forEach(k => {
            if (!angleBuffer[k]) angleBuffer[k] = [];
            angleBuffer[k].push(currentAngles[k]);
            if (angleBuffer[k].length > HISTORIAL_MAX) angleBuffer[k].shift();
        });

        if (iaActiva && !calibrado && (Date.now() - startTimeCalib > 3000)) {
            Object.keys(angleBuffer).forEach(k => { baseAngles[k] = angleBuffer[k].reduce((a,b)=>a+b,0) / angleBuffer[k].length; });
            wbaStats.lastHandY = (p.m_d.y + p.m_i.y) / 2;
            calibrado = true; document.getElementById('recordBtn').style.opacity = "1";
            txtStatus.innerText = "CALIBRADO - LISTO";
        }

        // Esqueleto y Líneas de Articulación
        ctx.strokeStyle = "#00ff00"; ctx.lineWidth = 4;
        ctx.beginPath(); ctx.moveTo(p.h_i.x, p.h_i.y); ctx.lineTo(p.h_d.x, p.h_d.y); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(p.p_i.x, p.p_i.y); ctx.lineTo(p.p_d.x, p.p_d.y); ctx.stroke();
        drawV(p.cue, p.esp_baja, 'abd', 'tronco', lm[11], lm[23]);
        drawV(p.cue, p.cab, 'cue', 'cuello', lm[11], lm[0]);
        drawV(p.h_d, p.c_d, 'c_d', 'codos', lm[12], lm[14]); drawV(p.c_d, p.m_d, 'c_d', 'codos', lm[14], lm[16]);
        drawV(p.h_i, p.c_i, 'c_i', 'codos', lm[11], lm[13]); drawV(p.c_i, p.m_i, 'c_i', 'codos', lm[13], lm[15]);
        drawV(p.p_d, p.r_d, 'r_d', 'piernas', lm[24], lm[26]); drawV(p.r_d, p.t_d, 'r_d', 'piernas', lm[26], lm[28]);
        drawV(p.p_i, p.r_i, 'r_i', 'piernas', lm[23], lm[25]); drawV(p.r_i, p.t_i, 'r_i', 'piernas', lm[25], lm[27]);
        ctx.restore();
    }

/**
 * 🏷️ BLOQUE 6: INICIALIZACIÓN DE IA (MEDIAPIPE)
 * Carga de modelos de redes neuronales y bucle de inferencia.
 */
    function activarIA() {
        document.getElementById('loader-ia').style.display = 'flex';
        pose = new Pose({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}` });
        pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });
        pose.onResults((res) => {
            if (!iaActiva) { document.getElementById('loader-ia').style.display = 'none'; iaActiva = true; startTimeCalib = Date.now(); loopIA(); }
            onResults(res);
        });
        pose.send({image: video});
    }

    async function loopIA() { if (iaActiva) { await pose.send({image: video}); requestAnimationFrame(loopIA); } }

/**
 * 🏷️ BLOQUE 7: GENERACIÓN DE REPORTE PDF
 * Cruce de datos de auditoría con normatividad NOM-036 y exportación con jsPDF.
 */
    function generarReporteWBA() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const puesto = document.getElementById('puestoTrabajo')?.value || "GENERAL";
        const peso = parseFloat(document.getElementById('pesoCarga')?.value) || 0;
        const porcentajeRiesgo = wbaStats.framesAnalizados > 0 ? ((wbaStats.riesgoAltoTotal / wbaStats.framesAnalizados) * 100).toFixed(1) : 0;
        const zonas = Array.from(wbaStats.zonasAfectadas).join(', ') || 'NINGUNA';
        const msTranscurridos = Date.now() - wbaStats.inicioAuditoria;
        const duracionMinutos = msTranscurridos / 60000;
        const frecuencia = (wbaStats.ciclos / (duracionMinutos || 0.01)).toFixed(2);

        let colorHex = "#27ae60", conclusion = "OPERACIÓN ESTABLE / RIESGO BAJO";
        if (peso > 25 || frecuencia > 4 || porcentajeRiesgo > 60) { colorHex = "#c0392b"; conclusion = "NO APTO: REQUIERE REDISEÑO O AYUDA MECÁNICA INMEDIATA"; }
        else if (peso > 15 || frecuencia > 1 || porcentajeRiesgo > 25) { colorHex = "#f1c40f"; conclusion = "RIESGO MODERADO: REQUIERE AJUSTES ERGONÓMICOS"; }

        doc.setFillColor(13, 17, 23); doc.rect(0, 0, 210, 40, 'F');
        doc.setTextColor(0, 255, 0); doc.setFontSize(22); doc.text("LYA – ERGONOMI", 105, 20, { align: "center" });
        doc.setTextColor(255, 255, 255); doc.setFontSize(14); doc.text("REPORTE MIXTO: WBA + NOM-036-STPS", 105, 32, { align: "center" });

        doc.autoTable({
            startY: 75,
            head: [['FACTOR ANALIZADO', 'VALOR OBTENIDO', 'ESTATUS']],
            body: [['Peso de Carga', `${peso} kg`, peso > 25 ? 'RIESGO' : 'ACEPTABLE'],['Frecuencia', `${frecuencia} lev/min`, frecuencia > 4 ? 'RIESGO ALTO' : 'ESTABLE'],['Postura Crítica', `${porcentajeRiesgo}%`, zonas]],
            headStyles: { fillColor: [41, 128, 185] }
        });

        const finalY = doc.lastAutoTable.finalY + 15;
        doc.setDrawColor(colorHex); doc.rect(15, finalY, 180, 40);
        doc.setTextColor(colorHex); doc.text("CONCLUSIÓN Y RECOMENDACIÓN:", 20, finalY + 10);
        doc.setTextColor(0, 0, 0); doc.setFontSize(10);
        doc.text(`${conclusion}. Se detectó estrés en: ${zonas}. Ciclos totales: ${wbaStats.ciclos}.`, 20, finalY + 20, { maxWidth: 170 });
        doc.save(`REPORTE_LYA_${puesto.replace(/\s+/g, '_')}.pdf`);
    }

/**
 * 🏷️ BLOQUE 8: CONTROL DE GRABACIÓN Y CÁMARA
 * Funciones de usuario para iniciar auditoría o alternar cámara frontal/trasera.
 */
    function toggleGrabacion() {
        if (!calibrado) return;
        analizandoRiesgo = !analizandoRiesgo;
        const btn = document.getElementById('recordBtn');
        btn.classList.toggle('rec-active', analizandoRiesgo);

        if (analizandoRiesgo) {
            wbaStats = { riesgoAltoTotal: 0, framesAnalizados: 0, zonasAfectadas: new Set(), inicioAuditoria: Date.now(), ciclos: 0, lastHandY: null, subiendo: false };
            txtStatus.innerText = "ANALIZANDO...";
            btn.innerHTML = "⏹️<br>DETENER";
        } else {
            txtStatus.innerText = "GENERANDO REPORTE...";
            btn.innerHTML = "🔴<br>AUDITAR";
            setTimeout(() => { generarReporteWBA(); txtStatus.innerText = "FIN AUDITORÍA"; }, 300);
        }
    }

    async function cambiarCamara() {
        currentFacingMode = (currentFacingMode === "environment") ? "user" : "environment";
