<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ERGO-SENSING PRO v7.8</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0d1117; color: white; margin: 0; overflow: hidden; font-family: sans-serif; }
        #menu-inicial { display: flex; width: 100%; height: 100vh; flex-direction: column; align-items: center; justify-content: center; background: #0d1117; position: fixed; z-index: 5000; }
        #contenedor-analisis { display: none; width: 100vw; height: 100vh; position: relative; background: #000; }
        canvas { width: 100%; height: 100%; object-fit: contain; }
        video { display: none; }
        .status-badge { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.85); color: #00ff00; padding: 12px; border-radius: 10px; border-left: 5px solid #00ff00; font-size: 11px; z-index: 3000; }
        .barra-controles { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 12px; z-index: 4000; }
        .btn-circular { width: 62px; height: 62px; border-radius: 50%; border: none; font-size: 10px; font-weight: bold; color: white; display: flex; align-items: center; justify-content: center; flex-direction: column; text-align: center; }
    </style>
</head>
<body>

<div id="menu-inicial">
    <h1 style="color: #00ff00;">ERGO-SENSING PRO</h1>
    <p>v7.8 - Fix Cámara Trasera</p>
    <button class="btn btn-success p-3 w-75 mb-3" onclick="iniciarSistema('camara')">🎥 INICIAR CÁMARA</button>
    <button class="btn btn-primary p-3 w-75" onclick="document.getElementById('fileInput').click()">📁 VIDEO LOCAL</button>
    <input type="file" id="fileInput" hidden accept="video/*" onchange="iniciarSistema('archivo')">
</div>

<div id="contenedor-analisis">
    <div class="status-badge" id="txt-status">CONECTANDO...</div>
    <canvas id="output_canvas"></canvas>
    <video id="input_video" playsinline muted></video>
    <div class="barra-controles">
        <button class="btn-circular btn-dark" onclick="location.reload()">MENÚ</button>
        <button class="btn-circular" style="background:#00d2d3; color:#000;" onclick="cambiarCamara()">🔄<br>CAM</button>
        <button class="btn-circular" style="background:#f1c40f; color:#000;" onclick="recalibrar()">⚖️<br>CALIB</button>
        <button id="recordBtn" class="btn-circular" style="background:#ff4d4d;" onclick="toggleGrabacion()">🔴<br>REC</button>
    </div>
</div>

<script>
    const video = document.getElementById('input_video');
    const canvas = document.getElementById('output_canvas');
    const ctx = canvas.getContext('2d');
    const txtStatus = document.getElementById('txt-status');
    
    let currentFacingMode = "environment"; 
    let poseSolver = null;
    let streamActual = null;
    let isStarting = false;

    let sistemaCalibrado = false, calibrando = false, startTime = 0;
    let offsets = {}, bases = {};
    const THRESHOLDS = { 'cabeza': { amar: 15, rojo: 25 }, 'abdomen': { amar: 20, rojo: 40 }, 'ext': { amar: 30, rojo: 55 } };
    const historial = Array.from({ length: 33 }, () => []);

    async function apagarCamara() {
        if (streamActual) {
            streamActual.getTracks().forEach(track => track.stop());
            streamActual = null;
        }
        video.pause();
        video.srcObject = null;
        video.removeAttribute('src'); // Limpieza profunda
        video.load();
        await new Promise(r => setTimeout(r, 800)); // Más tiempo para liberar hardware
    }

    async function iniciarSistema(fuente) {
        if (isStarting) return;
        isStarting = true;

        document.getElementById('menu-inicial').style.display = 'none';
        document.getElementById('contenedor-analisis').style.display = 'block';

        if (!poseSolver) {
            poseSolver = new Pose({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}` });
            poseSolver.setOptions({ modelComplexity: 0, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
            poseSolver.onResults(onResults);
        }

        if (fuente === 'camara') {
            await apagarCamara();
            
            // CONSTRAINTS RELAJADAS PARA EVITAR PARPADEO
            const constraints = {
                audio: false,
                video: {
                    facingMode: currentFacingMode, // Quitamos el "exact" para que sea flexible
                    width: { min: 320, ideal: 640 },
                    height: { min: 240, ideal: 480 }
                }
            };

            try {
                streamActual = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = streamActual;
                
                video.onloadedmetadata = async () => {
                    try {
                        await video.play();
                        txtStatus.innerText = "SISTEMA ESTABLE: PULSE CALIB";
                        requestAnimationFrame(renderLoop);
                        isStarting = false;
                    } catch(e) { isStarting = false; }
                };
            } catch (err) {
                console.error("Error cámara primaria:", err);
                // ÚLTIMO RECURSO: Abrir cualquier cámara disponible
                try {
                    streamActual = await navigator.mediaDevices.getUserMedia({ video: true });
                    video.srcObject = streamActual;
                    video.play();
                    isStarting = false;
                } catch (err2) {
                    txtStatus.innerText = "FALLO TOTAL DE CÁMARA";
                    isStarting = false;
                }
            }
        } else {
            video.src = URL.createObjectURL(document.getElementById('fileInput').files[0]);
            video.play(); requestAnimationFrame(renderLoop);
            isStarting = false;
        }
    }

    // --- EL RESTO DE LA LÓGICA DE DIBUJO Y CÁLCULOS SE MANTIENE IGUAL ---
    function onResults(res) {
        if (!res.poseLandmarks) return;
        ctx.save();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (currentFacingMode === "user") { ctx.translate(canvas.width, 0); ctx.scale(-1, 1); }
        ctx.drawImage(res.image, 0, 0, canvas.width, canvas.height);
        const lm = res.poseLandmarks;
        const w = canvas.width, h = canvas.height;
        const p = lm.map((l, i) => {
            historial[i].push(l);
            if(historial[i].length > 5) historial[i].shift();
            const s = historial[i].reduce((a,b)=>({x:a.x+b.x, y:a.y+b.y, z:a.z+b.z}),{x:0,y:0,z:0});
            return {x: s.x/historial[i].length, y: s.y/historial[i].length, z: s.z/historial[i].length};
        });
        const pt = (i) => ({ x: p[i].x * w, y: p[i].y * h });
        const h_m = { x:(p[11].x+p[12].x)/2, y:(p[11].y+p[12].y)/2, z:(p[11].z+p[12].z)/2 };
        const c_m = { x:(p[23].x+p[24].x)/2, y:(p[23].y+p[24].y)/2, z:(p[23].z+p[24].z)/2 };
        const ang = {
            'cabeza': calcAng(p[0], h_m, c_m),
            'abdomen': calcAng(h_m, c_m, {x:c_m.x, y:c_m.y+0.5, z:c_m.z}),
            'brazo_d': calcAng(p[12], p[14], p[16]),
            'brazo_i': calcAng(p[11], p[13], p[15])
        };
        if (calibrando) {
            if (startTime === 0) startTime = Date.now();
            const segs = Math.max(0, Math.ceil((5000 - (Date.now() - startTime)) / 1000));
            txtStatus.innerText = `CALIBRANDO... ${segs}s`;
            Object.keys(ang).forEach(k => { if(!bases[k]) bases[k]=[]; bases[k].push(ang[k]); });
            if (Date.now() - startTime > 5000) {
                Object.keys(bases).forEach(k => offsets[k] = bases[k].reduce((a,b)=>a+b)/bases[k].length);
                calibrando = false; sistemaCalibrado = true;
                txtStatus.innerText = "ANALIZANDO RIESGO";
            }
        }
        const ph = {x:h_m.x*w, y:h_m.y*h}, pc = {x:c_m.x*w, y:c_m.y*h};
        const draw = (p1, p2, k, a, th=6) => {
            ctx.lineWidth = th; ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y);
            if (sistemaCalibrado) {
                const diff = Math.abs(a - (offsets[k]||0));
                const c = THRESHOLDS[k] || THRESHOLDS['ext'];
                ctx.strokeStyle = diff > c.rojo ? "#F00" : diff > c.amar ? "#FF0" : "#0F0";
            } else { ctx.strokeStyle = "rgba(255,255,255,0.4)"; }
            ctx.stroke();
        };
        draw(pt(0), ph, 'cabeza', ang.cabeza);
        draw(ph, pc, 'abdomen', ang.abdomen, 10);
        draw(pt(12), pt(14), 'ext', ang.brazo_d);
        draw(pt(11), pt(13), 'ext', ang.brazo_i);
        ctx.restore();
    }

    function calcAng(a,b,c) {
        const v1={x:a.x-b.x,y:a.y-b.y,z:a.z-b.z}, v2={x:c.x-b.x,y:c.y-b.y,z:c.z-b.z};
        const dot=v1.x*v2.x+v1.y*v2.y+v1.z*v2.z, m1=Math.sqrt(v1.x**2+v1.y**2+v1.z**2), m2=Math.sqrt(v2.x**2+v2.y**2+v2.z**2);
        return Math.acos(Math.max(-1,Math.min(1,dot/(m1*m2+1e-6))))*(180/Math.PI);
    }

    async function renderLoop() { 
        if(!video.paused && streamActual){ 
            canvas.width=video.videoWidth; canvas.height=video.videoHeight; 
            await poseSolver.send({image:video}); 
            requestAnimationFrame(renderLoop); 
        } 
    }
    
    async function cambiarCamara() { 
        if (isStarting) return;
        sistemaCalibrado = false;
        currentFacingMode = (currentFacingMode === "user") ? "environment" : "user"; 
        await iniciarSistema('camara'); 
    }
    
    function recalibrar() { calibrando = true; sistemaCalibrado = false; startTime = 0; bases = {}; }
</script>
</body>
</html>
