// Referencias globales al DOM
const video = document.getElementById('input_video');

const ctx = canvas.getContext('2d');
const txtStatus = document.getElementById('txt-status');
/**
 * 🏷️ BLOQUE 1: CONFIGURACIÓN AVANZADA NOM-036 + NIOSH (VERSIÓN CRÍTICA VALIDADA)
 */

// 🔹 Umbrales biomecánicos base (más estrictos)

/**
 * 🏷️ BLOQUE 1: CONFIGURACIÓN AVANZADA NOM-036 + NIOSH (VERSIÓN CRÍTICA VALIDADA)
 */

// 🔹 Umbrales biomecánicos base (más estrictos)
const TH = { 
    tronco: 15,
    cuello: 10,
    hombros: 15,
    codos: 20,
    munecas: 15,
    piernas: 20,
    pies: 15
};

// 🔴 FACTOR DE RIESGO GLOBAL
const FACTOR_RIESGO = {
    tronco: 1.5,
    cuello: 1.3,
    hombros: 1.2,
    codos: 1.0,
    munecas: 1.1,
    piernas: 1.3,
    pies: 1.1
};

// 🔵 CONFIGURACIÓN NIOSH VALIDADA
const NIOSH = {
    LC: 23, // kg

    calcularHM: (H) => {
        if (H < 25) H = 25;
        if (H > 63) return 0;
        return 25 / H;
    },

    calcularVM: (V) => {
        if (V < 0 || V > 175) return 0;
        return Math.max(0, 1 - (0.003 * Math.abs(V - 75)));
    },

    calcularDM: (D) => {
        if (D < 25) D = 25;
        if (D > 175) return 0;
        return Math.min(1, 0.82 + (4.5 / D));
    },

    calcularAM: (A) => {
        if (A > 135) return 0;
        return Math.max(0, 1 - (0.0032 * A));
    },

    calcularFM: (F) => {
        if (F < 0.2) return 1;
        if (F < 1) return 0.95;
        if (F < 4) return 0.85;
        if (F < 8) return 0.75;
        return 0.65;
    },

    calcularCM: (C) => {
        return C === "bueno" ? 1 : (C === "regular" ? 0.95 : 0.90);
    }
};
// Solo resetea valores, no oculta el menú
function limpiarFormulario() {
    document.querySelectorAll('.form-control-custom').forEach(input => input.value = '');
}
// 🔴 RWL (Recommended Weight Limit)
function calcularRWL(params) {
    const { H, V, D, A, F, C } = params;

    const HM = NIOSH.calcularHM(H);
    const VM = NIOSH.calcularVM(V);
    const DM = NIOSH.calcularDM(D);
    const AM = NIOSH.calcularAM(A);
    const FM = NIOSH.calcularFM(F);
    const CM = NIOSH.calcularCM(C);

    const RWL = NIOSH.LC * HM * VM * DM * AM * FM * CM;

    return Math.max(0, RWL);
}

// 🔴 ÍNDICE DE LEVANTAMIENTO (LI) + CLASIFICACIÓN
function calcularLI(pesoReal, RWL) {
    if (RWL === 0) return { li: Infinity, nivel: "CRÍTICO" };

    const li = pesoReal / RWL;

    let nivel = "SEGURO";
    if (li > 3) nivel = "CRÍTICO";
    else if (li > 1) nivel = "RIESGO";

    return { li, nivel };
}

/**

// 🎯 Buffers de IA
let baseAngles = {};      
let angleBuffer = {};     
let posBuffer = {};       

const HISTORIAL_MAX = 15;
const SUAVIZADO_POS = 5;

// ⚙️ Estado del sistema
let iaActiva = false;
let calibrado = false;

// 📹 MediaPipe / video
let pose;
let mediaRecorder;
let recordedChunks = [];

// ⚖️ Normativa
let hallazgosNormativos = [];
    let liftState = {

let nioshStats = {

};
const validarEntradasNormativas = () => {
    const campos = {
        empresa: document.getElementById('nombreEmpresa').value.trim(),
        puesto: document.getElementById('puestoTrabajo').value.trim(),

    };

    // Restricción: Exactamente 2 números para la edad

    }

    const edadNum = parseInt(campos.edad);

        alert("⚠️ PROHIBICIÓN LFT: No se permite el trabajo de menores de 15 años.");

    } else if (edadNum < 18) {

    } else {
        // Límites NOM-036 según género y edad[cite: 1]
        limiteMax = (genero === 'H') ? (edadNum > 45 ? 20 : 25) : (edadNum > 45 ? 10 : 15);
    }

    if (campos.peso > limiteMax) {
        alert(`⚠️ ADVERTENCIA: El peso (${campos.peso}kg) excede el límite normativo de ${limiteMax}kg.`);
    }

    return campos;
};
/**
 * 🏷️ BLOQUE 3: MATEMÁTICAS DINÁMICAS
 * Funciones para cálculo de ángulos 3D y dibujo de vectores.
 */
function calcAng3D(a, b, c) {
    if (!a || !b || !c) return 0;

    const v1 = { x: a.x - b.x, y: a.y - b.y, z: a.z - b.z };
    const v2 = { x: c.x - b.x, y: c.y - b.y, z: c.z - b.z };

    const dot = v1.x * v2.x + v1.y * v2.y + v1.z * v2.z;

    const m1 = Math.sqrt(v1.x ** 2 + v1.y ** 2 + v1.z ** 2);
    const m2 = Math.sqrt(v2.x ** 2 + v2.y ** 2 + v2.z ** 2);

    // 🔴 Evita vectores degenerados (ruido / puntos colapsados)
    if (m1 < 0.001 || m2 < 0.001) return 0;

    const denom = m1 * m2;

    // 🔴 Protección extra (por seguridad numérica)
    if (denom === 0) return 0;

    // 🔵 Clamp para estabilidad numérica
    let cosTheta = dot / denom;
    cosTheta = Math.max(-1, Math.min(1, cosTheta));

    const angle = Math.acos(cosTheta) * (180 / Math.PI);

    // 🔴 Evita NaN o Infinity
    if (!isFinite(angle)) return 0;

    return angle;
}

/**
 * 🏷️ FUNCIÓN DE DIBUJO DE VECTORES
 * Corregida con cierre de llave y lógica de alertas.
 */
/**
 * 🎨 BLOQUE CORREGIDO: drawV (RENDERIZADO ERGONÓMICO)
 */
const drawV = (p1, p2, angKey, groupKey, vis1, vis2) => {
    // 🛡️ Abortar si los puntos no son válidos (coordenadas en 0)
    if (p1.x === 0 || p2.x === 0) return;

    // 🌊 Suavizado del ángulo mediante el promedio del historial
    const buffer = angleBuffer[angKey] || [];
    const avgAngle = buffer.length > 0 ? buffer.reduce((a, b) => a + b, 0) / buffer.length : 0;

    // Configuración base de estilo
    let color = "#00ff00", thickness = 3, status = "SEGURO";
    const esSimulado = (vis1 < 0.5 || vis2 < 0.5); // "Ghost Mode" si la visibilidad es baja

    // ==========================================
    // 🔴 EVALUACIÓN NOM-036-1-STPS-2018
    // ==========================================
    if (analizandoRiesgo && calibrado && isFinite(avgAngle)) {
        const base = baseAngles[angKey];

        if (typeof base === "number") {
            const diff = Math.abs(avgAngle - base);
            const limit = TH[groupKey] || 20; // Umbrales definidos para cada grupo articular[cite: 1]

            // 📊 Registro estadístico único por frame
            if (!wbaStats._frameContado) {
                wbaStats.framesAnalizados++;
                wbaStats._frameContado = true;
            }

            // Lógica de Semaforización
            if (diff > (limit * 2)) {
                color = "#ff3838"; // Rojo Crítico
                thickness = 8;
                status = "CRÍTICO";
                wbaStats.riesgoAltoTotal++;
                wbaStats.zonasAfectadas.add(groupKey);
            } else if (diff > limit) {
                color = "#f1c40f"; // Amarillo Riesgo
                thickness = 5;
                status = "RIESGO";
            }
        }
    }

    // ✨ RENDERIZADO AVANZADO EN CANVAS
    ctx.save();
    
    // Aplicar transparencia si el punto es persistencia/simulado[cite: 2]
    ctx.globalAlpha = esSimulado ? 0.3 : 1.0;
    
    // Efecto de resplandor para resaltar el riesgo en el operario
    ctx.shadowBlur = esSimulado ? 0 : 12;
    ctx.shadowColor = color;

    ctx.beginPath();
    ctx.lineWidth = thickness;
    ctx.strokeStyle = color;
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    
    // Dibujo del vector conectando las articulaciones
    ctx.moveTo(p1.x, p1.y);
    ctx.lineTo(p2.x, p2.y);
    ctx.stroke();

    // 🏷️ Etiqueta de ángulo y estado
    // Se muestra solo si hay riesgo detectado para no saturar la vista[cite: 2]
    if (status !== "SEGURO" && !esSimulado) {
        const midX = (p1.x + p2.x) / 2;
        const midY = (p1.y + p2.y) / 2;

        ctx.shadowBlur = 0;
        ctx.fillStyle = "rgba(0, 0, 0, 0.6)";
        ctx.fillRect(midX - 20, midY - 15, 40, 20); // Fondo para legibilidad

        ctx.fillStyle = "white";
        ctx.font = "bold 12px Arial";
        ctx.textAlign = "center";
        ctx.fillText(`${Math.round(avgAngle)}°`, midX, midY);
    }

    ctx.restore();
};

    
function onResults(res) {
    const w = canvas.width, h = canvas.height;
    wbaStats._frameContado = false; 

    ctx.save();
    ctx.clearRect(0, 0, w, h);
    
    // Espejo si se usa cámara frontal
    if (currentFacingMode === "user") { 
        ctx.translate(w, 0); 
        ctx.scale(-1, 1);
    }
    
    if (res.image) ctx.drawImage(res.image, 0, 0, w, h);

    if (!res.poseLandmarks) { 
        txtStatus.innerText = "BUSCANDO TRABAJADOR..."; 
        ctx.restore(); 
        return; 
    }

    // Gestión del Loader IA
    const loader = document.getElementById('loader-ia');
    if (loader && loader.style.display !== 'none') loader.style.display = 'none';

    const lm = res.poseLandmarks;

    // --- FUNCIÓN DE PUNTO CON SUAVIZADO Y PERSISTENCIA ---
    const pt = (i) => {
        if (!lm[i]) return { x: 0, y: 0, z: 0, v: 0 };
        if (!posBuffer[i]) posBuffer[i] = { h: [], lastValid: null };

        let currentPos = { x: lm[i].x * w, y: lm[i].y * h, z: lm[i].z };
        const currentVis = lm[i].visibility ?? 0;

        // Persistencia: Si se pierde visibilidad, usar la última posición válida conocida
        if (currentVis < 0.5 && posBuffer[i].lastValid) {
            currentPos = posBuffer[i].lastValid;
        } else if (currentVis >= 0.5) {
            posBuffer[i].lastValid = currentPos;
        }

        posBuffer[i].h.push(currentPos);
        if (posBuffer[i].h.length > SUAVIZADO_POS) posBuffer[i].h.shift();
        
        const len = posBuffer[i].h.length || 1;
        const avg = posBuffer[i].h.reduce((a, b) => ({ 
            x: a.x + b.x, y: a.y + b.y, z: a.z + b.z 
        }), { x: 0, y: 0, z: 0 });

        return { x: avg.x / len, y: avg.y / len, z: avg.z / len, v: currentVis };
    };

    // --- MAPEO DE PUNTOS (EXTREMIDADES COMPLETAS) ---
    const p = {
        ore_d: pt(8), ore_i: pt(7), 
        h_d: pt(12), h_i: pt(11),
        c_d: pt(14), c_i: pt(13), 
        m_d: pt(16), m_i: pt(15),   // Muñecas
        d_d: pt(20), d_i: pt(19),   // Dedos
        p_d: pt(24), p_i: pt(23),   // Pelvis
        r_d: pt(26), r_i: pt(25),   // Rodillas
        t_d: pt(28), t_i: pt(27),   // Tobillos
        pie_d: pt(32), pie_i: pt(31) // Puntas pies
    };

    // --- ESTRUCTURA ÓSEA Y CENTRALIZACIÓN ---
    p.cabeza_t = { x: (p.ore_d.x + p.ore_i.x) / 2, y: (p.ore_d.y + p.ore_i.y) / 2 };
    p.cuello = { x: (p.h_d.x + p.h_i.x) / 2, y: (p.h_d.y + p.h_i.y) / 2 };
    p.sacro = { x: (p.p_d.x + p.p_i.x) / 2, y: (p.p_d.y + p.p_i.y) / 2 };
    const verticalRef = { x: p.cuello.x, y: p.cuello.y + 100, z: 0 };

    // --- CÁLCULO DE ÁNGULOS ERGONÓMICOS ---
    const currentAngles = {
        cuello: calcAng3D(p.cabeza_t, p.cuello, verticalRef),
        tronco: calcAng3D(p.cuello, p.sacro, verticalRef),
        h_d: calcAng3D(p.cuello, p.h_d, p.c_d),
        h_i: calcAng3D(p.cuello, p.h_i, p.c_i),
        c_d: calcAng3D(p.h_d, p.c_d, p.m_d),
        c_i: calcAng3D(p.h_i, p.c_i, p.m_i),
        m_d: calcAng3D(p.c_d, p.m_d, p.d_d),   // Muñeca Derecha
        m_i: calcAng3D(p.c_i, p.m_i, p.d_i),   // Muñeca Izquierda
        pie_d: calcAng3D(p.r_d, p.t_d, p.pie_d), 
        pie_i: calcAng3D(p.r_i, p.t_i, p.pie_i)
    };

    // Registro en buffer para suavizado de gráficas
    Object.keys(currentAngles).forEach(k => {
        if (!angleBuffer[k]) angleBuffer[k] = [];
        angleBuffer[k].push(currentAngles[k]);
        if (angleBuffer[k].length > HISTORIAL_MAX) angleBuffer[k].shift();
    });

    // --- RENDERIZADO DE ESQUELETO (VECTORES) ---
    // Columna y Cabeza (Estructura T)
    drawV(p.ore_d, p.ore_i, 'cuello', 'cuello', p.ore_d.v, p.ore_i.v); 
    drawV(p.cabeza_t, p.cuello, 'cuello', 'cuello', 1, 1);
    drawV(p.cuello, p.sacro, 'tronco', 'tronco', 1, 1);

    // Miembros Superiores
    drawV(p.h_d, p.c_d, 'h_d', 'hombros', p.h_d.v, p.c_d.v);
    drawV(p.c_d, p.m_d, 'c_d', 'codos', p.c_d.v, p.m_d.v);
    drawV(p.m_d, p.d_d, 'm_d', 'munecas', p.m_d.v, p.d_d.v);

    drawV(p.h_i, p.c_i, 'h_i', 'hombros', p.h_i.v, p.c_i.v);
    drawV(p.c_i, p.m_i, 'c_i', 'codos', p.c_i.v, p.m_i.v);
    drawV(p.m_i, p.d_i, 'm_i', 'munecas', p.m_i.v, p.d_i.v);

    // Miembros Inferiores
    drawV(p.p_d, p.r_d, 'tronco', 'piernas', p.p_d.v, p.r_d.v);
    drawV(p.r_d, p.t_d, 'r_d', 'piernas', p.r_d.v, p.t_d.v);
    drawV(p.t_d, p.pie_d, 'pie_d', 'pies', p.t_d.v, p.pie_d.v);

    drawV(p.p_i, p.r_i, 'tronco', 'piernas', p.p_i.v, p.r_i.v);
    drawV(p.r_i, p.t_i, 'r_i', 'piernas', p.r_i.v, p.t_i.v);
    drawV(p.t_i, p.pie_i, 'pie_i', 'pies', p.t_i.v, p.pie_i.v);

    // --- ANÁLISIS DE RIESGO BIOMECÁNICO (NIOSH / NOM-036) ---
    if (analizandoRiesgo && calibrado) {
        // Verificar visibilidad mínima para análisis legalmente válido
        const manosVisibles = (p.m_d.v >= 0.4 && p.m_i.v >= 0.4);
        if (!manosVisibles) {
            txtStatus.innerText = "⚠️ ERROR: MANOS NO VISIBLES PARA ANÁLISIS";
            ctx.restore();
            return;
        }

        const manosY = (p.m_d.y + p.m_i.y) / 2;
        const levantandoAhora = manosY < (p.sacro.y - 40);

        // Lógica de detección de ciclo de levantamiento
        if (levantandoAhora && !liftState.levantando) {
            liftState.levantando = true;
            liftState.inicioY = manosY;
        }

        if (!levantandoAhora && liftState.levantando) {
            liftState.levantando = false;
            // Solo contar si el desplazamiento es significativo (>50px)
            if (Math.abs(manosY - liftState.inicioY) > 50) {
                wbaStats.ciclos++;
                liftState.ciclosValidos++;
            }
        }

        // Cálculos dinámicos si hay carga activa
        if (levantandoAhora) {
            const peso = parseFloat(document.getElementById('pesoCarga').value) || 0;
            // Distancia horizontal H (Manos a Centro de Gravedad/Cuello)
            const H = Math.abs((p.m_d.x + p.m_i.x)/2 - p.cuello.x) * 0.1;
            // Distancia vertical V (Desde el suelo al punto de agarre)
            const V = (canvas.height - manosY) * 0.1; 
            
            const RWL = NIOSH.LC * NIOSH.calcularHM(H) * NIOSH.calcularVM(V);
            const li = peso / (RWL || 1);
            const nivel = li > 1.0 ? "CRÍTICO" : li > 0.85 ? "RIESGO" : "SEGURO";

            // Dashboard NIOSH en Pantalla
            ctx.fillStyle = "rgba(13, 17, 23, 0.9)";
            ctx.fillRect(20, 20, 220, 90);
            ctx.strokeStyle = (nivel === "CRÍTICO") ? "#ff3838" : "#00ff00";
            ctx.lineWidth = 2;
            ctx.strokeRect(20, 20, 220, 90);

            ctx.fillStyle = (nivel === "CRÍTICO") ? "#ff3838" : "#00ff00";
            ctx.font = "bold 18px Arial";
            ctx.fillText(`ÍNDICE LI: ${li.toFixed(2)}`, 35, 45);
            ctx.fillStyle = "white";
            ctx.font = "12px Arial";
            ctx.fillText(`Límite (RWL): ${RWL.toFixed(1)}kg`, 35, 70);
            ctx.fillText(`Estado: ${nivel}`, 35, 88);
        }
    }

    ctx.restore();
}
    
/**
 * 🏷️ BLOQUE 5: CONTROL DE CALIBRACIÓN Y AUDITORÍA
 */
function iniciarCalibracion() {

    if (!iaActiva) {
        txtStatus.innerText = "⚠️ IA no activa";
        return;
    }

    const btnCalib = document.getElementById('btn-calib');
    const btnRecord = document.getElementById('recordBtn');

    // 🔒 Bloquear botón durante calibración
    btnCalib.disabled = true;
    btnCalib.style.opacity = "0.6";

    txtStatus.innerText = "⚖️ CALIBRANDO... MANTENGA POSTURA NEUTRA";

    setTimeout(() => {

        let calibracionValida = false;

        Object.keys(angleBuffer).forEach(k => {

            const arr = angleBuffer[k];

            // 🔴 Validar datos reales
            if (!arr || arr.length === 0) return;

            const suma = arr.reduce((a, b) => a + b, 0);
            const avg = suma / arr.length;

            if (isFinite(avg)) {
                baseAngles[k] = avg;
                calibracionValida = true;
            }
        });

        // 🔴 Validación final
        if (!calibracionValida) {
            txtStatus.innerText = "❌ Error: sin datos para calibrar";
            
            // 🔓 Reactivar botón para reintento
            btnCalib.disabled = false;
            btnCalib.style.opacity = "1";
            return;
        }

        calibrado = true;

        // ✅ UI OK
        btnCalib.style.background = "#2ecc71";

        if (btnRecord) {
            btnRecord.disabled = false;
            btnRecord.style.opacity = "1";
        }

        txtStatus.innerText = "✅ CALIBRADO COMPLETADO";

    }, 2000);
}

    
function toggleAuditoria() {
    if (!calibrado) return;
    analizandoRiesgo = !analizandoRiesgo;
    const btn = document.getElementById('recordBtn');

    if (analizandoRiesgo) {
        recordedChunks = [];
        const stream = canvas.captureStream(30);
        mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
        mediaRecorder.ondataavailable = (e) => recordedChunks.push(e.data);
        mediaRecorder.onstop = descargarVideo;
        mediaRecorder.start();
        wbaStats.inicioAuditoria = Date.now();
        btn.innerHTML = "<span>⏹️</span>DETENER"; btn.classList.add('rec-active');
    } else {
        btn.innerHTML = "<span>🔴</span>AUDITAR"; btn.classList.remove('rec-active');
        if (mediaRecorder) mediaRecorder.stop();
        setTimeout(generarReporteWBA, 800);
    }
}
    /**
 * ⚖️ BLOQUE LEGAL: VALIDACIÓN DE NORMATIVA MEXICANA
 * Analiza el cumplimiento según LFT y NOM-036-1-STPS-2018[cite: 1, 2]
 */
function validarNormativa() {
    const info = {
        edad: parseInt(document.getElementById('edadTrabajador').value) || 0,
        genero: document.getElementById('generoTrabajador').value,
        peso: parseFloat(document.getElementById('pesoCarga').value) || 0
    };

    let limites = { max: 0, mensaje: "", legal: true };

    // 1. Validación LFT (Menores de edad)
    if (info.edad < 15) {
        limites.mensaje = "⚠️ PROHIBICIÓN LFT: Trabajo infantil detectado.";
        limites.legal = false;
        limites.max = 0;
    } else if (info.edad < 18) {
        limites.mensaje = "⚠️ RESTRICCIÓN LFT: Menor en formación (Máx 7kg).";
        limites.max = 7;
        limites.legal = info.peso <= 7;
    } 
    // 2. Validación NOM-036 (Adultos)[cite: 1]
    else {
        if (info.genero === 'H') {
            limites.max = (info.edad > 45) ? 20 : 25;
        } else {
            limites.max = (info.edad > 45) ? 10 : 15;
        }
        limites.legal = info.peso <= limites.max;
        limites.mensaje = limites.legal ? "✅ Peso dentro de límite normativo" : "❌ EXCESO DE CARGA DETECTADO";
    }

    // 3. Registro de Hallazgo para el Reporte PDF
    hallazgosNormativos = [{
        categoria: "Carga Legal",
        valor: `${info.peso}kg`,
        limite: `${limites.max}kg`,
        estado: limites.legal ? "CUMPLE" : "FALLO",
        nota: limites.mensaje
    }];

    return limites;
}

/**
 * 🏷️ BLOQUE 6: SISTEMA DE REPORTES PDF (VERSIÓN INTEGRAL NOM-036 & LFT)
 * Genera un documento técnico basado en los hallazgos de la IA y la normativa mexicana.
 */
function generarReporteWBA() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    // =========================================================
    // 🔹 1. DATOS GENERALES
    // =========================================================
    const info = {
        emp: document.getElementById('nombreEmpresa')?.value.toUpperCase() || "EMPRESA NO ESPECIFICADA",
        puesto: document.getElementById('puestoTrabajo')?.value || "General",
        trab: document.getElementById('nombreTrabajador')?.value || "Sin Nombre",
        peso: parseFloat(document.getElementById('pesoCarga')?.value) || 0,
        gen: document.getElementById('generoTrabajador')?.value || 'H',
        edad: parseInt(document.getElementById('edadTrabajador')?.value) || 0
    };

    // =========================================================
    // 🔴 2. PROCESAMIENTO NIOSH
    // =========================================================
    const avgRWL = nioshStats.muestras > 0 
        ? (nioshStats.avgRWL / nioshStats.muestras) 
        : 0;

    const maxLI = isFinite(nioshStats.maxLI) 
        ? nioshStats.maxLI 
        : Infinity;

    let estadoNIOSH = "SEGURO";
    if (!isFinite(maxLI) || maxLI > 3) estadoNIOSH = "CRÍTICO";
    else if (maxLI > 1) estadoNIOSH = "RIESGO";

    const avgRWL_txt = avgRWL.toFixed(1);
    const maxLI_txt = isFinite(maxLI) ? maxLI.toFixed(2) : "∞";

    // =========================================================
    // 🔴 3. LÓGICA LEGAL (NOM-036 + LFT)
    // =========================================================
    let limiteNormativo = 0;
    let hallazgosLegales = [];

    if (info.edad < 15) {
        hallazgosLegales.push("PROHIBICIÓN: Trabajo infantil (LFT).");
        limiteNormativo = 0;
    } else if (info.edad < 18) {
        hallazgosLegales.push("RESTRICCIÓN: Menor de edad.");
        limiteNormativo = 7;
    } else {
        limiteNormativo = info.gen === 'H'
            ? (info.edad > 45 ? 20 : 25)
            : (info.edad > 45 ? 10 : 15);
    }

    // =========================================================
    // 🔴 4. CÁLCULO ERGONÓMICO IA
    // =========================================================
    const porcRiesgo = wbaStats.framesAnalizados > 0 
        ? (wbaStats.riesgoAltoTotal / wbaStats.framesAnalizados) * 100 
        : 0;

    const porcRiesgo_txt = porcRiesgo.toFixed(1);

    const cumpleNorma = (
        info.peso <= limiteNormativo &&
        porcRiesgo <= 20 &&
        maxLI <= 1
    );

    const colorSemaforo = cumpleNorma ? [46, 204, 113] : [231, 76, 60];

    // =========================================================
    // 🎨 5. DISEÑO DEL DOCUMENTO
    // =========================================================

    // 🔹 HEADER
    doc.setFillColor(10, 15, 25);
    doc.rect(0, 0, 210, 42, 'F');

    doc.setTextColor(0, 255, 180);
    doc.setFontSize(17);
    doc.setFont("helvetica", "bold");
    doc.text("INFORME ERGONÓMICO INTELIGENTE", 105, 16, { align: "center" });

    doc.setFontSize(9);
    doc.setTextColor(255);
    doc.setFont("helvetica", "normal");
    doc.text("Evaluación NOM-036-STPS + NIOSH + LFT", 105, 26, { align: "center" });
    doc.text(`Folio: LYA-${Date.now()} | ${info.emp}`, 105, 33, { align: "center" });

    // =========================================================
    // 🔹 DATOS GENERALES
    // =========================================================
    doc.setTextColor(0);
    doc.setFontSize(11);
    doc.setFont("helvetica", "bold");
    doc.text("1. DATOS GENERALES", 15, 52);

    doc.autoTable({
        startY: 55,
        theme: 'grid',
        styles: { fontSize: 8 },
        body: [
            ['Empresa', info.emp, 'Fecha', new Date().toLocaleDateString()],
            ['Trabajador', info.trab, 'Edad', `${info.edad} años`],
            ['Puesto', info.puesto, 'Género', info.gen === 'H' ? 'Hombre' : 'Mujer']
        ]
    });

    // =========================================================
    // 🔹 RESULTADOS
    // =========================================================
    doc.text("2. RESULTADOS DE EVALUACIÓN", 15, doc.lastAutoTable.finalY + 10);

    doc.autoTable({
        startY: doc.lastAutoTable.finalY + 13,
        head: [['FACTOR', 'VALOR', 'LÍMITE', 'ESTADO']],
        theme: 'striped',
        styles: { fontSize: 8 },
        body: [
            ['Carga', `${info.peso} kg`, `${limiteNormativo} kg`, info.peso > limiteNormativo ? 'EXCEDE' : 'CUMPLE'],
            ['Postura Crítica', `${porcRiesgo_txt}%`, '≤ 20%', porcRiesgo > 20 ? 'CRÍTICO' : 'ACEPTABLE'],
            ['NIOSH - LI', maxLI_txt, '< 1.0', estadoNIOSH],
            ['NIOSH - RWL', `${avgRWL_txt} kg`, '—', 'REFERENCIAL'],
            ['Zonas afectadas', Array.from(wbaStats.zonasAfectadas).join(', ') || 'Ninguna', '—', '—']
        ]
    });

    // =========================================================
    // 🔴 SEMÁFORO
    // =========================================================
    const ySemaforo = doc.lastAutoTable.finalY + 14;

    doc.setFillColor(...colorSemaforo);
    doc.rect(15, ySemaforo, 180, 12, 'F');

    doc.setTextColor(255);
    doc.setFontSize(11);
    doc.setFont("helvetica", "bold");

    const veredicto = cumpleNorma
        ? "OPERACIÓN SEGURA"
        : "NO CUMPLE - REQUIERE INTERVENCIÓN";

    doc.text(`VEREDICTO: ${veredicto}`, 105, ySemaforo + 8, { align: "center" });

    // =========================================================
    // 🔹 CONCLUSIONES
    // =========================================================
    let recomendaciones = [];

    if (info.peso > limiteNormativo)
        recomendaciones.push(`Exceso de carga (${info.peso} kg > ${limiteNormativo} kg)`);

    if (porcRiesgo > 20)
        recomendaciones.push("Alta frecuencia de posturas críticas");

    if (maxLI > 1)
        recomendaciones.push(`Índice NIOSH elevado (LI=${maxLI_txt})`);

    if (hallazgosLegales.length > 0)
        recomendaciones = recomendaciones.concat(hallazgosLegales);

    if (recomendaciones.length === 0)
        recomendaciones.push("Condiciones ergonómicas aceptables");

    doc.setTextColor(0);
    doc.setFontSize(11);
    doc.text("3. CONCLUSIONES Y RECOMENDACIONES", 15, ySemaforo + 22);

    doc.setFontSize(9);
    doc.text(
        doc.splitTextToSize("• " + recomendaciones.join("\n• "), 175),
        15,
        ySemaforo + 28
    );

    // =========================================================
    // ✍️ FIRMAS
    // =========================================================
    const finalY = ySemaforo + 65;

    doc.line(25, finalY, 95, finalY);
    doc.text("Responsable de Seguridad", 30, finalY + 5);

    doc.line(115, finalY, 185, finalY);
    doc.text("Trabajador Evaluado", 130, finalY + 5);

    // =========================================================
    // 💾 EXPORTACIÓN
    // =========================================================
    doc.save(`Reporte_Ergonomico_${info.trab.replace(/\s+/g, '_')}.pdf`);
}


    
    
/**
 * 🏷️ BLOQUE 7: GESTIÓN DE HARDWARE Y ARRANQUE - VERSIÓN OPTIMIZADA ANDROID
 * Controla el ciclo de vida de la cámara, el video y el motor de IA.
 */

async function prepararSistema(fuente) {
    // 1. Captura de Referencias Locales
    const video = document.getElementById('input_video'); 
    const canvas = document.getElementById('output_canvas'); 
    const edadInput = document.getElementById('edadTrabajador');
    const pesoInput = document.getElementById('pesoCarga');
    const videoControls = document.getElementById('video-controls');
    const btnGirar = document.getElementById('btn-girar');
    
    // IDs para validación de campos obligatorios
    const ids = ['nombreEmpresa', 'puestoTrabajo', 'nombreTrabajador', 'edadTrabajador', 'pesoCarga'];
    
    // Validación de campos vacíos
    const incompleto = ids.some(id => !document.getElementById(id).value.trim());
    if (incompleto) { 
        alert("⚠️ Por favor, complete todos los campos del formulario antes de iniciar el análisis."); 
        return; 
    }

    // Validación de EDAD (Estrictamente 2 cifras)
    const edadValor = edadInput.value.trim();
    if (!/^\d{2}$/.test(edadValor)) {
        alert("❌ Error en EDAD: Debe ingresar exactamente 2 números (Ejemplo: 25).");
        edadInput.focus();
        return;
    }

    // Validación de PESO (Numérico y positivo)
    const pesoValor = parseFloat(pesoInput.value);
    if (isNaN(pesoValor) || pesoValor <= 0) {
        alert("❌ El peso de la carga debe ser un número positivo mayor a cero.");
        pesoInput.focus();
        return;
    }

    // --- LIMPIEZA DE MEMORIA Y ESTADOS GLOBALES ---
    iaActiva = false; 
    angleBuffer = {}; 
    posBuffer = {};
    
    // Reinicio de estadísticas de auditoría
    if (typeof wbaStats !== 'undefined') {
        wbaStats.zonasAfectadas.clear();
        wbaStats.framesAnalizados = 0;
        wbaStats.riesgoAltoTotal = 0;
        wbaStats.inicioAuditoria = null;
        wbaStats.ciclos = 0;
    }

    // Detener flujos de cámara previos para liberar hardware en móviles
    if (video.srcObject) {
        video.srcObject.getTracks().forEach(track => track.stop());
        video.srcObject = null;
    }
    
    // Liberar memoria de archivos de video anteriores
    if (video.src && video.src.startsWith('blob:')) {
        URL.revokeObjectURL(video.src);
        video.src = "";
    }

    // 2. Configuración según Fuente (Cámara o Archivo Local)
    try {
        if (fuente === 'camara') {
            if (videoControls) videoControls.classList.add('d-none');
            if (btnGirar) btnGirar.classList.remove('d-none');

            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { 
                    facingMode: typeof currentFacingMode !== 'undefined' ? currentFacingMode : "environment", 
                    width: { ideal: 640 }, 
                    height: { ideal: 480 } 
                } 
            });
            video.srcObject = stream;
        } else {
            // Modo ARCHIVO
            if (videoControls) videoControls.classList.remove('d-none');
            if (btnGirar) btnGirar.classList.add('d-none');

            const fileInput = document.getElementById('fileInput');
            const file = fileInput ? fileInput.files[0] : null;
            
            if (!file) { 
                alert("Seleccione un archivo de video."); 
                return; 
            }
            video.src = URL.createObjectURL(file);
            video.loop = true;
        }

        // 3. Transición Visual de Interfaz
        document.getElementById('menu-inicial').style.display = 'none';
        document.getElementById('contenedor-analisis').style.display = 'block';

        // Inicialización del Canvas y el Motor de IA
        video.onloadedmetadata = async () => {
            canvas.width = video.videoWidth; 
            canvas.height = video.videoHeight;
            try {
                await video.play();
                activarIA(); // Dispara el motor de MediaPipe Pose
            } catch (playError) {
                console.error("Error al reproducir video:", playError);
            }
        };

    } catch (err) {
        console.error("Error crítico de hardware:", err);
        alert("Error: Verifique permisos de cámara o compatibilidad.");
        location.reload();
    }
}
async function activarIA() {
    const loader = document.getElementById('loader-ia');
    loader.style.display = 'flex';
    
    const safetyTimeout = setTimeout(() => {
        if (loader.style.display !== 'none') {
            loader.style.display = 'none';
            alert("⚠️ El motor de IA tarda en responder. Verifique su conexión o GPU.");
        }
    }, 12000);

    if (pose) {
        try { await pose.close(); } catch(e) {}
    }

    pose = new Pose({ 
        locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}` 
    });

    pose.setOptions({ 
        modelComplexity: 1, 
        smoothLandmarks: true, 
        minDetectionConfidence: 0.5, 
        minTrackingConfidence: 0.5 
    });

    pose.onResults((res) => {
        clearTimeout(safetyTimeout);
        if (loader.style.display !== 'none') loader.style.display = 'none';
        iaActiva = true;
        onResults(res);
    });

    // Bucle de frames controlado (Evita saturación en Android)
    async function frameLoop() {
        if (video.paused || video.ended) return;

        try {
            // CRÍTICO: Esperamos a que la IA procese el frame antes de pedir el siguiente
            await pose.send({ image: video });
        } catch (e) {
            console.warn("Frame drop");
        }
        
        // Solo solicita el siguiente frame si el sistema sigue activo
        if (document.getElementById('contenedor-analisis').style.display !== 'none') {
            requestAnimationFrame(frameLoop);
        }
    }
    
    frameLoop();
}

// --- GESTIÓN DE VIDEO ---
function togglePlay() {
    const playIcon = document.getElementById('playIcon');
    if (video.paused) {
        video.play();
        playIcon.src = "https://img.icons8.com/ios-filled/50/ffffff/pause.png";
    } else {
        video.pause();
        playIcon.src = "https://img.icons8.com/ios-filled/50/ffffff/play.png";
    }
}

function rewindVideo() { video.currentTime = Math.max(0, video.currentTime - 5); }
function forwardVideo() { video.currentTime = Math.min(video.duration, video.currentTime + 5); }


    
function descargarVideo() {
    if (recordedChunks.length === 0) return;

    const blob = new Blob(recordedChunks, { type: 'video/webm' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; 
    a.download = `EVIDENCIA_LYA_${document.getElementById('nombreTrabajador').value}_${Date.now()}.webm`; 
    a.click();

    // 🧹 LIMPIEZA DE MEMORIA
    // Liberamos la URL del objeto después de 100ms para asegurar que la descarga inició
    setTimeout(() => {
        URL.revokeObjectURL(url);
        console.log("Memoria de blob de video liberada con éxito.");
    }, 100);
}



    
function cambiarCamara() {
    currentFacingMode = currentFacingMode === "environment" ? "user" : "environment";
    prepararSistema('camara');
}

function validarYAbrirArchivo() {
    const ids = ['nombreEmpresa', 'puestoTrabajo', 'nombreTrabajador', 'edadTrabajador', 'pesoCarga'];
    const incompleto = ids.some(id => !document.getElementById(id).value.trim());
    
    if (incompleto) {
        alert("⚠️ Complete todos los campos antes de cargar el archivo.");
        return;
    }
    document.getElementById('fileInput').click();
}
