<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LYA-ERGO v20.2 | AUDITORÍA BIOMECÁNICA</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* 1. BASE GENERAL: Previene scroll innecesario y mejora el toque en Android */
        body { 
            background-color: #0d1117; 
            color: white; 
            margin: 0; 
            padding: 0;
            overflow: hidden; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            -webkit-tap-highlight-color: transparent;
        }

        /* 2. MENÚ INICIAL: Diseño adaptativo para móvil y PC */
        #menu-inicial { 
            display: flex; 
            width: 100%; 
            height: 100vh; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            background: radial-gradient(circle, #161b22 0%, #0d1117 100%); 
            position: fixed; 
            z-index: 5000;
            padding: 20px;
            box-sizing: border-box;
        }

        .logo-text { color: #00ff00; font-weight: 800; letter-spacing: 3px; margin-bottom: 0; text-align: center; }
        .sub-text { color: #8b949e; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 40px; text-align: center; }

        /* 3. FORMULARIO: Mejorado para evitar el zoom automático en navegadores móviles */
        .form-container { width: 85%; max-width: 320px; margin-bottom: 20px; }
        .label-style { color: #8b949e; font-size: 0.7rem; display: block; text-align: left; margin-bottom: 5px; font-weight: bold; }
        
        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #30363d;
            background: #161b22;
            color: white;
            font-size: 16px !important; /* Evita zoom en iOS/Android */
            box-sizing: border-box;
        }

        /* 4. BOTONES: Estilo uniforme sin sombras nativas de Android */
        .btn-inicio { 
            width: 85%; 
            max-width: 320px; 
            padding: 18px; 
            margin: 10px; 
            border-radius: 12px; 
            font-weight: bold; 
            border: none; 
            font-size: 1.1rem; 
            transition: all 0.3s ease; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-appearance: none;
        }

        .btn-inicio:active { transform: scale(0.95); }

        /* 5. INTERFAZ DE AUDITORÍA */
        #contenedor-analisis { display: none; width: 100vw; height: 100vh; position: relative; background: #000; }
        canvas { width: 100%; height: 100%; object-fit: contain; }
        video { display: none; }

        .status-badge { 
            position: absolute; 
            top: env(safe-area-inset-top, 20px); 
            left: 20px; 
            background: rgba(0,0,0,0.8); 
            padding: 10px 15px; 
            border-radius: 8px; 
            border-left: 4px solid #00ff00; 
            font-size: 10px; 
            z-index: 3000; 
            font-weight: bold; 
        }

        .barra-controles { 
            position: absolute; 
            bottom: 40px; 
            left: 50%; 
            transform: translateX(-50%); 
            display: flex; 
            gap: 12px; 
            z-index: 4000; 
            width: 100%; 
            padding: 0 10px;
            justify-content: center;
            flex-wrap: wrap; 
        }

        .btn-circular { 
            width: 65px; 
            height: 65px; 
            border-radius: 50%; 
            border: none; 
            font-size: 9px; 
            font-weight: 900; 
            color: white; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            -webkit-appearance: none;
            line-height: 1.2;
        }

        /* 6. ANIMACIONES Y LOADER */
        .rec-active { background: #fff !important; color: #f00 !important; border: 3px solid #f00 !important; animation: pulse-red 1.5s infinite; }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(255, 0, 0, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0); } }

        #loader-ia { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(13, 17, 23, 0.98); z-index: 6000; flex-direction: column; align-items: center; justify-content: center; }
        .progress-bar-custom { width: 0%; height: 6px; background: #00ff00; transition: 0.4s; box-shadow: 0 0 20px #00ff00; border-radius: 10px; }
    </style>
</head>
<body>

<div id="loader-ia">
    <h3 style="color:#00ff00; letter-spacing: 4px; font-weight: 900;">INICIANDO ENGINE</h3>
    <div style="width: 70%; height: 6px; background: #21262d; border-radius: 10px; margin-top: 25px; overflow: hidden;">
        <div id="bar-id" class="progress-bar-custom"></div>
    </div>
</div>

<div id="menu-inicial">
    <h1 class="logo-text">LYA-ERGO</h1>
    <p class="sub-text">Auditoría Biomecánica</p>
    
    <div class="form-container">
        <label class="label-style">PUESTO DE TRABAJO:</label>
        <input type="text" id="puestoTrabajo" placeholder="Ej: Operador Línea 4">
        
        <label class="label-style">PESO DE LA CARGA (KG):</label>
        <input type="number" id="pesoCarga" placeholder="Ej: 10">
    </div>

    <button class="btn-inicio" style="background:#27ae60; color:white;" onclick="prepararSistema('camara')">🎥 VISTA EN VIVO</button>
    <button class="btn-inicio" style="background:#2980b9; color:white;" onclick="document.getElementById('fileInput').click()">📁 SUBIR ARCHIVO</button>
    <input type="file" id="fileInput" hidden accept="video/*" onchange="prepararSistema('archivo')">
</div>

<div id="contenedor-analisis">
    <div class="status-badge" id="txt-status">SISTEMA READY</div>
    <canvas id="output_canvas"></canvas>
    <video id="input_video" playsinline muted></video>
    
    <div class="barra-controles">
        <button class="btn-circular btn-dark" onclick="location.reload()">SALIR</button>
        <button class="btn-circular" style="background:#00d2d3; color:#000;" onclick="cambiarCamara()">🔄<br>GIRAR</button>
        <button id="btn-calib" class="btn-circular" style="background:#f1c40f; color:#000;" onclick="activarIA()">⚖️<br>CALIBRAR</button>
        <button id="recordBtn" class="btn-circular" style="background:#ff4d4d; opacity: 0.3;" onclick="toggleGrabacion()">🔴<br>AUDITAR</button>
    </div>
</div>

    const video = document.getElementById('input_video');

    const ctx = canvas.getContext('2d');

    let pose;

    // Grabación
    let mediaRecorder;
    let recordedChunks = [];

    // Estadísticas NOM-036
    let wbaStats = { 
        riesgoAltoTotal: 0, 
        framesAnalizados: 0, 
        zonasAfectadas: new Set(), 
        inicioAuditoria: null,
        ciclos: 0, 
        lastHandY: null,
        subiendo: false
    };

    // pero asegúrate de usar las variables corregidas de arriba].
</script>
</body>
</html>
