<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ERGO-SENSING PRO v3.6</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0d1117; color: white; margin: 0; overflow: hidden; font-family: sans-serif; }
        
        #menu-inicial { 
            position: absolute; width: 100%; height: 100%; display: flex; 
            flex-direction: column; align-items: center; justify-content: center;
            background: #0d1117; z-index: 2000;
        }
        .btn-menu { width: 85%; max-width: 320px; padding: 20px; margin: 12px; border-radius: 15px; font-weight: bold; font-size: 1.1rem; }

        #contenedor-analisis { display: none; width: 100vw; height: 100vh; position: relative; background: #000; }
        canvas { width: 100%; height: 100%; object-fit: contain; }
        video { display: none; }

        .status-badge { 
            position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.7); 
            color: #00ff00; padding: 8px 15px; border-radius: 10px; border-left: 4px solid #00ff00;
            font-size: 12px; z-index: 3000; font-weight: bold;
        }

        .barra-controles {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 12px; padding: 15px; background: rgba(255,255,255,0.1);
            backdrop-filter: blur(15px); border-radius: 35px; z-index: 4000;
            border: 1px solid rgba(255,255,255,0.2); width: 92%; justify-content: space-around;
        }

        .btn-circular {
            width: 65px; height: 65px; border-radius: 50%; border: none;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 10px; font-weight: bold; color: white; transition: 0.2s;
        }

        .btn-back { background: #34495e; }
        .btn-flip { background: #00d2d3; color: #000; border: 2px solid white; }
        .btn-calib { background: #f1c40f; color: #000; }
        .btn-record { background: #ff4d4d; width: 85px; border-radius: 30px; }
        .recording { animation: pulse 1s infinite; background: white; color: #ff4d4d; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(0.92); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

<div id="menu-inicial">
    <h2 style="color: #00d2d3; margin-bottom: 30px; letter-spacing: 2px;">ERGO-SENSING PRO</h2>
    <button class="btn btn-success btn-menu" onclick="iniciarApp('camara')">🎥 EVALUACIÓN EN VIVO</button>
    <button class="btn btn-primary btn-menu" onclick="document.getElementById('fileInput').click()">📁 CARGAR VIDEO</button>
    <input type="file" id="fileInput" hidden accept="video/*" onchange="iniciarApp('archivo')">
</div>

<div id="contenedor-analisis">
    <div class="status-badge" id="txt-status">INICIALIZANDO...</div>
    <canvas id="output_canvas"></canvas>
    <video id="input_video" playsinline muted></video>

    <div class="barra-controles">
        <button class="btn-circular btn-back" onclick="location.reload()"><span>⬅</span>Menú</button>
        <button id="btn-flip" class="btn-circular btn-flip" onclick="cambiarCamara()"><span>🔄</span>GIRAR</button>
        <button class="btn-circular btn-calib" onclick="alert('Calibrando postura...')"><span>⚖️</span>CALIB</button>
        <button id="recordBtn" class="btn-circular btn-record" onclick="toggleGrabacion()"><span>🔴</span>GRABAR</button>
    </div>
</div>

<script>
    const video = document.getElementById('input_video');
    const canvas = document.getElementById('output_canvas');
    const ctx = canvas.getContext('2d');
    const txtStatus = document.getElementById('txt-status');
    
    let currentFacingMode = "user"; 
    let cameraInstance = null;
    let poseSolver = null;
    let isVideoFile = false;

    // --- CONFIGURACIÓN MEDIAPIPE ---
    poseSolver = new Pose({ 
        locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}` 
    });
    
    poseSolver.setOptions({ 
        modelComplexity: 1, 
        smoothLandmarks: true, 
        minDetectionConfidence: 0.5, 
        minTrackingConfidence: 0.5 
    });
    
    poseSolver.onResults((res) => {
        ctx.save();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Efecto espejo automático: Solo si NO es video de archivo y es cámara frontal
        if (!isVideoFile && currentFacingMode === "user") {
            ctx.translate(canvas.width, 0);
            ctx.scale(-1, 1);
        }
        
        ctx.drawImage(res.image, 0, 0, canvas.width, canvas.height);
        
        if (res.poseLandmarks) {
            ctx.strokeStyle = "#00ff00";
            ctx.lineWidth = 3;
            // Dibujamos una línea base (hombros) como indicador de actividad
            const p1 = res.poseLandmarks[11];
            const p2 = res.poseLandmarks[12];
            ctx.beginPath();
            ctx.moveTo(p1.x * canvas.width, p1.y * canvas.height);
            ctx.lineTo(p2.x * canvas.width, p2.y * canvas.height);
            ctx.stroke();
        }
        ctx.restore();
    });

    // --- LÓGICA DE ARRANQUE ---
    async function iniciarApp(fuente) {
        if (fuente === 'camara') {
            try {
                txtStatus.innerText = "SOLICITANDO CÁMARA...";
                // Verificación de hardware/permisos
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: currentFacingMode } 
                });
                stream.getTracks().forEach(t => t.stop()); // Cerramos prueba inicial

                document.getElementById('menu-inicial').style.display = 'none';
                document.getElementById('contenedor-analisis').style.display = 'block';
                isVideoFile = false;
                await habilitarCamara();
            } catch (err) {
                alert("ERROR DE ACCESO: " + err.name + "\n\nVerifica que estés usando HTTPS y que hayas aceptado los permisos de cámara.");
                console.error(err);
            }
        } else {
            const file = document.getElementById('fileInput').files[0];
            if (file) {
                document.getElementById('menu-inicial').style.display = 'none';
                document.getElementById('contenedor-analisis').style.display = 'block';
                document.getElementById('btn-flip').style.display = 'none';
                isVideoFile = true;
                video.src = URL.createObjectURL(file);
                video.play();
                txtStatus.innerText = "MODO: ARCHIVO DE VIDEO";
                loopVideo();
            }
        }
    }

    async function habilitarCamara() {
        if (cameraInstance) await cameraInstance.stop();

        cameraInstance = new Camera(video, {
            onFrame: async () => {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                await poseSolver.send({image: video});
            },
            facingMode: currentFacingMode,
            width: 1280, height: 720
        });

        txtStatus.innerText = `CÁMARA: ${currentFacingMode === 'user' ? 'FRONTAL' : 'TRASERA'}`;
        await cameraInstance.start();
    }

    async function cambiarCamara() {
        currentFacingMode = (currentFacingMode === "user") ? "environment" : "user";
        txtStatus.innerText = "CAMBIANDO...";
        await habilitarCamara();
    }

    function loopVideo() {
        if (!video.paused && !video.ended) {
            canvas.width = video.videoWidth; 
            canvas.height = video.videoHeight;
            poseSolver.send({image: video});
            requestAnimationFrame(loopVideo);
        }
    }

    // --- GRABACIÓN ---
    let recorder; let chunks = [];
    function toggleGrabacion() {
        const btn = document.getElementById('recordBtn');
        if (!recorder || recorder.state === "inactive") {
            chunks = [];
            const stream = canvas.captureStream(30);
            recorder = new MediaRecorder(stream);
            recorder.ondataavailable = (e) => chunks.push(e.data);
            recorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `ERGO_REPORTE_${Date.now()}.webm`;
                a.click();
            };
            recorder.start();
            btn.classList.add('recording');
            btn.innerHTML = "<span>⏹</span>FIN";
        } else {
            recorder.stop();
            btn.classList.remove('recording');
            btn.innerHTML = "<span>🔴</span>GRABAR";
        }
    }
</script>
</body>
</html>
