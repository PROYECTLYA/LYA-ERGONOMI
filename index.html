<script>

/**
 * 🏷️ BLOQUE 1: CONFIGURACIÓN Y UMBRALES NOM-036
 * Define los límites de desviación angular permitidos para evitar riesgos.
 */
const video = document.getElementById('input_video');
const canvas = document.getElementById('output_canvas');
const ctx = canvas.getContext('2d');
const txtStatus = document.getElementById('txt-status');

// Umbrales de desviación (Grados) basados en NOM-036-STPS-2018
const TH = { tronco: 18, cuello: 12, hombros: 15, codos: 25, munecas: 20, piernas: 25 };

/**
 * 🏷️ BLOQUE 2: VARIABLES DE ESTADO Y ESTADÍSTICAS
 * Maneja el suavizado de la imagen y los acumuladores de riesgo.
 */
let wbaStats = { 
    riesgoAltoTotal: 0, 
    framesAnalizados: 0, 
    zonasAfectadas: new Set(), 
    inicioAuditoria: null, 
    ciclos: 0 
};

let baseAngles = {};        // Ángulos capturados en la calibración (postura neutra)
let angleBuffer = {};       // Búfer para media móvil de ángulos
let posBuffer = {};         // Búfer para suavizar el jitter de los puntos
const HISTORIAL_MAX = 15;   // Cuadros para suavizar ángulos
const SUAVIZADO_POS = 5;    // Cuadros para suavizar coordenadas

let iaActiva = false;
let calibrado = false;
let analizandoRiesgo = false;
let currentFacingMode = "environment";
let pose;
let mediaRecorder;
let recordedChunks = [];
// Objeto para almacenar incumplimientos
let hallazgosNormativos = [];

function validarNormativa() {
    hallazgosNormativos = []; 
    const edad = parseInt(document.getElementById('edadTrabajador').value);
    const genero = document.getElementById('generoTrabajador').value; 
    const peso = parseFloat(document.getElementById('pesoCarga').value);

    // --- Validación LFT (Edad) ---
    if (edad < 15) {
        hallazgosNormativos.push("INCUMPLIMIENTO CRÍTICO LFT: Trabajador menor de edad legal (menor a 15 años).");
    } else if (edad < 18) {
        hallazgosNormativos.push("OBSERVACIÓN LFT: Menor en edad de aprendizaje (15-17 años). Carga restringida.");
    }

    // --- Validación NOM-036 (Peso vs Género/Edad) ---
    let limiteMax = 0;
    if (genero === "M") { // 'M' de Mujer en tu select
        if (edad < 18) limiteMax = 7;
        else if (edad <= 45) limiteMax = 15;
        else limiteMax = 10;
    } else { // Hombre
        if (edad < 18) limiteMax = 7;
        else if (edad <= 45) limiteMax = 25;
        else limiteMax = 20;
    }

    if (peso > limiteMax) {
        hallazgosNormativos.push(`INCUMPLIMIENTO NOM-036: Peso de ${peso}kg excede el límite de ${limiteMax}kg para este perfil.`);
    }
    
    return { hallazgos: hallazgosNormativos, limite: limiteMax };
}
/**
 * 🏷️ BLOQUE 3: MATEMÁTICAS DINÁMICAS
 * Funciones para cálculo de ángulos 3D y dibujo de vectores.
 */
function calcAng3D(a, b, c) {
    if(!a || !b || !c) return 0;
    const v1 = { x: a.x - b.x, y: a.y - b.y, z: a.z - b.z };
    const v2 = { x: c.x - b.x, y: c.y - b.y, z: c.z - b.z };
    const dot = v1.x * v2.x + v1.y * v2.y + v1.z * v2.z;
    const m1 = Math.sqrt(v1.x**2 + v1.y**2 + v1.z**2);
    const m2 = Math.sqrt(v2.x**2 + v2.y**2 + v2.z**2);
    const angle = Math.acos(Math.max(-1, Math.min(1, dot / (m1 * m2)))) * (180 / Math.PI);
    return isNaN(angle) ? 0 : angle;
}

const drawV = (p1, p2, angKey, groupKey, vis1, vis2) => {
    // CORRECCIÓN: Bajamos el umbral de visibilidad a 0.4 para evitar parpadeos
    // en los pies y en videos de archivo con poca luz.
    if (vis1 < 0.4 || vis2 < 0.4) return;

    const buffer = angleBuffer[angKey] || [];
    if (buffer.length === 0) return;
    const avgAngle = buffer.reduce((a, b) => a + b, 0) / buffer.length;

    let color = "#00ff00", thickness = 3, status = "SEGURO";

    if (analizandoRiesgo && calibrado) {
        // CORRECCIÓN: Aseguramos que la diferencia se calcule contra la base real
        const base = baseAngles[angKey] !== undefined ? baseAngles[angKey] : avgAngle;
        const diff = Math.abs(avgAngle - base);
        const limit = TH[groupKey] || 20; // Valor por defecto si TH no carga

        // Solo sumamos a estadísticas si el video NO está pausado para no inflar datos
        if (!video.paused) {
            wbaStats.framesAnalizados++;
        }

        // SEMAFORIZACIÓN: Ajuste de grosores para no tapar la imagen
        if (diff > (limit * 1.5)) { 
            color = "#ff3838"; thickness = 7; status = "CRÍTICO";
            if (!video.paused) {
                wbaStats.riesgoAltoTotal++;
                wbaStats.zonasAfectadas.add(groupKey);
            }
        } else if (diff > limit) {
            color = "#f1c40f"; thickness = 5; status = "RIESGO";
        }
    }

    // --- RENDERIZADO DEL VECTOR ---
    ctx.beginPath();
    ctx.strokeStyle = color; 
    ctx.lineWidth = thickness; 
    ctx.lineCap = "round";
    // Efecto de brillo para mejor visibilidad en plantas industriales
    ctx.shadowBlur = 5;
    ctx.shadowColor = color;
    ctx.moveTo(p1.x, p1.y); 
    ctx.lineTo(p2.x, p2.y); 
    ctx.stroke();
    ctx.shadowBlur = 0; // Limpiar sombra para el texto

    // --- ETIQUETA DE DATOS ---
    if (calibrado) {
        const mx = (p1.x + p2.x) / 2, my = (p1.y + p2.y) / 2;
        ctx.fillStyle = "rgba(0,0,0,0.8)";
        ctx.beginPath();
        ctx.roundRect(mx + 10, my - 25, 65, 35, 5);
        ctx.fill();
        
        ctx.fillStyle = "#ffffff"; ctx.font = "bold 11px Arial";
        ctx.fillText(`${avgAngle.toFixed(0)}°`, mx + 15, my - 12);
        
        ctx.fillStyle = color; ctx.font = "9px Arial";
        ctx.fillText(status, mx + 15, my + 2);
    }
};

    /**
 * 🆕 FUNCIÓN ADICIONAL: Renderizado exclusivo para ARCHIVO (Ángulos Absolutos)
 * Basado en rangos fijos de la NOM-036-1-STPS-2018.
 */
const drawV_Archivo = (p1, p2, angKey, groupKey, vis1, vis2) => {
    if (vis1 < 0.4 || vis2 < 0.4) return;

    const buffer = angleBuffer[angKey] || [];
    if (buffer.length === 0) return;
    const avgAngle = buffer.reduce((a, b) => a + b, 0) / buffer.length;

    // Umbrales Absolutos NOM-036 / REBA / RULA
    const RANGOS = {
        tronco: { riesgo: 20, critico: 60 },
        cuello: { riesgo: 15, critico: 45 },
        hombros: { riesgo: 45, critico: 90 },
        codos: { riesgo: 40, critico: 100 }, // Desviación desde posición neutral
        piernas: { riesgo: 30, critico: 60 }
    };

    let color = "#00ff00", thickness = 3, status = "SEGURO";

    if (analizandoRiesgo) {
        const rango = RANGOS[groupKey] || { riesgo: 25, critico: 50 };
        
        if (avgAngle > rango.critico) {
            color = "#ff3838"; thickness = 7; status = "CRÍTICO";
        } else if (avgAngle > rango.riesgo) {
            color = "#f1c40f"; thickness = 5; status = "RIESGO";
        }

        if (!video.paused) {
            wbaStats.framesAnalizados++;
            if (color !== "#00ff00") {
                wbaStats.riesgoAltoTotal++;
                wbaStats.zonasAfectadas.add(groupKey);
            }
        }
    }

    ctx.beginPath();
    ctx.strokeStyle = color; 
    ctx.lineWidth = thickness; 
    ctx.moveTo(p1.x, p1.y); 
    ctx.lineTo(p2.x, p2.y); 
    ctx.stroke();

    // Mostrar siempre los grados en el modo archivo
    const mx = (p1.x + p2.x) / 2, my = (p1.y + p2.y) / 2;
    ctx.fillStyle = "rgba(0,0,0,0.8)";
    ctx.beginPath(); ctx.roundRect(mx + 10, my - 25, 65, 35, 5); ctx.fill();
    ctx.fillStyle = "#ffffff"; ctx.font = "bold 11px Arial";
    ctx.fillText(`${avgAngle.toFixed(0)}°`, mx + 15, my - 12);
    ctx.fillStyle = color; ctx.font = "9px Arial";
    ctx.fillText(status, mx + 15, my + 2);
};
    
/**
 * 🏷️ BLOQUE 4: PROCESAMIENTO DE IA (REDISEÑO JERÁRQUICO "T")
 * Conecta orejas -> centro cabeza -> cuello para una visualización limpia.
 */

function onResults(res) {
    const w = canvas.width, h = canvas.height;

    ctx.save();
    ctx.clearRect(0, 0, w, h);
    
    if (currentFacingMode === "user") { 
        ctx.translate(w, 0); 
        ctx.scale(-1, 1); 
    }
    
    if (res.image) ctx.drawImage(res.image, 0, 0, w, h);

    if (!res.poseLandmarks) { 
        txtStatus.innerText = "BUSCANDO TRABAJADOR..."; 
        ctx.restore(); 
        return; 
    }

    const loader = document.getElementById('loader-ia');
    if (loader && loader.style.display !== 'none') loader.style.display = 'none';

    const lm = res.poseLandmarks;

    // Helper de suavizado
    const pt = (i) => {
        if (!lm[i]) return { x: 0, y: 0, z: 0, v: 0 };
        if (!posBuffer[i]) posBuffer[i] = { h: [] };
        posBuffer[i].h.push({ x: lm[i].x * w, y: lm[i].y * h, z: lm[i].z });
        if (posBuffer[i].h.length > SUAVIZADO_POS) posBuffer[i].h.shift();
        const len = posBuffer[i].h.length;
        const avg = posBuffer[i].h.reduce((a, b) => ({ x: a.x + b.x, y: a.y + b.y, z: a.z + b.z }), { x: 0, y: 0, z: 0 });
        return { x: avg.x / len, y: avg.y / len, z: avg.z / len, v: lm[i].visibility };
    };

    // --- MAPEO DE PUNTOS CLAVE ---
    const p = {
        ore_d: pt(8), ore_i: pt(7), 
        h_d: pt(12), h_i: pt(11), 
        c_d: pt(14), c_i: pt(13), 
        m_d: pt(16), m_i: pt(15), 
        dedo_d: pt(20), dedo_i: pt(19),
        p_d: pt(24), p_i: pt(23),
        r_d: pt(26), r_i: pt(25),
        t_d: pt(28), t_i: pt(27),
        // CORRECCIÓN: Puntos adicionales para los pies
        pie_d: pt(32), pie_i: pt(31) 
    };

    // --- LÓGICA DE PUNTOS CENTRALES ---
    p.centro_orejas = { 
        x: (p.ore_d.x + p.ore_i.x) / 2, 
        y: (p.ore_d.y + p.ore_i.y) / 2, 
        z: (p.ore_d.z + p.ore_i.z) / 2 
    };

    p.cue = { 
        x: (p.h_d.x + p.h_i.x) / 2, 
        y: (p.h_d.y + p.h_i.y) / 2, 
        z: (p.h_d.z + p.h_i.z) / 2 
    };

    p.esp_baja = { 
        x: (p.p_d.x + p.p_i.x) / 2, 
        y: (p.p_d.y + p.p_i.y) / 2, 
        z: (p.p_d.z + p.p_i.z) / 2 
    };

    p.torax = { x: p.cue.x + (p.esp_baja.x - p.cue.x) * 0.3, y: p.cue.y + (p.esp_baja.y - p.cue.y) * 0.3, z: p.cue.z };
    p.abdomen = { x: p.cue.x + (p.esp_baja.x - p.cue.x) * 0.6, y: p.cue.y + (p.esp_baja.y - p.cue.y) * 0.6, z: p.cue.z };

    const verticalRef = { x: p.cue.x, y: p.cue.y + 100, z: p.cue.z };

    // --- CÁLCULO DE ÁNGULOS ---
    const currentAngles = {
        cuello: calcAng3D(p.centro_orejas, p.cue, verticalRef),
        tronco: calcAng3D(p.cue, p.esp_baja, verticalRef),
        h_d: calcAng3D(p.cue, p.h_d, p.c_d),
        h_i: calcAng3D(p.cue, p.h_i, p.c_i),
        c_d: calcAng3D(p.h_d, p.c_d, p.m_d),
        c_i: calcAng3D(p.h_i, p.c_i, p.m_i),
        r_d: calcAng3D(p.p_d, p.r_d, p.t_d),
        r_i: calcAng3D(p.p_i, p.r_i, p.t_i)
    };

    Object.keys(currentAngles).forEach(k => {
        if (!angleBuffer[k]) angleBuffer[k] = [];
        angleBuffer[k].push(currentAngles[k]);
        if (angleBuffer[k].length > HISTORIAL_MAX) angleBuffer[k].shift();
    });

    // --- RENDERIZADO DEL ESQUEMA ---
    
    // Cabeza y Cuello
    drawV(p.ore_d, p.ore_i, 'cuello', 'cuello', p.ore_d.v, p.ore_i.v); 
    drawV(p.centro_orejas, p.cue, 'cuello', 'cuello', 1, 1);

    // Eje Central (Columna)
    drawV(p.cue, p.torax, 'tronco', 'tronco', 1, 1);
    drawV(p.torax, p.abdomen, 'tronco', 'tronco', 1, 1);
    drawV(p.abdomen, p.esp_baja, 'tronco', 'tronco', 1, 1);

    // Conexión de Hombros
    drawV(p.h_d, p.h_i, 'tronco', 'hombros', p.h_d.v, p.h_i.v);

    // Brazos
    drawV(p.h_d, p.c_d, 'h_d', 'hombros', p.h_d.v, p.c_d.v);
    drawV(p.h_i, p.c_i, 'h_i', 'hombros', p.h_i.v, p.c_i.v);
    drawV(p.c_d, p.m_d, 'c_d', 'codos', p.c_d.v, p.m_d.v);
    drawV(p.c_i, p.m_i, 'c_i', 'codos', p.c_i.v, p.m_i.v);

    // CORRECCIÓN PIERNAS: Conexión de Cadera a Columna (Une el esqueleto)
    drawV(p.esp_baja, p.p_d, 'tronco', 'piernas', 1, p.p_d.v);
    drawV(p.esp_baja, p.p_i, 'tronco', 'piernas', 1, p.p_i.v);

    // Muslos y Pantorrillas
    drawV(p.p_d, p.r_d, 'r_d', 'piernas', p.p_d.v, p.r_d.v);
    drawV(p.p_i, p.r_i, 'r_i', 'piernas', p.p_i.v, p.r_i.v);
    drawV(p.r_d, p.t_d, 'r_d', 'piernas', p.r_d.v, p.t_d.v);
    drawV(p.r_i, p.t_i, 'r_i', 'piernas', p.r_i.v, p.t_i.v);

    // CORRECCIÓN PIES: Dibujo de vectores finales[cite: 1]
    drawV(p.t_d, p.pie_d, 'r_d', 'piernas', p.t_d.v, p.pie_d.v);
    drawV(p.t_i, p.pie_i, 'r_i', 'piernas', p.t_i.v, p.pie_i.v);

    ctx.restore();
}

function iniciarCalibracion() {
    if (!iaActiva) return;
    txtStatus.innerText = "⚖️ CALIBRANDO... MANTENGA POSTURA NEUTRA";
    
    setTimeout(() => {
        Object.keys(angleBuffer).forEach(k => {
            const avg = angleBuffer[k].reduce((a, b) => a + b, 0) / angleBuffer[k].length;
            baseAngles[k] = avg;
        });
        calibrado = true;
        document.getElementById('btn-calib').style.background = "#2ecc71";
        document.getElementById('recordBtn').disabled = false;
        document.getElementById('recordBtn').style.opacity = "1";
        txtStatus.innerText = "✅ CALIBRADO COMPLETADO";
    }, 2000);
}

function toggleAuditoria() {
    if (!calibrado) return;
    analizandoRiesgo = !analizandoRiesgo;
    const btn = document.getElementById('recordBtn');

    if (analizandoRiesgo) {
        recordedChunks = [];
        const stream = canvas.captureStream(30);
        mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
        mediaRecorder.ondataavailable = (e) => recordedChunks.push(e.data);
        mediaRecorder.onstop = descargarVideo;
        mediaRecorder.start();
        wbaStats.inicioAuditoria = Date.now();
        btn.innerHTML = "<span>⏹️</span>DETENER"; btn.classList.add('rec-active');
    } else {
        btn.innerHTML = "<span>🔴</span>AUDITAR"; btn.classList.remove('rec-active');
        if (mediaRecorder) mediaRecorder.stop();
        setTimeout(generarReporteWBA, 800);
    }
}

    /**
 * 🏷️ BLOQUE 6: SISTEMA DE REPORTES PDF (VERSIÓN INTEGRAL NOM-036 & LFT)
 * Genera un documento técnico basado en los hallazgos de la IA y la normativa mexicana.
 */
function generarReporteWBA() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    
    // 1. Recolección de datos del DOM
    const info = {
        emp: document.getElementById('nombreEmpresa')?.value || "Empresa No Especificada",
        puesto: document.getElementById('puestoTrabajo')?.value || "General",
        trab: document.getElementById('nombreTrabajador')?.value || "Sin Nombre",
        peso: parseFloat(document.getElementById('pesoCarga')?.value) || 0,
        gen: document.getElementById('generoTrabajador')?.value || 'H',
        edad: parseInt(document.getElementById('edadTrabajador')?.value) || 0
    };

    // 2. Lógica de Cumplimiento Normativo (Sincronizado con NOM-036 y LFT)
    let limiteNormativo = 0;
    let hallazgosLegales = [];

    // Validación según Ley Federal del Trabajo (Menores)
    if (info.edad < 15) {
        hallazgosLegales.push("PROHIBICIÓN LFT: Trabajo infantil detectado.");
        limiteNormativo = 0;
    } else if (info.edad < 18) {
        hallazgosLegales.push("RESTRICCIÓN LFT: Menor en etapa de desarrollo.");
        limiteNormativo = 7;
    } else {
        // Límites NOM-036-1-STPS-2018
        if (info.gen === 'H') {
            limiteNormativo = (info.edad > 45) ? 20 : 25;
        } else {
            limiteNormativo = (info.edad > 45) ? 10 : 15;
        }
    }

    // Cálculos de riesgo postural (IA)
    const porcRiesgo = wbaStats.framesAnalizados > 0 
        ? ((wbaStats.riesgoAltoTotal / wbaStats.framesAnalizados) * 100).toFixed(1) 
        : 0;
    const nivelRiesgo = porcRiesgo > 20 ? 'MUY ALTO' : (porcRiesgo > 5 ? 'MODERADO' : 'BAJO');
    const colorRiesgo = porcRiesgo > 20 ? [231, 76, 60] : (porcRiesgo > 5 ? [241, 196, 15] : [46, 204, 113]);

    // --- DISEÑO DEL PDF ---

    // Encabezado
    doc.setFillColor(13, 17, 23); doc.rect(0, 0, 210, 40, 'F');
    doc.setTextColor(0, 255, 0); doc.setFontSize(18); 
    doc.text("INFORME DE EVALUACIÓN ERGONÓMICA IA", 105, 15, { align: "center" });
    doc.setFontSize(10); doc.setTextColor(255, 255, 255);
    doc.text(`CUMPLIMIENTO: NOM-036-1-STPS-2018 & LFT`, 105, 25, { align: "center" });
    doc.text(`ID Reporte: LYA-${Date.now()}`, 105, 32, { align: "center" });

    // 1. Datos Generales
    doc.setTextColor(0, 0, 0); doc.setFontSize(12); doc.setFont("helvetica", "bold");
    doc.text("1. DATOS GENERALES DEL PUESTO", 15, 50);
    doc.autoTable({
        startY: 55,
        body: [
            ['Empresa/Planta:', info.emp, 'Fecha:', new Date().toLocaleDateString()],
            ['Trabajador:', info.trab, 'Edad:', `${info.edad} años`],
            ['Puesto de Trabajo:', info.puesto, 'Género:', info.gen === 'H' ? 'Hombre' : 'Mujer']
        ],
        theme: 'grid', styles: { fontSize: 8 }
    });

    // 2. Análisis de Carga y Postura
    doc.text("2. ANÁLISIS DE CARGA Y POSTURA (IA)", 15, doc.lastAutoTable.finalY + 10);
    doc.autoTable({
        startY: doc.lastAutoTable.finalY + 13,
        head: [['FACTOR ANALIZADO', 'VALOR', 'LÍMITE MÁX.', 'ESTADO']],
        body: [
            [
                'Manejo Manual de Carga', 
                `${info.peso} kg`, 
                `${limiteNormativo} kg`, 
                info.peso > limiteNormativo ? 'EXCEDE LÍMITE' : 'CUMPLE'
            ],
            [
                'Exposición a Postura Crítica', 
                `${porcRiesgo}%`, 
                'Máx. 20%', 
                nivelRiesgo
            ],
            [
                'Zonas de Mayor Tensión', 
                Array.from(wbaStats.zonasAfectadas).join(', ') || 'Sin anomalías', 
                'N/A', 
                '-'
            ]
        ],
        headStyles: { fillColor: colorRiesgo },
        styles: { fontSize: 8 }
    });

    // 3. Conclusiones y Recomendaciones
    let recomendaciones = "";
    if (info.peso > limiteNormativo) {
        recomendaciones += `ALERTA NORMATIVA: Se excede el límite de ${limiteNormativo}kg. ${hallazgosLegales.join(" ")} Requiere rediseño o ayuda mecánica. `;
    }
    if (porcRiesgo > 20) {
        recomendaciones += "RIESGO POSTURAL: Alta frecuencia de ángulos críticos. Se recomienda rotación de personal y pausas activas.";
    }
    if (recomendaciones === "") {
        recomendaciones = "OPERACIÓN SEGURA: La tarea se ejecuta bajo parámetros aceptables. Continuar con monitoreo preventivo.";
    }

    doc.setFont("helvetica", "bold"); doc.setFontSize(11);
    doc.text("3. CONCLUSIONES Y RECOMENDACIONES", 15, doc.lastAutoTable.finalY + 12);
    doc.setFont("helvetica", "normal"); doc.setFontSize(9);
    
    const splitText = doc.splitTextToSize(recomendaciones, 175);
    const boxHeight = (splitText.length * 5) + 12;
    doc.setFillColor(245, 245, 245);
    doc.rect(15, doc.lastAutoTable.finalY + 15, 180, boxHeight, 'F');
    doc.text(splitText, 18, doc.lastAutoTable.finalY + 22);

    // 4. Firmas
    const finalY = doc.lastAutoTable.finalY + boxHeight + 40;
    doc.setFontSize(8);
    doc.line(30, finalY, 90, finalY); doc.text("Responsable de Seguridad / Auditor", 32, finalY + 5);
    doc.line(120, finalY, 180, finalY); doc.text("Firma del Trabajador", 135, finalY + 5);

    // Pie de Página
    doc.setFontSize(7); doc.setTextColor(150);
    doc.text("Generado por LYA-ERGO IA System. Basado en IA Pose Estimation.", 105, 285, { align: "center" });

    // Guardar
    doc.save(`Reporte_NOM036_${info.trab.replace(/\s+/g, '_')}.pdf`);
}
    
    /**
 * 🏷️ BLOQUE 7: GESTIÓN DE HARDWARE Y ARRANQUE - VERSIÓN MEJORADA
 * Controla el ciclo de vida de la cámara, el video y el motor de IA.
 */
async function prepararSistema(fuente) {
    // 1. Referencias y Captura de Datos
    const edadInput = document.getElementById('edadTrabajador');
    const pesoInput = document.getElementById('pesoCarga');
    const ids = ['nombreEmpresa', 'puestoTrabajo', 'nombreTrabajador', 'edadTrabajador', 'pesoCarga'];
    
    // Validación de campos vacíos
    const incompleto = ids.some(id => !document.getElementById(id).value.trim());
    if (incompleto) { 
        alert("⚠️ Por favor, complete todos los campos del formulario antes de iniciar el análisis."); 
        return; 
    }

    // Validación de Edad (Estrictamente 2 cifras)
    const edadValor = edadInput.value.trim();
    if (!/^\d{2}$/.test(edadValor)) {
        alert("❌ Error en EDAD: Debe ingresar un valor de exactamente 2 cifras (Ejemplo: 25).");
        edadInput.focus();
        return;
    }

    // Validación de peso
    if (parseFloat(pesoInput.value) <= 0) {
        alert("❌ El peso de la carga debe ser un número positivo mayor a cero.");
        pesoInput.focus();
        return;
    }

    // --- LIMPIEZA DE MEMORIA Y BUFFERS ---
    angleBuffer = {}; 
    posBuffer = {};
    wbaStats.zonasAfectadas.clear();
    wbaStats.framesAnalizados = 0;
    wbaStats.riesgoAltoTotal = 0;

    // 2. Limpieza de flujos previos (Cámara o Archivos)
    if (video.srcObject) {
        video.srcObject.getTracks().forEach(track => track.stop());
        video.srcObject = null;
    }
    if (video.src.startsWith('blob:')) {
        URL.revokeObjectURL(video.src);
        video.src = "";
    }

    // 3. Gestión de la Fuente (Redirección Corregida)
    if (fuente === 'camara') {
        // Modo VIVO: Ocultar controles de reproductor y abrir cámara
        document.getElementById('controles-archivo-flotantes').style.display = 'none';
        if (document.getElementById('btn-girar-cam')) document.getElementById('btn-girar-cam').style.display = 'flex';
        
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { 
                    facingMode: currentFacingMode, 
                    width: { ideal: 1280 }, 
                    height: { ideal: 720 } 
                } 
            });
            video.srcObject = stream;
        } catch (err) {
            console.error("Error de acceso al hardware:", err);
            alert("No se pudo acceder a la cámara. Verifique los permisos.");
            return;
        }
    } else {
        // Modo ARCHIVO: Disparar el input file y detener este flujo (continuará al seleccionar archivo)
        document.getElementById('fileInput').click();[cite: 3]
        return; 
    }

    // 4. Transición de Interfaz y Arranque del Motor
    document.getElementById('menu-inicial').style.display = 'none';
    document.getElementById('contenedor-analisis').style.display = 'block';

    video.onloadedmetadata = async () => {
        canvas.width = video.videoWidth; 
        canvas.height = video.videoHeight;
        
        try {
            await video.play();
            activarIA(); // Motor único con lógica de detección de fuente
        } catch (playError) {
            console.error("Error al reproducir:", playError);
        }
    };
}
async function activarIA() {
    const loader = document.getElementById('loader-ia');
    if (loader) loader.style.display = 'flex';
    
    // 1. Aumentamos el margen de espera a 20s para videos locales pesados
    const safetyTimeout = setTimeout(() => {
        if (loader && loader.style.display !== 'none') {
            loader.style.display = 'none';
            alert("⚠️ El motor de IA está tardando en responder. Si el problema persiste, reduzca la resolución del video o recargue la página.");
        }
    }, 20000);

    // 2. REINICIO PROFUNDO: Liberar memoria de GPU antes de crear nueva instancia
    if (typeof pose !== 'undefined' && pose) {
        try { 
            await pose.close(); 
            pose = null; // Forzar recolección de basura
        } catch(e) { console.warn("Error liberando instancia previa"); }
    }

    // 3. Nueva instancia de MediaPipe
    pose = new Pose({ 
        locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}` 
    });

    pose.setOptions({ 
        modelComplexity: 1, 
        smoothLandmarks: true, 
        enableSegmentation: false, // Desactivar si no se usa para ahorrar GPU
        minDetectionConfidence: 0.5, 
        minTrackingConfidence: 0.5 
    });

    pose.onResults((res) => {
        clearTimeout(safetyTimeout);
        if (loader && loader.style.display !== 'none') {
            loader.style.display = 'none';
            console.log("IA Operativa - Motor Sincronizado");
        }
        iaActiva = true;
        onResults(res);
    });

    // 4. Loop de frames optimizado para ARCHIVO y VIVO
    async function frameLoop() {
        // En modo archivo, permitimos un frame inicial incluso en pausa para calibrar
        if (video.ended || (!iaActiva && video.paused)) return;

        try {
            if (video.readyState >= 2) { // Verificar que el video tiene datos suficientes
                await pose.send({ image: video });
            }
        } catch (e) {
            console.warn("GPU Saturada: Frame omitido.");
        }
        
        // Si el video está reproduciéndose, seguimos el loop[cite: 4]
        if (!video.paused && !video.ended) {
            requestAnimationFrame(frameLoop);
        } else if (!iaActiva) {
            // Reintento lento inicial si la IA aún no responde
            setTimeout(frameLoop, 500);
        }
    }
    
    // Iniciar loop cuando el video empiece a reproducirse[cite: 4]
    video.removeEventListener('play', frameLoop); // Evitar duplicados
    video.addEventListener('play', frameLoop);
    
    // Ejecución inicial para detectar al trabajador en el frame estático[cite: 4]
    frameLoop();
}

/**
 * 📁 GESTIÓN DE ARCHIVOS EXTERNOS
 * Permite procesar videos pregrabados con lógica de ángulos absolutos.
 * Independiente del sistema de calibración del modo VIVO.
 */

/**
 * Procesa los resultados de MediaPipe exclusivamente para ARCHIVO.
 * Llama a drawV_Archivo para usar rangos normativos fijos.
 */
function onResults_Archivo(res) {
    const w = canvas.width, h = canvas.height;
    ctx.save();
    ctx.clearRect(0, 0, w, h);
    if (res.image) ctx.drawImage(res.image, 0, 0, w, h);
    if (!res.poseLandmarks) { 
        txtStatus.innerText = "📁 BUSCANDO TRABAJADOR EN VIDEO..."; 
        ctx.restore(); 
        return; 
    }

    const lm = res.poseLandmarks;
    const pt = (i) => {
        if (!lm[i]) return { x: 0, y: 0, z: 0, v: 0 };
        if (!posBuffer[i]) posBuffer[i] = { h: [] };
        posBuffer[i].h.push({ x: lm[i].x * w, y: lm[i].y * h, z: lm[i].z });
        if (posBuffer[i].h.length > 5) posBuffer[i].h.shift();
        const avg = posBuffer[i].h.reduce((a, b) => ({ x: a.x + b.x, y: a.y + b.y, z: a.z + b.z }), { x: 0, y: 0, z: 0 });
        return { x: avg.x / posBuffer[i].h.length, y: avg.y / posBuffer[i].h.length, z: avg.z / posBuffer[i].h.length, v: lm[i].visibility };
    };

    const p = {
        ore_d: pt(8), ore_i: pt(7), h_d: pt(12), h_i: pt(11), 
        c_d: pt(14), c_i: pt(13), m_d: pt(16), m_i: pt(15),
        p_d: pt(24), p_i: pt(23), r_d: pt(26), r_i: pt(25), t_d: pt(28), t_i: pt(27)
    };
    p.centro_orejas = { x: (p.ore_d.x+p.ore_i.x)/2, y: (p.ore_d.y+p.ore_i.y)/2, z: (p.ore_d.z+p.ore_i.z)/2 };
    p.cue = { x: (p.h_d.x+p.h_i.x)/2, y: (p.h_d.y+p.h_i.y)/2, z: (p.h_d.z+p.h_i.z)/2 };
    p.esp_baja = { x: (p.p_d.x+p.p_i.x)/2, y: (p.p_d.y+p.p_i.y)/2, z: (p.p_d.z+p.p_i.z)/2 };
    const verticalRef = { x: p.cue.x, y: p.cue.y + 100, z: p.cue.z };

    const curAng = {
        cuello: calcAng3D(p.centro_orejas, p.cue, verticalRef),
        tronco: calcAng3D(p.cue, p.esp_baja, verticalRef),
        h_d: calcAng3D(p.cue, p.h_d, p.c_d), h_i: calcAng3D(p.cue, p.h_i, p.c_i),
        c_d: calcAng3D(p.h_d, p.c_d, p.m_d), c_i: calcAng3D(p.h_i, p.c_i, p.m_i)
    };
    
    Object.keys(curAng).forEach(k => {
        if (!angleBuffer[k]) angleBuffer[k] = [];
        angleBuffer[k].push(curAng[k]);
        if (angleBuffer[k].length > 15) angleBuffer[k].shift();
    });

    // RENDERIZADO INDEPENDIENTE (Asegúrate de haber sumado drawV_Archivo en el Bloque 4)
    drawV_Archivo(p.centro_orejas, p.cue, 'cuello', 'cuello', 1, 1);
    drawV_Archivo(p.cue, p.esp_baja, 'tronco', 'tronco', 1, 1);
    drawV_Archivo(p.h_d, p.c_d, 'h_d', 'hombros', p.h_d.v, p.c_d.v);
    drawV_Archivo(p.h_i, p.c_i, 'h_i', 'hombros', p.h_i.v, p.c_i.v);
    drawV_Archivo(p.c_d, p.m_d, 'c_d', 'codos', p.c_d.v, p.m_d.v);
    drawV_Archivo(p.c_i, p.m_i, 'c_i', 'codos', p.c_i.v, p.m_i.v);

    ctx.restore();
}

/**
 * Valida el formulario y dispara la selección de archivo local.
 */
function validarYAbrirArchivo() {
    const ids = ['nombreEmpresa', 'puestoTrabajo', 'nombreTrabajador', 'edadTrabajador', 'pesoCarga'];
    const incompleto = ids.some(id => !document.getElementById(id).value.trim());

    if (incompleto) {
        alert("⚠️ Por favor, complete los datos del formulario antes de cargar un archivo de video.");
        return;
    }
    document.getElementById('fileInput').click();
}

/**
 * Configura el entorno para video local con prevención de errores de GPU.
 */
async function procesarVideoArchivo() {
    const fileInput = document.getElementById('fileInput');
    const file = fileInput.files[0];
    if (!file) return;

    if (video.srcObject) {
        video.srcObject.getTracks().forEach(track => track.stop());
        video.srcObject = null;
    }

    if (document.getElementById('btn-girar-cam')) document.getElementById('btn-girar-cam').style.display = 'none';
    document.getElementById('menu-inicial').style.display = 'none';
    document.getElementById('contenedor-analisis').style.display = 'block';
    
    const capaControles = document.getElementById('controles-archivo-flotantes');
    if (capaControles) capaControles.style.display = 'flex';

    if (video.src.startsWith('blob:')) URL.revokeObjectURL(video.src); 
    
    video.src = URL.createObjectURL(file);
    video.loop = false; 
    video.autoplay = false; 

    video.onloadedmetadata = async () => {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        video.currentTime = 0.1; 
        txtStatus.innerText = "📁 ARCHIVO CARGADO: MODO NOM-036 ACTIVO";
        const iconPath = document.getElementById('svg-play-icon');
        if (iconPath) iconPath.innerHTML = '<path d="M8 5v14l11-7z"/>';
        activarIA(); 
    };
}

/**
 * Motor de IA para Archivo (Con redirección inteligente)
 * Mantiene la independencia total entre el modo VIVO y ARCHIVO.
 */
async function activarIA() {
    const loader = document.getElementById('loader-ia');
    if (loader) loader.style.display = 'flex';
    
    // 1. Tiempo de seguridad para evitar bloqueos en la carga
    const safetyTimeout = setTimeout(() => {
        if (loader && loader.style.display !== 'none') {
            loader.style.display = 'none';
            alert("⚠️ El motor de IA está tardando en responder. Intente reducir la resolución del video.");
        }
    }, 20000);

    // 2. Reinicio Limpio: Liberar la instancia previa de MediaPipe para no saturar la GPU
    if (window.pose) {
        try { 
            await window.pose.close(); 
            window.pose = null; 
        } catch(e) { console.warn("Error liberando memoria de IA:", e); }
    }

    // 3. Inicialización del Motor (Instancia Única)
    window.pose = new Pose({ 
        locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}` 
    });

    window.pose.setOptions({ 
        modelComplexity: 1, 
        smoothLandmarks: true, 
        minDetectionConfidence: 0.5, 
        minTrackingConfidence: 0.5 
    });

    // 4. Redirección Inteligente de Resultados
    window.pose.onResults((res) => {
        clearTimeout(safetyTimeout);
        if (loader) loader.style.display = 'none';
        iaActiva = true;

        /**
         * LÓGICA DE DETECCIÓN DE FUENTE:
         * Si no hay srcObject (stream de cámara), el sistema procesa como ARCHIVO.
         * De lo contrario, procesa como VIVO para respetar la calibración inicial.
         */
        if (!video.srcObject) {
            onResults_Archivo(res); 
        } else {
            onResults(res); 
        }
    });

    // 5. Bucle de procesamiento optimizado para Pausa/Reproducción
    async function loopIA() {
        if (video.ended) return;

        try {
            // Solo envía frames a la IA si el video tiene datos cargados
            if (video.readyState >= 2) {
                await window.pose.send({ image: video });
            }
        } catch (e) { 
            console.warn("GPU Saturada: Saltando frame..."); 
        }
        
        // Continúa el bucle solo si el video está en reproducción
        if (!video.paused && !video.ended) {
            requestAnimationFrame(loopIA);
        }
    }
    
    // Sincronización de eventos para el control de reproducción
    video.removeEventListener('play', loopIA);
    video.addEventListener('play', loopIA);
    
    // Ejecución inicial (necesaria para procesar el primer frame de un archivo en pausa)
    loopIA();
}
function gestionarReproduccion() {
    const iconPath = document.getElementById('svg-play-icon');
    if (video.paused) {
        video.play();
        if (iconPath) iconPath.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
        txtStatus.innerText = "▶️ ANALIZANDO...";
    } else {
        video.pause();
        if (iconPath) iconPath.innerHTML = '<path d="M8 5v14l11-7z"/>';
        txtStatus.innerText = "⏸️ PAUSADO";
    }
}

function retrocederSegundos() {
    video.currentTime = Math.max(0, video.currentTime - 5);
    if (video.paused && iaActiva) pose.send({ image: video });
}

function adelantarSegundos() {
    video.currentTime = Math.min(video.duration, video.currentTime + 5);
    if (video.paused && iaActiva) pose.send({ image: video });
}

document.getElementById('fileInput').addEventListener('change', (e) => {
    if (e.target.files.length > 0) procesarVideoArchivo(); 
});

    


/* --- TERMINA EL CODIGO DEL BOTON ARCHIVO --- */
</script>
