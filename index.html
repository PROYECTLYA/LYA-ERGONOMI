<!DOCTYPE html> 
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LYA-ERGO v20.2 | AUDITORÍA CERVECERA HIERÁRQUICA</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
   <style>
    /* --- CONFIGURACIÓN BASE --- */
    body { 
        background-color: #0d1117; 
        color: white; 
        margin: 0; 
        overflow: hidden; 
        font-family: 'Segoe UI', sans-serif; 
        height: 100vh;
        height: 100svh; 
    }

    /* --- MENÚ INICIAL (CORREGIDO) --- */
    #menu-inicial { 
        display: flex;
        width: 100%; 
        height: 100svh;
        flex-direction: column; 
        align-items: center; 
        justify-content: center; 
        background: radial-gradient(circle, #161b22 0%, #0d1117 100%); 
        position: fixed; 
        z-index: 5000;
        padding: 20px;
        box-sizing: border-box;
        overflow-y: auto;
    }

    .logo-text { 
        color: #00ff00;
        font-weight: 800; 
        letter-spacing: 3px; 
        margin-bottom: 5px; 
        font-size: clamp(2.5rem, 10vw, 4rem);
        text-align: center;
        text-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
    }

    .sub-text {
        color: #8b949e;
        font-size: clamp(0.8rem, 2.5vw, 1rem);
        text-transform: uppercase;
        letter-spacing: 2px;
        margin-bottom: 40px;
        text-align: center;
    }

    .form-container {
        width: 100%;
        max-width: 500px;
        background: rgba(22, 27, 34, 0.8);
        padding: 30px;
        border-radius: 20px;
        border: 1px solid rgba(48, 54, 61, 1);
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .label-custom {
        color: #8b949e;
        font-size: 0.75rem;
        font-weight: 600;
        margin-bottom: 5px;
        display: block;
    }

    input[type="text"], input[type="number"], select {
        background: #0d1117 !important;
        border: 1px solid #30363d !important;
        color: #e6edf3 !important;
        border-radius: 10px !important;
        padding: 12px !important;
        margin-bottom: 15px !important;
    }

    input:focus {
        border-color: #00ff00 !important;
        box-shadow: 0 0 0 2px rgba(0, 255, 0, 0.2) !important;
        outline: none;
    }

    .btn-inicio { 
        padding: 18px !important; 
        border-radius: 15px !important; 
        font-weight: 900 !important; 
        font-size: 1.1rem !important;
        border: none !important;
        transition: transform 0.2s, box-shadow 0.3s !important;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        width: 100%;
    }

    .btn-inicio:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.4); }

    /* --- PANTALLA DE ANÁLISIS --- */
    #contenedor-analisis { 
        display: none;
        width: 100vw; 
        height: 100svh;
        position: relative; 
        background: #000; 
    }

    canvas { width: 100%; height: 100%; object-fit: contain; }
    
    .status-badge { 
        position: absolute;
        top: 30px; 
        left: 50%; 
        transform: translateX(-50%);
        background: rgba(13, 17, 23, 0.9);
        color: #00ff00;
        padding: 8px 25px;
        border-radius: 30px;
        font-weight: 800;
        border: 2px solid #00ff00;
        z-index: 7000;
        text-transform: uppercase;
        letter-spacing: 1px;
        box-shadow: 0 0 15px rgba(0, 255, 0, 0.2);
    }

    .barra-controles {
        position: absolute;
        bottom: 40px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 20px;
        z-index: 7000;
        background: rgba(13, 17, 23, 0.85);
        padding: 20px 30px;
        border-radius: 60px;
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .btn-circular {
        width: 75px;
        height: 75px;
        border-radius: 50%;
        border: none;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-size: 0.65rem;
        font-weight: 800;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .btn-circular span { font-size: 1.6rem; margin-bottom: 3px; }
    .rec-active { background: #ff4d4d !important; color: white !important; animation: pulse-red 1.5s infinite; }

    @keyframes pulse-red {
        0% { box-shadow: 0 0 0 0 rgba(255, 77, 77, 0.7); }
        70% { box-shadow: 0 0 0 20px rgba(255, 77, 77, 0); }
        100% { box-shadow: 0 0 0 0 rgba(255, 77, 77, 0); }
    }
   </style> 
</head>
<body>

<div id="menu-inicial">
    <h1 class="logo-text">LYA-ERGO</h1>
    <p class="sub-text">Auditoría de Procesos NOM-036-STPS</p>
    
    <div class="form-container">
        <label class="label-custom">EMPRESA / PLANTA</label>
        <input type="text" id="nombreEmpresa" placeholder="Ej: Cervecería Modelo" class="form-control">
        
        <div class="row">
            <div class="col-6">
                <label class="label-custom">PUESTO</label>
                <input type="text" id="puestoTrabajo" placeholder="Ej: Estibador" class="form-control">
            </div>
            <div class="col-6">
                <label class="label-custom">TRABAJADOR</label>
                <input type="text" id="nombreTrabajador" placeholder="Nombre completo" class="form-control">
            </div>
        </div>

        <div class="row">
            <div class="col-6">
                <label class="label-custom">PESO CARGA (KG)</label>
                <input type="number" id="pesoCarga" placeholder="Ej: 10" class="form-control">
            </div>
            <div class="col-6">
                <label class="label-custom">EDAD</label>
                <input type="number" id="edadTrabajador" placeholder="Años" class="form-control">
            </div>
        </div>
        
        <div class="d-flex gap-3 mt-3">
            <button class="btn-inicio" style="background:#27ae60; color:white;" onclick="prepararSistema('camara')">🎥 MODO VIVO</button>
            <button class="btn-inicio" style="background:#2980b9; color:white;" onclick="validarYAbrirArchivo()">📁 ARCHIVO</button>
        </div>
    </div>
    <input type="file" id="fileInput" hidden accept="video/*" onchange="prepararSistema('archivo')">
</div>

<div id="contenedor-analisis">
    <div class="status-badge" id="txt-status">SISTEMA READY</div>
    <canvas id="output_canvas"></canvas>
    <video id="input_video" playsinline muted style="display:none;"></video>
    
    <div class="barra-controles">
        <button class="btn-circular btn-dark" onclick="location.reload()"><span>✖</span>SALIR</button>
        <button id="btn-calib" class="btn-circular" style="background:#f1c40f; color:#000;" onclick="activarIA()"><span>⚖️</span>CALIBRAR</button>
        <button id="recordBtn" class="btn-circular" style="background:#ff4d4d; opacity: 0.3;" onclick="toggleGrabacion()" disabled><span>🔴</span>AUDITAR</button>
    </div>
</div>

<script>
    const video = document.getElementById('input_video');
    const canvas = document.getElementById('output_canvas');
    const ctx = canvas.getContext('2d');
    const txtStatus = document.getElementById('txt-status');
    
    let pose, calibrado = false, iaActiva = false;
    let recordedChunks = [], mediaRecorder;

    async function prepararSistema(fuente) {
        const campos = ['nombreEmpresa', 'puestoTrabajo', 'nombreTrabajador', 'pesoCarga', 'edadTrabajador'];
        let valid = true;
        campos.forEach(id => {
            if (!document.getElementById(id).value.trim()) {
                document.getElementById(id).style.borderColor = "#ff4d4d";
                valid = false;
            } else {
                document.getElementById(id).style.borderColor = "#30363d";
            }
        });

        if (!valid) { alert("⛔ Complete todos los campos."); return; }

        document.getElementById('menu-inicial').style.display = 'none';
        document.getElementById('contenedor-analisis').style.display = 'block';

        if (fuente === 'camara') {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
        } else {
            const file = document.getElementById('fileInput').files[0];
            video.src = URL.createObjectURL(file);
        }
        
        video.onloadedmetadata = () => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            video.play();
            requestAnimationFrame(drawLoop);
        };
    }

    function drawLoop() {
        if (!iaActiva) {
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            requestAnimationFrame(drawLoop);
        }
    }

    function validarYAbrirArchivo() {
        document.getElementById('fileInput').click();
    }

    function activarIA() {
        iaActiva = true;
        txtStatus.innerText = "IA ACTIVADA";
        // Lógica de MediaPipe Pose iría aquí...
        setTimeout(() => {
            calibrado = true;
            document.getElementById('recordBtn').style.opacity = "1";
            document.getElementById('recordBtn').disabled = false;
            txtStatus.innerText = "LISTO PARA AUDITAR";
        }, 2000);
    }

    function toggleGrabacion() {
        const btn = document.getElementById('recordBtn');
        if (btn.classList.contains('rec-active')) {
            btn.classList.remove('rec-active');
            btn.innerHTML = "<span>🔴</span>AUDITAR";
            txtStatus.innerText = "FIN AUDITORÍA";
        } else {
            btn.classList.add('rec-active');
            btn.innerHTML = "<span>⏹️</span>DETENER";
            txtStatus.innerText = "ANALIZANDO...";
        }
    }
</script>
</body>
</html>
