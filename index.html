<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ERGO-SENSING PRO v3.3</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0d1117; color: white; margin: 0; overflow: hidden; font-family: sans-serif; }
        
        /* Menú Inicial */
        #menu-inicial { 
            position: absolute; width: 100%; height: 100%; display: flex; 
            flex-direction: column; align-items: center; justify-content: center;
            background: #0d1117; z-index: 2000;
        }
        .btn-menu { width: 80%; max-width: 300px; padding: 20px; margin: 10px; border-radius: 15px; font-weight: bold; }

        /* Contenedor Principal */
        #contenedor-analisis { display: none; width: 100vw; height: 100vh; position: relative; background: #000; }
        canvas { width: 100%; height: 100%; object-fit: contain; }
        video { display: none; }

        /* HUD y Controles */
        .status-badge { 
            position: absolute; top: 10px; left: 10px; background: rgba(0,255,0,0.2); 
            color: #00ff00; padding: 5px 12px; border-radius: 20px; border: 1px solid #00ff00;
            font-size: 12px; z-index: 3000;
        }

        .barra-controles {
            position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 10px; padding: 15px; background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px); border-radius: 30px; z-index: 4000;
            border: 1px solid rgba(255,255,255,0.2); width: 90%; justify-content: space-around;
        }

        .btn-circular {
            width: 60px; height: 60px; border-radius: 50%; border: none;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 10px; font-weight: bold; transition: 0.3s; color: white;
        }

        .btn-back { background: #34495e; }
        /* BOTÓN GIRAR: Ahora en color Cian para que resalte */
        .btn-flip { background: #00d2d3; color: #000; border: 2px solid white; }
        .btn-calib { background: #f1c40f; color: #000; }
        .btn-record { background: #ff4d4d; width: 80px; border-radius: 30px; }
        .recording { animation: pulse 1s infinite; background: white; color: red; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div id="menu-inicial">
    <h2 style="color: #00d2d3; margin-bottom: 30px;">ERGO-SENSING PRO</h2>
    <button class="btn btn-success btn-menu" onclick="iniciarApp('camara')">🎥 EVALUACIÓN EN VIVO</button>
    <button class="btn btn-primary btn-menu" onclick="document.getElementById('fileInput').click()">📁 CARGAR VIDEO</button>
    <input type="file" id="fileInput" hidden accept="video/*" onchange="iniciarApp('archivo')">
</div>

<div id="contenedor-analisis">
    <div class="status-badge" id="txt-status">SISTEMA LISTO</div>
    <canvas id="output_canvas"></canvas>
    <video id="input_video" playsinline muted></video>

    <div class="barra-controles">
        <button class="btn-circular btn-back" onclick="location.reload()"><span>⬅</span>Menu</button>
        
        <button id="btn-flip" class="btn-circular btn-flip" onclick="cambiarCamara()"><span>🔄</span>GIRAR</button>
        
        <button class="btn-circular btn-calib" onclick="alert('Calibrando...')"><span>⚖️</span>CALIB</button>
        <button id="recordBtn" class="btn-circular btn-record" onclick="toggleGrabacion()"><span>🔴</span>GRABAR</button>
    </div>
</div>

<script>
    const video = document.getElementById('input_video');
    const canvas = document.getElementById('output_canvas');
    const ctx = canvas.getContext('2d');
    const status = document.getElementById('txt-status');
    
    let currentFacingMode = "user";
    let camera = null;
    let pose = null;

    // Inicializar MediaPipe Pose
    pose = new Pose({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}` });
    pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
    
    pose.onResults((res) => {
        ctx.save();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Espejo solo en frontal
        if (currentFacingMode === "user") {
            ctx.translate(canvas.width, 0);
            ctx.scale(-1, 1);
        }
        
        ctx.drawImage(res.image, 0, 0, canvas.width, canvas.height);
        
        // (Aquí iría tu lógica de dibujo de vectores completa)
        if (res.poseLandmarks) {
            ctx.fillStyle = "#00ff00";
            res.poseLandmarks.slice(11, 17).forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x * canvas.width, p.y * canvas.height, 5, 0, 2 * Math.PI);
                ctx.fill();
            });
        }
        ctx.restore();
    });

    async function iniciarApp(fuente) {
        document.getElementById('menu-inicial').style.display = 'none';
        document.getElementById('contenedor-analisis').style.display = 'block';

        if (fuente === 'camara') {
            document.getElementById('btn-flip').style.display = 'flex';
            await habilitarCamara();
        } else {
            document.getElementById('btn-flip').style.display = 'none';
            const file = document.getElementById('fileInput').files[0];
            video.src = URL.createObjectURL(file);
            video.play();
            status.innerText = "ANALIZANDO ARCHIVO";
            renderFrame();
        }
    }

    async function habilitarCamara() {
        if (camera) { await camera.stop(); }
        
        camera = new Camera(video, {
            onFrame: async () => {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                await pose.send({image: video});
            },
            facingMode: currentFacingMode,
            width: 1280, height: 720
        });
        
        status.innerText = `CÁMARA: ${currentFacingMode === 'user' ? 'FRONTAL' : 'TRASERA'}`;
        await camera.start();
    }

    // FUNCIÓN DE BOTÓN GIRAR
    async function cambiarCamara() {
        currentFacingMode = (currentFacingMode === "user") ? "environment" : "user";
        status.innerText = "CAMBIANDO...";
        await habilitarCamara();
    }

    async function renderFrame() {
        if (!video.paused && !video.ended) {
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            await pose.send({image: video});
            requestAnimationFrame(renderFrame);
        }
    }

    // Grabación
    let recorder; let chunks = [];
    function toggleGrabacion() {
        const btn = document.getElementById('recordBtn');
        if (!recorder || recorder.state === "inactive") {
            chunks = [];
            recorder = new MediaRecorder(canvas.captureStream(30));
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
