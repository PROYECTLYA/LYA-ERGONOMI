<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LYA-ERGO v20.2 | FULL CONTROL</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0d1117; color: white; margin: 0; height: 100vh; font-family: 'Segoe UI', sans-serif; overflow: hidden; display: flex; flex-direction: column; }
        
        /* Menú Inicial */
        #menu-inicial { display: flex; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle, #161b22 0%, #0d1117 100%); position: fixed; top:0; left:0; z-index: 5000; }
        .btn-inicio { width: 85%; max-width: 320px; padding: 18px; margin: 10px; border-radius: 12px; font-weight: bold; border: none; font-size: 1.1rem; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        
        /* Contenedor Principal de Análisis */
        #contenedor-analisis { display: none; flex: 1; width: 100vw; position: relative; background: #000; flex-direction: column; overflow: hidden; }
        
        /* Ajuste de Canvas Proporcional */
        #canvas-wrapper { flex: 1; width: 100%; display: flex; align-items: center; justify-content: center; background: #000; overflow: hidden; position: relative; }
        canvas { display: block; object-fit: contain; }
        
        /* Filtros de Video para mejor captura */
        #input_video { display: none; filter: brightness(1.2) contrast(1.3); }

        /* Barra de Controles (Siempre visible al frente) */
        .barra-controles { 
            background: rgba(22, 27, 34, 0.95); 
            padding: 10px; 
            display: flex; 
            justify-content: center; 
            gap: 12px; 
            z-index: 4500; 
            border-top: 1px solid #30363d;
            min-height: 85px;
        }
        
        .btn-circular { width: 58px; height: 58px; border-radius: 50%; border: none; font-size: 9px; font-weight: 900; color: white; display: flex; align-items: center; justify-content: center; flex-direction: column; transition: transform 0.1s; }
        .btn-circular:active { transform: scale(0.9); }
        .rec-active { background: #fff !important; color: #f00 !important; border: 3px solid #f00 !important; animation: pulse 1.5s infinite; }
        
        /* Feedback Visual */
        #status-label { position: absolute; top: 10px; left: 10px; font-size: 10px; background: rgba(0,0,0,0.6); padding: 5px 10px; border-radius: 5px; color: #00ff00; z-index: 4600; }
        #loader-ia { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 6000; text-align: center; background: rgba(0,0,0,0.9); padding: 25px; border-radius: 15px; border: 1px solid #00ff00; }
        
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255,0,0,0.7); } 70% { box-shadow: 0 0 0 10px rgba(255,0,0,0); } 100% { box-shadow: 0 0 0 0 rgba(255,0,0,0); } }
    </style>
</head>
<body>

<div id="loader-ia">
    <div class="spinner-border text-success" role="status"></div>
    <p class="mt-2" style="font-size: 11px; color: #00ff00; font-weight: bold;">CONFIGURANDO BIOTIPO IA...</p>
</div>

<div id="menu-inicial">
    <h1 style="color: #00ff00; letter-spacing: 3px; font-weight: 900;">LYA-ERGO</h1>
    <p style="color: #8b949e; font-size: 0.8rem;">V20.2 | FULL ADAPTIVE SYSTEM</p>
    <button class="btn-inicio" style="background:#27ae60; color:white;" onclick="prepararSistema('camara')">🎥 VISTA EN VIVO</button>
    <button class="btn-inicio" style="background:#2980b9; color:white;" onclick="document.getElementById('fileInput').click()">📁 SUBIR VIDEO</button>
    <input type="file" id="fileInput" hidden accept="video/*" onchange="prepararSistema('archivo')">
</div>

<div id="contenedor-analisis">
    <div id="status-label">MODO: PREVISUALIZACIÓN</div>
    <div id="canvas-wrapper">
        <canvas id="output_canvas"></canvas>
    </div>
    <video id="input_video" playsinline muted></video>
    
    <div class="barra-controles">
        <button class="btn-circular btn-dark" onclick="location.reload()">SALIR</button>
        <button class="btn-circular" style="background:#00d2d3; color:#000;" onclick="cambiarCamara()">🔄<br>GIRAR</button>
        <button id="btn-calib" class="btn-circular" style="background:#f1c40f; color:#000;" onclick="activarIA()">⚖️<br>CALIBRAR</button>
        <button id="recordBtn" class="btn-circular" style="background:#ff4d4d; opacity: 0.3;" onclick="toggleGrabacion()">🔴<br>GRABAR</button>
    </div>
</div>

<script>
    const video = document.getElementById('input_video');
    const canvas = document.getElementById('output_canvas');
    const ctx = canvas.getContext('2d', { alpha: false });
    const statusLabel = document.getElementById('status-label');
    
    let pose = null, iaActiva = false, calibrado = false, analizandoRiesgo = false;
    let currentFacingMode = "environment", baseAngles = {}, mediaRecorder, recordedChunks = [];
    let smoothedLandmarks = null;
    const ALPHA = 0.4;
    const TH = { cuello: 15, tronco: 20, hombros: 30, codos: 25, munecas: 22, piernas: 28, pies: 20 };

    // ADAPTACIÓN DE PANTALLA MEJORADA
    function ajustarPantalla() {
        if (!video.videoWidth) return;
        const vW = video.videoWidth;
        const vH = video.videoHeight;
        const aspect = vW / vH;
        
        const contenedorW = window.innerWidth;
        const contenedorH = window.innerHeight - 85; // Espacio para controles

        if (contenedorW < contenedorH) {
            // VERTICAL: Ancho total
            canvas.style.width = "100%";
            canvas.style.height = "auto";
            canvas.width = contenedorW;
            canvas.height = contenedorW / aspect;
        } else {
            // HORIZONTAL: Proporcional a la altura
            canvas.style.height = contenedorH + "px";
            canvas.style.width = "auto";
            canvas.height = contenedorH;
            canvas.width = contenedorH * aspect;
        }
    }

    async function prepararSistema(fuente) {
        document.getElementById('menu-inicial').style.display = 'none';
        document.getElementById('contenedor-analisis').style.display = 'flex';
        if (fuente === 'camara') await encenderCamara();
        else {
            video.src = URL.createObjectURL(document.getElementById('fileInput').files[0]);
            video.onloadedmetadata = () => { ajustarPantalla(); video.play(); loopPrevio(); };
        }
    }

    async function encenderCamara() {
        if(video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: currentFacingMode, width: { ideal: 640 }, height: { ideal: 480 } } 
            });
            video.srcObject = stream;
            video.onloadedmetadata = () => { ajustarPantalla(); video.play(); loopPrevio(); };
        } catch (err) { alert("Error de cámara: " + err); }
    }

    function loopPrevio() { if (!iaActiva) { ctx.drawImage(video, 0, 0, canvas.width, canvas.height); requestAnimationFrame(loopPrevio); } }

    async function activarIA() {
        document.getElementById('loader-ia').style.display = 'block';
        if(pose) await pose.close();
        
        pose = new Pose({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}` });
        pose.setOptions({ 
            modelComplexity: 0, // Vital para gama baja
            smoothLandmarks: true, 
            minDetectionConfidence: 0.5, 
            minTrackingConfidence: 0.5 
        });
        pose.onResults(onResults);
        
        setTimeout(() => {
            document.getElementById('loader-ia').style.display = 'none';
            iaActiva = true;
            statusLabel.innerText = "IA ACTIVA: CALIBRANDO...";
            document.getElementById('recordBtn').style.opacity = "1";
            const startTime = Date.now();
            const calibTimer = setInterval(() => {
                if (Date.now() - startTime > 3500) { 
                    calibrado = true; 
                    statusLabel.innerText = "SISTEMA CALIBRADO Y LISTO";
                    statusLabel.style.color = "#00ff00";
                    clearInterval(calibTimer); 
                }
            }, 100);
            loopIA();
        }, 1500);
    }

    async function loopIA() { if (iaActiva) { await pose.send({image: video}); requestAnimationFrame(loopIA); } }

    function onResults(res) {
        if (!res.poseLandmarks) return;
        
        // FILTRO EMA PARA ESTABILIDAD
        if (!smoothedLandmarks) smoothedLandmarks = res.poseLandmarks;
        else {
            smoothedLandmarks = res.poseLandmarks.map((lm, i) => ({
                x: lm.x * ALPHA + (smoothedLandmarks[i]?.x || lm.x) * (1 - ALPHA),
                y: lm.y * ALPHA + (smoothedLandmarks[i]?.y || lm.y) * (1 - ALPHA)
            }));
        }

        ctx.drawImage(res.image, 0, 0, canvas.width, canvas.height);
        const w = canvas.width, h = canvas.height;
        const pt = (i) => ({ x: smoothedLandmarks[i].x * w, y: smoothedLandmarks[i].y * h });
        
        const p = {
            cab: pt(0),
            cue: { x: (smoothedLandmarks[11].x+smoothedLandmarks[12].x)/2*w, y:(smoothedLandmarks[11].y+smoothedLandmarks[12].y)/2*h },
            trx: { x: (smoothedLandmarks[11].x+smoothedLandmarks[12].x)/2*w, y:(smoothedLandmarks[11].y+smoothedLandmarks[12].y)/2*h + 20 },
            abd: { x: (smoothedLandmarks[23].x+smoothedLandmarks[24].x)/2*w, y:(smoothedLandmarks[23].y+smoothedLandmarks[24].y)/2*h - 20 },
            eba: { x: (smoothedLandmarks[23].x+smoothedLandmarks[24].x)/2*w, y:(smoothedLandmarks[23].y+smoothedLandmarks[24].y)/2*h },
            h_d: pt(12), c_d: pt(14), m_d: pt(16), h_i: pt(11), c_i: pt(13), m_i: pt(15),
            r_d: pt(26), t_d: pt(28), r_i: pt(25), t_i: pt(27)
        };

        const angles = {
            cue: calcAng(p.cab, p.cue, p.trx), abd: calcAng(p.trx, p.abd, p.eba),
            h_d: calcAng(p.trx, p.h_d, p.c_d), h_i: calcAng(p.trx, p.h_i, p.c_i),
            c_d: calcAng(p.h_d, p.c_d, p.m_d), c_i: calcAng(p.h_i, p.c_i, p.m_i)
        };

        if (calibrado && Object.keys(baseAngles).length === 0) baseAngles = {...angles};

        const drawSeg = (p1, p2, angKey, groupKey) => {
            ctx.lineWidth = 4; ctx.lineCap = "round"; ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y);
            if (analizandoRiesgo && calibrado) {
                const diff = Math.abs(angles[angKey] - baseAngles[angKey]);
                const t = TH[groupKey] || 20;
                ctx.strokeStyle = diff > (t*2) ? "#ff3838" : (diff > t ? "#fffa65" : "#32ff7e");
            } else { ctx.strokeStyle = calibrado ? "#32ff7e" : "#666"; }
            ctx.stroke();
        };

        // Renderizado de esqueleto LYA
        drawSeg(p.cab, p.cue, 'cue', 'cuello');
        drawSeg(p.cue, p.trx, 'abd', 'tronco');
        drawSeg(p.trx, p.h_d, 'h_d', 'hombros'); drawSeg(p.h_d, p.c_d, 'h_d', 'hombros'); drawSeg(p.c_d, p.m_d, 'c_d', 'codos');
        drawSeg(p.trx, p.h_i, 'h_i', 'hombros'); drawSeg(p.h_i, p.c_i, 'h_i', 'hombros'); drawSeg(p.c_i, p.m_i, 'c_i', 'codos');
        drawSeg(p.eba, p.r_d, 'r_d', 'piernas'); drawSeg(p.r_d, p.t_d, 'r_d', 'piernas');
        drawSeg(p.eba, p.r_i, 'r_i', 'piernas'); drawSeg(p.r_i, p.t_i, 'r_i', 'piernas');
    }

    function calcAng(a,b,c) {
        const v1={x:a.x-b.x, y:a.y-b.y}, v2={x:c.x-b.x, y:c.y-b.y};
        const dot = v1.x*v2.x + v1.y*v2.y;
        const m1 = Math.sqrt(v1.x**2 + v1.y**2), m2 = Math.sqrt(v2.x**2 + v2.y**2);
        return (m1*m2 === 0) ? 0 : Math.acos(Math.max(-1, Math.min(1, dot/(m1*m2))))*(180/Math.PI);
    }

    function toggleGrabacion() {
        if (!calibrado) return;
        analizandoRiesgo = !analizandoRiesgo;
        document.getElementById('recordBtn').classList.toggle('rec-active', analizandoRiesgo);
        if (analizandoRiesgo) {
            statusLabel.innerText = "ESTADO: GRABANDO AUDITORÍA...";
            statusLabel.style.color = "#ff4d4d";
            recordedChunks = [];
            mediaRecorder = new MediaRecorder(canvas.captureStream(24), { mimeType: 'video/webm;codecs=vp8' });
            mediaRecorder.ondataavailable = (e) => recordedChunks.push(e.data);
            mediaRecorder.onstop = () => {
                const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob(recordedChunks));
                a.download = `LYA_AUDIT_${Date.now()}.webm`; a.click();
            };
            mediaRecorder.start();
        } else { 
            if(mediaRecorder) mediaRecorder.stop(); 
            statusLabel.innerText = "SISTEMA LISTO";
            statusLabel.style.color = "#00ff00";
        }
    }

    async function cambiarCamara() {
        currentFacingMode = (currentFacingMode === "environment") ? "user" : "environment";
        iaActiva = false; 
        await encenderCamara();
    }

    window.addEventListener('resize', ajustarPantalla);
</script>
</body>
</html>
