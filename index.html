<script>

/**
 * 🏷️ BLOQUE 1: CONFIGURACIÓN AVANZADA NOM-036 + NIOSH (VERSIÓN CRÍTICA VALIDADA)
 */

// 🔹 Umbrales biomecánicos base (más estrictos)

/**
 * 🏷️ BLOQUE 1: CONFIGURACIÓN AVANZADA NOM-036 + NIOSH (VERSIÓN CRÍTICA VALIDADA)
 */

// 🔹 Umbrales biomecánicos base (más estrictos)
const TH = { 
    tronco: 15,
    cuello: 10,
    hombros: 15,
    codos: 20,
    munecas: 15,
    piernas: 20,
    pies: 15
};

// 🔴 FACTOR DE RIESGO GLOBAL
const FACTOR_RIESGO = {
    tronco: 1.5,
    cuello: 1.3,
    hombros: 1.2,
    codos: 1.0,
    munecas: 1.1,
    piernas: 1.3,
    pies: 1.1
};

// 🔵 CONFIGURACIÓN NIOSH VALIDADA
const NIOSH = {
    LC: 23, // kg

    calcularHM: (H) => {
        if (H < 25) H = 25;
        if (H > 63) return 0;
        return 25 / H;
    },

    calcularVM: (V) => {
        if (V < 0 || V > 175) return 0;
        return Math.max(0, 1 - (0.003 * Math.abs(V - 75)));
    },

    calcularDM: (D) => {
        if (D < 25) D = 25;
        if (D > 175) return 0;
        return Math.min(1, 0.82 + (4.5 / D));
    },

    calcularAM: (A) => {
        if (A > 135) return 0;
        return Math.max(0, 1 - (0.0032 * A));
    },

    calcularFM: (F) => {
        if (F < 0.2) return 1;
        if (F < 1) return 0.95;
        if (F < 4) return 0.85;
        if (F < 8) return 0.75;
        return 0.65;
    },

    calcularCM: (C) => {
        return C === "bueno" ? 1 : (C === "regular" ? 0.95 : 0.90);
    }
};

// 🔴 RWL (Recommended Weight Limit)
function calcularRWL(params) {
    const { H, V, D, A, F, C } = params;

    const HM = NIOSH.calcularHM(H);
    const VM = NIOSH.calcularVM(V);
    const DM = NIOSH.calcularDM(D);
    const AM = NIOSH.calcularAM(A);
    const FM = NIOSH.calcularFM(F);
    const CM = NIOSH.calcularCM(C);

    const RWL = NIOSH.LC * HM * VM * DM * AM * FM * CM;

    return Math.max(0, RWL);
}

// 🔴 ÍNDICE DE LEVANTAMIENTO (LI) + CLASIFICACIÓN
function calcularLI(pesoReal, RWL) {
    if (RWL === 0) return { li: Infinity, nivel: "CRÍTICO" };

    const li = pesoReal / RWL;

    let nivel = "SEGURO";
    if (li > 3) nivel = "CRÍTICO";
    else if (li > 1) nivel = "RIESGO";

    return { li, nivel };
}

/**
 * 🏷️ VARIABLES GLOBALES DEL SISTEMA (🔥 AQUÍ VA LO QUE TE FALTABA)
 */

// 📊 Estadísticas de evaluación
let wbaStats = { 
    riesgoAltoTotal: 0, 
    framesAnalizados: 0, 
    zonasAfectadas: new Set(), 
    inicioAuditoria: null, 
    ciclos: 0 
};


// 🎯 Buffers de IA
let baseAngles = {};      
let angleBuffer = {};     
let posBuffer = {};       

const HISTORIAL_MAX = 15;
const SUAVIZADO_POS = 5;

// ⚙️ Estado del sistema
let iaActiva = false;
let calibrado = false;
let analizandoRiesgo = false;
let currentFacingMode = "environment";

// 📹 MediaPipe / video
let pose;
let mediaRecorder;
let recordedChunks = [];

// ⚖️ Normativa
let hallazgosNormativos = [];
    let liftState = {
    levantando: false,
    inicioY: null,
    finY: null,
    ciclosValidos: 0
};

let nioshStats = {
    muestras: 0,
    avgRWL: 0,
    maxLI: 0,
    liAcumulado: 0
};
    
/**
 * 🏷️ BLOQUE 3: MATEMÁTICAS DINÁMICAS
 * Funciones para cálculo de ángulos 3D y dibujo de vectores.
 */
function calcAng3D(a, b, c) {
    if (!a || !b || !c) return 0;

    const v1 = { x: a.x - b.x, y: a.y - b.y, z: a.z - b.z };
    const v2 = { x: c.x - b.x, y: c.y - b.y, z: c.z - b.z };

    const dot = v1.x * v2.x + v1.y * v2.y + v1.z * v2.z;

    const m1 = Math.sqrt(v1.x ** 2 + v1.y ** 2 + v1.z ** 2);
    const m2 = Math.sqrt(v2.x ** 2 + v2.y ** 2 + v2.z ** 2);

    // 🔴 Evita vectores degenerados (ruido / puntos colapsados)
    if (m1 < 0.001 || m2 < 0.001) return 0;

    const denom = m1 * m2;

    // 🔴 Protección extra (por seguridad numérica)
    if (denom === 0) return 0;

    // 🔵 Clamp para estabilidad numérica
    let cosTheta = dot / denom;
    cosTheta = Math.max(-1, Math.min(1, cosTheta));

    const angle = Math.acos(cosTheta) * (180 / Math.PI);

    // 🔴 Evita NaN o Infinity
    if (!isFinite(angle)) return 0;

    return angle;
}

/**
 * 🏷️ RENDERIZADO DE VECTORES CON ESTABILIZACIÓN Y PERSISTENCIA
 * Dibuja los segmentos del cuerpo, simulando trazos si hay oclusión (objetos tapando al sujeto).
 */
const drawV = (p1, p2, angKey, groupKey, vis1, vis2) => {
    // Si el punto no existe en absoluto (coordenadas 0), abortar dibujo
    if (p1.x === 0 || p2.x === 0) return;

    // Obtener promedio del buffer para suavizar el movimiento del ángulo
    const buffer = angleBuffer[angKey] || [];
    const avgAngle = buffer.length > 0 ? buffer.reduce((a, b) => a + b, 0) / buffer.length : 0;

    // Configuración base de alertas
    let color = "#00ff00", thickness = 4, status = "SEGURO";
    
    // DETECCIÓN DE SIMULACIÓN: Si la visibilidad es baja, marcamos como simulado
    const esSimulado = (vis1 < 0.5 || vis2 < 0.5);

    // Lógica de evaluación de Riesgo Ergonómico (NOM-036)[cite: 1]
    if (analizandoRiesgo && calibrado) {
        const diff = Math.abs(avgAngle - (baseAngles[angKey] || avgAngle));
        const limit = TH[groupKey] || 20; // Default si el grupo no existe
        wbaStats.framesAnalizados++;

        if (diff > (limit * 2)) {
            color = "#ff3838"; thickness = 10; status = "CRÍTICO";
            wbaStats.riesgoAltoTotal++;
            wbaStats.zonasAfectadas.add(groupKey);
        } else if (diff > limit) {
            color = "#f1c40f"; thickness = 6; status = "RIESGO";
        }
    }

    // --- DIBUJO DEL VECTOR ---
    ctx.save();
    ctx.beginPath();
    
    // Si es simulado (puntos ocultos), usamos línea punteada y transparencia[cite: 1]
    if (esSimulado) {
        ctx.setLineDash([5, 5]); 
        ctx.strokeStyle = "rgba(150, 150, 150, 0.6)"; // Gris tenue para lo que la IA "imagina"[cite: 1]
    } else {
        ctx.setLineDash([]);
        ctx.strokeStyle = color;
    }

    ctx.lineWidth = thickness;
    ctx.lineCap = "round";
    ctx.moveTo(p1.x, p1.y);
    ctx.lineTo(p2.x, p2.y);
    ctx.stroke();
    ctx.restore();

    // --- ETIQUETA DE DATOS (Solo si está calibrado) ---
    if (calibrado && (vis1 > 0.1 && vis2 > 0.1)) {
        const mx = (p1.x + p2.x) / 2;
        const my = (p1.y + p2.y) / 2;
        
        // Fondo de la etiqueta[cite: 1]
        ctx.fillStyle = "rgba(0,0,0,0.7)";
        ctx.fillRect(mx + 10, my - 20, 75, 32);
        
        // Texto de ángulo y estado[cite: 1]
        ctx.fillStyle = esSimulado ? "#bdc3c7" : color;
        ctx.font = "bold 11px Arial";
        ctx.fillText(`${avgAngle.toFixed(0)}°`, mx + 15, my - 7);
        ctx.font = "8px Arial";
        ctx.fillText(esSimulado ? "SIMULADO" : status, mx + 15, my + 6);
    }
};
/**
 * 🏷️ BLOQUE 4: PROCESAMIENTO DE IA (REDISEÑO JERÁRQUICO "T")
 */
function onResults(res) {
    const w = canvas.width, h = canvas.height;

    ctx.save();
    ctx.clearRect(0, 0, w, h);
    
    if (currentFacingMode === "user") { 
        ctx.translate(w, 0); 
        ctx.scale(-1, 1);
    }
    
    if (res.image) ctx.drawImage(res.image, 0, 0, w, h);

    if (!res.poseLandmarks) { 
        txtStatus.innerText = "BUSCANDO TRABAJADOR..."; 
        ctx.restore(); 
        return; 
    }

    const loader = document.getElementById('loader-ia');
    if (loader && loader.style.display !== 'none') loader.style.display = 'none';

    const lm = res.poseLandmarks;

    // =========================
    // 🔹 FUNCIÓN DE PUNTO
    // =========================
    const pt = (i) => {
        if (!lm[i]) return { x: 0, y: 0, z: 0, v: 0 };
        if (!posBuffer[i]) posBuffer[i] = { h: [], lastValid: null };

        let currentPos = { x: lm[i].x * w, y: lm[i].y * h, z: lm[i].z };
        const currentVis = lm[i].visibility ?? 0;

        if (currentVis < 0.5 && posBuffer[i].lastValid) {
            currentPos = posBuffer[i].lastValid;
        } else if (currentVis >= 0.5) {
            posBuffer[i].lastValid = currentPos;
        }

        posBuffer[i].h.push(currentPos);
        if (posBuffer[i].h.length > SUAVIZADO_POS) posBuffer[i].h.shift();

        const len = posBuffer[i].h.length || 1;

        const avg = posBuffer[i].h.reduce((a, b) => ({
            x: a.x + b.x,
            y: a.y + b.y,
            z: a.z + b.z
        }), { x: 0, y: 0, z: 0 });

        return {
            x: avg.x / len,
            y: avg.y / len,
            z: avg.z / len,
            v: currentVis
        };
    };

    // =========================
    // 🔹 MAPEO COMPLETO
    // =========================
    const p = {
        ore_d: pt(8), ore_i: pt(7),
        h_d: pt(12), h_i: pt(11),
        codo_d: pt(14), codo_i: pt(13),
        muneca_d: pt(16), muneca_i: pt(15),
        mano_d: pt(20), mano_i: pt(19),
        cadera_d: pt(24), cadera_i: pt(23),
        rodilla_d: pt(26), rodilla_i: pt(25),
        tobillo_d: pt(28), tobillo_i: pt(27),
        pie_d: pt(32), pie_i: pt(31)
    };

    // =========================
    // 🔹 CENTROS (COLUMNA)
    // =========================

// 🔴 CABEZA
p.cabeza = {
    x: (p.ore_d.x + p.ore_i.x) / 2,
    y: (p.ore_d.y + p.ore_i.y) / 2
};

// 🔴 CUELLO (centro de hombros)
p.cuello = {
    x: (p.h_d.x + p.h_i.x) / 2,
    y: (p.h_d.y + p.h_i.y) / 2
};

// 🔴 ABDOMEN (centro de caderas)
p.abdomen = {
    x: (p.cadera_d.x + p.cadera_i.x) / 2,
    y: (p.cadera_d.y + p.cadera_i.y) / 2
};

// 🔴 TÓRAX (punto intermedio real entre cuello y abdomen)
p.torax = {
    x: (p.cuello.x + p.abdomen.x) / 2,
    y: (p.cuello.y + p.abdomen.y) / 2
};

// 🔴 ESPALDA BAJA (ligeramente por debajo del abdomen)
p.espalda_baja = {
    x: p.abdomen.x,
    y: p.abdomen.y + (h * 0.05)
};

    
    const verticalRef = { x: p.cuello.x, y: p.cuello.y + 100 };

    // =========================
    // 🔹 ÁNGULOS
    // =========================
   const currentAngles = {
    cuello: calcAng3D(p.cabeza, p.cuello, verticalRef),
    tronco: calcAng3D(p.cuello, p.abdomen, verticalRef),
    torax: calcAng3D(p.cuello, p.torax, verticalRef),
    abdomen: calcAng3D(p.torax, p.abdomen, verticalRef),
    lumbar: calcAng3D(p.abdomen, p.espalda_baja, verticalRef)
};
  

    Object.keys(currentAngles).forEach(k => {
        if (!angleBuffer[k]) angleBuffer[k] = [];
        angleBuffer[k].push(currentAngles[k]);
        if (angleBuffer[k].length > HISTORIAL_MAX) angleBuffer[k].shift();
    });

    // =========================
    // 🔹 DIBUJO COMPLETO
    // =========================

    // 🔴 COLUMNA
    drawV(p.cabeza, p.cuello, 'cuello', 'cuello', 1, 1);
    drawV(p.cuello, p.torax, 'torax', 'tronco', 1, 1);
    drawV(p.torax, p.abdomen, 'abdomen', 'tronco', 1, 1);
    drawV(p.abdomen, p.espalda_baja, 'lumbar', 'tronco', 1, 1);

    // 🔵 HOMBROS
    drawV(p.h_d, p.h_i, 'hombros', 'hombros', p.h_d.v, p.h_i.v);

    // 🔵 BRAZO DERECHO
    drawV(p.h_d, p.codo_d, 'brazo_d', 'hombros', p.h_d.v, p.codo_d.v);
    drawV(p.codo_d, p.muneca_d, 'antebrazo_d', 'codos', p.codo_d.v, p.muneca_d.v);
    drawV(p.muneca_d, p.mano_d, 'mano_d', 'munecas', p.muneca_d.v, p.mano_d.v);

    // 🔵 BRAZO IZQUIERDO
    drawV(p.h_i, p.codo_i, 'brazo_i', 'hombros', p.h_i.v, p.codo_i.v);
    drawV(p.codo_i, p.muneca_i, 'antebrazo_i', 'codos', p.codo_i.v, p.muneca_i.v);
    drawV(p.muneca_i, p.mano_i, 'mano_i', 'munecas', p.muneca_i.v, p.mano_i.v);

    // 🔴 CADERA
    drawV(p.cadera_d, p.cadera_i, 'cadera', 'tronco', p.cadera_d.v, p.cadera_i.v);

    // 🟢 PIERNA DERECHA
    drawV(p.cadera_d, p.rodilla_d, 'pierna_d', 'piernas', p.cadera_d.v, p.rodilla_d.v);
    drawV(p.rodilla_d, p.tobillo_d, 'rodilla_d', 'piernas', p.rodilla_d.v, p.tobillo_d.v);
    drawV(p.tobillo_d, p.pie_d, 'pie_d', 'pies', p.tobillo_d.v, p.pie_d.v);

    // 🟢 PIERNA IZQUIERDA
    drawV(p.cadera_i, p.rodilla_i, 'pierna_i', 'piernas', p.cadera_i.v, p.rodilla_i.v);
    drawV(p.rodilla_i, p.tobillo_i, 'rodilla_i', 'piernas', p.rodilla_i.v, p.tobillo_i.v);
    drawV(p.tobillo_i, p.pie_i, 'pie_i', 'pies', p.tobillo_i.v, p.pie_i.v);

    // =========================
    // 🔴 NIOSH PRO
    // =========================

if (analizandoRiesgo && calibrado) {

    // 🔹 Validación de visibilidad (SIN romper render)
    const manosVisibles = (p.muneca_d.v >= 0.4 && p.muneca_i.v >= 0.4);

    if (!manosVisibles) {
        // 🔸 No calcular NIOSH si no hay datos confiables
        txtStatus.innerText = "Manos no visibles";
    } else {

        const manosY = (p.muneca_d.y + p.muneca_i.y) / 2;
        const manosX = (p.muneca_d.x + p.muneca_i.x) / 2;

        const levantandoAhora = manosY < (p.abdomen.y - 30);

        // 🔁 INICIO DE CICLO
        if (levantandoAhora && !liftState.levantando) {
            liftState.levantando = true;
            liftState.inicioY = manosY;
        }

        // 🔁 FIN DE CICLO
        if (!levantandoAhora && liftState.levantando) {
            liftState.levantando = false;
            liftState.finY = manosY;

            const delta = Math.abs(liftState.finY - liftState.inicioY);

            if (delta > 50) {
                liftState.ciclosValidos++;
                wbaStats.ciclos++;
                liftState.lastD = delta * 0.1;
            }
        }

        // 🔴 SOLO CALCULAR SI ESTÁ LEVANTANDO
        if (levantandoAhora) {

            if (!wbaStats.inicioAuditoria) {
                wbaStats.inicioAuditoria = Date.now();
            }

            const tiempo = (Date.now() - wbaStats.inicioAuditoria) / 1000;

            const F = tiempo > 5
                ? (liftState.ciclosValidos / tiempo) * 60
                : 0;

            const H = Math.abs(manosX - p.cuello.x) * 0.1;
            const V = (h - manosY) * 0.1;
            const D = liftState.lastD || 25;
            const A = Math.abs(p.h_d.x - p.h_i.x) * 0.1;

            const RWL = calcularRWL({ H, V, D, A, F, C: "regular" });

            const peso = parseFloat(document.getElementById('pesoCarga').value) || 0;
            const { li, nivel } = calcularLI(peso, RWL);

            // 📊 STATS
            nioshStats.muestras++;
            nioshStats.avgRWL += RWL;
            nioshStats.liAcumulado += li;
            if (li > nioshStats.maxLI) nioshStats.maxLI = li;

            // 🎨 UI
            let color = nivel === "CRÍTICO" ? "#ff0000" :
                        nivel === "RIESGO" ? "#f1c40f" : "#00ff00";

            ctx.save();
            ctx.fillStyle = "rgba(0,0,0,0.7)";
            ctx.fillRect(20, 20, 240, 100);

            ctx.fillStyle = color;
            ctx.font = "bold 12px Arial";
            ctx.fillText(`LI: ${isFinite(li) ? li.toFixed(2) : '∞'}`, 30, 40);

            ctx.font = "10px Arial";
            ctx.fillText(`RWL: ${RWL.toFixed(1)} kg`, 30, 55);
            ctx.fillText(`F: ${F.toFixed(1)} lev/min`, 30, 70);
            ctx.fillText(`Estado: ${nivel}`, 30, 85);

            ctx.restore();

            txtStatus.innerText = `NIOSH PRO: ${nivel} | LI ${isFinite(li) ? li.toFixed(2) : '∞'}`;
        }
    }
}
    
/**
 * 🏷️ BLOQUE 5: CONTROL DE CALIBRACIÓN Y AUDITORÍA
 */
function iniciarCalibracion() {
    if (!iaActiva) return;
    txtStatus.innerText = "⚖️ CALIBRANDO... MANTENGA POSTURA NEUTRA";
    
    setTimeout(() => {
        Object.keys(angleBuffer).forEach(k => {
            const avg = angleBuffer[k].reduce((a, b) => a + b, 0) / angleBuffer[k].length;
            baseAngles[k] = avg;
        });
        calibrado = true;
        document.getElementById('btn-calib').style.background = "#2ecc71";
        document.getElementById('recordBtn').disabled = false;
        document.getElementById('recordBtn').style.opacity = "1";
        txtStatus.innerText = "✅ CALIBRADO COMPLETADO";
    }, 2000);
}

function toggleAuditoria() {
    if (!calibrado) return;
    analizandoRiesgo = !analizandoRiesgo;
    const btn = document.getElementById('recordBtn');

    if (analizandoRiesgo) {
        recordedChunks = [];
        const stream = canvas.captureStream(30);
        mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
        mediaRecorder.ondataavailable = (e) => recordedChunks.push(e.data);
        mediaRecorder.onstop = descargarVideo;
        mediaRecorder.start();
        wbaStats.inicioAuditoria = Date.now();
        btn.innerHTML = "<span>⏹️</span>DETENER"; btn.classList.add('rec-active');
    } else {
        btn.innerHTML = "<span>🔴</span>AUDITAR"; btn.classList.remove('rec-active');
        if (mediaRecorder) mediaRecorder.stop();
        setTimeout(generarReporteWBA, 800);
    }
}

/**
 * 🏷️ BLOQUE 6: SISTEMA DE REPORTES PDF (VERSIÓN INTEGRAL NOM-036 & LFT)
 * Genera un documento técnico basado en los hallazgos de la IA y la normativa mexicana.
 */
function generarReporteWBA() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    // =========================================================
    // 🔹 1. DATOS GENERALES
    // =========================================================
    const info = {
        emp: document.getElementById('nombreEmpresa')?.value.toUpperCase() || "EMPRESA NO ESPECIFICADA",
        puesto: document.getElementById('puestoTrabajo')?.value || "General",
        trab: document.getElementById('nombreTrabajador')?.value || "Sin Nombre",
        peso: parseFloat(document.getElementById('pesoCarga')?.value) || 0,
        gen: document.getElementById('generoTrabajador')?.value || 'H',
        edad: parseInt(document.getElementById('edadTrabajador')?.value) || 0
    };

    // =========================================================
    // 🔴 2. PROCESAMIENTO NIOSH
    // =========================================================
    const avgRWL = nioshStats.muestras > 0 
        ? (nioshStats.avgRWL / nioshStats.muestras) 
        : 0;

    const maxLI = isFinite(nioshStats.maxLI) 
        ? nioshStats.maxLI 
        : Infinity;

    let estadoNIOSH = "SEGURO";
    if (!isFinite(maxLI) || maxLI > 3) estadoNIOSH = "CRÍTICO";
    else if (maxLI > 1) estadoNIOSH = "RIESGO";

    const avgRWL_txt = avgRWL.toFixed(1);
    const maxLI_txt = isFinite(maxLI) ? maxLI.toFixed(2) : "∞";

    // =========================================================
    // 🔴 3. LÓGICA LEGAL (NOM-036 + LFT)
    // =========================================================
    let limiteNormativo = 0;
    let hallazgosLegales = [];

    if (info.edad < 15) {
        hallazgosLegales.push("PROHIBICIÓN: Trabajo infantil (LFT).");
        limiteNormativo = 0;
    } else if (info.edad < 18) {
        hallazgosLegales.push("RESTRICCIÓN: Menor de edad.");
        limiteNormativo = 7;
    } else {
        limiteNormativo = info.gen === 'H'
            ? (info.edad > 45 ? 20 : 25)
            : (info.edad > 45 ? 10 : 15);
    }

    // =========================================================
    // 🔴 4. CÁLCULO ERGONÓMICO IA
    // =========================================================
    const porcRiesgo = wbaStats.framesAnalizados > 0 
        ? (wbaStats.riesgoAltoTotal / wbaStats.framesAnalizados) * 100 
        : 0;

    const porcRiesgo_txt = porcRiesgo.toFixed(1);

    const cumpleNorma = (
        info.peso <= limiteNormativo &&
        porcRiesgo <= 20 &&
        maxLI <= 1
    );

    const colorSemaforo = cumpleNorma ? [46, 204, 113] : [231, 76, 60];

    // =========================================================
    // 🎨 5. DISEÑO DEL DOCUMENTO
    // =========================================================

    // 🔹 HEADER
    doc.setFillColor(10, 15, 25);
    doc.rect(0, 0, 210, 42, 'F');

    doc.setTextColor(0, 255, 180);
    doc.setFontSize(17);
    doc.setFont("helvetica", "bold");
    doc.text("INFORME ERGONÓMICO INTELIGENTE", 105, 16, { align: "center" });

    doc.setFontSize(9);
    doc.setTextColor(255);
    doc.setFont("helvetica", "normal");
    doc.text("Evaluación NOM-036-STPS + NIOSH + LFT", 105, 26, { align: "center" });
    doc.text(`Folio: LYA-${Date.now()} | ${info.emp}`, 105, 33, { align: "center" });

    // =========================================================
    // 🔹 DATOS GENERALES
    // =========================================================
    doc.setTextColor(0);
    doc.setFontSize(11);
    doc.setFont("helvetica", "bold");
    doc.text("1. DATOS GENERALES", 15, 52);

    doc.autoTable({
        startY: 55,
        theme: 'grid',
        styles: { fontSize: 8 },
        body: [
            ['Empresa', info.emp, 'Fecha', new Date().toLocaleDateString()],
            ['Trabajador', info.trab, 'Edad', `${info.edad} años`],
            ['Puesto', info.puesto, 'Género', info.gen === 'H' ? 'Hombre' : 'Mujer']
        ]
    });

    // =========================================================
    // 🔹 RESULTADOS
    // =========================================================
    doc.text("2. RESULTADOS DE EVALUACIÓN", 15, doc.lastAutoTable.finalY + 10);

    doc.autoTable({
        startY: doc.lastAutoTable.finalY + 13,
        head: [['FACTOR', 'VALOR', 'LÍMITE', 'ESTADO']],
        theme: 'striped',
        styles: { fontSize: 8 },
        body: [
            ['Carga', `${info.peso} kg`, `${limiteNormativo} kg`, info.peso > limiteNormativo ? 'EXCEDE' : 'CUMPLE'],
            ['Postura Crítica', `${porcRiesgo_txt}%`, '≤ 20%', porcRiesgo > 20 ? 'CRÍTICO' : 'ACEPTABLE'],
            ['NIOSH - LI', maxLI_txt, '< 1.0', estadoNIOSH],
            ['NIOSH - RWL', `${avgRWL_txt} kg`, '—', 'REFERENCIAL'],
            ['Zonas afectadas', Array.from(wbaStats.zonasAfectadas).join(', ') || 'Ninguna', '—', '—']
        ]
    });

    // =========================================================
    // 🔴 SEMÁFORO
    // =========================================================
    const ySemaforo = doc.lastAutoTable.finalY + 14;

    doc.setFillColor(...colorSemaforo);
    doc.rect(15, ySemaforo, 180, 12, 'F');

    doc.setTextColor(255);
    doc.setFontSize(11);
    doc.setFont("helvetica", "bold");

    const veredicto = cumpleNorma
        ? "OPERACIÓN SEGURA"
        : "NO CUMPLE - REQUIERE INTERVENCIÓN";

    doc.text(`VEREDICTO: ${veredicto}`, 105, ySemaforo + 8, { align: "center" });

    // =========================================================
    // 🔹 CONCLUSIONES
    // =========================================================
    let recomendaciones = [];

    if (info.peso > limiteNormativo)
        recomendaciones.push(`Exceso de carga (${info.peso} kg > ${limiteNormativo} kg)`);

    if (porcRiesgo > 20)
        recomendaciones.push("Alta frecuencia de posturas críticas");

    if (maxLI > 1)
        recomendaciones.push(`Índice NIOSH elevado (LI=${maxLI_txt})`);

    if (hallazgosLegales.length > 0)
        recomendaciones = recomendaciones.concat(hallazgosLegales);

    if (recomendaciones.length === 0)
        recomendaciones.push("Condiciones ergonómicas aceptables");

    doc.setTextColor(0);
    doc.setFontSize(11);
    doc.text("3. CONCLUSIONES Y RECOMENDACIONES", 15, ySemaforo + 22);

    doc.setFontSize(9);
    doc.text(
        doc.splitTextToSize("• " + recomendaciones.join("\n• "), 175),
        15,
        ySemaforo + 28
    );

    // =========================================================
    // ✍️ FIRMAS
    // =========================================================
    const finalY = ySemaforo + 65;

    doc.line(25, finalY, 95, finalY);
    doc.text("Responsable de Seguridad", 30, finalY + 5);

    doc.line(115, finalY, 185, finalY);
    doc.text("Trabajador Evaluado", 130, finalY + 5);

    // =========================================================
    // 💾 EXPORTACIÓN
    // =========================================================
    doc.save(`Reporte_Ergonomico_${info.trab.replace(/\s+/g, '_')}.pdf`);
}


    
    
/**
 * 🏷️ BLOQUE 7: GESTIÓN DE HARDWARE Y ARRANQUE - VERSIÓN OPTIMIZADA ANDROID
 * Controla el ciclo de vida de la cámara, el video y el motor de IA.
 */
async function prepararSistema(fuente) {
    // 1. Referencias y Captura de Datos
    const edadInput = document.getElementById('edadTrabajador');
    const pesoInput = document.getElementById('pesoCarga');
    const ids = ['nombreEmpresa', 'puestoTrabajo', 'nombreTrabajador', 'edadTrabajador', 'pesoCarga'];
    const videoControls = document.getElementById('video-controls');
    const btnGirar = document.getElementById('btn-girar');
    
    // Validación de campos vacíos
    const incompleto = ids.some(id => !document.getElementById(id).value.trim());
    if (incompleto) { 
        alert("⚠️ Por favor, complete todos los campos del formulario antes de iniciar el análisis."); 
        return; 
    }

    // Validación de EDAD (Estrictamente 2 cifras)
    const edadValor = edadInput.value.trim();
    if (!/^\d{2}$/.test(edadValor)) {
        alert("❌ Error en EDAD: Debe ingresar un valor de exactamente 2 cifras (Ejemplo: 25).");
        edadInput.focus();
        return;
    }

    // Validación de peso
    if (parseFloat(pesoInput.value) <= 0) {
        alert("❌ El peso de la carga debe ser un número positivo mayor a cero.");
        pesoInput.focus();
        return;
    }

    // --- LIMPIEZA DE MEMORIA Y BUFFERS ---
    iaActiva = false; // Detener bucles previos
    angleBuffer = {}; 
    posBuffer = {};
    wbaStats.zonasAfectadas.clear();
    wbaStats.framesAnalizados = 0;
    wbaStats.riesgoAltoTotal = 0;

    // Limpieza de flujos previos (Cámara o Archivos)
    if (video.srcObject) {
        video.srcObject.getTracks().forEach(track => track.stop());
        video.srcObject = null;
    }
    if (video.src.startsWith('blob:')) {
        URL.revokeObjectURL(video.src);
        video.src = "";
    }

    // 2. Configuración según Fuente
    try {
        if (fuente === 'camara') {
            videoControls.classList.add('d-none');
            btnGirar.classList.remove('d-none');

            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { 
                    facingMode: currentFacingMode, 
                    width: { ideal: 640 }, // Resolución reducida para mayor fluidez en Android
                    height: { ideal: 480 } 
                } 
            });
            video.srcObject = stream;
        } else {
            videoControls.classList.remove('d-none');
            btnGirar.classList.add('d-none');

            const file = document.getElementById('fileInput').files[0];
            if (!file) { 
                alert("Seleccione un archivo de video."); 
                return; 
            }
            video.src = URL.createObjectURL(file);
            video.loop = true;
        }

        // 3. Transición de Interfaz
        document.getElementById('menu-inicial').style.display = 'none';
        document.getElementById('contenedor-analisis').style.display = 'block';

        video.onloadedmetadata = async () => {
            canvas.width = video.videoWidth; 
            canvas.height = video.videoHeight;
            try {
                await video.play();
                activarIA(); 
            } catch (playError) {
                console.error("Error play:", playError);
            }
        };

    } catch (err) {
        console.error("Error hardware:", err);
        alert("Error: Verifique permisos de cámara.");
        location.reload();
    }
}

async function activarIA() {
    const loader = document.getElementById('loader-ia');
    loader.style.display = 'flex';
    
    const safetyTimeout = setTimeout(() => {
        if (loader.style.display !== 'none') {
            loader.style.display = 'none';
            alert("⚠️ El motor de IA tarda en responder. Verifique su conexión o GPU.");
        }
    }, 12000);

    if (pose) {
        try { await pose.close(); } catch(e) {}
    }

    pose = new Pose({ 
        locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}` 
    });

    pose.setOptions({ 
        modelComplexity: 1, 
        smoothLandmarks: true, 
        minDetectionConfidence: 0.5, 
        minTrackingConfidence: 0.5 
    });

    pose.onResults((res) => {
        clearTimeout(safetyTimeout);
        if (loader.style.display !== 'none') loader.style.display = 'none';
        iaActiva = true;
        onResults(res);
    });

    // Bucle de frames controlado (Evita saturación en Android)
    async function frameLoop() {
        if (video.paused || video.ended) return;

        try {
            // CRÍTICO: Esperamos a que la IA procese el frame antes de pedir el siguiente
            await pose.send({ image: video });
        } catch (e) {
            console.warn("Frame drop");
        }
        
        // Solo solicita el siguiente frame si el sistema sigue activo
        if (document.getElementById('contenedor-analisis').style.display !== 'none') {
            requestAnimationFrame(frameLoop);
        }
    }
    
    frameLoop();
}

// --- GESTIÓN DE VIDEO ---
function togglePlay() {
    const playIcon = document.getElementById('playIcon');
    if (video.paused) {
        video.play();
        playIcon.src = "https://img.icons8.com/ios-filled/50/ffffff/pause.png";
    } else {
        video.pause();
        playIcon.src = "https://img.icons8.com/ios-filled/50/ffffff/play.png";
    }
}

function rewindVideo() { video.currentTime = Math.max(0, video.currentTime - 5); }
function forwardVideo() { video.currentTime = Math.min(video.duration, video.currentTime + 5); }


    
function descargarVideo() {
    if (recordedChunks.length === 0) return;

    const blob = new Blob(recordedChunks, { type: 'video/webm' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; 
    a.download = `EVIDENCIA_LYA_${document.getElementById('nombreTrabajador').value}_${Date.now()}.webm`; 
    a.click();

    // 🧹 LIMPIEZA DE MEMORIA
    // Liberamos la URL del objeto después de 100ms para asegurar que la descarga inició
    setTimeout(() => {
        URL.revokeObjectURL(url);
        console.log("Memoria de blob de video liberada con éxito.");
    }, 100);
}



    
function cambiarCamara() {
    currentFacingMode = currentFacingMode === "environment" ? "user" : "environment";
    prepararSistema('camara');
}

function validarYAbrirArchivo() {
    document.getElementById('fileInput').click();
}
