<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LYA-ERGO v22.0 | NOM-036 STPS</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        * { box-sizing: border-box; }
        html, body { 
            background-color: #0d1117; color: white; margin: 0; padding: 0;
            width: 100vw; height: 100vh; overflow: hidden; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
        }

        #menu-inicial { 
            display: flex; width: 100vw; height: 100vh; flex-direction: column; 
            align-items: center; justify-content: center;
            background: radial-gradient(circle, #161b22 0%, #0d1117 100%); 
            position: fixed; top: 0; left: 0; z-index: 5000; 
        }

        .logo-text { color: #00ff00; font-weight: 800; letter-spacing: 3px; margin-bottom: 5px; text-transform: uppercase; }
        .sub-text { color: #8b949e; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 35px; }

        .input-group-custom { width: 85%; max-width: 350px; margin-bottom: 20px; }
        
        #menu-inicial input, #menu-inicial select {
            width: 100%; padding: 12px; background: #161b22; border: 1px solid #30363d;
            border-radius: 8px; color: white; margin-bottom: 15px; outline: none;
        }
        
        #menu-inicial label { color: #8b949e; font-size: 0.7rem; display: block; text-align: left; margin-bottom: 5px; text-transform: uppercase; }

        .btn-inicio { 
            width: 85%; max-width: 350px; padding: 18px; margin: 8px 0; 
            border-radius: 12px; font-weight: bold; border: none; font-size: 1.1rem; 
            transition: all 0.2s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.4); cursor: pointer;
        }

        #contenedor-analisis { display: none; width: 100vw; height: 100vh; position: relative; background: #000; }
        canvas { width: 100%; height: 100%; object-fit: contain; display: block; }
        video { display: none; }

        #loader-ia { 
            display: none; position: fixed; top:0; left:0; width:100%; height:100%; 
            background: rgba(13, 17, 23, 0.98); z-index: 6000; 
            flex-direction: column; align-items: center; justify-content: center; 
        }
        
        .progress-bar-fill { width: 0%; height: 100%; background: #00ff00; transition: 0.4s; box-shadow: 0 0 20px #00ff00; }
        .status-badge { 
            position: absolute; top: 20px; left: 20px; 
            background: rgba(0,0,0,0.85); padding: 10px 18px; border-radius: 8px; 
            border-left: 4px solid #00ff00; font-size: 11px; z-index: 3000; 
        }

        .barra-controles { 
            position: absolute; bottom: 35px; left: 50%; transform: translateX(-50%); 
            display: flex; gap: 12px; z-index: 4000; width: 95%; justify-content: center; 
        }

        .btn-circular { 
            width: 65px; height: 65px; border-radius: 50%; border: none; 
            font-size: 9px; font-weight: 900; color: white; 
            display: flex; align-items: center; justify-content: center; flex-direction: column; 
        }

        .rec-active { background: #ffffff !important; color: #ff0000 !important; border: 3px solid #ff0000 !important; animation: pulse-red 1.5s infinite; }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(255, 0, 0, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0); } }
    </style>
</head>
<body>

<div id="loader-ia">
    <h3 style="color:#00ff00; letter-spacing: 4px; font-weight: 900;">INICIANDO ENGINE IA</h3>
    <div style="width: 75%; height: 6px; background: #21262d; border-radius: 10px; margin-top: 25px; overflow: hidden;">
        <div id="bar-id" class="progress-bar-fill"></div>
    </div>
</div>

<div id="menu-inicial">
    <h1 class="logo-text">LYA-ERGO AI</h1>
    <p class="sub-text">Auditoría NOM-036-1-STPS</p>
    
    <div class="input-group-custom">
        <label>PUESTO DE TRABAJO:</label>
        <input type="text" id="puestoTrabajo" placeholder="Ej: Estibador Almacén">
        
        <div style="display: flex; gap: 10px;">
            <div style="flex: 1;">
                <label>GÉNERO:</label>
                <select id="genero">
                    <option value="H">MASCULINO</option>
                    <option value="M">FEMENINO</option>
                </select>
            </div>
            <div style="flex: 1;">
                <label>CARGA (KG):</label>
                <input type="number" id="pesoCarga" placeholder="10">
            </div>
        </div>

        <label>JORNADA (HORAS):</label>
        <input type="number" id="horasJornada" value="8">
    </div>

    <button class="btn-inicio" style="background:#27ae60; color:white;" onclick="prepararSistema('camara')">🎥 VISTA EN VIVO</button>
    <button class="btn-inicio" style="background:#2980b9; color:white;" onclick="document.getElementById('fileInput').click()">📁 ANALIZAR VIDEO</button>
    <input type="file" id="fileInput" hidden accept="video/*" onchange="prepararSistema('archivo')">
</div>

<div id="contenedor-analisis">
    <div class="status-badge" id="txt-status">SISTEMA READY</div>
    <canvas id="output_canvas"></canvas>
    <video id="input_video" playsinline muted></video>
    
    <div class="barra-controles">
        <button class="btn-circular btn-dark" onclick="location.reload()">SALIR</button>
        <button class="btn-circular" style="background:#00d2d3; color:#000;" onclick="cambiarCamara()">🔄<br>GIRAR</button>
        <button id="btn-calib" class="btn-circular" style="background:#f1c40f; color:#000;" onclick="activarIA()">⚖️<br>CALIBRAR</button>
        <button id="recordBtn" class="btn-circular" style="background:#ff4d4d; opacity: 0.3;" onclick="toggleGrabacion()">🔴<br>AUDITAR</button>
    </div>
</div>

<script>
    const video = document.getElementById('input_video');
    const canvas = document.getElementById('output_canvas');
    const ctx = canvas.getContext('2d');
    const txtStatus = document.getElementById('txt-status');

    let wbaStats = { riesgoAltoTotal: 0, framesAnalizados: 0, zonasAfectadas: new Set(), inicioAuditoria: null, ciclos: 0, lastHandY: null, subiendo: false };
    const TH = { tronco: 18, cuello: 12, hombros: 28, codos: 25, munecas: 20, piernas: 25, pies: 18 };
    let baseAngles = {}, angleBuffer = {}, iaActiva = false, calibrado = false, analizandoRiesgo = false;
    let currentFacingMode = "environment", startTimeCalib = 0, pose;
    let mediaRecorder, recordedChunks = [];

    async function prepararSistema(fuente) {
        document.getElementById('menu-inicial').style.display = 'none';
        document.getElementById('contenedor-analisis').style.display = 'block';
        if (fuente === 'camara') await encenderCamara();
        else {
            const file = document.getElementById('fileInput').files[0];
            video.src = URL.createObjectURL(file);
            video.onloadedmetadata = () => { canvas.width = video.videoWidth; canvas.height = video.videoHeight; video.play(); requestAnimationFrame(loopVideoSimple); };
        }
    }

    async function encenderCamara() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: currentFacingMode, width: 1280, height: 720 } });
            video.srcObject = stream;
            video.onloadedmetadata = () => { canvas.width = video.videoWidth; canvas.height = video.videoHeight; video.play(); requestAnimationFrame(loopVideoSimple); };
        } catch (e) { alert("Error al acceder a la cámara"); }
    }

    function loopVideoSimple() { if (!iaActiva) { ctx.drawImage(video, 0, 0, canvas.width, canvas.height); requestAnimationFrame(loopVideoSimple); } }

    function calcAng3D(a,b,c) {
        const v1={x:a.x-b.x, y:a.y-b.y, z:a.z-b.z}, v2={x:c.x-b.x, y:c.y-b.y, z:c.z-b.z};
        const dot = v1.x*v2.x + v1.y*v2.y + v1.z*v2.z;
        const m1 = Math.sqrt(v1.x**2 + v1.y**2 + v1.z**2), m2 = Math.sqrt(v2.x**2 + v2.y**2 + v2.z**2);
        return (m1*m2 === 0) ? 0 : Math.acos(Math.max(-1, Math.min(1, dot/(m1*m2))))*(180/Math.PI);
    }

    const drawV = (p1, p2, angKey, groupKey, raw_lm1, raw_lm2) => {
        ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y);
        if (!raw_lm1 || !raw_lm2 || raw_lm1.visibility < 0.6 || raw_lm2.visibility < 0.6) {
            ctx.strokeStyle = "#4b4b4b"; ctx.lineWidth = 4; ctx.stroke(); return; 
        }
        const avgAngle = angleBuffer[angKey].reduce((a, b) => a + b, 0) / angleBuffer[angKey].length;
        let color = "#00ff00", thickness = 4;
        if (analizandoRiesgo && calibrado) {
            const diff = Math.abs(avgAngle - (baseAngles[angKey] || avgAngle));
            if (diff > (TH[groupKey] * 2)) { color = "#ff3838"; thickness = 10; wbaStats.zonasAfectadas.add(groupKey); wbaStats.riesgoAltoTotal++; }
            else if (diff > TH[groupKey]) { color = "#f1c40f"; thickness = 7; }
            wbaStats.framesAnalizados++;
        }
        ctx.strokeStyle = color; ctx.lineWidth = thickness; ctx.stroke();
    };

    function onResults(res) {
        if (!res.poseLandmarks) return;
        ctx.save(); ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (currentFacingMode === "user") { ctx.translate(canvas.width, 0); ctx.scale(-1, 1); }
        ctx.drawImage(res.image, 0, 0, canvas.width, canvas.height);

        const lm = res.poseLandmarks, w = canvas.width, h = canvas.height;
        const pt = (i) => ({ x: lm[i].x * w, y: lm[i].y * h, z: lm[i].z });
        const p = {
            cab: pt(0), h_d: pt(12), c_d: pt(14), m_d: pt(16), h_i: pt(11), c_i: pt(13), m_i: pt(15),
            p_d: pt(24), r_d: pt(26), t_d: pt(28), p_i: pt(23), r_i: pt(25), t_i: pt(27),
            cue: { x: (lm[11].x+lm[12].x)/2*w, y:(lm[11].y+lm[12].y)/2*h, z:(lm[11].z+lm[12].z)/2 },
            esp_baja: { x: (lm[23].x+lm[24].x)/2*w, y:(lm[23].y+lm[24].y)/2*h, z:(lm[23].z+lm[24].z)/2 }
        };

        if (analizandoRiesgo) {
            const currentHandY = (p.m_d.y + p.m_i.y) / 2;
            if (wbaStats.lastHandY && Math.abs(wbaStats.lastHandY - currentHandY) > 50) {
                if (currentHandY < wbaStats.lastHandY && !wbaStats.subiendo) { wbaStats.ciclos++; wbaStats.subiendo = true; }
                else if (currentHandY > wbaStats.lastHandY) { wbaStats.subiendo = false; }
            }
            wbaStats.lastHandY = currentHandY;
        }

        const angles = { abd: calcAng3D(p.cab, p.cue, p.esp_baja), c_d: calcAng3D(p.h_d, p.c_d, p.m_d), c_i: calcAng3D(p.h_i, p.c_i, p.m_i) };
        Object.keys(angles).forEach(k => {
            if (!angleBuffer[k]) angleBuffer[k] = [];
            angleBuffer[k].push(angles[k]); if (angleBuffer[k].length > 20) angleBuffer[k].shift();
        });

        if (iaActiva && !calibrado && (Date.now() - startTimeCalib > 3000)) {
            Object.keys(angleBuffer).forEach(k => { baseAngles[k] = angleBuffer[k].reduce((a,b)=>a+b,0)/20; });
            calibrado = true; document.getElementById('recordBtn').style.opacity = "1"; txtStatus.innerText = "IA CALIBRADA";
        }

        drawV(p.cue, p.esp_baja, 'abd', 'tronco', lm[11], lm[23]);
        drawV(p.h_d, p.c_d, 'c_d', 'codos', lm[12], lm[14]); drawV(p.h_i, p.c_i, 'c_i', 'codos', lm[11], lm[13]);
        ctx.restore();
    }

    function activarIA() {
        document.getElementById('loader-ia').style.display = 'flex';
        pose = new Pose({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}` });
        pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.6 });
        pose.onResults((res) => {
            if (!iaActiva) { iaActiva = true; document.getElementById('loader-ia').style.display = 'none'; startTimeCalib = Date.now(); loopIA(); }
            onResults(res);
        });
        pose.send({image: video});
    }

    async function loopIA() { if (iaActiva) { await pose.send({image: video}); requestAnimationFrame(loopIA); } }

    function toggleGrabacion() {
        if (!calibrado) return;
        analizandoRiesgo = !analizandoRiesgo;
        document.getElementById('recordBtn').classList.toggle('rec-active');

        if (analizandoRiesgo) {
            const stream = canvas.captureStream(30);
            mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm; codecs=vp9' });
            mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: 'video/mp4' });
                const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
                a.download = `EVIDENCIA_LYA_${Date.now()}.mp4`; a.click();
                recordedChunks = [];
            };
            mediaRecorder.start();
            wbaStats = { riesgoAltoTotal: 0, framesAnalizados: 0, zonasAfectadas: new Set(), inicioAuditoria: Date.now(), ciclos: 0, lastHandY: null };
            txtStatus.innerText = "AUDITANDO...";
        } else {
            mediaRecorder.stop(); generarReporteWBA();
            txtStatus.innerText = "FINALIZADO";
        }
    }

    function generarReporteWBA() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const puesto = document.getElementById('puestoTrabajo').value.toUpperCase() || "OPERADOR";
        const peso = parseFloat(document.getElementById('pesoCarga').value) || 0;
        const genero = document.getElementById('genero').value;
        const hrsJornada = parseFloat(document.getElementById('horasJornada').value) || 8;
        const frecuencia = (wbaStats.ciclos / ((Date.now() - wbaStats.inicioAuditoria) / 60000 || 0.1)).toFixed(2);
        const masaTotal = (frecuencia * peso * 60 * hrsJornada).toFixed(0);
        const limitePeso = (genero === 'H') ? 25 : 20;

        doc.setFillColor(20, 25, 35); doc.rect(0, 0, 210, 40, 'F');
        doc.setTextColor(0, 255, 0); doc.setFontSize(20); doc.text("LYA ERGONOMICS AI REPORT", 105, 15, { align: "center" });
        doc.setTextColor(255, 255, 255); doc.setFontSize(10); doc.text("NOM-036-1-STPS-2018 | EVIDENCIA DIGITAL", 105, 25, { align: "center" });

        doc.setTextColor(0, 0, 0); doc.text(`Puesto: ${puesto}`, 15, 50);
        doc.text(`Género: ${genero === 'H' ? 'Masculino' : 'Femenino'}`, 15, 57);
        doc.text(`Fecha: ${new Date().toLocaleString()}`, 15, 64);

        doc.autoTable({
            startY: 75,
            head: [['Indicador', 'Valor', 'Límite NOM', 'Estado']],
            body: [
                ['Peso Carga', `${peso} kg`, `${limitePeso} kg`, peso > limitePeso ? 'EXCEDE' : 'CUMPLE'],
                ['Frecuencia', `${frecuencia} lev/min`, '4 lev/min', frecuencia > 4 ? 'RIESGO' : 'OK'],
                ['Masa/Jornada', `${masaTotal} kg`, '10,000 kg', masaTotal > 10000 ? 'ALTO' : 'SEGURO']
            ],
            theme: 'striped', headStyles: { fillColor: [40, 45, 55] }
        });

        doc.setFont("helvetica", "bold"); doc.text("DICTAMEN:", 15, doc.lastAutoTable.finalY + 15);
        doc.setFont("helvetica", "normal");
        const msg = (peso > limitePeso || masaTotal > 10000) ? "ALTO RIESGO: Se requiere rediseño o ayuda mecánica." : "ACEPTABLE: Mantener higiene postural.";
        doc.text(msg, 15, doc.lastAutoTable.finalY + 22);

        doc.save(`REPORTE_NOM036_${puesto}.pdf`);
    }

    async function cambiarCamara() { currentFacingMode = (currentFacingMode === "environment") ? "user" : "environment"; iaActiva = false; await encenderCamara(); }
</script>
</body>
</html>
