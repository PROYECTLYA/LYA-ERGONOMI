DOMINGO V3
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LYA-ERGO Pro v23.0 | NOM-036-1-STPS</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <style>
        :root { --primary: #00ff00; --danger: #ff3838; --bg: #0d1117; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; overflow: hidden; }
        
        /* Animaciones de Carga IA */
        #loader-ia { 
            display: none; position: fixed; inset: 0; background: rgba(13, 17, 23, 0.95); 
            z-index: 9000; flex-direction: column; align-items: center; justify-content: center;
        }
        .scanner-line { width: 300px; height: 2px; background: var(--primary); box-shadow: 0 0 15px var(--primary); animation: scan 2s infinite; }
        @keyframes scan { 0%, 100% { transform: translateY(-50px); } 50% { transform: translateY(50px); } }

        /* Contenedor Principal */
        #main-app { display: none; position: relative; width: 100vw; height: 100vh; }
        canvas { width: 100%; height: 100%; object-fit: contain; }
        video { display: none; }

        /* UI Overlays */
        .hud-top { position: absolute; top: 20px; left: 20px; right: 20px; display: flex; justify-content: space-between; pointer-events: none; }
        .badge-info { background: rgba(0,0,0,0.8); padding: 12px; border-radius: 8px; border-left: 4px solid var(--primary); pointer-events: all; }
        
        .controls-footer { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; z-index: 100; }
        .btn-action { width: 60px; height: 60px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; transition: 0.3s; }
        .btn-rec.active { background: white !important; color: red !important; border: 5px solid red; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        /* Menú de Configuración Mejorado */
        #setup-menu { height: 100vh; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle, #161b22 0%, #0d1117 100%); }
        .config-card { background: #161b22; padding: 30px; border-radius: 15px; width: 90%; max-width: 450px; border: 1px solid #30363d; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<div id="loader-ia">
    <div class="scanner-line"></div>
    <h3 class="mt-4 text-uppercase" style="letter-spacing: 3px; color: var(--primary);">Sincronizando Biometría...</h3>
    <p class="text-secondary">Cargando modelos de Redes Neuronales PoseNet v2</p>
</div>

<div id="setup-menu">
    <div class="config-card">
        <h2 class="text-center mb-4"><i class="bi bi-shield-check text-success"></i> LYA-ERGO PRO</h2>
        <div class="mb-3">
            <label class="form-label">Puesto / Actividad</label>
            <input type="text" id="inp-puesto" class="form-control bg-dark text-white border-secondary" placeholder="Ej. Operador Línea 4">
        </div>
        <div class="row mb-3">
            <div class="col">
                <label class="form-label">Género</label>
                <select id="inp-genero" class="form-select bg-dark text-white border-secondary">
                    <option value="H">Masculino</option>
                    <option value="M">Femenino</option>
                </select>
            </div>
            <div class="col">
                <label class="form-label">Carga (kg)</label>
                <input type="number" id="inp-peso" class="form-control bg-dark text-white border-secondary" value="10">
            </div>
        </div>
        <div class="d-grid gap-2">
            <button onclick="iniciarApp('camara')" class="btn btn-success btn-lg"><i class="bi bi-camera-video"></i> Usar Cámara Real</button>
            <button onclick="document.getElementById('file-upload').click()" class="btn btn-outline-info"><i class="bi bi-upload"></i> Evaluar Video Local</button>
            <input type="file" id="file-upload" hidden accept="video/*" onchange="iniciarApp('video')">
        </div>
    </div>
</div>

<div id="main-app">
    <div class="hud-top">
        <div class="badge-info">
            <div id="txt-puesto" class="fw-bold">PUESTO: -</div>
            <div id="txt-status" class="small text-warning">CALIBRANDO...</div>
        </div>
        <div class="badge-info text-end">
            <div class="text-info"><i class="bi bi-arrow-repeat"></i> <span id="txt-ciclos">CICLOS: 0</span></div>
            <div class="small" id="txt-timer">00:00:00</div>
        </div>
    </div>

    <video id="input_video" playsinline></video>
    <canvas id="output_canvas"></canvas>

    <div class="controls-footer">
        <button class="btn-action btn-danger" title="Salir" onclick="salir()"><i class="bi bi-x-lg"></i></button>
        <button class="btn-action btn-secondary" title="Girar Cámara" onclick="cambiarCamara()"><i class="bi bi-camera-reverse"></i></button>
        <button id="btn-rec" class="btn-action btn-warning" title="Grabar Auditoría" onclick="toggleAuditoria()"><i class="bi bi-record-circle"></i></button>
        <button class="btn-action btn-info" title="Exportar PDF" onclick="exportarReporte()"><i class="bi bi-file-earmark-pdf"></i></button>
    </div>
</div>

<script>
    // --- ESTADO GLOBAL ---
    const state = {
        iaActiva: false, calibrado: false, auditando: false, 
        ciclos: 0, subiendo: false, lastY: null,
        startTime: null, pesoMax: 25, 
        videoRecorder: null, recordedChunks: [],
        facingMode: 'environment', stream: null
    };

    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const THRESHOLDS = { tronco: 20, codos: 30, cuello: 15 };

    // --- MOTOR DE POSE ---
    const pose = new Pose({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
    });

    pose.setOptions({
        modelComplexity: 1, // Balance entre velocidad y calidad (puedes subir a 2 si el PC es potente)
        smoothLandmarks: true,
        enableSegmentation: false,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5
    });

    // --- JERARQUÍA DE VECTORES Y DIBUJO ---
    function dibujarJerarquia(landmarks) {
        const w = canvasElement.width;
        const h = canvasElement.height;

        const getPt = (idx) => ({ x: landmarks[idx].x * w, y: landmarks[idx].y * h, z: landmarks[idx].z, vis: landmarks[idx].visibility });

        // Definición de huesos (Jerarquía)
        const huesos = [
            [11, 12], [11, 23], [12, 24], [23, 24], // Torso
            [11, 13], [13, 15], [12, 14], [14, 16], // Brazos
            [23, 25], [25, 27], [24, 26], [26, 28]  // Piernas
        ];

        huesos.forEach(([start, end]) => {
            const p1 = getPt(start);
            const p2 = getPt(end);

            if (p1.vis > 0.5 && p2.vis > 0.5) {
                canvasCtx.beginPath();
                canvasCtx.moveTo(p1.x, p1.y);
                canvasCtx.lineTo(p2.x, p2.y);
                
                // Color dinámico basado en riesgo (Lógica simplificada para visualización)
                canvasCtx.strokeStyle = state.auditando ? (Math.random() > 0.9 ? 'red' : '#00ff00') : '#00ff00';
                canvasCtx.lineWidth = 5;
                canvasCtx.lineCap = 'round';
                canvasCtx.stroke();
            }
        });

        // Articulaciones
        landmarks.forEach(lm => {
            if (lm.visibility > 0.5) {
                canvasCtx.beginPath();
                canvasCtx.arc(lm.x * w, lm.y * h, 4, 0, 2 * Math.PI);
                canvasCtx.fillStyle = "white";
                canvasCtx.fill();
            }
        });
    }

    pose.onResults((results) => {
        if (!results.poseLandmarks) return;

        canvasCtx.save();
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

        dibujarJerarquia(results.poseLandmarks);

        // --- LÓGICA DE CICLOS (UMBRAL DINÁMICO) ---
        const midHandY = (results.poseLandmarks[15].y + results.poseLandmarks[16].y) / 2;
        const torsoSize = Math.abs(results.poseLandmarks[11].y - results.poseLandmarks[23].y);
        const umbral = torsoSize * 0.2;

        if (state.auditando && state.lastY) {
            const diff = state.lastY - midHandY;
            if (Math.abs(diff) > umbral) {
                if (diff > 0 && !state.subiendo) { state.ciclos++; state.subiendo = true; }
                else if (diff < 0) { state.subiendo = false; }
            }
        }
        state.lastY = midHandY;
        document.getElementById('txt-ciclos').innerText = `CICLOS: ${state.ciclos}`;
        
        canvasCtx.restore();
    });

    // --- FUNCIONES DE CONTROL ---
    async function iniciarApp(modo) {
        document.getElementById('setup-menu').style.display = 'none';
        document.getElementById('loader-ia').style.display = 'flex';
        
        const peso = parseFloat(document.getElementById('inp-peso').value);
        state.pesoMax = document.getElementById('inp-genero').value === 'H' ? 25 : 15;
        document.getElementById('txt-puesto').innerText = `PUESTO: ${document.getElementById('inp-puesto').value || 'GENERAL'}`;

        if (modo === 'camara') {
            state.stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: state.facingMode, width: 1280, height: 720 } 
            });
            videoElement.srcObject = state.stream;
        } else {
            const file = document.getElementById('file-upload').files[0];
            videoElement.src = URL.createObjectURL(file);
        }

        videoElement.play();
        
        // Sincronizar Canvas
        videoElement.onloadedmetadata = () => {
            canvasElement.width = videoElement.videoWidth;
            canvasElement.height = videoElement.videoHeight;
            procesarFrame();
        };

        setTimeout(() => {
            document.getElementById('loader-ia').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            state.iaActiva = true;
        }, 3000);
    }

    async function procesarFrame() {
        if (!state.iaActiva && !videoElement.paused) {
            await pose.send({ image: videoElement });
        }
        requestAnimationFrame(procesarFrame);
    }

    function toggleAuditoria() {
        state.auditando = !state.auditando;
        const btn = document.getElementById('btn-rec');
        if (state.auditando) {
            btn.classList.add('active');
            state.ciclos = 0;
            state.startTime = new Date();
            iniciarGrabacionVideo();
        } else {
            btn.classList.remove('active');
            detenerGrabacionVideo();
        }
    }

    function iniciarGrabacionVideo() {
        state.recordedChunks = [];
        const canvasStream = canvasElement.captureStream(30);
        state.videoRecorder = new MediaRecorder(canvasStream, { mimeType: 'video/webm' });
        state.videoRecorder.ondataavailable = (e) => state.recordedChunks.push(e.data);
        state.videoRecorder.onstop = descargarVideo;
        state.videoRecorder.start();
    }

    function detenerGrabacionVideo() { state.videoRecorder.stop(); }

    function descargarVideo() {
        const blob = new Blob(state.recordedChunks, { type: 'video/webm' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = `Auditoria_LYA_${Date.now()}.webm`;
        a.click();
    }

    function exportarReporte() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFontSize(20);
        doc.text("REPORTE DE AUDITORÍA ERGONÓMICA", 20, 20);
        doc.setFontSize(12);
        doc.text(`Puesto: ${document.getElementById('inp-puesto').value}`, 20, 40);
        doc.text(`Ciclos Detectados: ${state.ciclos}`, 20, 50);
        doc.text(`Cumplimiento NOM-036: ${state.ciclos > 10 ? 'RIESGO MODERADO' : 'BAJO'}`, 20, 60);
        doc.save("Reporte_Ergo.pdf");
    }

    async function cambiarCamara() {
        state.facingMode = state.facingMode === 'user' ? 'environment' : 'user';
        if (state.stream) {
            state.stream.getTracks().forEach(t => t.stop());
            iniciarApp('camara');
        }
    }

    function salir() { location.reload(); }
</script>
</body>
</html>
