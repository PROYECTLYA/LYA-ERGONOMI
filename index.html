<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ERGO-SENSING PRO v3.2</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0d1117; color: white; font-family: 'Segoe UI', sans-serif; height: 100vh; margin: 0; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        
        #menu-inicial { text-align: center; background: #161b22; padding: 40px; border-radius: 20px; border: 1px solid #30363d; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 1000; }
        .btn-menu { width: 280px; padding: 15px; margin: 10px; font-weight: bold; border-radius: 10px; }

        #contenedor-analisis { display: none; position: relative; width: 100vw; height: 100vh; background: #000; }
        canvas { width: 100%; height: 100%; object-fit: contain; }
        video { display: none; }

        .status-badge { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.8); padding: 8px 15px; border-radius: 5px; border-left: 5px solid #00ff00; font-size: 0.8rem; z-index: 100; }
        
        /* Controles ajustados para móvil */
        .controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: center; gap: 8px; z-index: 100; flex-wrap: wrap; padding: 0 10px; }
        .btn-ergo { padding: 12px 18px; border-radius: 15px; font-weight: bold; border: none; font-size: 0.85rem; display: flex; flex-direction: column; align-items: center; justify-content: center; min-width: 80px; }
        
        .btn-flip { background: #2ecc71; color: white; box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3); }
        .btn-calib { background: #f1c40f; color: #000; }
        .btn-record { background: #e74c3c; color: white; min-width: 120px; }
        .btn-record.recording { animation: pulse 1.5s infinite; background: #fff; color: #e74c3c; }
        
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(0.95); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

<div id="menu-inicial">
    <h2 class="text-info mb-4">ERGO-SENSING AI</h2>
    <button class="btn btn-success btn-menu" onclick="seleccionarFuente('camara')">1. EVALUACIÓN EN VIVO</button>
    <br>
    <button class="btn btn-primary btn-menu" onclick="document.getElementById('fileInput').click()">2. CARGAR VIDEO</button>
    <input type="file" id="fileInput" hidden accept="video/*" onchange="seleccionarFuente('archivo')">
</div>

<div id="contenedor-analisis">
    <div class="status-badge" id="status">INICIALIZANDO...</div>
    <canvas id="output_canvas"></canvas>
    <video id="input_video" playsinline muted></video>

    <div class="controls">
        <button class="btn btn-dark btn-ergo" onclick="regresarMenu()"><span>⬅</span><span>Menú</span></button>
        <button class="btn-ergo btn-flip" id="btn-flip" onclick="cambiarCamara()"><span>🔄</span><span>Girar</span></button>
        <button class="btn-ergo btn-calib" onclick="iniciarCalibracion()"><span>⚖️</span><span>Calibrar</span></button>
        <button id="recordBtn" class="btn-ergo btn-record" onclick="toggleGrabacion()"><span>🔴</span><span>Grabar</span></button>
    </div>
</div>

<script>
    const menu = document.getElementById('menu-inicial');
    const app = document.getElementById('contenedor-analisis');
    const video = document.getElementById('input_video');
    const canvas = document.getElementById('output_canvas');
    const ctx = canvas.getContext('2d');
    const status = document.getElementById('status');

    let currentFacingMode = "user"; // Iniciamos con frontal por defecto
    let cameraInstance = null;
    let isVideoMode = false;

    // --- CONFIGURACIÓN POSE ---
    const pose = new Pose({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}` });
    pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });

    pose.onResults((res) => {
        ctx.save();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Efecto espejo dinámico: solo si es la cámara frontal (user)
        if (!isVideoMode && currentFacingMode === "user") {
            ctx.translate(canvas.width, 0);
            ctx.scale(-1, 1);
        }
        
        ctx.drawImage(res.image, 0, 0, canvas.width, canvas.height);

        if (res.poseLandmarks) {
            // Aquí va tu lógica de dibujo de vectores (simplificada para el ejemplo)
            const lm = res.poseLandmarks;
            ctx.strokeStyle = "#00ff00";
            ctx.lineWidth = 4;
            // Ejemplo: Línea entre hombros
            ctx.beginPath();
            ctx.moveTo(lm[11].x * canvas.width, lm[11].y * canvas.height);
            ctx.lineTo(lm[12].x * canvas.width, lm[12].y * canvas.height);
            ctx.stroke();
        }
        ctx.restore();
    });

    async function seleccionarFuente(tipo) {
        menu.style.display = 'none';
        app.style.display = 'block';
        
        if (tipo === 'camara') {
            isVideoMode = false;
            document.getElementById('btn-flip').style.display = 'flex';
            await iniciarCamara();
        } else {
            isVideoMode = true;
            document.getElementById('btn-flip').style.display = 'none';
            const file = document.getElementById('fileInput').files[0];
            video.src = URL.createObjectURL(file);
            video.play();
            async function frameLoop() {
                if(!video.paused && !video.ended) {
                    canvas.width = video.videoWidth; canvas.height = video.videoHeight;
                    await pose.send({image: video});
                    requestAnimationFrame(frameLoop);
                }
            }
            frameLoop();
        }
    }

    async function iniciarCamara() {
        if (cameraInstance) {
            await cameraInstance.stop();
        }

        cameraInstance = new Camera(video, {
            onFrame: async () => {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                await pose.send({image: video});
            },
            facingMode: currentFacingMode,
            width: 1280,
            height: 720
        });

        status.innerText = `MODO: ${currentFacingMode === 'user' ? 'FRONTAL' : 'TRASERA'}`;
        await cameraInstance.start();
    }

    // FUNCIÓN CRÍTICA PARA EL CAMBIO
    async function cambiarCamara() {
        status.innerText = "CAMBIANDO CÁMARA...";
        currentFacingMode = (currentFacingMode === "user") ? "environment" : "user";
        await iniciarCamara();
    }

    // --- GRABACIÓN ---
    let recorder; let chunks = [];
    function toggleGrabacion() {
        const btn = document.getElementById('recordBtn');
        if (!recorder || recorder.state === "inactive") {
            chunks = [];
            recorder = new MediaRecorder(canvas.captureStream(30));
            recorder.ondataavailable = (e) => chunks.push(e.data);
            recorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `ERGO_ANALISIS_${Date.now()}.webm`;
                a.click();
            };
            recorder.start();
            btn.innerHTML = "<span>⏹</span><span>Parar</span>";
            btn.classList.add('recording');
        } else {
            recorder.stop();
            btn.innerHTML = "<span>🔴</span><span>Grabar</span>";
            btn.classList.remove('recording');
        }
    }

    function iniciarCalibracion() { alert("Calibrando postura actual..."); }
    function regresarMenu() { location.reload(); }
</script>
</body>
</html>
