<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LYA-ERGO v24.0 | ROBUST ENGINE</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --neon-g: #00ff00; --neon-y: #ffff00; --neon-r: #ff4d4d; --bg-dark: #0d1117; }
        body { background-color: var(--bg-dark); color: white; margin: 0; overflow: hidden; font-family: 'Consolas', monospace; }
        
        #contenedor-analisis { display: none; width: 100vw; height: 100vh; position: relative; }
        canvas { width: 100%; height: 100%; object-fit: contain; }
        
        /* Capas de Interfaz */
        .status-header { position: absolute; top: 15px; left: 15px; z-index: 10; font-size: 11px; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 5px; border-left: 3px solid var(--neon-g); }
        .data-grid { position: absolute; top: 15px; right: 15px; z-index: 10; text-align: right; font-size: 10px; color: var(--neon-g); }
        
        /* Escáner y Alertas */
        #scanner-line { display: none; position: absolute; width: 100%; height: 2px; background: var(--neon-g); box-shadow: 0 0 15px var(--neon-g); z-index: 5; }
        #integrity-alert { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(255,0,0,0.9); padding: 20px; border-radius: 10px; z-index: 9000; text-align: center; }
        
        .barra-controles { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 12px; z-index: 100; }
        .btn-core { width: 75px; height: 75px; border-radius: 50%; border: 2px solid #30363d; background: #21262d; color: white; font-size: 9px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-core:active { transform: scale(0.9); }
        .rec-pulse { border-color: var(--neon-r) !important; animation: pulseR 1.5s infinite; color: var(--neon-r); }
        
        #countdown { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 120px; font-weight: 900; color: var(--neon-r); display: none; z-index: 200; }

        @keyframes pulseR { 0% { box-shadow: 0 0 0 0 rgba(255, 77, 77, 0.4); } 70% { box-shadow: 0 0 0 20px rgba(255, 77, 77, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 77, 77, 0); } }
    </style>
</head>
<body>

<div id="integrity-alert">
    <h3>⚠️ ERROR DE INTEGRIDAD</h3>
    <p id="integrity-msg"></p>
    <button onclick="location.reload()" class="btn btn-light btn-sm">REINICIAR MOTOR</button>
</div>

<div id="menu-inicial" class="d-flex flex-column align-items-center justify-content-center vh-100">
    <h2 style="letter-spacing: 5px; color: var(--neon-g);">LYA-ERGO AI</h2>
    <p class="text-muted small mb-4">ENGINE v24.0 | HIGH PRECISION VALIDATION</p>
    <button class="btn btn-outline-success px-5 py-3 mb-3 w-75" onclick="initCore('camara')">INICIAR SENSOR LIVE</button>
    <button class="btn btn-outline-primary px-5 py-3 w-75" onclick="document.getElementById('fileIn').click()">ANALIZAR VIDEO</button>
    <input type="file" id="fileIn" hidden accept="video/*" onchange="initCore('archivo')">
</div>

<div id="contenedor-analisis">
    <div id="scanner-line"></div>
    <div id="countdown">3</div>
    
    <div class="status-header">
        STATUS: <span id="st-ia">IDLE</span><br>
        HEALTH: <span id="st-health">100%</span><br>
        CALIB: <span id="st-cal">PENDING</span>
    </div>
    
    <div class="data-grid" id="angle-log"></div>
    
    <canvas id="canvas_out"></canvas>
    <video id="vid_in" playsinline muted style="display:none;"></video>
    
    <div class="barra-controles">
        <button class="btn-core" onclick="location.reload()">EXIT</button>
        <button id="btn-cal" class="btn-core" style="color: var(--neon-y);" onclick="runCalibration()">CALIBRATE</button>
        <button id="btn-aud" class="btn-core" style="opacity:0.3;" onclick="startAuditFlow()">AUDIT</button>
    </div>
</div>

<script>
    const video = document.getElementById('vid_in');
    const canvas = document.getElementById('canvas_out');
    const ctx = canvas.getContext('2d', { alpha: false, desynchronized: true });
    
    // Variables de Control Maestro
    let pose = null, isIAReady = false, isCalibrated = false, isRecording = false;
    let baseProfile = {}, angleHistory = {};
    let currentFacing = "environment";
    const THRESHOLDS = { neck: 15, trunk: 20, shoulder: 30, elbow: 40 };
    const CONFIDENCE_MIN = 0.82; // Umbral de veracidad biometríca

    // 1. Inicialización Robusta del Motor
    async function initCore(mode) {
        document.getElementById('menu-inicial').style.display = 'none';
        document.getElementById('contenedor-analisis').style.display = 'block';
        
        try {
            if (mode === 'camara') {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: currentFacing, width: { ideal: 1280 }, frameRate: { ideal: 30 } } 
                });
                video.srcObject = stream;
            } else {
                video.src = URL.createObjectURL(document.getElementById('fileIn').files[0]);
            }

            video.onloadedmetadata = () => {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                video.play();
                bootAI();
            };
        } catch (err) { reportError("Fallo acceso multimedia: " + err.message); }
    }

    async function bootAI() {
        pose = new Pose({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}` });
        pose.setOptions({ 
            modelComplexity: 1, 
            smoothLandmarks: true, 
            enableSegmentation: false,
            minDetectionConfidence: 0.7, 
            minTrackingConfidence: 0.7 
        });
        
        pose.onResults(validateAndRender);
        isIAReady = true;
        document.getElementById('st-ia').innerText = "AI_ONLINE";
        requestAnimationFrame(processLoop);
    }

    async function processLoop() {
        if (isIAReady && !video.paused) {
            await pose.send({ image: video });
            requestAnimationFrame(processLoop);
        }
    }

    // 2. Lógica de Calibración con Verificación
    function runCalibration() {
        isCalibrated = false;
        const scan = document.getElementById('scanner-line');
        scan.style.display = "block";
        scan.style.animation = "scannerMove 3s infinite ease-in-out";
        
        let startTime = Date.now();
        const calInterval = setInterval(() => {
            let elapsed = Date.now() - startTime;
            document.getElementById('st-cal').innerText = `ANALYZING (${Math.ceil((5000-elapsed)/1000)}s)`;
            
            if (elapsed >= 5000) {
                clearInterval(calInterval);
                isCalibrated = true;
                scan.style.display = "none";
                document.getElementById('st-cal').innerText = "VERIFIED";
                document.getElementById('btn-aud').style.opacity = "1";
            }
        }, 100);
    }

    // 3. Flujo de Auditoría con Delay
    function startAuditFlow() {
        if (!isCalibrated || isRecording) return;
        
        let count = 3;
        const cd = document.getElementById('countdown');
        cd.style.display = "block";
        
        const timer = setInterval(() => {
            count--;
            cd.innerText = count;
            if (count <= 0) {
                clearInterval(timer);
                cd.style.display = "none";
                executeRecording();
            }
        }, 1000);
    }

    function executeRecording() {
        isRecording = true;
        document.getElementById('btn-aud').classList.add('rec-pulse');
        // Lógica de MediaRecorder omitida por brevedad, igual a v23.1
    }

    // 4. MOTOR DE CÁLCULO DE ALTA PRECISIÓN (DOBLE CHECK)
    function getPreciseAngle(p1, p2, p3, key) {
        // Validación de Visibilidad
        if (p1.v < CONFIDENCE_MIN || p2.v < CONFIDENCE_MIN || p3.v < CONFIDENCE_MIN) return null;

        // Metodo A: Vectores Unitarios
        const vA = { x: p1.x - p2.x, y: p1.y - p2.y, z: (p1.z - p2.z) * 0.1 };
        const vB = { x: p3.x - p2.x, y: p3.y - p2.y, z: (p3.z - p2.z) * 0.1 };
        
        const dot = vA.x*vB.x + vA.y*vB.y + vA.z*vB.z;
        const magA = Math.sqrt(vA.x**2 + vA.y**2 + vA.z**2);
        const magB = Math.sqrt(vB.x**2 + vB.y**2 + vB.z**2);
        const angA = Math.acos(dot / (magA * magB)) * (180/Math.PI);

        // Metodo B: Ley de Cosenos (Doble Check)
        const distA = Math.hypot(p2.x-p1.x, p2.y-p1.y);
        const distB = Math.hypot(p3.x-p2.x, p3.y-p2.y);
        const distC = Math.hypot(p3.x-p1.x, p3.y-p1.y);
        const angB = Math.acos((distA**2 + distB**2 - distC**2) / (2 * distA * distB)) * (180/Math.PI);

        // Verificación de Veracidad: Si los métodos difieren > 1.5 grados, promediar o descartar
        if (Math.abs(angA - angB) > 1.5) return null; 

        // Suavizado Temporal (Kalman Simple)
        if (!angleHistory[key]) angleHistory[key] = angA;
        angleHistory[key] = angleHistory[key] * 0.7 + angA * 0.3;
        
        return angleHistory[key];
    }

    // 5. RENDERIZADO Y SEMAFORIZACIÓN ROBUSTA
    function validateAndRender(res) {
        if (!res.poseLandmarks) return;
        
        ctx.save();
        ctx.clearRect(0,0, canvas.width, canvas.height);
        ctx.drawImage(res.image, 0, 0, canvas.width, canvas.height);

        const lm = res.poseLandmarks;
        const w = canvas.width, h = canvas.height;
        const getP = (i) => ({ x: lm[i].x * w, y: lm[i].y * h, z: lm[i].z, v: lm[i].visibility });

        // Nodos Críticos
        const points = {
            nose: getP(0),
            shL: getP(11), shR: getP(12),
            elL: getP(13), elR: getP(14),
            wrL: getP(15), wrR: getP(16),
            hipL: getP(23), hipR: getP(24),
            midSh: { x: (lm[11].x + lm[12].x)/2 * w, y: (lm[11].y + lm[12].y)/2 * h, v: (lm[11].visibility + lm[12].visibility)/2 }
        };

        // Cálculos con Veracidad
        const angs = {
            neck: getPreciseAngle(points.nose, points.midSh, {x: points.midSh.x, y: points.midSh.y + 50, v:1}, 'n'),
            trunk: getPreciseAngle(points.midSh, points.hipL, {x: points.hipL.x, y: points.hipL.y + 50, v:1}, 't'),
            armR: getPreciseAngle(points.shR, points.elR, points.wrR, 'ar'),
            armL: getPreciseAngle(points.shL, points.elL, points.wrL, 'al')
        };

        // Calibración Inicial (Guardar Biotipo)
        if (!isCalibrated && isIAReady) {
            for (let k in angs) if (angs[k]) baseProfile[k] = angs[k];
        }

        // Dibujo de Vectores con Semaforización Lógica
        const drawV = (pA, pB, currentAng, key, threshold) => {
            if (!pA || !pB || pA.v < CONFIDENCE_MIN) return;
            
            ctx.beginPath();
            ctx.lineWidth = 8;
            ctx.lineCap = "round";
            ctx.moveTo(pA.x, pA.y);
            ctx.lineTo(pB.x, pB.y);

            let color = "#4b4b4b"; // Standby
            
            if (isRecording && currentAng && baseProfile[key]) {
                const delta = Math.abs(currentAng - baseProfile[key]);
                // Lógica de Doble Check de Umbral
                if (delta > threshold * 1.5) color = varColor('--neon-r');
                else if (delta > threshold) color = varColor('--neon-y');
                else color = varColor('--neon-g');
            } else if (isCalibrated) {
                color = "rgba(0, 255, 0, 0.3)";
            }

            ctx.strokeStyle = color;
            ctx.stroke();
        };

        // Ejecución de Dibujo
        drawV(points.nose, points.midSh, angs.neck, 'neck', THRESHOLDS.neck);
        drawV(points.shR, points.elR, angs.armR, 'armR', THRESHOLDS.shoulder);
        drawV(points.elR, points.wrR, angs.armR, 'armR', THRESHOLDS.elbow);
        drawV(points.shL, points.elL, angs.armL, 'armL', THRESHOLDS.shoulder);
        drawV(points.elL, points.wrL, angs.armL, 'armL', THRESHOLDS.elbow);
        
        ctx.restore();
        updateUI(angs);
    }

    function varColor(name) { return getComputedStyle(document.documentElement).getPropertyValue(name); }

    function updateUI(angs) {
        let html = "";
        for (let k in angs) {
            const val = angs[k] ? angs[k].toFixed(1) : "LOST";
            html += `${k.toUpperCase()}: ${val}°<br>`;
        }
        document.getElementById('angle-log').innerHTML = html;
    }

    function reportError(msg) {
        document.getElementById('integrity-alert').style.display = "block";
        document.getElementById('integrity-msg').innerText = msg;
    }
</script>

<style>
    @keyframes scannerMove { 0% { top: 0%; } 50% { top: 100%; } 100% { top: 0%; } }
</style>
</body>
</html>
