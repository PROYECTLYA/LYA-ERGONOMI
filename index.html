DOMINGO V3
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LYA-ERGO TOTAL v26.0 | NOM-036-1-STPS</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <style>
        :root { --primary: #00ff00; --danger: #ff3838; --warning: #f1c40f; --bg: #0d1117; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; }
        
        /* Loader IA */
        #loader-ia { display: none; position: fixed; inset: 0; background: rgba(13, 17, 23, 0.98); z-index: 9000; flex-direction: column; align-items: center; justify-content: center; }
        .scanner-line { width: 350px; height: 3px; background: var(--primary); box-shadow: 0 0 20px var(--primary); animation: scan 2s infinite; }
        @keyframes scan { 0%, 100% { transform: translateY(-60px); } 50% { transform: translateY(60px); } }

        /* App Principal */
        #main-app { display: none; position: relative; width: 100vw; height: 100vh; }
        canvas { width: 100%; height: 100%; object-fit: contain; }
        video { display: none; }

        /* MINIATURA 3D (Render Estilo Imagen Adjunta) */
        #canvas-3d { 
            position: absolute; top: 100px; right: 20px; width: 220px; height: 180px; 
            background: rgba(0,0,0,0.6); border: 2px solid #30363d; border-radius: 12px; 
            z-index: 50; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .hud-top { position: absolute; top: 20px; left: 20px; right: 20px; display: flex; justify-content: space-between; z-index: 10; pointer-events: none; }
        .badge-info { background: rgba(0,0,0,0.85); padding: 12px; border-radius: 10px; border-left: 5px solid var(--primary); pointer-events: all; backdrop-filter: blur(10px); }
        
        .controls-footer { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; z-index: 100; }
        .btn-action { width: 65px; height: 65px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; font-size: 1.6rem; transition: 0.3s; }
        .btn-rec.active { background: white !important; color: red !important; border: 6px solid red; animation: pulse 1s infinite; }

        #setup-menu { height: 100vh; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle, #1c2128 0%, #0d1117 100%); }
        .config-card { background: #161b22; padding: 40px; border-radius: 20px; width: 95%; max-width: 500px; border: 1px solid #30363d; }
    </style>
</head>
<body>

<div id="loader-ia">
    <div class="scanner-line"></div>
    <h3 class="mt-4 text-success" style="letter-spacing: 5px;">SISTEMA BIOMÉTRICO 3D</h3>
</div>

<div id="setup-menu">
    <div class="config-card">
        <h2 class="text-center mb-4 text-success font-monospace">LYA-ERGO TOTAL</h2>
        <div class="mb-3">
            <label class="form-label small fw-bold text-secondary text-uppercase">Puesto de Trabajo</label>
            <input type="text" id="inp-puesto" class="form-control bg-dark text-white border-secondary" placeholder="Ej. LÍNEA-12">
        </div>
        <div class="row mb-4">
            <div class="col-6">
                <label class="form-label small fw-bold text-secondary">GÉNERO</label>
                <select id="inp-genero" class="form-select bg-dark text-white border-secondary">
                    <option value="H">Hombre (25kg)</option>
                    <option value="M">Mujer (15kg)</option>
                </select>
            </div>
            <div class="col-6">
                <label class="form-label small fw-bold text-secondary">PESO CARGA</label>
                <input type="number" id="inp-peso" class="form-control bg-dark text-white border-secondary" value="5">
            </div>
        </div>
        <div class="d-grid gap-2">
            <button onclick="iniciarApp('camara')" class="btn btn-success btn-lg">INICIAR CÁMARA</button>
            <button onclick="document.getElementById('file-upload').click()" class="btn btn-outline-info">VIDEO LOCAL</button>
            <input type="file" id="file-upload" hidden accept="video/*" onchange="iniciarApp('video')">
        </div>
    </div>
</div>

<div id="main-app">
    <div class="hud-top">
        <div class="badge-info">
            <div id="txt-puesto" class="fw-bold small">PUESTO: -</div>
            <div id="txt-limite" class="text-info small">LÍMITE: 25kg</div>
        </div>
        <div class="badge-info text-end">
            <div class="text-success fw-bold">CICLOS: <span id="txt-ciclos">0</span></div>
            <div class="text-secondary small">MODO: 3D POSE</div>
        </div>
    </div>

    <canvas id="canvas-3d"></canvas>

    <video id="input_video" playsinline muted></video>
    <canvas id="output_canvas"></canvas>

    <div class="controls-footer">
        <button class="btn-action btn-danger" onclick="salir()"><i class="bi bi-power"></i></button>
        <button id="btn-flip" class="btn-action btn-secondary" onclick="cambiarCamara()"><i class="bi bi-camera-reverse"></i></button>
        <button id="btn-rec" class="btn-action btn-warning" onclick="toggleAuditoria()"><i class="bi bi-record-circle-fill"></i></button>
        <button class="btn-action btn-info" onclick="exportarReporte()"><i class="bi bi-file-earmark-pdf-fill"></i></button>
    </div>
</div>

<script>
    const state = {
        iaActiva: false, auditando: false, ciclos: 0, subiendo: false, lastY: null,
        pesoActual: 0, limiteLegal: 25, facingMode: 'environment', recordedChunks: [], videoRecorder: null
    };

    const video = document.getElementById('input_video');
    const mainCanvas = document.getElementById('output_canvas');
    const mainCtx = mainCanvas.getContext('2d');
    const miniCanvas = document.getElementById('canvas-3d');
    const miniCtx = miniCanvas.getContext('2d');

    const pose = new Pose({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}` });
    pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });

    function getAngle(a, b, c) {
        const v1 = { x: a.x - b.x, y: a.y - b.y };
        const v2 = { x: c.x - b.x, y: c.y - b.y };
        const dot = v1.x * v2.x + v1.y * v2.y;
        const mag1 = Math.sqrt(v1.x**2 + v1.y**2);
        const mag2 = Math.sqrt(v2.x**2 + v2.y**2);
        return Math.round(Math.acos(dot / (mag1 * mag2)) * (180 / Math.PI)) || 0;
    }

    function render3DView(landmarks) {
        miniCtx.clearRect(0, 0, miniCanvas.width, miniCanvas.height);
        const w = miniCanvas.width; const h = miniCanvas.height;
        
        // Estilo de cuadrícula (como tu imagen)
        miniCtx.strokeStyle = "#ffffff11";
        for(let i=0; i<w; i+=20) { miniCtx.beginPath(); miniCtx.moveTo(i,0); miniCtx.lineTo(i,h); miniCtx.stroke(); }
        for(let i=0; i<h; i+=20) { miniCtx.beginPath(); miniCtx.moveTo(0,i); miniCtx.lineTo(w,i); miniCtx.stroke(); }

        const getXY = (i) => ({ x: landmarks[i].x * w, y: landmarks[i].y * h });
        
        miniCtx.lineWidth = 3;
        miniCtx.strokeStyle = "#00ff00";
        const bones = [[11,12], [11,23], [12,24], [23,24], [11,13], [13,15], [12,14], [14,16], [23,25], [24,26], [25,27], [26,28]];
        
        bones.forEach(([s, e]) => {
            const p1 = getXY(s); const p2 = getXY(e);
            miniCtx.beginPath();
            miniCtx.moveTo(p1.x, p1.y);
            miniCtx.lineTo(p2.x, p2.y);
            miniCtx.stroke();
        });
    }

    function drawLabels(ctx, landmarks, w, h) {
        const getPt = (i) => ({ x: landmarks[i].x * w, y: landmarks[i].y * h });
        const pts = { h_i: getPt(11), c_d: getPt(14), cue: { x: (landmarks[11].x + landmarks[12].x)/2 * w, y: (landmarks[11].y + landmarks[12].y)/2 * h } };
        
        const labels = [
            { pt: pts.cue, txt: `TRONCO: ${getAngle(getPt(11), {x: (landmarks[23].x + landmarks[24].x)/2 * w, y: (landmarks[23].y + landmarks[24].y)/2 * h}, {x: (landmarks[23].x + landmarks[24].x)/2 * w, y: 0})}°` },
            { pt: pts.c_d, txt: `CODO D: ${getAngle(getPt(12), getPt(14), getPt(16))}°` }
        ];

        labels.forEach(l => {
            ctx.fillStyle = "rgba(0,0,0,0.8)";
            ctx.fillRect(l.pt.x + 10, l.pt.y - 20, 110, 30);
            ctx.fillStyle = "white";
            ctx.font = "bold 13px Arial";
            ctx.fillText(l.txt, l.pt.x + 15, l.pt.y);
        });
    }

    pose.onResults((res) => {
        if (!res.poseLandmarks) return;
        mainCtx.save();
        mainCtx.clearRect(0, 0, mainCanvas.width, mainCanvas.height);
        mainCtx.drawImage(res.image, 0, 0, mainCanvas.width, mainCanvas.height);
        
        // Render Principal
        const w = mainCanvas.width; const h = mainCanvas.height;
        mainCtx.lineWidth = 5; mainCtx.strokeStyle = "#ffffff55";
        [[11,12], [11,23], [12,24], [23,24], [11,13], [13,15], [12,14], [14,16]].forEach(([s, e]) => {
            mainCtx.beginPath();
            mainCtx.moveTo(res.poseLandmarks[s].x * w, res.poseLandmarks[s].y * h);
            mainCtx.lineTo(res.poseLandmarks[e].x * w, res.poseLandmarks[e].y * h);
            mainCtx.stroke();
        });

        drawLabels(mainCtx, res.poseLandmarks, w, h);
        render3DView(res.poseLandmarks);

        // Ciclos
        const midY = (res.poseLandmarks[15].y + res.poseLandmarks[16].y) / 2;
        if (state.auditando && state.lastY) {
            if (state.lastY - midY > 0.15 && !state.subiendo) { state.ciclos++; state.subiendo = true; }
            if (state.lastY - midY < -0.15) { state.subiendo = false; }
        }
        state.lastY = midY;
        document.getElementById('txt-ciclos').innerText = state.ciclos;
        mainCtx.restore();
    });

    async function iniciarApp(modo) {
        document.getElementById('setup-menu').style.display = 'none';
        document.getElementById('loader-ia').style.display = 'flex';
        state.pesoActual = parseFloat(document.getElementById('inp-peso').value);
        state.limiteLegal = document.getElementById('inp-genero').value === 'H' ? 25 : 15;
        
        if (modo === 'camara') {
            const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: state.facingMode, width: 1280, height: 720 } });
            video.srcObject = s;
        } else {
            video.src = URL.createObjectURL(document.getElementById('file-upload').files[0]);
        }

        video.play();
        video.onloadedmetadata = () => {
            mainCanvas.width = video.videoWidth; mainCanvas.height = video.videoHeight;
            miniCanvas.width = 220; miniCanvas.height = 180;
            loop();
        };
        setTimeout(() => { document.getElementById('loader-ia').style.display = 'none'; document.getElementById('main-app').style.display = 'block'; state.iaActiva = true; }, 2500);
    }

    async function loop() { if (!video.paused) await pose.send({ image: video }); requestAnimationFrame(loop); }

    function toggleAuditoria() {
        state.auditando = !state.auditando;
        const btn = document.getElementById('btn-rec');
        if (state.auditando) {
            btn.classList.add('active');
            state.recordedChunks = [];
            state.videoRecorder = new MediaRecorder(mainCanvas.captureStream(30), { mimeType: 'video/webm' });
            state.videoRecorder.ondataavailable = (e) => state.recordedChunks.push(e.data);
            state.videoRecorder.onstop = () => {
                const b = new Blob(state.recordedChunks, { type: 'video/webm' });
                const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = `Auditoria_LYA.webm`; a.click();
            };
            state.videoRecorder.start();
        } else { btn.classList.remove('active'); state.videoRecorder.stop(); }
    }

    function exportarReporte() {
        const { jsPDF } = window.jspdf; const doc = new jsPDF();
        doc.text("REPORTE LYA-ERGO", 20, 20);
        doc.text(`Ciclos: ${state.ciclos} | Carga: ${state.pesoActual}kg`, 20, 40);
        doc.save("Reporte_NOM036.pdf");
    }

    function salir() { location.reload(); }
    async function cambiarCamara() { state.facingMode = state.facingMode === 'user' ? 'environment' : 'user'; iniciarApp('camara'); }
</script>
</body>
</html>
