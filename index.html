<script>
/**
 * 🏷️ BLOQUE 1: CONFIGURACIÓN Y UMBRALES NOM-036
 * Define los límites de desviación angular permitidos para evitar riesgos.
 */
const video = document.getElementById('input_video');
const canvas = document.getElementById('output_canvas');
const ctx = canvas.getContext('2d');
const txtStatus = document.getElementById('txt-status');
// ✅ Umbrales de desviación (Grados) corregidos según NOM-036-1-STPS-2018 y Metodología REBA/RULA
const TH = { 
    tronco: 20,    // La norma marca riesgo si la flexión es > 20°
    cuello: 10,    // El cuello es más sensible; > 10° ya inicia el nivel de riesgo
    hombros: 20,   // Flexión/Abducción permitida hasta 20°
    codos: 60,     // El rango de confort es 60°-100°. Se penaliza fuera de este rango.
    munecas: 15,   // NOM-036/RULA penaliza desviaciones mayores a 15°
    piernas: 30,   // Flexión de rodilla permitida hasta 30-60° según soporte
    pies: 15       // Flexión de tobillo (neutro a flexión/extensión)
};
/**
 * 🏷️ BLOQUE 2: VARIABLES DE ESTADO Y ESTADÍSTICAS
 * Maneja el suavizado de la imagen y los acumuladores de riesgo.
 */
let wbaStats = { 
    riesgoAltoTotal: 0, 
    framesAnalizados: 0, 
    zonasAfectadas: new Set(), 
    inicioAuditoria: null, 
    ciclos: 0 
};

let baseAngles = {};        // Ángulos capturados en la calibración (postura neutra)
let angleBuffer = {};       // Búfer para media móvil de ángulos
let posBuffer = {};         // Búfer para suavizar el jitter de los puntos
const HISTORIAL_MAX = 15;   // Cuadros para suavizar ángulos
const SUAVIZADO_POS = 5;    // Cuadros para suavizar coordenadas

let iaActiva = false;
let calibrado = false;
let analizandoRiesgo = false;
let currentFacingMode = "environment";
let pose;
let mediaRecorder;
let recordedChunks = [];
// Objeto para almacenar incumplimientos
let hallazgosNormativos = [];

function validarNormativa() {
    hallazgosNormativos = []; 
    const edad = parseInt(document.getElementById('edadTrabajador').value);
    const genero = document.getElementById('generoTrabajador').value; 
    const peso = parseFloat(document.getElementById('pesoCarga').value);

    // --- Validación LFT (Edad) ---
    if (edad < 15) {
        hallazgosNormativos.push("INCUMPLIMIENTO CRÍTICO LFT: Trabajador menor de edad legal (menor a 15 años).");
    } else if (edad < 18) {
        hallazgosNormativos.push("OBSERVACIÓN LFT: Menor en edad de aprendizaje (15-17 años). Carga restringida.");
    }

    // --- Validación NOM-036 (Peso vs Género/Edad) ---
    let limiteMax = 0;
    if (genero === "M") { // 'M' de Mujer en tu select
        if (edad < 18) limiteMax = 7;
        else if (edad <= 45) limiteMax = 15;
        else limiteMax = 10;
    } else { // Hombre
        if (edad < 18) limiteMax = 7;
        else if (edad <= 45) limiteMax = 25;
        else limiteMax = 20;
    }

    if (peso > limiteMax) {
        hallazgosNormativos.push(`INCUMPLIMIENTO NOM-036: Peso de ${peso}kg excede el límite de ${limiteMax}kg para este perfil.`);
    }
    
    return { hallazgos: hallazgosNormativos, limite: limiteMax };
}
/**
 * 🏷️ BLOQUE 3: MATEMÁTICAS DINÁMICAS
 * Funciones para cálculo de ángulos 3D y dibujo de vectores.
 */
function calcAng3D(a, b, c) {
    if(!a || !b || !c) return 0;
    const v1 = { x: a.x - b.x, y: a.y - b.y, z: a.z - b.z };
    const v2 = { x: c.x - b.x, y: c.y - b.y, z: c.z - b.z };
    const dot = v1.x * v2.x + v1.y * v2.y + v1.z * v2.z;
    const m1 = Math.sqrt(v1.x**2 + v1.y**2 + v1.z**2);
    const m2 = Math.sqrt(v2.x**2 + v2.y**2 + v2.z**2);
    const angle = Math.acos(Math.max(-1, Math.min(1, dot / (m1 * m2)))) * (180 / Math.PI);
    return isNaN(angle) ? 0 : angle;
}
const drawV = (p1, p2, angKey, groupKey, vis1, vis2) => {
    // 1. FILTRO DE CERTEZA: Elevamos el umbral para evitar el "brinco" de los vectores
    // Si la visibilidad es baja, dibujamos un vector fantasma (gris tenue) o retornamos
    if (vis1 < 0.65 || vis2 < 0.65) {
        ctx.beginPath();
        ctx.strokeStyle = "rgba(200, 200, 200, 0.2)"; // Color neutro para indicar pérdida de señal
        ctx.lineWidth = 2;
        ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
        return; 
    }

    const buffer = angleBuffer[angKey] || [];
    if (buffer.length === 0) return;
    
    // Promedio del buffer para estabilidad del ángulo mostrado
    const avgAngle = buffer.reduce((a, b) => a + b, 0) / buffer.length;

    // Configuración visual por defecto
    let color = "#00ff00", thickness = 4, status = "SEGURO";

    // 2. LÓGICA DE AUDITORÍA (NOM-036 / REBA)
    if (analizandoRiesgo && calibrado) {
        const diff = Math.abs(avgAngle - (baseAngles[angKey] || avgAngle));
        const limit = TH[groupKey];
        
        // Solo incrementamos frames si el tracking es sólido
        wbaStats.framesAnalizados++;

        if (diff > (limit * 2)) {
            color = "#ff3838"; thickness = 8; status = "CRÍTICO";
            wbaStats.riesgoAltoTotal++;
            wbaStats.zonasAfectadas.add(groupKey);
        } else if (diff > limit) {
            color = "#f1c40f"; thickness = 5; status = "RIESGO";
        }
    }

    // 3. RENDERIZADO ESTILO PROFESIONAL
    ctx.beginPath();
    // Añadimos un pequeño brillo exterior (Glow) al vector para mejorar visibilidad
    ctx.shadowBlur = 4;
    ctx.shadowColor = color;
    
    ctx.strokeStyle = color; 
    ctx.lineWidth = thickness; 
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    
    ctx.moveTo(p1.x, p1.y); 
    ctx.lineTo(p2.x, p2.y); 
    ctx.stroke();
    
    // Limpiamos el brillo para no afectar otros dibujos
    ctx.shadowBlur = 0;

    // 4. ETIQUETADO DINÁMICO (MODO AUDITORÍA)
    if (calibrado) {
        const mx = (p1.x + p2.x) / 2, my = (p1.y + p2.y) / 2;
        
        // Fondo de etiqueta estilizado (Semi-transparente)
        ctx.fillStyle = "rgba(15, 15, 15, 0.8)";
        ctx.roundRect(mx + 12, my - 22, 65, 32, 5); // Rectángulo con bordes redondeados
        ctx.fill();
        
        // Texto del Ángulo
        ctx.fillStyle = "#ffffff";
        ctx.font = "bold 11px Inter, Arial";
        ctx.fillText(`${avgAngle.toFixed(0)}°`, mx + 18, my - 8);
        
        // Texto del Estatus (Color dinámico según riesgo)
        ctx.fillStyle = color;
        ctx.font = "9px Inter, Arial";
        ctx.fillText(status, mx + 18, my + 5);
    }
};

/**
 * 🏷️ BLOQUE 4: PROCESAMIENTO DE IA (REDISEÑO JERÁRQUICO "T")
 * Conecta orejas -> centro cabeza -> cuello para una visualización limpia.
 */
function onResults(res) {
    const w = canvas.width, h = canvas.height;

    ctx.save();
    ctx.clearRect(0, 0, w, h);
    
    if (currentFacingMode === "user") { 
        ctx.translate(w, 0); 
        ctx.scale(-1, 1); 
    }
    
    if (res.image) ctx.drawImage(res.image, 0, 0, w, h);

    if (!res.poseLandmarks) { 
        txtStatus.innerText = "BUSCANDO TRABAJADOR..."; 
        ctx.restore(); 
        return; 
    }

    const loader = document.getElementById('loader-ia');
    if (loader && loader.style.display !== 'none') loader.style.display = 'none';

    const lm = res.poseLandmarks;

    // Helper de suavizado
// --- CONFIGURACIÓN DE FILTRADO ---
const ALPHA = 0.2; // Factor de suavizado (0.1 = muy estable / 0.9 = muy rápido)
const MIN_CONFIDENCE = 0.65; // Umbral para ignorar "brincos" del modelo
let smoothLM = {}; // Memoria para el suavizado exponencial

const pt = (i) => {
    if (!lm[i]) return { x: 0, y: 0, z: 0, v: 0 };
    
    // 1. FILTRO DE CONFIANZA: Si la IA duda, mantenemos la posición anterior
    if (lm[i].visibility < MIN_CONFIDENCE && smoothLM[i]) {
        return { ...smoothLM[i], v: lm[i].visibility };
    }

    const currentPos = { x: lm[i].x * w, y: lm[i].y * h, z: lm[i].z };

    // 2. SUAVIZADO EXPONENCIAL (EMA): Elimina la vibración/jitter
    if (!smoothLM[i]) {
        smoothLM[i] = currentPos;
    } else {
        smoothLM[i] = {
            x: smoothLM[i].x + ALPHA * (currentPos.x - smoothLM[i].x),
            y: smoothLM[i].y + ALPHA * (currentPos.y - smoothLM[i].y),
            z: smoothLM[i].z + ALPHA * (currentPos.z - smoothLM[i].z)
        };
    }

    return { ...smoothLM[i], v: lm[i].visibility };
};

// --- MAPEO DE PUNTOS CLAVE (OPTIMIZADO NOM-036) ---
const p = {
    ore_d: pt(8), ore_i: pt(7), 
    h_d: pt(12), h_i: pt(11),      // Hombros
    c_d: pt(14), c_i: pt(13),      // Codos
    m_d: pt(16), m_i: pt(15),      // Muñecas
    dedo_d: pt(20), dedo_i: pt(19), // Dedos
    p_d: pt(24), p_i: pt(23),      // Pelvis
    r_d: pt(26), r_i: pt(25),      // Rodillas
    t_d: pt(28), t_i: pt(27),      // Talón
    pie_d: pt(32), pie_i: pt(31)   // Punta pie
};

// --- LÓGICA DE CONEXIÓN EN "T" (CABEZA Y CUELLO) ---
p.centro_orejas = { 
    x: (p.ore_d.x + p.ore_i.x) / 2, 
    y: (p.ore_d.y + p.ore_i.y) / 2, 
    z: (p.ore_d.z + p.ore_i.z) / 2 
};

p.cue = { 
    x: (p.h_d.x + p.h_i.x) / 2, 
    y: (p.h_d.y + p.h_i.y) / 2, 
    z: (p.h_d.z + p.h_i.z) / 2 
};

p.esp_baja = { 
    x: (p.p_d.x + p.p_i.x) / 2, 
    y: (p.p_d.y + p.p_i.y) / 2, 
    z: (p.p_d.z + p.p_i.z) / 2 
};

// Segmentos del tronco (Para visualización de curvatura de espalda baja)
p.torax = { 
    x: p.cue.x + (p.esp_baja.x - p.cue.x) * 0.3, 
    y: p.cue.y + (p.esp_baja.y - p.cue.y) * 0.3, 
    z: p.cue.z + (p.esp_baja.z - p.cue.z) * 0.3 
};
p.abdomen = { 
    x: p.cue.x + (p.esp_baja.x - p.cue.x) * 0.6, 
    y: p.cue.y + (p.esp_baja.y - p.cue.y) * 0.6, 
    z: p.cue.z + (p.esp_baja.z - p.cue.z) * 0.6 
};

// Referencia vertical absoluta (basada en el cuello)
const verticalRef = { x: p.cue.x, y: p.cue.y + 100, z: p.cue.z };

// --- CÁLCULO DE ÁNGULOS (NOM-036 / REBA) ---
const currentAngles = {
    cuello: calcAng3D(p.centro_orejas, p.cue, verticalRef),
    tronco: calcAng3D(p.cue, p.esp_baja, verticalRef),
    h_d: calcAng3D(p.cue, p.h_d, p.c_d),
    h_i: calcAng3D(p.cue, p.h_i, p.c_i),
    c_d: calcAng3D(p.h_d, p.c_d, p.m_d),
    c_i: calcAng3D(p.h_i, p.c_i, p.m_i),
    mu_d: calcAng3D(p.c_d, p.m_d, p.dedo_d),
    mu_i: calcAng3D(p.c_i, p.m_i, p.dedo_i),
    r_d: calcAng3D(p.p_d, p.r_d, p.t_d),
    r_i: calcAng3D(p.p_i, p.r_i, p.t_i),
    pie_d: calcAng3D(p.r_d, p.t_d, p.pie_d),
    pie_i: calcAng3D(p.r_i, p.t_i, p.pie_i)
};

// --- BUFFER DE ÁNGULOS ---
Object.keys(currentAngles).forEach(k => {
    if (!angleBuffer[k]) angleBuffer[k] = [];
    angleBuffer[k].push(currentAngles[k]);
    if (angleBuffer[k].length > HISTORIAL_MAX) angleBuffer[k].shift();
});

/**
 * 🏷️ BLOQUE 5: CONTROL DE CALIBRACIÓN Y AUDITORÍA
 */
function iniciarCalibracion() {
    if (!iaActiva) return;
    txtStatus.innerText = "⚖️ CALIBRANDO... MANTENGA POSTURA NEUTRA";
    
    setTimeout(() => {
        Object.keys(angleBuffer).forEach(k => {
            const avg = angleBuffer[k].reduce((a, b) => a + b, 0) / angleBuffer[k].length;
            baseAngles[k] = avg;
        });
        calibrado = true;
        document.getElementById('btn-calib').style.background = "#2ecc71";
        document.getElementById('recordBtn').disabled = false;
        document.getElementById('recordBtn').style.opacity = "1";
        txtStatus.innerText = "✅ CALIBRADO COMPLETADO";
    }, 2000);
}

function toggleAuditoria() {
    if (!calibrado) return;
    analizandoRiesgo = !analizandoRiesgo;
    const btn = document.getElementById('recordBtn');

    if (analizandoRiesgo) {
        recordedChunks = [];
        const stream = canvas.captureStream(30);
        mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
        mediaRecorder.ondataavailable = (e) => recordedChunks.push(e.data);
        mediaRecorder.onstop = descargarVideo;
        mediaRecorder.start();
        wbaStats.inicioAuditoria = Date.now();
        btn.innerHTML = "<span>⏹️</span>DETENER"; btn.classList.add('rec-active');
    } else {
        btn.innerHTML = "<span>🔴</span>AUDITAR"; btn.classList.remove('rec-active');
        if (mediaRecorder) mediaRecorder.stop();
        setTimeout(generarReporteWBA, 800);
    }
}

/**
 * 🏷️ BLOQUE 6: SISTEMA DE REPORTES PDF (VERSIÓN INTEGRAL NOM-036 & LFT)
 * Genera un documento técnico basado en los hallazgos de la IA y la normativa mexicana.
 */
function generarReporteWBA() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    
    // 1. Recolección de datos del DOM
    const info = {
        emp: document.getElementById('nombreEmpresa')?.value.toUpperCase() || "EMPRESA NO ESPECIFICADA",
        puesto: document.getElementById('puestoTrabajo')?.value || "General",
        trab: document.getElementById('nombreTrabajador')?.value || "Sin Nombre",
        peso: parseFloat(document.getElementById('pesoCarga')?.value) || 0,
        gen: document.getElementById('generoTrabajador')?.value || 'H',
        edad: parseInt(document.getElementById('edadTrabajador')?.value) || 0
    };

    // 2. Lógica de Cumplimiento Normativo (Sincronizado con NOM-036 y LFT)
    let limiteNormativo = 0;
    let hallazgosLegales = [];

    if (info.edad < 15) {
        hallazgosLegales.push("PROHIBICIÓN LFT: Trabajo infantil detectado.");
        limiteNormativo = 0;
    } else if (info.edad < 18) {
        hallazgosLegales.push("RESTRICCIÓN LFT: Menor en etapa de desarrollo.");
        limiteNormativo = 7;
    } else {
        if (info.gen === 'H') {
            limiteNormativo = (info.edad > 45) ? 20 : 25;
        } else {
            limiteNormativo = (info.edad > 45) ? 10 : 15;
        }
    }

    // Cálculos de riesgo postural (IA)
    const porcRiesgo = wbaStats.framesAnalizados > 0 
        ? ((wbaStats.riesgoAltoTotal / wbaStats.framesAnalizados) * 100).toFixed(1) 
        : 0;
    
    const cumpleNorma = (info.peso <= limiteNormativo && porcRiesgo <= 20);
    const colorSemaforo = cumpleNorma ? [46, 204, 113] : [231, 76, 60]; // Verde o Rojo

    // --- DISEÑO DEL PDF ---

    // Encabezado Profesional
    doc.setFillColor(13, 17, 23); doc.rect(0, 0, 210, 40, 'F');
    doc.setTextColor(0, 255, 0); doc.setFontSize(18); doc.setFont("helvetica", "bold");
    doc.text("INFORME DE EVALUACIÓN ERGONÓMICA IA", 105, 15, { align: "center" });
    doc.setFontSize(9); doc.setTextColor(255, 255, 255); doc.setFont("helvetica", "normal");
    doc.text("AUDITORÍA DE CUMPLIMIENTO: NOM-036-1-STPS-2018 & LEY FEDERAL DEL TRABAJO", 105, 25, { align: "center" });
    doc.text(`ID Reporte: LYA-${Date.now()} | Planta: ${info.emp}`, 105, 32, { align: "center" });

    // 1. Datos Generales
    doc.setTextColor(0); doc.setFontSize(11); doc.setFont("helvetica", "bold");
    doc.text("1. DATOS GENERALES Y REFERENCIAS", 15, 50);
    doc.autoTable({
        startY: 53,
        body: [
            ['Empresa:', info.emp, 'Fecha de Evaluación:', new Date().toLocaleDateString()],
            ['Trabajador:', info.trab, 'ID/Edad:', `${info.edad} años`],
            ['Puesto:', info.puesto, 'Género:', info.gen === 'H' ? 'Hombre' : 'Mujer']
        ],
        theme: 'grid', styles: { fontSize: 8, cellPadding: 2 }
    });

    // 2. Tabla de Umbrales Técnicos (Actualizada con Muñecas y Pies)
    doc.text("2. MATRIZ DE UMBRALES ADMISIBLES (NOM-036 / REBA)", 15, doc.lastAutoTable.finalY + 10);
    doc.autoTable({
        startY: doc.lastAutoTable.finalY + 13,
        head: [['Región Anatómica', 'Ángulo Neutro', 'Tolerancia Máx.', 'Referencia']],
        body: [
            ['Tronco (Flexión)', '0°', '20°', 'NOM-036-1-STPS'],
            ['Cuello (Inclinación)', '0°', '10°', 'ISO 11228-3'],
            ['Hombros / Codos', '0°', '20° / 60°', 'Método REBA'],
            ['Muñecas', '0°', '15°', 'Prevención Túnel Carpiano'],
            ['Pies / Tobillos', '90°', '15° (Flexión)', 'Estabilidad Biomecánica']
        ],
        headStyles: { fillColor: [44, 62, 80] },
        styles: { fontSize: 8 }
    });

    // 3. Análisis de Resultados (IA)
    doc.text("3. RESULTADOS DE LA EVALUACIÓN EN TIEMPO REAL", 15, doc.lastAutoTable.finalY + 10);
    
    // Traducir zonas afectadas para el reporte
    const zonasTraduccion = {
        tronco: "Tronco", cuello: "Cuello", hombros: "Hombros", 
        codos: "Codos", munecas: "Muñecas", piernas: "Rodillas", pies: "Tobillos"
    };
    const zonasTexto = Array.from(wbaStats.zonasAfectadas)
        .map(z => zonasTraduccion[z] || z)
        .join(', ') || 'Ninguna';

    doc.autoTable({
        startY: doc.lastAutoTable.finalY + 13,
        head: [['FACTOR ANALIZADO', 'VALOR DETECTADO', 'LÍMITE LEGAL', 'ESTADO']],
        body: [
            ['Masa de Carga', `${info.peso} kg`, `${limiteNormativo} kg`, info.peso > limiteNormativo ? 'EXCEDE' : 'CUMPLE'],
            ['Exposición a Riesgo', `${porcRiesgo}%`, '20.0%', porcRiesgo > 20 ? 'CRÍTICO' : 'ACEPTABLE'],
            ['Zonas con Estrés', zonasTexto, 'N/A', porcRiesgo > 0 ? 'OBSERVACIÓN' : 'NORMAL']
        ],
        theme: 'striped',
        styles: { fontSize: 8 },
        columnStyles: { 3: { fontStyle: 'bold' } }
    });

    // 4. SEMAFORIZACIÓN FINAL Y VERDICTO
    const ySemaforo = doc.lastAutoTable.finalY + 12;
    doc.setFillColor(colorSemaforo[0], colorSemaforo[1], colorSemaforo[2]);
    doc.rect(15, ySemaforo, 180, 12, 'F');
    
    doc.setTextColor(255); doc.setFontSize(11); doc.setFont("helvetica", "bold");
    const veredicto = cumpleNorma ? "VERDICTO: CUMPLE CON LOS ESTÁNDARES DE SEGURIDAD" : "VERDICTO: NO CUMPLE - REQUIERE INTERVENCIÓN INMEDIATA";
    doc.text(veredicto, 105, ySemaforo + 8, { align: "center" });

    // 5. Conclusiones y Recomendaciones Específicas
    let recomendaciones = "";
    if (info.peso > limiteNormativo) {
        recomendaciones += `• SOBRECARGA: El peso excede el límite de ${limiteNormativo}kg. ${hallazgosLegales.join(" ")} Usar equipo auxiliar. `;
    }
    if (wbaStats.zonasAfectadas.has('munecas')) {
        recomendaciones += "• ERGONOMÍA MANO: Se detectaron ángulos críticos en muñecas; evitar agarres en pinza o desviaciones laterales extremas. ";
    }
    if (wbaStats.zonasAfectadas.has('pies')) {
        recomendaciones += "• POSTURA BASE: Se detectó inestabilidad en tobillos. Verificar calzado de seguridad y superficie de apoyo. ";
    }
    if (porcRiesgo > 20) {
        recomendaciones += "• FATIGA: Alta frecuencia de posturas forzadas. Aplicar rotación de puestos y pausas activas. ";
    }
    if (recomendaciones === "") {
        recomendaciones = "OPERACIÓN SEGURA: El trabajador mantiene ángulos confortables en todas las articulaciones evaluadas. Continuar con monitoreo periódico.";
    }

    doc.setTextColor(0); doc.setFontSize(11);
    doc.text("4. CONCLUSIONES TÉCNICAS", 15, ySemaforo + 22);
    doc.setFont("helvetica", "normal"); doc.setFontSize(9);
    const splitText = doc.splitTextToSize(recomendaciones, 175);
    doc.text(splitText, 15, ySemaforo + 28);

    // 6. Sección de Firmas
    const finalY = Math.min(ySemaforo + 80, 270);
    doc.setDrawColor(0); doc.setLineWidth(0.5);
    doc.line(25, finalY, 95, finalY); doc.text("Responsable de Seguridad / Auditor", 32, finalY + 5);
    doc.line(115, finalY, 185, finalY); doc.text("Firma del Trabajador Evaluado", 130, finalY + 5);

    // Pie de Página
    doc.setFontSize(7); doc.setTextColor(150);
    doc.text("Reporte generado por LYA-ERGO IA System - Módulo de Visión 3D Integrado.", 105, 285, { align: "center" });
    doc.text("Cumplimiento normativo basado en NOM-036-1-STPS-2018.", 105, 290, { align: "center" });

    // Guardar Documento
    doc.save(`Auditoria_Ergo_${info.trab.replace(/\s+/g, '_')}_${info.emp}.pdf`);
}

/**
 * 🏷️ BLOQUE 7: GESTIÓN DE HARDWARE Y ARRANQUE - CORREGIDO
 */
async function prepararSistema(fuente) {
    // 1. Referencias y Captura de Datos
    const edadInput = document.getElementById('edadTrabajador');
    const pesoInput = document.getElementById('pesoCarga');
    const ids = ['nombreEmpresa', 'puestoTrabajo', 'nombreTrabajador', 'edadTrabajador', 'pesoCarga'];
    
    // Validación de campos vacíos
    const incompleto = ids.some(id => !document.getElementById(id).value.trim());
    if (incompleto) { 
        alert("⚠️ Por favor, complete todos los campos del formulario antes de iniciar el análisis."); 
        return; 
    }

    // Validación de Edad (NOM-036 / LFT)
    const edadValor = edadInput.value.trim();
    if (!/^\d{2}$/.test(edadValor)) {
        alert("❌ Error en EDAD: Debe ingresar un valor de exactamente 2 cifras (Ejemplo: 25).");
        edadInput.focus();
        return;
    }

    // Validación de peso
    if (parseFloat(pesoInput.value) <= 0) {
        alert("❌ El peso de la carga debe ser un número positivo mayor a cero.");
        pesoInput.focus();
        return;
    }

    // --- LIMPIEZA DE FLUJOS PREVIOS (CRÍTICO PARA QUE EL BOTÓN RESPONDA) ---
    if (video.srcObject) {
        video.srcObject.getTracks().forEach(track => track.stop());
        video.srcObject = null;
    }
    if (video.src && video.src.startsWith('blob:')) {
        URL.revokeObjectURL(video.src);
        video.src = "";
    }

    // Reinicio de buffers de la IA
    angleBuffer = {}; 
    posBuffer = {};
    wbaStats.zonasAfectadas.clear();
    wbaStats.framesAnalizados = 0;
    wbaStats.riesgoAltoTotal = 0;

    // 2. Transición de Interfaz
    document.getElementById('menu-inicial').style.display = 'none';
    document.getElementById('contenedor-analisis').style.display = 'block';

    try {
        if (fuente === 'camara') {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { 
                    facingMode: currentFacingMode, 
                    width: { ideal: 1280 }, 
                    height: { ideal: 720 } 
                } 
            });
            video.srcObject = stream;
        } else {
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];
            if (!file) { 
                // Si el usuario canceló, volvemos al menú
                document.getElementById('menu-inicial').style.display = 'block';
                document.getElementById('contenedor-analisis').style.display = 'none';
                return; 
            }
            video.src = URL.createObjectURL(file);
            video.load(); // Forzamos al navegador a reconocer el nuevo blob de video
        }

        // 3. Manejo del arranque del motor de IA
        video.onloadedmetadata = async () => {
            canvas.width = video.videoWidth; 
            canvas.height = video.videoHeight;
            
            try {
                await video.play();
                activarIA(); // Inicia la estimación de pose
            } catch (playError) {
                console.error("Error al reproducir video:", playError);
                alert("Error crítico: No se pudo iniciar la reproducción.");
            }
        };

    } catch (err) {
        console.error("Error de acceso:", err);
        alert("No se pudo acceder al recurso. Verifique permisos.");
        location.reload();
    }
}

    
async function activarIA() {
    const loader = document.getElementById('loader-ia');
    loader.style.display = 'flex';
    
    // Timeout de seguridad mejorado
    const safetyTimeout = setTimeout(() => {
        if (loader.style.display !== 'none') {
            loader.style.display = 'none';
            alert("⚠️ El motor de IA está tardando en responder. Esto puede deberse a la saturación de la GPU.");
        }
    }, 10000);

    // Reinicializar instancia de Pose si ya existía para liberar memoria
    if (pose) {
        try { await pose.close(); } catch(e) {}
    }

    pose = new Pose({ 
        locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}` 
    });

    pose.setOptions({ 
        modelComplexity: 1, // Balance óptimo entre velocidad y precisión para industria
        smoothLandmarks: true, 
        minDetectionConfidence: 0.5, 
        minTrackingConfidence: 0.5 
    });

    pose.onResults((res) => {
        clearTimeout(safetyTimeout);
        if (loader.style.display !== 'none') {
            loader.style.display = 'none';
            console.log("IA Operativa - Modelo Jerárquico T Cargado");
        }
        iaActiva = true;
        onResults(res);
    });

    // Loop de frames con control de estado
    async function frameLoop() {
        if (video.paused || video.ended) return;

        try {
            await pose.send({ image: video });
        } catch (e) {
            console.warn("Frame omitido por procesamiento pesado.");
        }
        
        if (iaActiva) {
            requestAnimationFrame(frameLoop);
        } else {
            // Si la IA aún no despierta, intentamos cada 500ms para no saturar
            setTimeout(frameLoop, 500);
        }
    }
    
    frameLoop();
}   


    

function descargarVideo() {
    if (recordedChunks.length === 0) return;

    const blob = new Blob(recordedChunks, { type: 'video/webm' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; 
    a.download = `EVIDENCIA_LYA_${document.getElementById('nombreTrabajador').value}_${Date.now()}.webm`; 
    a.click();

    // 🧹 LIMPIEZA DE MEMORIA
    // Liberamos la URL del objeto después de 100ms para asegurar que la descarga inició
    setTimeout(() => {
        URL.revokeObjectURL(url);
        console.log("Memoria de blob de video liberada con éxito.");
    }, 100);
}



    
function cambiarCamara() {
    currentFacingMode = currentFacingMode === "environment" ? "user" : "environment";
    prepararSistema('camara');
}
