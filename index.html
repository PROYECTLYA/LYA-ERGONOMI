<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ERGO-SENSING PRO v4.0</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0d1117; color: white; margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #menu-inicial { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #0d1117; z-index: 2000; }
        .btn-menu { width: 85%; max-width: 320px; padding: 18px; margin: 10px; border-radius: 12px; font-weight: bold; }
        #contenedor-analisis { display: none; width: 100vw; height: 100vh; position: relative; background: #000; }
        canvas { width: 100%; height: 100%; object-fit: contain; }
        video { display: none; }
        .status-badge { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.8); color: #00ff00; padding: 10px 15px; border-radius: 8px; border-left: 4px solid #00ff00; font-size: 12px; z-index: 3000; }
        .barra-controles { position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; padding: 12px; background: rgba(255,255,255,0.1); backdrop-filter: blur(15px); border-radius: 30px; z-index: 4000; border: 1px solid rgba(255,255,255,0.2); width: 92%; justify-content: space-around; }
        .btn-circular { width: 60px; height: 60px; border-radius: 50%; border: none; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; color: white; }
        .btn-flip { background: #00d2d3; color: #000; border: 2px solid white; }
        .btn-calib { background: #f1c40f; color: #000; }
        .btn-record { background: #ff4d4d; width: 80px; border-radius: 25px; }
        .recording { animation: pulse 1s infinite; background: white; color: #ff4d4d; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div id="menu-inicial">
    <h2 style="color: #00d2d3; margin-bottom: 25px;">ERGO-SENSING PRO AI</h2>
    <button class="btn btn-success btn-menu" onclick="iniciarApp('camara')">🎥 EVALUACIÓN EN VIVO</button>
    <button class="btn btn-primary btn-menu" onclick="document.getElementById('fileInput').click()">📁 CARGAR VIDEO</button>
    <input type="file" id="fileInput" hidden accept="video/*" onchange="iniciarApp('archivo')">
</div>

<div id="contenedor-analisis">
    <div class="status-badge" id="txt-status">INICIALIZANDO...</div>
    <canvas id="output_canvas"></canvas>
    <video id="input_video" playsinline muted></video>
    <div class="barra-controles">
        <button class="btn-circular btn-dark" onclick="location.reload()">Menu</button>
        <button id="btn-flip" class="btn-circular btn-flip" onclick="cambiarCamara()"><span>🔄</span>GIRAR</button>
        <button class="btn-circular btn-calib" onclick="iniciarCalibracion()"><span>⚖️</span>CALIB</button>
        <button id="recordBtn" class="btn-circular btn-record" onclick="toggleGrabacion()"><span>🔴</span>GRABAR</button>
    </div>
</div>

<script>
    const video = document.getElementById('input_video');
    const canvas = document.getElementById('output_canvas');
    const ctx = canvas.getContext('2d');
    const txtStatus = document.getElementById('txt-status');
    
    let currentFacingMode = "environment"; 
    let cameraInstance = null;
    let poseSolver = null;
    let isVideoFile = false;

    // --- LÓGICA BIOMECÁNICA (Porte de Python) ---
    const THRESHOLDS = {
        'cabeza': {yellow: 15, red: 25},
        'abdomen': {yellow: 20, red: 40},
        'extremities': {yellow: 30, red: 55},
        'default': {yellow: 20, red: 45}
    };

    let buffers = Array.from({length: 33}, () => []);
    let offsets = {};
    let isCalibrating = false;
    let calibStartTime = 0;
    let calibData = {};

    function filtrarPunto(id, p) {
        buffers[id].push(p);
        if (buffers[id].length > 8) buffers[id].shift();
        const avg = {x:0, y:0, z:0};
        buffers[id].forEach(c => { avg.x += c.x; avg.y += c.y; avg.z += c.z; });
        return {x: avg.x/buffers[id].length, y: avg.y/buffers[id].length, z: avg.z/buffers[id].length};
    }

    function calcAng3D(a, b, c) {
        const v1 = {x: a.x-b.x, y: a.y-b.y, z: a.z-b.z};
        const v2 = {x: c.x-b.x, y: c.y-b.y, z: c.z-b.z};
        const dot = v1.x*v2.x + v1.y*v2.y + v1.z*v2.z;
        const mag1 = Math.sqrt(v1.x**2 + v1.y**2 + v1.z**2);
        const mag2 = Math.sqrt(v2.x**2 + v2.y**2 + v2.z**2);
        const angle = Math.acos(Math.max(-1, Math.min(1, dot / (mag1 * mag2))));
        return angle * (180 / Math.PI);
    }

    function getColor(tipo, angulo) {
        const offset = offsets[tipo] || 0;
        const desviacion = Math.abs(angulo - offset);
        let conf = THRESHOLDS[tipo] || (tipo.includes('brazo') || tipo.includes('pierna') ? THRESHOLDS['extremities'] : THRESHOLDS['default']);
        
        if (desviacion > conf.red) return "#ff0000"; // Rojo
        if (desviacion > conf.yellow) return "#ffff00"; // Amarillo
        return "#00ff00"; // Verde
    }

    // --- CONFIGURACIÓN MEDIAPIPE ---
    poseSolver = new Pose({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}` });
    poseSolver.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
    
    poseSolver.onResults((res) => {
        if (!res.image) return;
        ctx.save();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (!isVideoFile && currentFacingMode === "user") { ctx.translate(canvas.width, 0); ctx.scale(-1, 1); }
        ctx.drawImage(res.image, 0, 0, canvas.width, canvas.height);
        
        if (res.poseLandmarks) {
            const lm = res.poseLandmarks.map((p, i) => filtrarPunto(i, p));
            const w = canvas.width, h = canvas.height;

            // Referencias Biomecánicas
            const h_med = { x: (lm[11].x+lm[12].x)/2, y: (lm[11].y+lm[12].y)/2, z: (lm[11].z+lm[12].z)/2 };
            const c_med = { x: (lm[23].x+lm[24].x)/2, y: (lm[23].y+lm[24].y)/2, z: (lm[23].z+lm[24].z)/2 };
            const v_down = { x: c_med.x, y: c_med.y + 0.5, z: c_med.z };

            const angulos = {
                'cabeza': calcAng3D(lm[0], h_med, c_med),
                'abdomen': calcAng3D(h_med, c_med, v_down),
                'brazo_der': calcAng3D(lm[12], lm[14], lm[16]),
                'brazo_izq': calcAng3D(lm[11], lm[13], lm[15]),
                'pierna_der': calcAng3D(lm[24], lm[26], lm[28]),
                'pierna_izq': calcAng3D(lm[23], lm[25], lm[27])
            };

            if (isCalibrating) {
                const seg = Math.ceil((5000 - (Date.now() - calibStartTime))/1000);
                txtStatus.innerText = `CALIBRANDO: ${seg}s`;
                Object.keys(angulos).forEach(k => { calibData[k] = (calibData[k] || []).concat(angulos[k]); });
                if (Date.now() - calibStartTime > 5000) {
                    Object.keys(calibData).forEach(k => { offsets[k] = calibData[k].reduce((a,b)=>a+b)/calibData[k].length; });
                    isCalibrating = false; txtStatus.innerText = "SISTEMA ACTIVO";
                }
            }

            const drawL = (p1, p2, color, thick=5) => {
                ctx.beginPath(); ctx.moveTo(p1.x*w, p1.y*h); ctx.lineTo(p2.x*w, p2.y*h);
                ctx.strokeStyle = color; ctx.lineWidth = thick; ctx.lineCap = "round"; ctx.stroke();
            };

            // DIBUJO DEL ESQUELETO COMPLETO
            drawL(lm[0], h_med, getColor('cabeza', angulos['cabeza'])); // Cuello/Cabeza
            drawL(h_med, c_med, getColor('abdomen', angulos['abdomen']), 8); // Torso
            drawL(lm[11], lm[12], "#fff", 6); // Hombros
            drawL(lm[23], lm[24], "#fff", 6); // Cadera

            // Brazos
            drawL(lm[12], lm[14], getColor('brazo_der', angulos['brazo_der']));
            drawL(lm[14], lm[16], getColor('brazo_der', angulos['brazo_der']));
            drawL(lm[11], lm[13], getColor('brazo_izq', angulos['brazo_izq']));
            drawL(lm[13], lm[15], getColor('brazo_izq', angulos['brazo_izq']));

            // Piernas
            drawL(lm[24], lm[26], getColor('pierna_der', angulos['pierna_der']));
            drawL(lm[26], lm[28], getColor('pierna_der', angulos['pierna_der']));
            drawL(lm[23], lm[25], getColor('pierna_izq', angulos['pierna_izq']));
            drawL(lm[25], lm[27], getColor('pierna_izq', angulos['pierna_izq']));
        }
        ctx.restore();
    });

    async function iniciarApp(fuente) {
        if (fuente === 'camara') {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: currentFacingMode } });
                stream.getTracks().forEach(t => t.stop());
                document.getElementById('menu-inicial').style.display = 'none';
                document.getElementById('contenedor-analisis').style.display = 'block';
                isVideoFile = false;
                await habilitarCamara();
            } catch (err) { alert("Acceso denegado a cámara"); }
        } else {
            const file = document.getElementById('fileInput').files[0];
            if (file) {
                document.getElementById('menu-inicial').style.display = 'none';
                document.getElementById('contenedor-analisis').style.display = 'block';
                document.getElementById('btn-flip').style.display = 'none';
                isVideoFile = true; video.src = URL.createObjectURL(file); video.play();
                requestAnimationFrame(function loop(){ if(!video.paused){ poseSolver.send({image:video}); requestAnimationFrame(loop); } });
            }
        }
    }

    async function habilitarCamara() {
        if (cameraInstance) await cameraInstance.stop();
        cameraInstance = new Camera(video, {
            onFrame: async () => { canvas.width = video.videoWidth; canvas.height = video.videoHeight; await poseSolver.send({image: video}); },
            facingMode: currentFacingMode, width: 1280, height: 720
        });
        txtStatus.innerText = "CÁMARA LISTA - PULSE CALIBRAR";
        await cameraInstance.start();
    }

    function cambiarCamara() { currentFacingMode = (currentFacingMode === "user") ? "environment" : "user"; habilitarCamara(); }
    function iniciarCalibracion() { isCalibrating = true; calibStartTime = Date.now(); calibData = {}; }

    let recorder; let chunks = [];
    function toggleGrabacion() {
        const btn = document.getElementById('recordBtn');
        if (!recorder || recorder.state === "inactive") {
            chunks = []; recorder = new MediaRecorder(canvas.captureStream(24));
            recorder.ondataavailable = (e) => chunks.push(e.data);
            recorder.onstop = () => {
                const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob(chunks, { type: 'video/webm' }));
                a.download = `ERGO_${Date.now()}.webm`; a.click();
            };
            recorder.start(); btn.classList.add('recording'); btn.innerHTML = "FIN";
        } else { recorder.stop(); btn.classList.remove('recording'); btn.innerHTML = "GRABAR"; }
    }
</script>
</body>
</html>
