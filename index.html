<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LYA-ERGO v21.5 | AUDITORÍA INTEGRAL</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0d1117; color: white; margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #menu-inicial { display: flex; width: 100%; height: 100vh; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle, #161b22 0%, #0d1117 100%); position: fixed; z-index: 5000; }
        .logo-text { color: #00ff00; font-weight: 800; letter-spacing: 3px; margin-bottom: 0; }
        .sub-text { color: #8b949e; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 40px; }
        
        #pantalla-evaluacion { 
            display: none; position: fixed; top:0; left:0; width:100%; height:100%; 
            background: rgba(13, 17, 23, 0.98); z-index: 7000; 
            flex-direction: column; align-items: center; justify-content: center; 
        }
        .scanner-line { width: 80%; height: 3px; background: #00ff00; position: absolute; box-shadow: 0 0 20px #00ff00; animation: scan 2s infinite ease-in-out; }
        @keyframes scan { 0%, 100% { top: 25%; opacity: 0; } 50% { top: 75%; opacity: 1; } }

        #contenedor-analisis { display: none; width: 100vw; height: 100vh; position: relative; background: #000; }
        canvas { width: 100%; height: 100%; object-fit: contain; }
        video { display: none; }
        
        .status-badge { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.8); padding: 12px 20px; border-radius: 8px; border-left: 4px solid #00ff00; font-size: 10px; z-index: 3000; font-weight: bold; }
        
        .barra-controles { position: absolute; bottom: 35px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; z-index: 4000; width: 95%; justify-content: center; }
        .btn-circular { width: 68px; height: 68px; border-radius: 50%; border: none; font-size: 9px; font-weight: 900; color: white; display: flex; align-items: center; justify-content: center; flex-direction: column; transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .btn-eval { background: #00ff00; color: #000; width: auto; padding: 0 30px; border-radius: 35px; }
        .rec-active { background: #fff !important; color: #f00 !important; animation: pulse-red 1.5s infinite; }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(255, 0, 0, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0); } }
    </style>
</head>
<body>

<div id="pantalla-evaluacion">
    <div class="scanner-line"></div>
    <h2 id="eval-status-text" style="color:#00ff00; letter-spacing: 4px;">REALIZANDO EVALUACIÓN</h2>
    <p style="color: #8b949e;" id="eval-subtext">MAPEO DE VECTORES BIOMECÁNICOS...</p>
</div>

<div id="menu-inicial">
    <h1 class="logo-text">LYA-ERGO</h1>
    <p class="sub-text">Cervecería del Trópico | Auditoría</p>
    <button class="btn-inicio" style="background:#27ae60; color:white; width:85%; max-width:320px; padding:18px; margin:10px; border-radius:12px; font-weight:bold; border:none;" onclick="prepararSistema('camara')">🎥 VISTA EN VIVO</button>
    <button class="btn-inicio" style="background:#2980b9; color:white; width:85%; max-width:320px; padding:18px; margin:10px; border-radius:12px; font-weight:bold; border:none;" onclick="document.getElementById('fileInput').click()">📁 SUBIR EVIDENCIA</button>
    <input type="file" id="fileInput" hidden accept="video/*" onchange="prepararSistema('archivo')">
</div>

<div id="contenedor-analisis">
    <div class="status-badge" id="txt-status">SISTEMA READY</div>
    <canvas id="output_canvas"></canvas>
    <video id="input_video" playsinline muted></video>
    <div class="barra-controles" id="controles-dinamicos"></div>
</div>

<script>
    const video = document.getElementById('input_video');
    const canvas = document.getElementById('output_canvas');
    const ctx = canvas.getContext('2d');
    const pantallaEval = document.getElementById('pantalla-evaluacion');
    const controles = document.getElementById('controles-dinamicos');
    const txtStatus = document.getElementById('txt-status');
    
    let pose = null, iaActiva = false, modoEvidencia = false, calibrado = false;
    let baseAngles = {}, angleBuffer = {};
    let mediaRecorder, recordedChunks = [], grabando = false;

    const TH = { tronco: 18, cuello: 12, hombros: 25, codos: 25, munecas: 20, piernas: 25, pies: 18 };

    async function prepararSistema(fuente) {
        document.getElementById('menu-inicial').style.display = 'none';
        document.getElementById('contenedor-analisis').style.display = 'block';
        
        if (fuente === 'camara') {
            modoEvidencia = false;
            configurarBotonesVivo();
            encenderCamara();
        } else {
            modoEvidencia = true;
            configurarBotonesEvidencia();
            const file = document.getElementById('fileInput').files[0];
            video.src = URL.createObjectURL(file);
            video.onloadedmetadata = () => {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                requestAnimationFrame(loopSimple);
            };
        }
    }

    async function encenderCamara() {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: 1280, height: 720 } });
        video.srcObject = stream;
        video.onloadedmetadata = () => { video.play(); requestAnimationFrame(loopSimple); };
    }

    function configurarBotonesVivo() {
        controles.innerHTML = `
            <button class="btn-circular btn-dark" onclick="location.reload()">SALIR</button>
            <button class="btn-circular" style="background:#00d2d3; color:#000;" onclick="cambiarCamara()">🔄<br>GIRAR</button>
            <button id="btn-calib" class="btn-circular" style="background:#f1c40f; color:#000;" onclick="activarIAVivo()">⚖️<br>CALIBRAR</button>
        `;
    }

    function configurarBotonesEvidencia() {
        controles.innerHTML = `
            <button class="btn-circular btn-dark" onclick="location.reload()">SALIR</button>
            <button class="btn-circular" style="background:#34495e;" onclick="video.currentTime -= 5">⏪<br>-5s</button>
            <button class="btn-circular" style="background:#2ecc71;" onclick="togglePlay()">⏯️<br>PLAY</button>
            <button class="btn-circular" style="background:#34495e;" onclick="video.currentTime += 5">⏩<br>+5s</button>
            <button class="btn-circular btn-eval" id="btn-iniciar-eval" onclick="iniciarEvaluacion()">INICIAR EVALUACIÓN</button>
            <button class="btn-circular" id="btn-descarga" style="background:#2980b9; display:none;" onclick="gestionarGrabacion()">💾<br>GRABAR</button>
        `;
    }

    function togglePlay() { video.paused ? video.play() : video.pause(); }

    // --- MODOS DE IA ---
    function activarIAVivo() {
        iaActiva = true;
        pose = new Pose({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}` });
        pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.7 });
        pose.onResults(onResults);
        let startTime = Date.now();
        const calibTimer = setInterval(() => {
            let seg = Math.ceil((5000 - (Date.now() - startTime)) / 1000);
            if(seg <= 0) {
                clearInterval(calibTimer); calibrado = true;
                txtStatus.innerText = "SISTEMA CALIBRADO";
            } else { txtStatus.innerText = `CALIBRANDO BIOTIPO... ${seg}s`; }
        }, 1000);
        loopIA();
    }

    function iniciarEvaluacion() {
        pantallaEval.style.display = 'flex';
        pose = new Pose({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}` });
        pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.6 });
        pose.onResults(onResults);

        setTimeout(() => {
            document.getElementById('eval-status-text').innerText = "EVALUACIÓN EXITOSA";
            setTimeout(() => {
                pantallaEval.style.display = 'none';
                iaActiva = true; calibrado = true; // En evidencia no calibramos, usamos neutral
                document.getElementById('btn-descarga').style.display = 'flex';
                document.getElementById('btn-iniciar-eval').style.display = 'none';
                loopIA();
            }, 1200);
        }, 2500);
    }

    // --- GRABACIÓN DE RESULTADOS ---
    function gestionarGrabacion() {
        if (!grabando) {
            recordedChunks = [];
            const stream = canvas.captureStream(30);
            mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm; codecs=vp9' });
            mediaRecorder.ondataavailable = (e) => recordedChunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `LYA_REPORTE_${Date.now()}.webm`;
                a.click();
            };
            mediaRecorder.start();
            grabando = true;
            document.getElementById('btn-descarga').classList.add('rec-active');
            txtStatus.innerText = "GRABANDO ANÁLISIS...";
        } else {
            mediaRecorder.stop();
            grabando = false;
            document.getElementById('btn-descarga').classList.remove('rec-active');
            txtStatus.innerText = "REPORTE DESCARGADO";
        }
    }

    // --- LOOPS DE PROCESAMIENTO ---
    async function loopIA() {
        if (iaActiva && (video.readyState >= 2)) {
            await pose.send({ image: video });
        }
        requestAnimationFrame(loopIA);
    }

    function loopSimple() {
        if (!iaActiva) {
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            requestAnimationFrame(loopSimple);
        }
    }

    function onResults(res) {
        if (!res.poseLandmarks) return;
        ctx.save();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(res.image, 0, 0, canvas.width, canvas.height);

        const lm = res.poseLandmarks;
        const w = canvas.width, h = canvas.height;
        const pt = (i) => ({ x: lm[i].x * w, y: lm[i].y * h, z: lm[i].z });

        const p = {
            cab: pt(0), 
            cue: { x: (lm[11].x+lm[12].x)/2*w, y:(lm[11].y+lm[12].y)/2*h, z:(lm[11].z+lm[12].z)/2 },
            tor: { x: (lm[11].x+lm[12].x)/2*w, y:(lm[11].y+lm[12].y)/2*h + 40, z:(lm[11].z+lm[12].z)/2 },
            abd: { x: (lm[23].x+lm[24].x)/2*w, y:(lm[23].y+lm[24].y)/2*h - 30, z:(lm[23].z+lm[24].z)/2 },
            esp_baja: { x: (lm[23].x+lm[24].x)/2*w, y:(lm[23].y+lm[24].y)/2*h, z:(lm[23].z+lm[24].z)/2 },
            h_d: pt(12), c_d: pt(14), m_d: pt(16), mano_d: pt(20),
            h_i: pt(11), c_i: pt(13), m_i: pt(15), mano_i: pt(19),
            p_d: pt(24), r_d: pt(26), t_d: pt(28), pie_d: pt(32),
            p_i: pt(23), r_i: pt(25), t_i: pt(27), pie_i: pt(31)
        };

        const vertical = (o) => ({ x: o.x, y: o.y + 100, z: o.z });
        const curAng = {
            cue: calcAng3D(p.cab, p.cue, p.tor),
            abd: calcAng3D(p.tor, p.abd, p.esp_baja),
            h_d: calcAng3D(vertical(p.h_d), p.h_d, p.c_d),
            h_i: calcAng3D(vertical(p.h_i), p.h_i, p.c_i),
            c_d: calcAng3D(p.h_d, p.c_d, p.m_d),
            c_i: calcAng3D(p.h_i, p.c_i, p.m_i),
            m_d: calcAng3D(p.c_d, p.m_d, p.mano_d),
            m_i: calcAng3D(p.c_i, p.m_i, p.mano_i),
            r_d: calcAng3D(p.p_d, p.r_d, p.t_d),
            r_i: calcAng3D(p.p_i, p.r_i, p.t_i),
            t_d: calcAng3D(p.r_d, p.t_d, p.pie_d),
            t_i: calcAng3D(p.r_i, p.t_i, p.pie_i)
        };

        const drawV = (p1, p2, angKey, groupKey) => {
            const ang = curAng[angKey];
            const t = TH[groupKey];
            ctx.lineWidth = 6;
            
            if (calibrado) {
                if (ang > (t*2)) { ctx.strokeStyle = "#ff3838"; ctx.lineWidth = 12; }
                else if (ang > t) { ctx.strokeStyle = "#fffa65"; ctx.lineWidth = 8; }
                else { ctx.strokeStyle = "#32ff7e"; }
            } else { ctx.strokeStyle = "#4b4b4b"; }

            ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
        };

        // Renderizado según Jerarquía
        drawV(p.cab, p.cue, 'cue', 'cuello'); drawV(p.cue, p.tor, 'cue', 'cuello');
        drawV(p.tor, p.abd, 'abd', 'tronco'); drawV(p.abd, p.esp_baja, 'abd', 'tronco');
        drawV(p.cue, p.h_d, 'h_d', 'hombros'); drawV(p.h_d, p.c_d, 'h_d', 'hombros'); 
        drawV(p.c_d, p.m_d, 'c_d', 'codos'); drawV(p.m_d, p.mano_d, 'm_d', 'munecas');
        drawV(p.cue, p.h_i, 'h_i', 'hombros'); drawV(p.h_i, p.c_i, 'h_i', 'hombros'); 
        drawV(p.c_i, p.m_i, 'c_i', 'codos'); drawV(p.m_i, p.mano_i, 'm_i', 'munecas');
        drawV(p.esp_baja, p.p_d, 'r_d', 'piernas'); drawV(p.p_d, p.r_d, 'r_d', 'piernas'); 
        drawV(p.r_d, p.t_d, 'r_d', 'piernas'); drawV(p.t_d, p.pie_d, 't_d', 'pies');
        drawV(p.esp_baja, p.p_i, 'r_i', 'piernas'); drawV(p.p_i, p.r_i, 'r_i', 'piernas'); 
        drawV(p.r_i, p.t_i, 'r_i', 'piernas'); drawV(p.t_i, p.pie_i, 't_i', 'pies');

        ctx.restore();
    }

    function calcAng3D(a,b,c) {
        const v1={x:a.x-b.x, y:a.y-b.y, z:a.z-b.z}, v2={x:c.x-b.x, y:c.y-b.y, z:c.z-b.z};
        const dot = v1.x*v2.x + v1.y*v2.y + v1.z*v2.z;
        const m1 = Math.sqrt(v1.x**2 + v1.y**2 + v1.z**2), m2 = Math.sqrt(v2.x**2 + v2.y**2 + v2.z**2);
        return (m1*m2 === 0) ? 0 : Math.acos(Math.max(-1, Math.min(1, dot/(m1*m2))))*(180/Math.PI);
    }
</script>
</body>
</html>
