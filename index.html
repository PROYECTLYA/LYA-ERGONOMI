<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LYA-ERGO v20.0 | TOTAL-RELIANCE</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0d1117; color: white; margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; touch-action: none; }
        #contenedor-analisis { width: 100vw; height: 100vh; position: relative; background: #000; display: none; }
        canvas { width: 100%; height: 100%; object-fit: contain; }
        video { display: none; }
        .status-badge { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.85); padding: 12px 20px; border-radius: 8px; border-left: 4px solid #00ff00; font-size: 11px; z-index: 3000; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .barra-controles { position: absolute; bottom: 35px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; z-index: 4000; width: 90%; justify-content: center; }
        .btn-circular { width: 65px; height: 65px; border-radius: 50%; border: none; font-size: 9px; font-weight: 900; color: white; display: flex; align-items: center; justify-content: center; flex-direction: column; transition: 0.2s; }
        .rec-active { background: #fff !important; color: #f00 !important; border: 3px solid #f00 !important; animation: pulse 1.5s infinite; }
        #menu-inicial { display: flex; width: 100%; height: 100vh; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle, #161b22 0%, #0d1117 100%); position: fixed; z-index: 5000; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255,0,0,0.7); } 70% { box-shadow: 0 0 0 15px rgba(255,0,0,0); } 100% { box-shadow: 0 0 0 0 rgba(255,0,0,0); } }
    </style>
</head>
<body>

<div id="menu-inicial">
    <h1 style="color:#00ff00; font-weight:800; letter-spacing:3px;">LYA-ERGO</h1>
    <p style="color:#8b949e; font-size:0.7rem; letter-spacing:2px; margin-bottom:40px;">AUDITORÍA BIOMECÁNICA v20.0</p>
    <button class="btn btn-success p-3 w-75 mb-3 fw-bold" onclick="prepararSistema('camara')">CAMARA IA</button>
    <button class="btn btn-primary p-3 w-75 fw-bold" onclick="document.getElementById('fileInput').click()">VIDEO ARCHIVO</button>
    <input type="file" id="fileInput" hidden accept="video/*" onchange="prepararSistema('archivo')">
</div>

<div id="contenedor-analisis">
    <div class="status-badge" id="txt-status">SISTEMA INICIALIZADO</div>
    <canvas id="output_canvas"></canvas>
    <video id="input_video" playsinline muted></video>
    <div class="barra-controles">
        <button class="btn-circular btn-dark" onclick="location.reload()">SALIR</button>
        <button class="btn-circular" style="background:#00d2d3; color:#000;" onclick="cambiarCamara()">GIRAR</button>
        <button id="btn-calib" class="btn-circular" style="background:#f1c40f; color:#000;" onclick="activarIA()">CALIBRAR</button>
        <button id="recordBtn" class="btn-circular" style="background:#ff4d4d; opacity:0.3;" onclick="toggleGrabacion()">GRABAR</button>
    </div>
</div>

<script>
    const video = document.getElementById('input_video');
    const canvas = document.getElementById('output_canvas');
    const ctx = canvas.getContext('2d');
    const txtStatus = document.getElementById('txt-status');
    
    let pose, iaActiva = false, calibrado = false, analizandoRiesgo = false;
    let baseAngles = {}, angleBuffer = {}, currentFacingMode = "environment";
    let mediaRecorder, recordedChunks = [];

    const TH = { cuello: 15, tronco: 20, hombros: 30, codos: 25, munecas: 22, piernas: 28, pies: 20 };

    async function prepararSistema(fuente) {
        document.getElementById('menu-inicial').style.display = 'none';
        document.getElementById('contenedor-analisis').style.display = 'block';
        if (fuente === 'camara') await encenderCamara();
        else {
            video.src = URL.createObjectURL(document.getElementById('fileInput').files[0]);
            video.onloadedmetadata = () => { video.play(); loopPrevio(); };
        }
    }

    async function encenderCamara() {
        const stream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: currentFacingMode, width: { ideal: 1280 }, height: { ideal: 720 } } 
        });
        video.srcObject = stream;
        video.onloadedmetadata = () => { video.play(); loopPrevio(); };
    }

    function loopPrevio() { if(!iaActiva) { ajustarCanvas(); ctx.drawImage(video, 0, 0, canvas.width, canvas.height); requestAnimationFrame(loopPrevio); } }

    function ajustarCanvas() {
        const dpr = window.devicePixelRatio || 1;
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
    }

    function activarIA() {
        pose = new Pose({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}` });
        pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });
        pose.onResults(onResults);
        iaActiva = true;
        startTimeCalib = Date.now();
        loopIA();
    }

    async function loopIA() { if(iaActiva) { await pose.send({image: video}); requestAnimationFrame(loopIA); } }

    function onResults(res) {
        if (!res.poseLandmarks) return;
        ajustarCanvas();
        ctx.save();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(res.image, 0, 0, canvas.width, canvas.height);

        const lm = res.poseLandmarks;
        const w = canvas.width, h = canvas.height;
        const pt = (i) => ({ x: lm[i].x * w, y: lm[i].y * h, z: lm[i].z });

        const p = {
            cab: pt(0), cue: {x:(lm[11].x+lm[12].x)/2*w, y:(lm[11].y+lm[12].y)/2*h, z:(lm[11].z+lm[12].z)/2},
            trx: {x:(lm[11].x+lm[12].x)/2*w, y:(lm[11].y+lm[12].y)/2*h + 20},
            abd: {x:(lm[23].x+lm[24].x)/2*w, y:(lm[23].y+lm[24].y)/2*h - 20},
            eba: {x:(lm[23].x+lm[24].x)/2*w, y:(lm[23].y+lm[24].y)/2*h},
            h_d: pt(12), c_d: pt(14), m_d: pt(16), mano_d: pt(20),
            h_i: pt(11), c_i: pt(13), m_i: pt(15), mano_i: pt(19),
            r_d: pt(26), t_d: pt(28), pie_d: pt(32),
            r_i: pt(25), t_i: pt(27), pie_i: pt(31)
        };

        const currentAngles = {
            cue: calcAng3D(p.cab, p.cue, p.trx),
            abd: calcAng3D(p.trx, p.abd, p.eba),
            h_d: calcAng3D(p.trx, p.h_d, p.c_d),
            h_i: calcAng3D(p.trx, p.h_i, p.c_i),
            c_d: calcAng3D(p.h_d, p.c_d, p.m_d),
            c_i: calcAng3D(p.h_i, p.c_i, p.m_i),
            m_d: calcAng3D(p.c_d, p.m_d, p.mano_d),
            m_i: calcAng3D(p.c_i, p.m_i, p.mano_i),
            r_d: calcAng3D(p.eba, p.r_d, p.t_d),
            r_i: calcAng3D(p.eba, p.r_i, p.t_i),
            t_d: calcAng3D(p.r_d, p.t_d, p.pie_d),
            t_i: calcAng3D(p.r_i, p.t_i, p.pie_i)
        };

        // Filtro de Suavizado (Buffer de 5 frames)
        for(let key in currentAngles) {
            if(!angleBuffer[key]) angleBuffer[key] = [];
            angleBuffer[key].push(currentAngles[key]);
            if(angleBuffer[key].length > 5) angleBuffer[key].shift();
        }

        if (!calibrado) {
            let t = Date.now() - startTimeCalib;
            if (t > 4000) { baseAngles = {...currentAngles}; calibrado = true; }
            else { txtStatus.innerText = `CALIBRANDO... ${Math.ceil((4000-t)/1000)}s`; }
        }

        const drawSeg = (p1, p2, angKey, groupKey) => {
            const avgAngle = angleBuffer[angKey].reduce((a,b)=>a+b, 0) / angleBuffer[angKey].length;
            ctx.lineWidth = 6; ctx.lineCap = "round"; ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y);
            
            if (analizandoRiesgo && calibrado) {
                const diff = Math.abs(avgAngle - baseAngles[angKey]);
                const t = TH[groupKey];
                ctx.strokeStyle = diff > (t*2) ? "#ff3838" : (diff > t ? "#fffa65" : "#32ff7e");
            } else { ctx.strokeStyle = calibrado ? "#32ff7e" : "#4b4b4b"; }
            ctx.stroke();
        };

        // Renderizado según Diagrama de Jerarquía
        drawSeg(p.cab, p.cue, 'cue', 'cuello');
        drawSeg(p.cue, p.trx, 'abd', 'tronco');
        drawSeg(p.trx, p.abd, 'abd', 'tronco');
        drawSeg(p.abd, p.eba, 'abd', 'tronco');
        // Miembros... (se repite la lógica de dibujo para cada segmento)
        drawSeg(p.trx, p.h_d, 'h_d', 'hombros'); drawSeg(p.h_d, p.c_d, 'h_d', 'hombros'); 
        drawSeg(p.c_d, p.m_d, 'c_d', 'codos'); drawSeg(p.m_d, p.mano_d, 'm_d', 'munecas');
        drawSeg(p.trx, p.h_i, 'h_i', 'hombros'); drawSeg(p.h_i, p.c_i, 'h_i', 'hombros'); 
        drawSeg(p.c_i, p.m_i, 'c_i', 'codos'); drawSeg(p.m_i, p.mano_i, 'm_i', 'munecas');
        drawSeg(p.eba, p.r_d, 'r_d', 'piernas'); drawSeg(p.r_d, p.t_d, 'r_d', 'piernas'); drawSeg(p.t_d, p.pie_d, 't_d', 'pies');
        drawSeg(p.eba, p.r_i, 'r_i', 'piernas'); drawSeg(p.r_i, p.t_i, 'r_i', 'piernas'); drawSeg(p.t_i, p.pie_i, 't_i', 'pies');

        ctx.restore();
    }

    function calcAng3D(a,b,c) {
        const v1={x:a.x-b.x, y:a.y-b.y, z:a.z-b.z}, v2={x:c.x-b.x, y:c.y-b.y, z:c.z-b.z};
        const dot = v1.x*v2.x + v1.y*v2.y + v1.z*v2.z;
        const m1 = Math.sqrt(v1.x**2 + v1.y**2 + v1.z**2), m2 = Math.sqrt(v2.x**2 + v2.y**2 + v2.z**2);
        return (m1*m2===0) ? 0 : Math.acos(Math.max(-1, Math.min(1, dot/(m1*m2))))*(180/Math.PI);
    }

    function toggleGrabacion() {
        if (!calibrado) return;
        analizandoRiesgo = !analizandoRiesgo;
        document.getElementById('recordBtn').classList.toggle('rec-active', analizandoRiesgo);
        
        if (analizandoRiesgo) {
            recordedChunks = [];
            const types = ['video/webm', 'video/mp4', 'video/quicktime'];
            const supportedType = types.find(t => MediaRecorder.isTypeSupported(t));
            mediaRecorder = new MediaRecorder(canvas.captureStream(30), { mimeType: supportedType });
            mediaRecorder.ondataavailable = (e) => recordedChunks.push(e.data);
            mediaRecorder.onstop = () => {
                const a = document.createElement('a');
                a.href = URL.createObjectURL(new Blob(recordedChunks, {type: supportedType}));
                a.download = `LYA_AUDIT_${Date.now()}.${supportedType.split('/')[1]}`;
                a.click();
            };
            mediaRecorder.start();
            txtStatus.innerText = "CAPTALIZANDO RIESGOS...";
        } else { mediaRecorder.stop(); txtStatus.innerText = "SISTEMA LISTO"; }
    }

    async function cambiarCamara() {
        currentFacingMode = (currentFacingMode === "environment") ? "user" : "environment";
        iaActiva = false;
        if(video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
        await encenderCamara();
    }
</script>
</body>
</html>
