PRIMERO LUNES
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LYA-ERGO v21.0 | NOM-036 COMPLIANCE</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body { background-color: #0d1117; color: white; margin: 0; font-family: 'Segoe UI', sans-serif; }
        #menu-inicial { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background: radial-gradient(circle, #161b22 0%, #0d1117 100%); padding: 20px; }
        .config-card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 25px; width: 100%; max-width: 450px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .form-label-custom { color: #8b949e; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; margin-bottom: 5px; display: block; }
        .input-custom { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #30363d; background: #0d1117; color: white; margin-bottom: 15px; }
        .btn-start { width: 100%; padding: 15px; border-radius: 8px; border: none; font-weight: bold; background: #238636; color: white; transition: 0.3s; }
        .btn-start:hover { background: #2ea043; }
        #contenedor-analisis { display: none; position: relative; width: 100vw; height: 100vh; background: #000; }
        canvas { width: 100%; height: 100%; object-fit: contain; }
        .hud-top { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 8px; border-left: 4px solid #00ff00; font-size: 11px; z-index: 100; }
    </style>
</head>
<body>

<div id="menu-inicial">
    <h2 style="color:#00ff00; font-weight: 800; letter-spacing: 2px;">LYA-ERGO v21</h2>
    <p style="color:#8b949e; margin-bottom: 30px;">SISTEMA DE CUMPLIMIENTO NOM-036-STPS</p>

    <div class="config-card">
        <label class="form-label-custom">PUESTO / ACTIVIDAD</label>
        <input type="text" id="puesto" class="input-custom" placeholder="Ej: Estibador Línea 2">

        <div class="row">
            <div class="col-6">
                <label class="form-label-custom">GÉNERO</label>
                <select id="genero" class="input-custom">
                    <option value="H">Hombre</option>
                    <option value="M">Mujer</option>
                </select>
            </div>
            <div class="col-6">
                <label class="form-label-custom">EDAD</label>
                <input type="number" id="edad" class="input-custom" value="25">
            </div>
        </div>

        <label class="form-label-custom">PESO DE CARGA (KG)</label>
        <input type="number" id="peso" class="input-custom" value="10">

        <label class="form-label-custom">TIPO DE ACTIVIDAD</label>
        <select id="tipoActividad" class="input-custom">
            <option value="levantar">Levantar / Bajar</option>
            <option value="transportar">Transportar</option>
            <option value="empujar">Empujar / Jalar</option>
        </select>

        <button class="btn-start" onclick="iniciarEvaluacion()">INICIAR AUDITORÍA IA</button>
    </div>
</div>

<div id="contenedor-analisis">
    <div class="hud-top" id="hud">SISTEMA INICIALIZANDO...</div>
    <canvas id="output_canvas"></canvas>
    <video id="input_video" style="display:none" playsinline muted></video>
    
    <div style="position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: center; gap: 15px;">
        <button id="btnAction" class="btn btn-danger btn-lg rounded-pill px-5" onclick="toggleAuditoria()">RECORD</button>
    </div>
</div>

<script>
    // Configuración Biomecánica y NOM
    const video = document.getElementById('input_video');
    const canvas = document.getElementById('output_canvas');
    const ctx = canvas.getContext('2d');
    let pose;
    let evalActiva = false;
    let analizando = false;

    let sessionData = {
        startTime: null,
        ciclos: 0,
        lastY: null,
        zonasRiesgo: new Set(),
        framesRiesgo: 0,
        totalFrames: 0,
        evidenciaImg: null
    };

    function iniciarEvaluacion() {
        document.getElementById('menu-inicial').style.display = 'none';
        document.getElementById('contenedor-analisis').style.display = 'block';
        startCamera();
    }

    async function startCamera() {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        video.srcObject = stream;
        video.onloadedmetadata = () => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            video.play();
            loadAI();
        };
    }

    function loadAI() {
        pose = new Pose({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}` });
        pose.setOptions({ modelComplexity: 1, minDetectionConfidence: 0.6 });
        pose.onResults(onResults);
        
        async function frameLoop() {
            await pose.send({image: video});
            requestAnimationFrame(frameLoop);
        }
        frameLoop();
    }

    function onResults(res) {
        if (!res.poseLandmarks) return;
        ctx.save();
        ctx.clearRect(0,0, canvas.width, canvas.height);
        ctx.drawImage(res.image, 0, 0, canvas.width, canvas.height);

        if (analizando) {
            sessionData.totalFrames++;
            detectarMovimiento(res.poseLandmarks);
            evaluarPostura(res.poseLandmarks);
            actualizarHUD();
        }
        ctx.restore();
    }

    function detectarMovimiento(lm) {
        const handY = (lm[15].y + lm[16].y) / 2;
        if (sessionData.lastY && (sessionData.lastY - handY) > 0.12) {
            sessionData.ciclos++;
        }
        sessionData.lastY = handY;
    }

    function evaluarPostura(lm) {
        // Ejemplo: Ángulo de tronco (NOM-036: Inclinación > 20°)
        const hip = lm[24].y;
        const shoulder = lm[12].y;
        if (Math.abs(hip - shoulder) < 0.2) { // Inclinación detectada
            sessionData.framesRiesgo++;
            sessionData.zonasRiesgo.add("Espalda/Tronco");
            if(!sessionData.evidenciaImg) sessionData.evidenciaImg = canvas.toDataURL('image/jpeg');
        }
    }

    function actualizarHUD() {
        const duracion = (Date.now() - sessionData.startTime) / 1000;
        document.getElementById('hud').innerHTML = `
            AUDITANDO NOM-036<br>
            TIEMPO: ${duracion.toFixed(1)}s | CICLOS: ${sessionData.ciclos}<br>
            ESTADO: ${sessionData.framesRiesgo > 10 ? '⚠️ RIESGO DETECTADO' : '✅ NORMAL'}
        `;
    }

    function toggleAuditoria() {
        const btn = document.getElementById('btnAction');
        if (!analizando) {
            analizando = true;
            sessionData.startTime = Date.now();
            btn.innerHTML = "STOP & REPORT";
            btn.className = "btn btn-warning btn-lg rounded-pill px-5";
        } else {
            analizando = false;
            generarReporteLegal();
            btn.innerHTML = "PROCESANDO...";
        }
    }

    function generarReporteLegal() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        // --- VARIABLES NOM-036 ---
        const g = document.getElementById('genero').value;
        const e = parseInt(document.getElementById('edad').value);
        const p = parseFloat(document.getElementById('peso').value);
        const duracionMin = (Date.now() - sessionData.startTime) / 60000;
        const frecuencia = (sessionData.ciclos / duracionMin).toFixed(2);
        const masaAcumulada = (frecuencia * p * 480).toFixed(0); // Jornada 8h
        
        // Validación de Peso Máximo (TABLA CRÍTICA)
        let limite = g === 'H' ? 25 : 20;
        if (e > 45) limite = 15;
        const estatusPeso = p <= limite ? 'ACEPTABLE' : 'ALTO RIESGO';

        // --- DISEÑO DEL REPORTE (Nivel 3: Informe Técnico) ---
        doc.setFillColor(33, 37, 41);
        doc.rect(0, 0, 210, 30, 'F');
        doc.setTextColor(0, 255, 0);
        doc.setFontSize(20);
        doc.text("INFORME ERGONÓMICO NOM-036-STPS", 105, 20, { align: "center" });

        doc.setTextColor(0,0,0);
        doc.setFontSize(10);
        doc.text(`1. IDENTIFICACIÓN`, 15, 45);
        doc.text(`PUESTO: ${document.getElementById('puesto').value}`, 15, 52);
        doc.text(`ACTIVIDAD: ${document.getElementById('tipoActividad').value}`, 15, 59);
        doc.text(`PERSONAL: ${g === 'H' ? 'Masculino' : 'Femenino'} (${e} años)`, 15, 66);

        doc.autoTable({
            startY: 75,
            head: [['VARIABLE', 'VALOR DETECTADO', 'LÍMITE NOM', 'ESTATUS']],
            body: [
                ['Peso de Carga', `${p} kg`, `${limite} kg`, estatusPeso],
                ['Frecuencia', `${frecuencia} lev/min`, '5.00 lev/min', frecuencia > 5 ? 'RIESGO' : 'ACEPTABLE'],
                ['Masa Acumulada', `${masaAcumulada} kg/jornada`, '10,000 kg', masaAcumulada > 10000 ? 'ALTO RIESGO' : 'ACEPTABLE'],
                ['Postura Crítica', sessionData.zonasRiesgo.size > 0 ? 'SI' : 'NO', 'NO GIROS/FLEX', sessionData.zonasRiesgo.size > 0 ? 'CORREGIR' : 'OK']
            ],
            theme: 'grid',
            headStyles: { fillColor: [0, 120, 215] }
        });

        // --- MATRIZ DE RIESGO ---
        const finalY = doc.lastAutoTable.finalY + 15;
        doc.setFont(undefined, 'bold');
        doc.text("2. EVALUACIÓN Y NIVEL DE RIESGO (APÉNDICE I)", 15, finalY);
        
        let nivelRiesgo = "BAJO";
        let colorRiesgo = [46, 204, 113];
        if (estatusPeso === 'ALTO RIESGO' || frecuencia > 8) {
            nivelRiesgo = "MUY ALTO (CORRECCIÓN INMEDIATA)";
            colorRiesgo = [231, 76, 60];
        }

        doc.setFillColor(...colorRiesgo);
        doc.rect(15, finalY + 5, 180, 10, 'F');
        doc.setTextColor(255, 255, 255);
        doc.text(`RESULTADO: ${nivelRiesgo}`, 105, finalY + 12, { align: "center" });

        // --- MEDIDAS DE CONTROL (Nivel 3) ---
        doc.setTextColor(0,0,0);
        doc.text("3. MEDIDAS DE CONTROL RECOMENDADAS", 15, finalY + 30);
        doc.setFont(undefined, 'normal');
        const recomendaciones = p > limite ? ["Reducción de peso de carga", "Uso de ayudas mecánicas (patines/diablos)"] : ["Rotación de personal", "Capacitación en higiene postural"];
        recomendaciones.forEach((r, i) => doc.text(`- ${r}`, 20, finalY + 40 + (i * 7)));

        // Evidencia Visual
        if (sessionData.evidenciaImg) {
            doc.addPage();
            doc.text("EVIDENCIA TÉCNICA (CAPTURADA POR IA)", 15, 20);
            doc.addImage(sessionData.evidenciaImg, 'JPEG', 15, 30, 180, 100);
        }

        doc.save(`NOM036_${document.getElementById('puesto').value}.pdf`);
        location.reload();
    }
</script>
</body>
</html>
