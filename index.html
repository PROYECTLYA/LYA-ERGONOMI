            background-position: center center;
            background-repeat: no-repeat;

        /* DISEÑO DE TEXTOS Y LOGO */
        .logo-text { 
            color: #00ff00; 
            font-weight: 900; 
            letter-spacing: 5px; 
            margin-bottom: 5px; 
            text-shadow: 0 0 25px rgba(0,255,0,0.8); 
            font-size: 3.5rem; 
        }
        .sub-text { 
            color: #ffffff; 
            font-size: 1.1rem; 
            text-transform: uppercase; 
            letter-spacing: 4px; 
            margin-bottom: 50px; 
            font-weight: 700; 
            background: rgba(0,0,0,0.5); 
            padding: 8px 20px; 
            border-radius: 8px; 
            border-left: 4px solid #00ff00;
        }
        
        /* BOTONES MODERNOS (Efecto Cristal) */
        .btn-inicio { 
            width: 85%; 
            max-width: 340px; 
            padding: 20px; 
            margin: 12px; 
            border-radius: 18px; 
            font-weight: bold; 
            border: 1px solid rgba(255,255,255,0.2); 
            font-size: 1.1rem; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            backdrop-filter: blur(12px);
            text-transform: uppercase;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .btn-cam { background: rgba(39, 174, 96, 0.7); color: white; }
        .btn-vid { background: rgba(41, 128, 185, 0.7); color: white; }
        .btn-inicio:hover { 
            transform: translateY(-5px) scale(1.02); 
            border-color: #00ff00; 
            box-shadow: 0 15px 40px rgba(0,255,0,0.2);
        }

        /* Pantalla de Carga */
        #loader-ia { 
            display: none; position: fixed; top:0; left:0; width:100%; height:100%; 
            background: #0d1117; z-index: 6000; 
            flex-direction: column; align-items: center; justify-content: center; 
        }
        .progress-container { width: 70%; height: 10px; background: #21262d; border-radius: 20px; margin-top: 25px; overflow: hidden; border: 1px solid #30363d; }
        .progress-bar { width: 0%; height: 100%; background: #00ff00; transition: 0.4s; box-shadow: 0 0 15px #00ff00; }

        /* Contenedor de análisis */
        #contenedor-analisis { display: none; width: 100vw; height: 100vh; position: relative; background: #000; }
        canvas { width: 100%; height: 100%; object-fit: contain; }
        video { display: none; }
        
        .barra-controles { position: absolute; bottom: 35px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; z-index: 4000; }
        .btn-circular { width: 70px; height: 70px; border-radius: 50%; border: none; font-size: 10px; font-weight: bold; color: white; display: flex; align-items: center; justify-content: center; flex-direction: column; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
    </style>

<body>

<div id="loader-ia">
    <h2 style="color:#00ff00; letter-spacing: 5px; font-weight: 900;">INICIANDO IA</h2>
    <div class="progress-container">
        <div id="bar-id" class="progress-bar"></div>
    </div>
    <p style="color:#8b949e; margin-top:20px;">Sincronizando con Safety Tuxtepec...</p>
</div>

<div id="menu-inicial">
    <h1 class="logo-text">LYA-ERGO</h1>
    <p class="sub-text">SAFETY TUXTEPEC</p>
    
    <button class="btn-inicio btn-cam" onclick="prepararSistema('camara')">🎥 INICIAR CÁMARA</button>
    <button class="btn-inicio btn-vid" onclick="document.getElementById('fileInput').click()">📁 SUBIR VIDEO</button>
    
    <input type="file" id="fileInput" hidden accept="video/*" onchange="prepararSistema('archivo')">
    
    <div style="position: absolute; bottom: 30px; text-align: center;">
        <p style="font-size: 0.75rem; opacity: 0.6; letter-spacing: 1px;">CERVECERÍA DEL TRÓPICO • v16.5</p>
    </div>
</div>

<div id="contenedor-analisis">
    <canvas id="output_canvas"></canvas>
    <video id="input_video" playsinline muted></video>
    <div class="barra-controles">
        <button class="btn-circular btn-dark" onclick="location.reload()">MENU</button>
        <button id="btn-calib" class="btn-circular" style="background:#f1c40f; color:#000;" onclick="activarIA()">⚖️<br>CALIB</button>
    </div>
</div>

<script>
    const video = document.getElementById('input_video');
    const canvas = document.getElementById('output_canvas');
    const ctx = canvas.getContext('2d');
    const loader = document.getElementById('loader-ia');
    const progressBar = document.getElementById('bar-id');
    
    let pose = null, iaActiva = false;

    async function prepararSistema(fuente) {
        document.getElementById('menu-inicial').style.display = 'none';
        document.getElementById('contenedor-analisis').style.display = 'block';
        if (fuente === 'camara') {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } } 
                });
                video.srcObject = stream;
                video.onloadedmetadata = () => { video.play(); requestAnimationFrame(loopPre); };
            } catch (err) {
                alert("Error al acceder a la cámara: " + err);
                location.reload();
            }
        }
        // Lógica para archivo de video
        if (fuente === 'archivo') {
            const file = document.getElementById('fileInput').files[0];
            if (file) {
                video.src = URL.createObjectURL(file);
                video.onloadedmetadata = () => { video.play(); requestAnimationFrame(loopPre); };
            }
        }
    }

    function loopPre() {
        if (!video.paused && !iaActiva) {
            canvas.width = video.videoWidth; 
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            requestAnimationFrame(loopPre);
        }
    }

    function activarIA() {
        loader.style.display = 'flex';
        let p = 0;
        const inv = setInterval(() => { 
            p += 5; 
            progressBar.style.width = p + '%'; 
            if(p >= 100) clearInterval(inv); 
        }, 50);
        
        setTimeout(() => {
            pose = new Pose({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}` });
            pose.setOptions({ modelComplexity: 1, smoothLandmarks: true });
            pose.onResults((res) => {
                ctx.save();
                ctx.clearRect(0,0,canvas.width,canvas.height);
                ctx.drawImage(res.image, 0,0,canvas.width,canvas.height);
                // Aquí irían tus cálculos vectoriales existentes...
                ctx.restore();
            });
            setTimeout(() => { 
                loader.style.display = 'none'; 
                iaActiva = true; 
                runIA(); 
            }, 1500);
        }, 200);
    }

    async function runIA() { 
        if(iaActiva) { 
            await pose.send({image: video}); 
            requestAnimationFrame(runIA); 
        } 
    }
</script>
</body>
</html>
