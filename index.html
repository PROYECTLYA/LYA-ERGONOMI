<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ERGO-SENSING PRO v12.0</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0d1117; color: white; margin: 0; overflow: hidden; font-family: sans-serif; }
        #menu-inicial { display: flex; width: 100%; height: 100vh; flex-direction: column; align-items: center; justify-content: center; background: #0d1117; position: fixed; z-index: 5000; }
        .btn-inicio { width: 85%; max-width: 320px; padding: 18px; margin: 10px; border-radius: 12px; font-weight: bold; border: none; font-size: 1.1rem; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        #contenedor-analisis { display: none; width: 100vw; height: 100vh; position: relative; background: #000; }
        canvas { width: 100%; height: 100%; object-fit: contain; }
        video { display: none; }
        .status-badge { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.85); color: #fff; padding: 12px 18px; border-radius: 10px; border-left: 5px solid #00ff00; font-size: 12px; z-index: 3000; }
        .barra-controles { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 12px; z-index: 4000; width: 95%; justify-content: center; }
        .btn-circular { width: 65px; height: 65px; border-radius: 50%; border: none; font-size: 10px; font-weight: bold; color: white; display: flex; align-items: center; justify-content: center; flex-direction: column; text-align: center; }
        .rec-active { background: #fff !important; color: #f00 !important; border: 2px solid #f00 !important; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

<div id="menu-inicial">
    <h1 style="color: #00ff00; margin-bottom: 5px;">LYA - ERGO</h1>
    <p style="color: #8b949e; margin-bottom: 30px; font-size: 0.9rem;">v12.0 - Jerarquía Completa</p>
    <button class="btn-inicio" style="background:#27ae60; color:white;" onclick="prepararSistema('camara')">🎥 USAR CÁMARA</button>
    <button class="btn-inicio" style="background:#2980b9; color:white;" onclick="document.getElementById('fileInput').click()">📁 SUBIR VIDEO</button>
    <input type="file" id="fileInput" hidden accept="video/*" onchange="prepararSistema('archivo')">
</div>

<div id="contenedor-analisis">
    <div class="status-badge" id="txt-status">PASO 1: POSICIONE AL SUJETO</div>
    <canvas id="output_canvas"></canvas>
    <video id="input_video" playsinline muted></video>
    <div class="barra-controles">
        <button class="btn-circular btn-dark" onclick="location.reload()">MENÚ</button>
        <button class="btn-circular" style="background:#00d2d3; color:#000;" onclick="cambiarCamara()">🔄<br>CAM</button>
        <button id="btn-calib" class="btn-circular" style="background:#f1c40f; color:#000;" onclick="activarIA()">⚖️<br>CALIB</button>
        <button id="recordBtn" class="btn-circular" style="background:#ff4d4d; opacity: 0.3;" onclick="toggleGrabacion()">🔴<br>REC</button>
    </div>
</div>

<script>
    const video = document.getElementById('input_video');
    const canvas = document.getElementById('output_canvas');
    const ctx = canvas.getContext('2d');
    const txtStatus = document.getElementById('txt-status');
    
    let pose = null, streamActual = null, currentFacingMode = "environment";
    let iaActiva = false, calibrado = false, analizandoRiesgo = false;
    let startTimeCalib = 0, baseAngles = {};

    // Umbrales por zona según ergonomía industrial
    const TH = { 
        tronco: { amar: 20, rojo: 40 },
        cuello: { amar: 15, rojo: 25 },
        brazos: { amar: 30, rojo: 60 },
        piernas: { amar: 25, rojo: 45 }
    };

    async function prepararSistema(fuente) {
        document.getElementById('menu-inicial').style.display = 'none';
        document.getElementById('contenedor-analisis').style.display = 'block';
        if (fuente === 'camara') await encenderCamara();
        else {
            const file = document.getElementById('fileInput').files[0];
            if (file) { video.src = URL.createObjectURL(file); video.onloadedmetadata = () => { video.play(); requestAnimationFrame(loopVideoSimple); }; }
        }
    }

    async function encenderCamara() {
        try {
            if (streamActual) streamActual.getTracks().forEach(t => t.stop());
            streamActual = await navigator.mediaDevices.getUserMedia({ video: { facingMode: currentFacingMode, width: 1280, height: 720 } });
            video.srcObject = streamActual;
            video.onloadedmetadata = () => { video.play(); requestAnimationFrame(loopVideoSimple); };
        } catch (e) { alert("Error de hardware"); location.reload(); }
    }

    function loopVideoSimple() {
        if (!video.paused && !iaActiva) {
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            requestAnimationFrame(loopVideoSimple);
        }
    }

    function activarIA() {
        if (iaActiva) return;
        txtStatus.innerText = "CARGANDO IA...";
        setTimeout(() => {
            pose = new Pose({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}` });
            pose.setOptions({ modelComplexity: 1, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });
            pose.onResults(onResults);
            iaActiva = true; startTimeCalib = Date.now(); requestAnimationFrame(loopIA);
        }, 300);
    }

    async function loopIA() { if (!video.paused && iaActiva) { await pose.send({image: video}); requestAnimationFrame(loopIA); } }

    function onResults(res) {
        if (!res.poseLandmarks) return;
        ctx.save();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (currentFacingMode === "user") { ctx.translate(canvas.width, 0); ctx.scale(-1, 1); }
        ctx.drawImage(res.image, 0, 0, canvas.width, canvas.height);

        const lm = res.poseLandmarks;
        const w = canvas.width, h = canvas.height;
        
        // --- MAPEADO SEGÚN ESQUEMA ---
        const pt = (i) => ({ x: lm[i].x * w, y: lm[i].y * h });
        
        // Tronco y Cabeza
        const cabeza = pt(0);
        const cuello = { x: (lm[11].x + lm[12].x)/2 * w, y: (lm[11].y + lm[12].y)/2 * h };
        const torax = { x: cuello.x, y: (cuello.y + (lm[23].y + lm[24].y)/2 * h) / 2 };
        const abdomen = { x: (lm[23].x + lm[24].x)/2 * w, y: (lm[23].y + lm[24].y)/2 * h };
        const espalda_baja = abdomen;

        // Cálculos de ángulos actuales para calibración/semaforización
        const angles = {
            c_c: calcAng(cabeza, cuello, torax),
            t_a: calcAng(cuello, torax, abdomen),
            // Brazos
            b_d: calcAng(pt(12), pt(14), pt(16)), // Codo derecho
            b_i: calcAng(pt(11), pt(13), pt(15)), // Codo izquierdo
            // Piernas
            p_d: calcAng(pt(24), pt(26), pt(28)), // Rodilla derecha
            p_i: calcAng(pt(23), pt(25), pt(27))  // Rodilla izquierda
        };

        if (!calibrado) {
            const segs = Math.max(0, Math.ceil((5000 - (Date.now() - startTimeCalib)) / 1000));
            txtStatus.innerText = `CALIBRANDO: ${segs}s`;
            if (Date.now() - startTimeCalib > 5000) {
                baseAngles = {...angles};
                calibrado = true;
                txtStatus.innerText = "CALIBRACIÓN OK. LISTO.";
                document.getElementById('recordBtn').style.opacity = "1";
            }
        }

        // --- FUNCIÓN DE DIBUJO INDEPENDIENTE ---
        const drawS = (p1, p2, key, thresholdKey) => {
            ctx.lineWidth = 5; ctx.lineCap = "round"; ctx.beginPath();
            ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y);
            
            if (analizandoRiesgo && calibrado) {
                const diff = Math.abs(angles[key] - baseAngles[key]);
                const t = TH[thresholdKey];
                ctx.strokeStyle = diff > t.rojo ? "#f00" : diff > t.amar ? "#ff0" : "#0f0";
            } else {
                ctx.strokeStyle = calibrado ? "#0f0" : "#888";
            }
            ctx.stroke();
        };

        // --- RENDERIZADO SEGÚN JERARQUÍA DEL ESQUEMA ---
        // Eje Central
        drawS(cabeza, cuello, 'c_c', 'cuello');
        drawS(cuello, torax, 't_a', 'tronco');
        drawS(torax, abdomen, 't_a', 'tronco');

        // Tren Superior Derecho
        drawS(cuello, pt(12), 't_a', 'tronco'); // Hombro D
        drawS(pt(12), pt(14), 'b_d', 'brazos'); // Brazo D
        drawS(pt(14), pt(16), 'b_d', 'brazos'); // Antebrazo D

        // Tren Superior Izquierdo
        drawS(cuello, pt(11), 't_a', 'tronco'); // Hombro I
        drawS(pt(11), pt(13), 'b_i', 'brazos'); // Brazo I
        drawS(pt(13), pt(15), 'b_i', 'brazos'); // Antebrazo I

        // Tren Inferior (Desde Espalda Baja / Abdomen)
        drawS(espalda_baja, pt(24), 'p_d', 'piernas'); // Pierna D
        drawS(pt(24), pt(26), 'p_d', 'piernas');      // Rodilla D
        drawS(pt(26), pt(28), 'p_d', 'piernas');      // Tobillo D

        drawS(espalda_baja, pt(23), 'p_i', 'piernas'); // Pierna I
        drawS(pt(23), pt(25), 'p_i', 'piernas');      // Rodilla I
        drawS(pt(25), pt(27), 'p_i', 'piernas');      // Tobillo I

        ctx.restore();
    }

    function calcAng(p1, p2, p3) {
        const v1 = { x: p1.x - p2.x, y: p1.y - p2.y };
        const v2 = { x: p3.x - p2.x, y: p3.y - p2.y };
        const dot = v1.x * v2.x + v1.y * v2.y;
        const m1 = Math.sqrt(v1.x**2 + v1.y**2), m2 = Math.sqrt(v2.x**2 + v2.y**2);
        return Math.acos(Math.max(-1, Math.min(1, dot/(m1*m2+1e-6)))) * (180/Math.PI);
    }

    async function cambiarCamara() {
        currentFacingMode = (currentFacingMode === "environment") ? "user" : "environment";
        iaActiva = false; calibrado = false;
        await encenderCamara();
    }

    function toggleGrabacion() {
        if (!calibrado) return;
        analizandoRiesgo = !analizandoRiesgo;
        const btn = document.getElementById('recordBtn');
        btn.classList.toggle('rec-active', analizandoRiesgo);
        txtStatus.innerText = analizandoRiesgo ? "GRABANDO Y EVALUANDO RIESGO..." : "ANÁLISIS PAUSADO.";
    }
</script>
</body>
</html>
