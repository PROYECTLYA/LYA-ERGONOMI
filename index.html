<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ERGO-SENSING PRO v3.1</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0d1117; color: white; font-family: 'Segoe UI', sans-serif; height: 100vh; margin: 0; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        
        #menu-inicial { text-align: center; background: #161b22; padding: 40px; border-radius: 20px; border: 1px solid #30363d; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 1000; }
        .btn-menu { width: 280px; padding: 15px; margin: 10px; font-weight: bold; border-radius: 10px; transition: 0.3s; }

        #contenedor-analisis { display: none; position: relative; width: 100vw; height: 100vh; background: #000; }
        canvas { width: 100%; height: 100%; object-fit: contain; }
        video { display: none; }

        .status-badge { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.8); padding: 8px 15px; border-radius: 5px; border-left: 5px solid #00ff00; font-size: 0.8rem; z-index: 100; }
        .controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: center; gap: 10px; z-index: 100; flex-wrap: wrap; padding: 0 10px; }
        .btn-ergo { padding: 10px 15px; border-radius: 50px; font-weight: bold; border: none; font-size: 0.9rem; }
        .btn-record { background: #eb4034; color: white; min-width: 140px; }
        .btn-record.recording { animation: pulse 1.5s infinite; background: #fff; color: #000; }
        
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(0.95); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

<div id="menu-inicial">
    <h2 class="text-info mb-4">ERGO-SENSING AI</h2>
    <button class="btn btn-success btn-menu" onclick="seleccionarFuente('camara')">1. EVALUACIÓN EN VIVO</button>
    <br>
    <button class="btn btn-primary btn-menu" onclick="document.getElementById('fileInput').click()">2. CARGAR VIDEO</button>
    <input type="file" id="fileInput" hidden accept="video/*" onchange="seleccionarFuente('archivo')">
</div>

<div id="contenedor-analisis">
    <div class="status-badge" id="status">INICIALIZANDO...</div>
    <canvas id="output_canvas"></canvas>
    <video id="input_video" playsinline muted></video>

    <div class="controls">
        <button class="btn btn-secondary btn-ergo" onclick="regresarMenu()">⬅ Menú</button>
        <button class="btn btn-info btn-ergo" id="btn-flip" onclick="cambiarCamara()">🔄 Girar</button>
        <button class="btn btn-warning btn-ergo" onclick="iniciarCalibracion()">⚖️ Calibrar</button>
        <button id="recordBtn" class="btn-record btn-ergo" onclick="toggleGrabacion()">🔴 Grabar</button>
    </div>
</div>

<script>
    const menu = document.getElementById('menu-inicial');
    const app = document.getElementById('contenedor-analisis');
    const video = document.getElementById('input_video');
    const canvas = document.getElementById('output_canvas');
    const ctx = canvas.getContext('2d');
    const status = document.getElementById('status');

    let currentFacingMode = "environment"; // Por defecto trasera para inspección
    let camera = null;
    let history = {};
    let offsets = {};
    let isCalibrating = false;
    let calibStart = 0;
    let calibBuffer = {};

    const THRESHOLDS = { 'tronco': { y: 20, r: 40 }, 'ext': { y: 30, r: 55 }, 'head': { y: 15, r: 25 } };

    // --- BIOMECÁNICA ---
    function filterPoint(id, p) {
        if (!history[id]) history[id] = [];
        history[id].push(p);
        if (history[id].length > 8) history[id].shift();
        return {
            x: history[id].reduce((a, b) => a + b.x, 0) / history[id].length,
            y: history[id].reduce((a, b) => a + b.y, 0) / history[id].length,
            z: history[id].reduce((a, b) => a + b.z, 0) / history[id].length
        };
    }

    function calcAngle3D(a, b, c) {
        const ba = { x: a.x-b.x, y: a.y-b.y, z: a.z-b.z }, bc = { x: c.x-b.x, y: c.y-b.y, z: c.z-b.z };
        const dot = ba.x*bc.x + ba.y*bc.y + ba.z*bc.z;
        const magA = Math.sqrt(ba.x**2 + ba.y**2 + ba.z**2), magB = Math.sqrt(bc.x**2 + bc.y**2 + bc.z**2);
        return Math.acos(Math.max(-1, Math.min(1, dot/(magA*magB)))) * (180/Math.PI);
    }

    const pose = new Pose({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}` });
    pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });

    pose.onResults((res) => {
        ctx.save();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Efecto espejo solo si es cámara frontal
        if (currentFacingMode === "user") {
            ctx.translate(canvas.width, 0);
            ctx.scale(-1, 1);
        }
        
        ctx.drawImage(res.image, 0, 0, canvas.width, canvas.height);

        if (res.poseLandmarks) {
            const lm = res.poseLandmarks.map((p, i) => filterPoint(i, p));
            const w = canvas.width, h = canvas.height;
            const h_med = { x: (lm[11].x + lm[12].x)/2, y: (lm[11].y + lm[12].y)/2, z: (lm[11].z + lm[12].z)/2 };
            const c_med = { x: (lm[23].x + lm[24].x)/2, y: (lm[23].y + lm[24].y)/2, z: (lm[23].z + lm[24].z)/2 };
            const v_down = { x: c_med.x, y: c_med.y + 0.5, z: c_med.z };

            const angs = {
                head: calcAngle3D(lm[0], h_med, c_med),
                tronco: calcAngle3D(h_med, c_med, v_down),
                arm_r: calcAngle3D(lm[12], lm[14], lm[16]),
                arm_l: calcAngle3D(lm[11], lm[13], lm[15])
            };

            if (isCalibrating) {
                const elapsed = Date.now() - calibStart;
                status.innerText = `CALIBRANDO: ${Math.ceil((5000-elapsed)/1000)}s`;
                if (elapsed >= 5000) { isCalibrating = false; status.innerText = "LISTO"; }
            }

            const draw = (p1, p2, color) => {
                ctx.beginPath(); ctx.moveTo(p1.x*w, p1.y*h); ctx.lineTo(p2.x*w, p2.y*h);
                ctx.strokeStyle = color; ctx.lineWidth = 5; ctx.stroke();
            };

            draw(lm[0], h_med, "#00ff00");
            draw(h_med, c_med, "#00ff00");
            draw(lm[12], lm[14], "#3498db"); draw(lm[14], lm[16], "#3498db");
            draw(lm[11], lm[13], "#3498db"); draw(lm[13], lm[15], "#3498db");
        }
        ctx.restore();
    });

    // --- CAMBIO DE CÁMARA ---
    async function seleccionarFuente(tipo) {
        menu.style.display = 'none';
        app.style.display = 'block';
        if (tipo === 'camara') {
            await encenderCamara();
            document.getElementById('btn-flip').style.display = 'inline-block';
        } else {
            const file = document.getElementById('fileInput').files[0];
            video.src = URL.createObjectURL(file);
            video.play();
            document.getElementById('btn-flip').style.display = 'none';
            requestAnimationFrame(function loop() { pose.send({image: video}); requestAnimationFrame(loop); });
        }
    }

    async function encenderCamara() {
        if (camera) await camera.stop();
        camera = new Camera(video, {
            onFrame: async () => {
                canvas.width = video.videoWidth; canvas.height = video.videoHeight;
                await pose.send({image: video});
            },
            facingMode: currentFacingMode,
            width: 1280, height: 720
        });
        status.innerText = currentFacingMode === "user" ? "CÁMARA FRONTAL" : "CÁMARA TRASERA";
        return camera.start();
    }

    function cambiarCamara() {
        currentFacingMode = currentFacingMode === "user" ? "environment" : "user";
        encenderCamara();
    }

    // --- GRABACIÓN ---
    let recorder; let chunks = [];
    function toggleGrabacion() {
        const btn = document.getElementById('recordBtn');
        if (!recorder || recorder.state === "inactive") {
            chunks = [];
            recorder = new MediaRecorder(canvas.captureStream(30), { mimeType: 'video/webm' });
            recorder.ondataavailable = (e) => chunks.push(e.data);
            recorder.onstop = () => {
                const a = document.createElement('a');
                a.href = URL.createObjectURL(new Blob(chunks, { type: 'video/webm' }));
                a.download = `ERGO_${Date.now()}.webm`; a.click();
            };
            recorder.start();
            btn.innerText = "⏹ Detener"; btn.classList.add('recording');
        } else {
            recorder.stop();
            btn.innerText = "🔴 Grabar"; btn.classList.remove('recording');
        }
    }

    function iniciarCalibracion() { isCalibrating = true; calibStart = Date.now(); }
    function regresarMenu() { location.reload(); }
</script>
</body>
</html>
