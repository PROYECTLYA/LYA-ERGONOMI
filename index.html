<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ERGO-SENSING PRO v6.5</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0d1117; color: white; margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        
        #menu-inicial { 
            display: flex; width: 100%; height: 100vh; 
            flex-direction: column; align-items: center; justify-content: center; 
            background: #0d1117; position: fixed; z-index: 5000; 
        }
        .btn-menu { width: 85%; max-width: 320px; padding: 18px; margin: 10px; border-radius: 12px; font-weight: bold; border: none; transition: 0.3s; }
        .btn-cam { background: #27ae60; color: white; }
        .btn-vid { background: #2980b9; color: white; }

        #contenedor-analisis { display: none; width: 100vw; height: 100vh; position: relative; background: #000; }
        canvas { width: 100%; height: 100%; object-fit: contain; }
        video { display: none; }

        /* HUD de Estado */
        .status-badge { 
            position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.85); 
            color: #00ff00; padding: 12px 18px; border-radius: 10px; 
            border-left: 5px solid #00ff00; font-size: 12px; z-index: 3000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .barra-controles { 
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); 
            display: flex; gap: 15px; z-index: 4000; width: 90%; justify-content: center;
        }

        .btn-circular { 
            width: 65px; height: 65px; border-radius: 50%; border: none; 
            font-size: 10px; font-weight: bold; color: white; 
            display: flex; align-items: center; justify-content: center; flex-direction: column;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

<div id="menu-inicial">
    <h1 style="color: #00ff00; letter-spacing: 2px;">ERGO-SENSING PRO</h1>
    <p style="color: #8b949e; margin-bottom: 40px;">Motor Biomecánico Basado en IA</p>
    <button class="btn btn-menu btn-cam" onclick="iniciarSistema('camara')">🎥 CÁMARA EN VIVO</button>
    <button class="btn btn-menu btn-vid" onclick="document.getElementById('fileInput').click()">📁 CARGAR VIDEO</button>
    <input type="file" id="fileInput" hidden accept="video/*" onchange="iniciarSistema('archivo')">
</div>

<div id="contenedor-analisis">
    <div class="status-badge" id="txt-status">INICIALIZANDO...</div>
    <canvas id="output_canvas"></canvas>
    <video id="input_video" playsinline muted></video>

    <div class="barra-controles">
        <button class="btn-circular btn-dark" onclick="location.reload()">MENÚ</button>
        <button class="btn-circular" style="background:#00d2d3; color:#000;" onclick="cambiarCamara()">🔄<br>CAM</button>
        <button class="btn-circular" style="background:#f1c40f; color:#000;" onclick="recalibrar()">⚖️<br>CALIB</button>
        <button id="recordBtn" class="btn-circular" style="background:#ff4d4d;" onclick="toggleGrabacion()">🔴<br>REC</button>
    </div>
</div>

<script>
    const video = document.getElementById('input_video');
    const canvas = document.getElementById('output_canvas');
    const ctx = canvas.getContext('2d');
    const txtStatus = document.getElementById('txt-status');
    
    let currentFacingMode = "environment"; 
    let poseSolver = null;
    
    // --- LÓGICA DE ESTABILIDAD (Buffers) ---
    const historialPuntos = Array.from({ length: 33 }, () => []);
    const maxHistorial = 8;
    
    // --- CONFIGURACIÓN ERGONÓMICA (Equivalente a Python) ---
    const THRESHOLDS = {
        'cabeza': { amarillo: 15, rojo: 25 },
        'abdomen': { amarillo: 20, rojo: 40 },
        'extremities': { amarillo: 30, rojo: 55 },
        'default': { amarillo: 20, rojo: 45 }
    };

    let calibrando = true;
    let startTime = 0;
    const duracionCalibracion = 5000;
    let offsets = {};
    let bases = {};

    function filtrarPunto(id, coords) {
        historialPuntos[id].push(coords);
        if (historialPuntos[id].length > maxHistorial) historialPuntos[id].shift();
        const sum = historialPuntos[id].reduce((a, b) => ({x: a.x+b.x, y: a.y+b.y, z: a.z+b.z}), {x:0, y:0, z:0});
        const len = historialPuntos[id].length;
        return { x: sum.x/len, y: sum.y/len, z: sum.z/len };
    }

    function calcAng3D(a, b, c) {
        const v1 = {x:a.x-b.x, y:a.y-b.y, z:a.z-b.z};
        const v2 = {x:c.x-b.x, y:c.y-b.y, z:c.z-b.z};
        const dot = v1.x*v2.x + v1.y*v2.y + v1.z*v2.z;
        const m1 = Math.sqrt(v1.x**2+v1.y**2+v1.z**2);
        const m2 = Math.sqrt(v2.x**2+v2.y**2+v2.z**2);
        return Math.acos(Math.max(-1, Math.min(1, dot/(m1*m2+1e-6)))) * (180/Math.PI);
    }

    function obtenerColor(parte, angulo) {
        const diff = Math.abs(angulo - (offsets[parte] || 0));
        let conf = THRESHOLDS['default'];
        if (THRESHOLDS[parte]) conf = THRESHOLDS[parte];
        else if (['mano','brazo','pierna','pie','rodilla'].some(x => parte.includes(x))) conf = THRESHOLDS['extremities'];

        if (diff > conf.rojo) return "#FF0000";    // Rojo: Riesgo Alto
        if (diff > conf.amarillo) return "#FFFF00"; // Amarillo: Riesgo Bajo
        return "#00FF00";                          // Verde: Óptimo
    }

    // --- MOTOR DE IA ---
    async function iniciarSistema(fuente) {
        document.getElementById('menu-inicial').style.display = 'none';
        document.getElementById('contenedor-analisis').style.display = 'block';

        poseSolver = new Pose({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}` });
        poseSolver.setOptions({ modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
        poseSolver.onResults(onResults);

        if (fuente === 'camara') {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: currentFacingMode, width: 1280, height: 720 } });
            video.srcObject = stream;
        } else {
            video.src = URL.createObjectURL(document.getElementById('fileInput').files[0]);
        }
        video.play();
        requestAnimationFrame(renderLoop);
    }

    function onResults(res) {
        if (!res.poseLandmarks) return;
        ctx.save();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        if (currentFacingMode === "user") { ctx.translate(canvas.width, 0); ctx.scale(-1, 1); }
        ctx.drawImage(res.image, 0, 0, canvas.width, canvas.height);

        const lm = res.poseLandmarks;
        const p = {}; // Puntos suavizados
        for(let i=0; i<33; i++) p[i] = filtrarPunto(i, lm[i]);

        const w = canvas.width, h = canvas.height;
        const pt = (i) => ({ x: p[i].x * w, y: p[i].y * h });
        const h_med = { x:(p[11].x+p[12].x)/2, y:(p[11].y+p[12].y)/2, z:(p[11].z+p[12].z)/2 };
        const c_med = { x:(p[23].x+p[24].x)/2, y:(p[23].y+p[24].y)/2, z:(p[23].z+p[24].z)/2 };
        const v_down = { x: c_med.x, y: c_med.y + 0.5, z: c_med.z };

        const ang = {
            'cabeza': calcAng3D(p[0], h_med, c_med),
            'torax': calcAng3D(p[12], h_med, c_med),
            'abdomen': calcAng3D(h_med, c_med, v_down),
            'espalda_baja': calcAng3D(p[24], c_med, p[26]),
            'brazo_der': calcAng3D(p[12], p[14], p[16]),
            'antebrazo_der': calcAng3D(p[14], p[16], p[20]),
            'brazo_izq': calcAng3D(p[11], p[13], p[15]),
            'antebrazo_izq': calcAng3D(p[13], p[15], p[19]),
            'pierna_der': calcAng3D(p[24], p[26], p[28]),
            'pierna_izq': calcAng3D(p[23], p[25], p[27])
        };

        const now = Date.now();
        if (startTime === 0) startTime = now;

        if (calibrando) {
            const progreso = Math.max(0, Math.ceil((duracionCalibracion - (now - startTime)) / 1000));
            txtStatus.innerText = `CALIBRANDO ESTADO DE REPOSO: ${progreso}s`;
            Object.keys(ang).forEach(k => { if(!bases[k]) bases[k]=[]; bases[k].push(ang[k]); });

            if (now - startTime > duracionCalibracion) {
                Object.keys(bases).forEach(k => offsets[k] = bases[k].reduce((a,b)=>a+b)/bases[k].length);
                calibrando = false;
                txtStatus.innerText = "SISTEMA ACTIVO - ANALIZANDO RIESGO";
            }
        } else {
            const draw = (p1, p2, parte, angulo, th=6) => {
                ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y);
                ctx.strokeStyle = obtenerColor(parte, angulo);
                ctx.lineWidth = th; ctx.lineCap = "round"; ctx.stroke();
            };

            const p_h = {x:h_med.x*w, y:h_med.y*h};
            const p_c = {x:c_med.x*w, y:c_med.y*h};

            draw(pt(0), p_h, 'cabeza', ang.cabeza, 5);
            draw(pt(11), pt(12), 'torax', ang.torax, 8);
            draw(p_h, p_c, 'abdomen', ang.abdomen, 10);
            draw(pt(23), pt(24), 'espalda_baja', ang.espalda_baja, 8);
            draw(pt(12), pt(14), 'brazo_der', ang.brazo_der);
            draw(pt(14), pt(16), 'antebrazo_der', ang.antebrazo_der);
            draw(pt(11), pt(13), 'brazo_izq', ang.brazo_izq);
            draw(pt(13), pt(15), 'antebrazo_izq', ang.antebrazo_izq);
            draw(pt(24), pt(26), 'pierna_der', ang.pierna_der);
            draw(pt(23), pt(25), 'pierna_izq', ang.pierna_izq);
        }
        ctx.restore();
    }

    async function renderLoop() {
        if (!video.paused) {
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            await poseSolver.send({image: video});
            requestAnimationFrame(renderLoop);
        }
    }

    function recalibrar() {
        calibrando = true; startTime = 0; bases = {};
        txtStatus.innerText = "RE-CALIBRANDO...";
    }

    function cambiarCamara() {
        currentFacingMode = (currentFacingMode === "user") ? "environment" : "user";
        iniciarSistema('camara');
    }

    let rec; let chunks = [];
    function toggleGrabacion() {
        const b = document.getElementById('recordBtn');
        if (!rec || rec.state === "inactive") {
            rec = new MediaRecorder(canvas.captureStream(25));
            rec.ondataavailable = e => chunks.push(e.data);
            rec.onstop = () => {
                const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob(chunks));
                a.download = `ERGO_REPORT_${Date.now()}.webm`; a.click();
            };
            rec.start(); b.style.background = "#fff"; b.style.color = "#ff4d4d"; b.innerText = "STOP";
        } else { rec.stop(); b.style.background = "#ff4d4d"; b.style.color = "#fff"; b.innerText = "🔴 REC"; }
    }
</script>
</body>
</html>
