<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LYA-ERGO v20.2 | AUDITORÍA UNIVERSAL</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background-color: #0d1117; color: white; margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #menu-inicial { display: flex; width: 100%; height: 100vh; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle, #161b22 0%, #0d1117 100%); position: fixed; z-index: 5000; }
        .logo-text { color: #00ff00; font-weight: 800; letter-spacing: 3px; margin-bottom: 0; }
        .sub-text { color: #8b949e; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 40px; }
        .btn-inicio { width: 85%; max-width: 320px; padding: 18px; margin: 10px; border-radius: 12px; font-weight: bold; border: none; font-size: 1.1rem; transition: all 0.3s ease; }
        
        /* Ajuste para evitar zoom en iPhone */
        input { font-size: 16px !important; }

        #contenedor-analisis { display: none; width: 100vw; height: 100vh; position: relative; background: #000; }
        canvas { width: 100%; height: 100%; object-fit: contain; }
        video { display: none; } /* Oculto, procesamos el canvas */

        .status-badge { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.8); padding: 12px 20px; border-radius: 8px; border-left: 4px solid #00ff00; font-size: 10px; z-index: 3000; font-weight: bold; }
        .barra-controles { position: absolute; bottom: 35px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; z-index: 4000; width: 95%; justify-content: center; }
        .btn-circular { width: 68px; height: 68px; border-radius: 50%; border: none; font-size: 9px; font-weight: 900; color: white; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        
        .rec-active { background: #fff !important; color: #f00 !important; border: 3px solid #f00 !important; animation: pulse-red 1.5s infinite; }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(255, 0, 0, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0); } }

        #loader-ia { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(13, 17, 23, 0.98); z-index: 6000; flex-direction: column; align-items: center; justify-content: center; }
        .progress-bar-custom { width: 75%; height: 6px; background: #21262d; border-radius: 10px; margin-top: 25px; overflow: hidden; }
        #bar-id { width: 0%; height: 100%; background: #00ff00; transition: 0.4s; }
    </style>
</head>
<body>

<div id="loader-ia">
    <h3 style="color:#00ff00; letter-spacing: 4px; font-weight: 900;">INICIANDO IA UNIVERSAL</h3>
    <div class="progress-bar-custom"><div id="bar-id"></div></div>
</div>

<div id="menu-inicial">
    <h1 class="logo-text">LYA-ERGO</h1>
    <p class="sub-text">Auditoría Biomecánica</p>
    <div style="width: 85%; max-width: 320px; margin-bottom: 20px;">
        <input type="text" id="puestoTrabajo" placeholder="PUESTO (Ej: Línea 4)" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #30363d; background: #0d1117; color: white; margin-bottom: 10px;">
        <input type="number" id="pesoCarga" placeholder="PESO CARGA (KG)" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #30363d; background: #0d1117; color: white;">
    </div>
    <button class="btn-inicio" style="background:#27ae60; color:white;" onclick="prepararSistema('camara')">VISTA EN VIVO</button>
    <button class="btn-inicio" style="background:#2980b9; color:white;" onclick="document.getElementById('fileInput').click()">SUBIR ARCHIVO</button>
    <input type="file" id="fileInput" hidden accept="video/*" onchange="prepararSistema('archivo')">
</div>

<div id="contenedor-analisis">
    <div class="status-badge" id="txt-status">SISTEMA LISTO</div>
    <canvas id="output_canvas"></canvas>
    <video id="input_video" playsinline webkit-playsinline muted></video>
    <div class="barra-controles">
        <button class="btn-circular btn-dark" onclick="location.reload()">SALIR</button>
        <button class="btn-circular" style="background:#00d2d3; color:#000;" onclick="cambiarCamara()">GIRAR</button>
        <button id="btn-calib" class="btn-circular" style="background:#f1c40f; color:#000;" onclick="activarIA()">IA ON</button>
        <button id="recordBtn" class="btn-circular" style="background:#ff4d4d; opacity: 0.3;" onclick="toggleGrabacion()">AUDITAR</button>
    </div>
</div>

<script>
    const video = document.getElementById('input_video');
    const canvas = document.getElementById('output_canvas');
    const ctx = canvas.getContext('2d');
    const txtStatus = document.getElementById('txt-status');
    const progressBar = document.getElementById('bar-id');

    // Variables de Estado
    let mediaRecorder;
    let recordedChunks = [];
    let pose;
    let iaActiva = false, calibrado = false, analizandoRiesgo = false;
    let currentFacingMode = "environment";
    let startTimeCalib = 0;
    
    const TH = { tronco: 18, cuello: 12, hombros: 28, codos: 25, munecas: 20, piernas: 25 };
    let wbaStats = { riesgoAltoTotal: 0, framesAnalizados: 0, zonasAfectadas: new Set(), inicioAuditoria: null, ciclos: 0, lastHandY: null, subiendo: false };
    let baseAngles = {}, angleBuffer = {};
    const HISTORIAL_MAX = 20;

    // --- 1. INICIO DE CÁMARA UNIVERSAL ---
    async function prepararSistema(fuente) {
        document.getElementById('menu-inicial').style.display = 'none';
        document.getElementById('contenedor-analisis').style.display = 'block';
        if (fuente === 'camara') await encenderCamara();
        else {
            const file = document.getElementById('fileInput').files[0];
            if (!file) return;
            video.src = URL.createObjectURL(file);
            video.onloadedmetadata = () => iniciarProcesamiento();
        }
    }

    async function encenderCamara() {
        try {
            const constraints = { video: { facingMode: currentFacingMode, width: { ideal: 1280 }, height: { ideal: 720 } } };
            const stream = await navigator.mediaDevices.getUserMedia(constraints);
            video.srcObject = stream;
            video.onloadedmetadata = () => iniciarProcesamiento();
        } catch (e) {
            alert("Error: Asegúrate de usar HTTPS y dar permisos de cámara.");
        }
    }

    function iniciarProcesamiento() {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        video.play();
        requestAnimationFrame(loopVideoSimple);
    }

    function loopVideoSimple() {
        if (!iaActiva) {
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            requestAnimationFrame(loopVideoSimple);
        }
    }

    // --- 2. MOTOR DE IA ---
    function calcAng3D(a,b,c) {
        const v1={x:a.x-b.x, y:a.y-b.y, z:a.z-b.z}, v2={x:c.x-b.x, y:c.y-b.y, z:c.z-b.z};
        const dot = v1.x*v2.x + v1.y*v2.y + v1.z*v2.z;
        const m1 = Math.sqrt(v1.x**2 + v1.y**2 + v1.z**2), m2 = Math.sqrt(v2.x**2 + v2.y**2 + v2.z**2);
        return (m1*m2 === 0) ? 0 : Math.acos(Math.max(-1, Math.min(1, dot/(m1*m2))))*(180/Math.PI);
    }

    const drawV = (p1, p2, angKey, groupKey, vis1, vis2) => {
        ctx.beginPath();
        ctx.lineCap = "round";
        ctx.moveTo(p1.x, p1.y);
        ctx.lineTo(p2.x, p2.y);

        if (vis1 < 0.6 || vis2 < 0.6) {
            ctx.strokeStyle = "#4b4b4b"; ctx.lineWidth = 4; ctx.stroke();
            return; 
        }

        const avgAngle = angleBuffer[angKey].reduce((a, b) => a + b, 0) / angleBuffer[angKey].length;
        let color = "#00ff00", thickness = 4;

        if (analizandoRiesgo && calibrado) {
            const diff = Math.abs(avgAngle - (baseAngles[angKey] || avgAngle));
            if (diff > (TH[groupKey] * 2)) { color = "#ff3838"; thickness = 10; wbaStats.zonasAfectadas.add(groupKey); wbaStats.riesgoAltoTotal++; }
            else if (diff > TH[groupKey]) { color = "#f1c40f"; thickness = 7; }
        }

        ctx.strokeStyle = color; ctx.lineWidth = thickness; ctx.stroke();
        
        if (calibrado) {
            ctx.fillStyle = "white"; ctx.font = "bold 12px sans-serif";
            ctx.fillText(`${avgAngle.toFixed(0)}°`, (p1.x+p2.x)/2 + 10, (p1.y+p2.y)/2);
        }
    };

    function onResults(res) {
        if (!res.poseLandmarks) return;
        ctx.save();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (currentFacingMode === "user") { ctx.translate(canvas.width, 0); ctx.scale(-1, 1); }
        ctx.drawImage(res.image, 0, 0, canvas.width, canvas.height);

        const lm = res.poseLandmarks, w = canvas.width, h = canvas.height;
        const pt = (i) => ({ x: lm[i].x * w, y: lm[i].y * h, z: lm[i].z });

        const p = {
            cab: pt(0), 
            cue: { x: (lm[11].x+lm[12].x)/2*w, y:(lm[11].y+lm[12].y)/2*h, z:(lm[11].z+lm[12].z)/2 },
            esp: { x: (lm[23].x+lm[24].x)/2*w, y:(lm[23].y+lm[24].y)/2*h, z:(lm[23].z+lm[24].z)/2 },
            h_d: pt(12), c_d: pt(14), m_d: pt(16), h_i: pt(11), c_i: pt(13), m_i: pt(15),
            p_d: pt(24), r_d: pt(26), t_d: pt(28), p_i: pt(23), r_i: pt(25), t_i: pt(27)
        };

        // Análisis Postural
        const currentAngles = {
            cue: calcAng3D(p.cab, p.cue, p.esp), 
            c_d: calcAng3D(p.h_d, p.c_d, p.m_d), c_i: calcAng3D(p.h_i, p.c_i, p.m_i),
            h_d: calcAng3D(p.p_d, p.h_d, p.c_d), h_i: calcAng3D(p.p_i, p.h_i, p.c_i),
            tronco: calcAng3D(p.cue, p.esp, {x: p.esp.x, y: p.esp.y + 50, z: p.esp.z})
        };

        Object.keys(currentAngles).forEach(k => {
            if (!angleBuffer[k]) angleBuffer[k] = [];
            angleBuffer[k].push(currentAngles[k]);
            if (angleBuffer[k].length > HISTORIAL_MAX) angleBuffer[k].shift();
        });

        if (analizandoRiesgo) {
            wbaStats.framesAnalizados++;
            const handY = (p.m_d.y + p.m_i.y) / 2;
            if (wbaStats.lastHandY && (wbaStats.lastHandY - handY) > 50 && !wbaStats.subiendo) { wbaStats.ciclos++; wbaStats.subiendo = true; }
            else if (wbaStats.lastHandY && (handY - wbaStats.lastHandY) > 50) { wbaStats.subiendo = false; }
            wbaStats.lastHandY = handY;
        }

        if (iaActiva && !calibrado && (Date.now() - startTimeCalib > 3000)) {
            Object.keys(angleBuffer).forEach(k => baseAngles[k] = angleBuffer[k].reduce((a,b)=>a+b,0)/angleBuffer[k].length);
            calibrado = true; document.getElementById('recordBtn').style.opacity = "1";
        }

        // Dibujar Esqueleto
        drawV(p.h_i, p.h_d, 'cue', 'hombros', lm[11].visibility, lm[12].visibility);
        drawV(p.cue, p.esp, 'tronco', 'tronco', 0.9, 0.9);
        drawV(p.h_d, p.c_d, 'c_d', 'codos', lm[12].visibility, lm[14].visibility);
        drawV(p.c_d, p.m_d, 'c_d', 'codos', lm[14].visibility, lm[16].visibility);
        
        ctx.restore();
    }

    // --- 3. GRABACIÓN Y REPORTE UNIVERSAL ---
    function toggleGrabacion() {
        if (!calibrado) return;
        analizandoRiesgo = !analizandoRiesgo;
        const btn = document.getElementById('recordBtn');
        btn.classList.toggle('rec-active', analizandoRiesgo);

        if (analizandoRiesgo) {
            recordedChunks = [];
            const stream = canvas.captureStream(30);
            
            // Detección de MimeType para iOS/Android
            let mimeType = 'video/webm; codecs=vp9';
            if (!MediaRecorder.isTypeSupported(mimeType)) mimeType = 'video/mp4';

            mediaRecorder = new MediaRecorder(stream, { mimeType });
            mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
            mediaRecorder.onstop = () => {
                const ext = mimeType.includes('mp4') ? 'mp4' : 'webm';
                const blob = new Blob(recordedChunks, { type: mimeType });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `EVIDENCIA_LYA_${Date.now()}.${ext}`;
                a.click();
            };
            mediaRecorder.start();
            wbaStats.inicioAuditoria = Date.now();
            wbaStats.ciclos = 0;
            txtStatus.innerText = "GRABANDO AUDITORÍA...";
        } else {
            if (mediaRecorder) mediaRecorder.stop();
            setTimeout(() => generarReporteWBA(), 600);
            txtStatus.innerText = "SISTEMA READY";
        }
    }

    function generarReporteWBA() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const puesto = document.getElementById('puestoTrabajo').value || "AUDITORIA";
        const peso = document.getElementById('pesoCarga').value || 0;
        const ms = Date.now() - wbaStats.inicioAuditoria;
        const frecuencia = (wbaStats.ciclos / (ms / 60000 || 0.01)).toFixed(2);

        doc.setFontSize(20); doc.text("REPORTE LYA-ERGO NOM-036", 20, 20);
        doc.setFontSize(12); doc.text(`Puesto: ${puesto}`, 20, 40);
        doc.text(`Frecuencia: ${frecuencia} lev/min`, 20, 50);
        doc.text(`Zonas con estrés: ${Array.from(wbaStats.zonasAfectadas).join(', ')}`, 20, 60);
        
        doc.autoTable({
            startY: 70,
            head: [['Métrica', 'Resultado']],
            body: [['Ciclos Totales', wbaStats.ciclos], ['Peso Declarado', `${peso} kg`], ['Frecuencia NOM-036', frecuencia]]
        });

        doc.save(`REPORTE_${puesto}.pdf`);
    }

    // Inicializadores
    function activarIA() {
        document.getElementById('loader-ia').style.display = 'flex';
        pose = new Pose({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}` });
        pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });
        pose.onResults((res) => {
            if (!iaActiva) { document.getElementById('loader-ia').style.display = 'none'; iaActiva = true; startTimeCalib = Date.now(); loopIA(); }
            onResults(res);
        });
        loopIA();
    }
    async function loopIA() { if (iaActiva) { await pose.send({image: video}); requestAnimationFrame(loopIA); } }
    async function cambiarCamara() { currentFacingMode = (currentFacingMode === "environment") ? "user" : "environment"; await encenderCamara(); }
</script>
</body>
</html>
