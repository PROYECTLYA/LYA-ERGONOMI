<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LYA-ERGO v16.7 | SAFETY TUXTEPEC</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0d1117; color: white; margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* SOLUCIÓN AL TAMAÑO DE LA IMAGEN DE FONDO */
        #menu-inicial { 
            display: flex; width: 100%; height: 100vh; flex-direction: column; 
            align-items: center; justify-content: center; 
            position: fixed; z-index: 5000;
            
            /* USAMOS EL ENLACE DIRECTO CORREGIDO */
            background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(13, 17, 23, 0.9)), 
                              url('https://i.ibb.co/qMwtNmk3/image.png'); 
            
            /* PROPIEDADES CRÍTICAS PARA ADAPTACIÓN */
            background-size: cover;      /* LA IMAGEN SE ESTIRA PARA CUBRIR TODO */
            background-position: center; /* LA IMAGEN SE CENTRA */
            background-repeat: no-repeat;/* NO SE REPITE */
        }

        /* DISEÑO DE TEXTOS Y LOGO */
        .logo-text { 
            color: #00ff00; font-weight: 900; letter-spacing: 5px; 
            margin-bottom: 5px; text-shadow: 0 0 25px rgba(0,255,0,0.8); 
            font-size: 3.5rem; text-align: center;
        }
        .sub-text { 
            color: #ffffff; font-size: 1.1rem; text-transform: uppercase; 
            letter-spacing: 4px; margin-bottom: 50px; font-weight: 700; 
            background: rgba(0,0,0,0.5); padding: 8px 20px; border-radius: 8px; 
            border-left: 4px solid #00ff00; text-align: center;
        }
        
        /* BOTONES MODERNOS CON EFECTO CRISTAL */
        .btn-inicio { 
            width: 85%; max-width: 340px; padding: 20px; margin: 12px; 
            border-radius: 18px; font-weight: bold; border: 1px solid rgba(255,255,255,0.2); 
            font-size: 1.1rem; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            backdrop-filter: blur(12px); /* EFECTO DE DESENFOQUE DETRÁS DEL BOTÓN */
            text-transform: uppercase; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .btn-cam { background: rgba(39, 174, 96, 0.75); color: white; }
        .btn-vid { background: rgba(41, 128, 185, 0.75); color: white; }
        .btn-inicio:hover { transform: translateY(-5px) scale(1.02); border-color: #00ff00; }

        /* Pantalla de Carga */
        #loader-ia { 
            display: none; position: fixed; top:0; left:0; width:100%; height:100%; 
            background: rgba(13, 17, 23, 0.98); z-index: 6000; 
            flex-direction: column; align-items: center; justify-content: center; 
        }
        .progress-container { width: 75%; height: 6px; background: #21262d; border-radius: 10px; margin-top: 25px; overflow: hidden; }
        .progress-bar { width: 0%; height: 100%; background: #00ff00; transition: 0.4s; box-shadow: 0 0 20px #00ff00; }

        #contenedor-analisis { display: none; width: 100vw; height: 100vh; position: relative; background: #000; }
        canvas { width: 100%; height: 100%; object-fit: contain; }
        video { display: none; }

        .status-badge { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.85); padding: 12px 20px; border-radius: 8px; border-left: 4px solid #00ff00; font-size: 10px; z-index: 3000; font-weight: bold; }
        
        .barra-controles { position: absolute; bottom: 35px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; z-index: 4000; }
        .btn-circular { width: 68px; height: 68px; border-radius: 50%; border: none; font-size: 9px; font-weight: 900; color: white; display: flex; align-items: center; justify-content: center; flex-direction: column; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<div id="loader-ia">
    <h3 id="loader-txt" style="color:#00ff00; letter-spacing: 4px; font-weight: 900;">VECTORIZANDO...</h3>
    <div class="progress-container">
        <div id="bar-id" class="progress-bar"></div>
    </div>
    <p style="color:#8b949e; margin-top:20px; font-size: 0.7rem;">SISTEMA BIOMECÁNICO LYA</p>
</div>

<div id="menu-inicial">
    <h1 class="logo-text">LYA-ERGO</h1>
    <p class="sub-text">SAFETY TUXTEPEC</p>
    <button class="btn-inicio btn-cam" onclick="prepararSistema('camara')">🎥 INICIAR CÁMARA</button>
    <button class="btn-inicio btn-vid" onclick="document.getElementById('fileInput').click()">📁 SUBIR VIDEO</button>
    <input type="file" id="fileInput" hidden accept="video/*" onchange="prepararSistema('archivo')">
    <p style="margin-top: 50px; font-size: 0.7rem; color: #fff; font-weight: bold;">v16.7 Enterprise Edition</p>
</div>

<div id="contenedor-analisis">
    <div class="status-badge" id="txt-status">LYA-ENGINE: READY</div>
    <canvas id="output_canvas"></canvas>
    <video id="input_video" playsinline muted></video>
    
    <div class="barra-controles">
        <button class="btn-circular btn-dark" onclick="location.reload()">SALIR</button>
        <button class="btn-circular" style="background:#00d2d3; color:#000;" onclick="cambiarCamara()">🔄<br>GIRAR</button>
        <button id="btn-calib" class="btn-circular" style="background:#f1c40f; color:#000;" onclick="activarIA()">⚖️<br>CALIBRAR</button>
        <button id="recordBtn" class="btn-circular" style="background:#ff4d4d; opacity: 0.3;" onclick="toggleGrabacion()">🔴<br>GRABAR</button>
    </div>
</div>

<script>
    const video = document.getElementById('input_video');
    const canvas = document.getElementById('output_canvas');
    const ctx = canvas.getContext('2d');
    const txtStatus = document.getElementById('txt-status');
    const loader = document.getElementById('loader-ia');
    const progressBar = document.getElementById('bar-id');
    
    let pose = null, streamActual = null, currentFacingMode = "environment";
    let iaActiva = false, calibrado = false, analizandoRiesgo = false;
    let startTimeCalib = 0, baseAngles = {};
    let mediaRecorder, recordedChunks = [];

    const TH = { tronco: 18, cuello: 12, hombros: 28, piernas: 25 };

    async function prepararSistema(fuente) {
        document.getElementById('menu-inicial').style.display = 'none';
        document.getElementById('contenedor-analisis').style.display = 'block';
        if (fuente === 'camara') await encenderCamara();
        else {
            const file = document.getElementById('fileInput').files[0];
            if (file) { video.src = URL.createObjectURL(file); video.onloadedmetadata = () => { video.play(); requestAnimationFrame(loopVideoSimple); }; }
        }
    }

    async function encenderCamara() {
        try {
            streamActual = await navigator.mediaDevices.getUserMedia({ video: { facingMode: currentFacingMode, width: {ideal: 1280}, height: {ideal: 720} } });
            video.srcObject = streamActual;
            video.onloadedmetadata = () => { video.play(); requestAnimationFrame(loopVideoSimple); };
        } catch (e) { alert("Error de cámara: Verifique permisos"); }
    }

    function loopVideoSimple() {
        if (!video.paused && !iaActiva) {
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            requestAnimationFrame(loopVideoSimple);
        }
    }

    function activarIA() {
        if (iaActiva) return;
        loader.style.display = 'flex';
        let prog = 0;
        const barInterval = setInterval(() => { prog += 5; if(prog > 95) prog = 95; progressBar.style.width = prog + '%'; }, 100);

        setTimeout(() => {
            pose = new Pose({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}` });
            pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });
            pose.onResults(onResults);
            
            setTimeout(() => {
                clearInterval(barInterval);
                progressBar.style.width = '100%';
                setTimeout(() => {
                    loader.style.display = 'none';
                    iaActiva = true; 
                    startTimeCalib = Date.now(); 
                    requestAnimationFrame(loopIA);
                }, 400);
            }, 1000);
        }, 100);
    }

    async function loopIA() { if (!video.paused && iaActiva) { await pose.send({image: video}); requestAnimationFrame(loopIA); } }

    function onResults(res) {
        if (!res.poseLandmarks) return;
        ctx.save();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (currentFacingMode === "user") { ctx.translate(canvas.width, 0); ctx.scale(-1, 1); }
        ctx.drawImage(res.image, 0, 0, canvas.width, canvas.height);

        const lm = res.poseLandmarks;
        const w = canvas.width, h = canvas.height;
        const pt = (i) => ({ x: lm[i].x * w, y: lm[i].y * h });
        
        const p = {
            cab: pt(0), 
            cue: { x: (lm[11].x+lm[12].x)/2*w, y:(lm[11].y+lm[12].y)/2*h },
            tor: { x: (lm[11].x+lm[12].x)/2*w, y:(lm[11].y+lm[12].y)/2*h + 45 },
            abd: { x: (lm[23].x+lm[24].x)/2*w, y:(lm[23].y+lm[24].y)/2*h },
            h_d: pt(12), c_d: pt(14), m_d: pt(16), mano_d: pt(20),
            h_i: pt(11), c_i: pt(13), m_i: pt(15), mano_i: pt(19),
            eb_d: pt(24), r_d: pt(26), t_d: pt(28), eb_i: pt(23), r_i: pt(25), t_i: pt(27)
        };

        const vertical = (o) => ({ x: o.x, y: o.y + 100 });
        const angles = {
            cue: calcAng(p.cab, p.cue, p.tor),
            abd: calcAng(p.cue, p.abd, vertical(p.abd)),
            h_d: calcAng(vertical(p.h_d), p.h_d, p.c_d),
            h_i: calcAng(vertical(p.h_i), p.h_i, p.c_i),
            c_d: calcAng(p.h_d, p.c_d, p.m_d),
            c_i: calcAng(p.h_i, p.c_i, p.m_i),
            r_d: calcAng(p.eb_d, p.r_d, p.t_d),
            r_i: calcAng(p.eb_i, p.r_i, p.t_i)
        };

        if (!calibrado) {
            const t = Date.now() - startTimeCalib;
            if (t > 5000) { baseAngles = {...angles}; calibrado = true; txtStatus.innerText = "POSTURA BASE OK"; document.getElementById('recordBtn').style.opacity = "1"; }
            else { txtStatus.innerText = `CALIBRANDO... ${Math.ceil((5000-t)/1000)}s`; }
        }

        const drawV = (p1, p2, val, groupKey) => {
            ctx.lineWidth = 8; ctx.lineCap = "round"; ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y);
            if (analizandoRiesgo && calibrado) {
                const diff = Math.abs(angles[val] - baseAngles[val]);
                const t = TH[groupKey];
                ctx.strokeStyle = diff > (t*2) ? "#ff3838" : (diff > (t+5) ? "#fffa65" : "#32ff7e");
            } else { ctx.strokeStyle = calibrado ? "#32ff7e" : "#555"; }
            ctx.stroke();
        };

        drawV(p.cab, p.cue, 'cue', 'cuello'); drawV(p.cue, p.tor, 'cue', 'cuello'); drawV(p.tor, p.abd, 'abd', 'tronco');
        drawV(p.cue, p.h_d, 'h_d', 'hombros'); drawV(p.h_d, p.c_d, 'h_d', 'hombros'); drawV(p.c_d, p.m_d, 'h_d', 'hombros');
        drawV(p.cue, p.h_i, 'h_i', 'hombros'); drawV(p.h_i, p.c_i, 'h_i', 'hombros'); drawV(p.c_i, p.m_i, 'h_i', 'hombros');
        drawV(p.abd, p.eb_d, 'abd', 'tronco'); drawV(p.eb_d, p.r_d, 'r_d', 'piernas'); drawV(p.r_d, p.t_d, 'r_d', 'piernas');
        drawV(p.abd, p.eb_i, 'abd', 'tronco'); drawV(p.eb_i, p.r_i, 'r_i', 'piernas'); drawV(p.r_i, p.t_i, 'r_i', 'piernas');
        ctx.restore();
    }

    function calcAng(a,b,c) {
        const v1={x:a.x-b.x, y:a.y-b.y}, v2={x:c.x-b.x, y:c.y-b.y};
        const dot = v1.x*v2.x + v1.y*v2.y;
        const m1 = Math.sqrt(v1.x**2 + v1.y**2), m2 = Math.sqrt(v2.x**2 + v2.y**2);
        const d = m1 * m2; return d === 0 ? 0 : Math.acos(Math.max(-1, Math.min(1, dot/d)))*(180/Math.PI);
    }

    function toggleGrabacion() {
        if (!calibrado) return;
        analizandoRiesgo = !analizandoRiesgo;
        document.getElementById('recordBtn').classList.toggle('rec-active', analizandoRiesgo);
        if (analizandoRiesgo) {
            recordedChunks = [];
            const stream = canvas.captureStream(30);
            mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm; codecs=vp9' });
            mediaRecorder.ondataavailable = (e) => recordedChunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
                a.download = `LYA_REPORT_${new Date().getTime()}.webm`; a.click();
            };
            mediaRecorder.start();
            txtStatus.innerText = "GRABANDO ANÁLISIS...";
        } else { mediaRecorder.stop(); txtStatus.innerText = "REPORTE DESCARGADO"; }
    }

    async function cambiarCamara() { currentFacingMode = (currentFacingMode === "environment") ? "user" : "environment"; iaActiva = false; calibrado = false; await encenderCamara(); }
</script>
</body>
</html>
