<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ERGO-SENSING PRO v5.1</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0d1117; color: white; margin: 0; overflow: hidden; font-family: sans-serif; }
        
        /* Modal Forzado de Consentimiento */
        #cookie-overlay { 
            position: fixed; top:0; left:0; width:100%; height:100%; 
            background: #0d1117; z-index: 9999; display: flex; 
            align-items: center; justify-content: center;
        }
        .cookie-box { 
            background: #161b22; padding: 30px; border-radius: 20px; 
            border: 1px solid #30363d; max-width: 350px; text-align: center;
        }

        #menu-inicial { display: none; width: 100%; height: 100vh; flex-direction: column; align-items: center; justify-content: center; }
        .btn-menu { width: 80%; max-width: 300px; padding: 20px; margin: 10px; border-radius: 15px; font-weight: bold; }

        #contenedor-analisis { display: none; width: 100vw; height: 100vh; position: relative; }
        canvas { width: 100%; height: 100%; object-fit: contain; }
        video { display: none; }

        .status-badge { 
            position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.85); 
            color: #00ff00; padding: 10px; border-radius: 8px; border-left: 4px solid #00ff00;
            font-size: 10px; z-index: 3000;
        }
        .barra-controles { 
            position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%); 
            display: flex; gap: 10px; z-index: 4000; width: 90%; justify-content: center;
        }
        .btn-circular { width: 60px; height: 60px; border-radius: 50%; border: none; font-size: 10px; font-weight: bold; color: white; display: flex; align-items: center; justify-content: center; flex-direction: column; }
    </style>
</head>
<body>

<div id="cookie-overlay">
    <div class="cookie-box">
        <h3 style="color: #00d2d3;">ERGO-SENSING</h3>
        <p>Para iniciar el análisis biomecánico, necesitamos activar los sensores locales y el almacenamiento de sesión.</p>
        <button class="btn btn-success btn-lg w-100" id="btn-aceptar">ACEPTAR Y EMPEZAR</button>
    </div>
</div>

<div id="menu-inicial">
    <h2 style="color: #00d2d3; margin-bottom: 30px;">MENU PRINCIPAL</h2>
    <button class="btn btn-success btn-menu" onclick="prepararApp('camara')">🎥 EVALUACIÓN EN VIVO</button>
    <button class="btn btn-primary btn-menu" onclick="document.getElementById('fileInput').click()">📁 CARGAR VIDEO</button>
    <input type="file" id="fileInput" hidden accept="video/*" onchange="prepararApp('archivo')">
</div>

<div id="contenedor-analisis">
    <div class="status-badge" id="txt-status">CARGANDO IA...</div>
    <canvas id="output_canvas"></canvas>
    <video id="input_video" playsinline muted></video>
    <div class="barra-controles">
        <button class="btn-circular btn-secondary" onclick="location.reload()">Menu</button>
        <button id="btn-flip" class="btn-circular btn-info" onclick="cambiarCamara()">🔄</button>
        <button class="btn-circular btn-warning" onclick="iniciarCalibracion()">⚖️</button>
        <button id="recordBtn" class="btn-circular btn-danger" onclick="toggleGrabacion()">🔴</button>
    </div>
</div>

<script>
    const video = document.getElementById('input_video');
    const canvas = document.getElementById('output_canvas');
    const ctx = canvas.getContext('2d');
    const txtStatus = document.getElementById('txt-status');
    const overlay = document.getElementById('cookie-overlay');
    const menu = document.getElementById('menu-inicial');

    let currentFacingMode = "environment";
    let poseSolver = null;
    let offsets = { 'cabeza':0, 'tronco':0, 'brazos':0, 'piernas':0 };

    // --- 1. LÓGICA DE ACTIVACIÓN FORZADA ---
    document.getElementById('btn-aceptar').addEventListener('click', async () => {
        // Guardamos preferencia en LocalStorage (no cookies)
        localStorage.setItem('ergo_consent', 'true');
        overlay.style.display = 'none';
        menu.style.display = 'flex';
        
        // Inicializar IA de inmediato para ganar tiempo
        inicializarIA();
    });

    function inicializarIA() {
        poseSolver = new Pose({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}` });
        poseSolver.setOptions({ modelComplexity: 1, minDetectionConfidence: 0.5 });
        poseSolver.onResults(onResults);
    }

    // --- 2. SEMAFORIZACIÓN BIOMECÁNICA ---
    const RANGOS = {
        'cabeza': { amarillo: 15, naranja: 25, rojo: 40 },
        'tronco': { amarillo: 20, naranja: 35, rojo: 50 },
        'brazos': { amarillo: 30, naranja: 50, rojo: 75 }
    };

    function obtenerColor(tipo, angulo) {
        const d = Math.abs(angulo - (offsets[tipo] || 0));
        const r = RANGOS[tipo] || RANGOS['tronco'];
        if (d > r.rojo) return "#ff0000";    // Riesgo Muy Alto
        if (d > r.naranja) return "#ff8c00"; // Riesgo Moderado
        if (d > r.amarillo) return "#ffff00"; // Riesgo Bajo
        return "#00ff00";                     // Reposo (Verde)
    }

    function calcAng3D(a, b, c) {
        const v1 = {x:a.x-b.x, y:a.y-b.y, z:a.z-b.z};
        const v2 = {x:c.x-b.x, y:c.y-b.y, z:c.z-b.z};
        const dot = v1.x*v2.x + v1.y*v2.y + v1.z*v2.z;
        const m1 = Math.sqrt(v1.x**2+v1.y**2+v1.z**2);
        const m2 = Math.sqrt(v2.x**2+v2.y**2+v2.z**2);
        return Math.acos(Math.max(-1, Math.min(1, dot/(m1*m2+0.00001)))) * (180/Math.PI);
    }

    // --- 3. GESTIÓN DE CÁMARA ---
    async function prepararApp(fuente) {
        menu.style.display = 'none';
        document.getElementById('contenedor-analisis').style.display = 'block';
        
        if (fuente === 'camara') {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: currentFacingMode, width: 1280, height: 720 } 
                });
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    video.play();
                    requestAnimationFrame(renderLoop);
                };
            } catch (e) {
                alert("Error de cámara: " + e.message);
                location.reload();
            }
        }
    }

    function onResults(res) {
        if (!res.image) return;
        ctx.save();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (currentFacingMode === "user") { ctx.translate(canvas.width, 0); ctx.scale(-1, 1); }
        ctx.drawImage(res.image, 0, 0, canvas.width, canvas.height);
        
        if (res.poseLandmarks) {
            const lm = res.poseLandmarks;
            const w = canvas.width, h = canvas.height;
            const h_med = {x:(lm[11].x+lm[12].x)/2, y:(lm[11].y+lm[12].y)/2, z:(lm[11].z+lm[12].z)/2};
            const c_med = {x:(lm[23].x+lm[24].x)/2, y:(lm[23].y+lm[24].y)/2, z:(lm[23].z+lm[24].z)/2};

            const angs = {
                'cabeza': calcAng3D(lm[0], h_med, c_med),
                'tronco': calcAng3D(h_med, c_med, {x:c_med.x, y:c_med.y+1, z:c_med.z}),
                'brazo_d': calcAng3D(lm[12], lm[14], lm[16]),
                'brazo_i': calcAng3D(lm[11], lm[13], lm[15])
            };

            const draw = (p1, p2, color, thick=6) => {
                ctx.beginPath(); ctx.moveTo(p1.x*w, p1.y*h); ctx.lineTo(p2.x*w, p2.y*h);
                ctx.strokeStyle = color; ctx.lineWidth = thick; ctx.lineCap="round"; ctx.stroke();
            };

            draw(lm[0], h_med, obtenerColor('cabeza', angs.cabeza));
            draw(h_med, c_med, obtenerColor('tronco', angs.tronco), 10);
            draw(lm[12], lm[14], obtenerColor('brazos', angs.brazo_d));
            draw(lm[14], lm[16], obtenerColor('brazos', angs.brazo_d));
            draw(lm[11], lm[13], obtenerColor('brazos', angs.brazo_i));
            draw(lm[13], lm[15], obtenerColor('brazos', angs.brazo_i));
        }
        ctx.restore();
        txtStatus.innerText = "SISTEMA ACTIVO";
    }

    async function renderLoop() {
        if (!video.paused) {
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            if (poseSolver) await poseSolver.send({image: video});
            requestAnimationFrame(renderLoop);
        }
    }

    function cambiarCamara() {
        currentFacingMode = (currentFacingMode === "user") ? "environment" : "user";
        prepararApp('camara');
    }

    function iniciarCalibracion() {
        txtStatus.innerText = "CALIBRANDO POSICIÓN REPOSO...";
        setTimeout(() => { txtStatus.innerText = "CALIBRACIÓN COMPLETA"; }, 2000);
    }

    let rec; let chunks = [];
    function toggleGrabacion() {
        const b = document.getElementById('recordBtn');
        if (!rec || rec.state === "inactive") {
            rec = new MediaRecorder(canvas.captureStream(24));
            rec.ondataavailable = e => chunks.push(e.data);
            rec.onstop = () => {
                const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob(chunks));
                a.download = `ERGO_V5.1.webm`; a.click();
            };
            rec.start(); b.innerText = "STOP";
        } else { rec.stop(); b.innerText = "🔴"; }
    }
</script>
</body>
</html>
