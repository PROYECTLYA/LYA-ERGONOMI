<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LYA-ERGO v19.5 | ADAPTIVE PRECISION</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0d1117; color: white; margin: 0; height: 100vh; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #menu-inicial { display: flex; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle, #161b22 0%, #0d1117 100%); position: fixed; z-index: 5000; }
        .btn-inicio { width: 85%; max-width: 320px; padding: 18px; margin: 10px; border-radius: 12px; font-weight: bold; border: none; font-size: 1.1rem; }
        #contenedor-analisis { display: none; width: 100vw; height: 100vh; position: relative; background: #000; flex-direction: column; }
        #canvas-wrapper { flex: 1; width: 100%; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; background: #000; }
        /* Mejora: Canvas adaptativo con relación de aspecto preservada */
        canvas { object-fit: contain; max-width: 100%; max-height: 100%; }
        video { display: none; }
        .barra-controles { background: rgba(22, 27, 34, 0.95); padding: 10px; display: flex; justify-content: center; gap: 10px; z-index: 4000; border-top: 1px solid #30363d; }
        .btn-circular { width: 55px; height: 55px; border-radius: 50%; border: none; font-size: 8px; font-weight: 900; color: white; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .rec-active { background: #fff !important; color: #f00 !important; border: 3px solid #f00 !important; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255,0,0,0.7); } 70% { box-shadow: 0 0 0 10px rgba(255,0,0,0); } 100% { box-shadow: 0 0 0 0 rgba(255,0,0,0); } }
    </style>
</head>
<body>

<div id="menu-inicial">
    <h1 style="color: #00ff00; letter-spacing: 3px;">LYA-ERGO</h1>
    <p style="color: #8b949e; font-size: 0.8rem;">V19.5 - TUXTEPEC SAFETY</p>
    <button class="btn-inicio" style="background:#27ae60; color:white;" onclick="prepararSistema('camara')">🎥 ABRIR CÁMARA IA</button>
    <button class="btn-inicio" style="background:#2980b9; color:white;" onclick="document.getElementById('fileInput').click()">📁 SUBIR VIDEO</button>
    <input type="file" id="fileInput" hidden accept="video/*" onchange="prepararSistema('archivo')">
</div>

<div id="contenedor-analisis">
    <div id="canvas-wrapper"><canvas id="output_canvas"></canvas></div>
    <video id="input_video" playsinline muted></video>
    <div class="barra-controles">
        <button class="btn-circular btn-dark" onclick="location.reload()">SALIR</button>
        <button class="btn-circular" style="background:#00d2d3; color:#000;" onclick="cambiarCamara()">🔄<br>GIRAR</button>
        <button id="btn-calib" class="btn-circular" style="background:#f1c40f; color:#000;" onclick="activarIA()">⚖️<br>CALIBRAR</button>
        <button id="recordBtn" class="btn-circular" style="background:#ff4d4d; opacity: 0.3;" onclick="toggleGrabacion()">🔴<br>GRABAR</button>
    </div>
</div>

<script>
    const video = document.getElementById('input_video');
    const canvas = document.getElementById('output_canvas');
    const ctx = canvas.getContext('2d');
    let pose = null, iaActiva = false, calibrado = false, analizandoRiesgo = false;
    let currentFacingMode = "environment", baseAngles = {}, mediaRecorder, recordedChunks = [];
    let smoothedLandmarks = null;
    const ALPHA = 0.35; // Balance entre respuesta y suavizado
    const TH = { cuello: 15, tronco: 20, hombros: 30, codos: 25, munecas: 22, piernas: 28, pies: 20 };

    // Función crucial: Adaptación dinámica al tamaño de pantalla
    function ajustarResolucion() {
        const vW = video.videoWidth;
        const vH = video.videoHeight;
        const aspect = vW / vH;
        const screenW = window.innerWidth;
        const screenH = window.innerHeight - 80; // Restamos espacio de botones

        // Si es vertical (móvil) o horizontal (tablet/PC)
        if (screenW < screenH) {
            canvas.width = screenW;
            canvas.height = screenW / aspect;
        } else {
            // Mantenemos proporción basada en la altura para evitar distorsión
            canvas.height = screenH;
            canvas.width = screenH * aspect;
        }
    }

    async function prepararSistema(fuente) {
        document.getElementById('menu-inicial').style.display = 'none';
        document.getElementById('contenedor-analisis').style.display = 'flex';
        if (fuente === 'camara') await encenderCamara();
        else {
            video.src = URL.createObjectURL(document.getElementById('fileInput').files[0]);
            video.onloadedmetadata = () => { ajustarResolucion(); video.play(); loopPrevio(); };
        }
    }

    async function encenderCamara() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: currentFacingMode, width: { ideal: 1280 }, height: { ideal: 720 } } 
            });
            video.srcObject = stream;
            video.onloadedmetadata = () => { ajustarResolucion(); video.play(); loopPrevio(); };
        } catch (err) { alert("Error de cámara: " + err); }
    }

    function loopPrevio() { if (!iaActiva) { ctx.drawImage(video, 0, 0, canvas.width, canvas.height); requestAnimationFrame(loopPrevio); } }

    function activarIA() {
        pose = new Pose({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}` });
        pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
        pose.onResults(onResults);
        iaActiva = true;
        document.getElementById('recordBtn').style.opacity = "1";
        const startTime = Date.now();
        const calibTimer = setInterval(() => {
            const elapsed = Date.now() - startTime;
            if (elapsed > 4000) { calibrado = true; clearInterval(calibTimer); }
        }, 100);
        loopIA();
    }

    async function loopIA() { if (iaActiva) { try { await pose.send({image: video}); } catch(e) { console.error("Error Pose:", e); } requestAnimationFrame(loopIA); } }

    function onResults(res) {
        if (!res.poseLandmarks) return;
        
        // Aplicar Filtro EMA para estabilidad
        if (!smoothedLandmarks) smoothedLandmarks = res.poseLandmarks;
        else {
            smoothedLandmarks = res.poseLandmarks.map((lm, i) => ({
                x: lm.x * ALPHA + smoothedLandmarks[i].x * (1 - ALPHA),
                y: lm.y * ALPHA + smoothedLandmarks[i].y * (1 - ALPHA)
            }));
        }

        ctx.save();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(res.image, 0, 0, canvas.width, canvas.height);

        const w = canvas.width, h = canvas.height;
        const pt = (i) => ({ x: smoothedLandmarks[i].x * w, y: smoothedLandmarks[i].y * h });
        
        const p = {
            cab: pt(0),
            cue: { x: (smoothedLandmarks[11].x+smoothedLandmarks[12].x)/2*w, y:(smoothedLandmarks[11].y+smoothedLandmarks[12].y)/2*h },
            trx: { x: (smoothedLandmarks[11].x+smoothedLandmarks[12].x)/2*w, y:(smoothedLandmarks[11].y+smoothedLandmarks[12].y)/2*h + 20 },
            abd: { x: (smoothedLandmarks[23].x+smoothedLandmarks[24].x)/2*w, y:(smoothedLandmarks[23].y+smoothedLandmarks[24].y)/2*h - 20 },
            eba: { x: (smoothedLandmarks[23].x+smoothedLandmarks[24].x)/2*w, y:(smoothedLandmarks[23].y+smoothedLandmarks[24].y)/2*h },
            h_d: pt(12), c_d: pt(14), m_d: pt(16), h_i: pt(11), c_i: pt(13), m_i: pt(15),
            r_d: pt(26), t_d: pt(28), r_i: pt(25), t_i: pt(27)
        };

        const angles = {
            cue: calcAng(p.cab, p.cue, p.trx), abd: calcAng(p.trx, p.abd, p.eba),
            h_d: calcAng(p.trx, p.h_d, p.c_d), h_i: calcAng(p.trx, p.h_i, p.c_i),
            c_d: calcAng(p.h_d, p.c_d, p.m_d), c_i: calcAng(p.h_i, p.c_i, p.m_i)
        };

        if (calibrado && Object.keys(baseAngles).length === 0) baseAngles = {...angles};

        const drawSeg = (p1, p2, angKey, groupKey) => {
            ctx.lineWidth = 5; ctx.lineCap = "round"; ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y);
            if (analizandoRiesgo && calibrado) {
                const diff = Math.abs(angles[angKey] - baseAngles[angKey]);
                const t = TH[groupKey] || 20;
                ctx.strokeStyle = diff > (t*2) ? "#ff3838" : (diff > t ? "#fffa65" : "#32ff7e");
            } else { ctx.strokeStyle = calibrado ? "#32ff7e" : "#4b4b4b"; }
            ctx.stroke();
        };

        drawSeg(p.cab, p.cue, 'cue', 'cuello');
        drawSeg(p.cue, p.trx, 'abd', 'tronco');
        drawSeg(p.trx, p.h_d, 'h_d', 'hombros');
        drawSeg(p.h_d, p.c_d, 'h_d', 'hombros');
        drawSeg(p.c_d, p.m_d, 'c_d', 'codos');
        drawSeg(p.trx, p.h_i, 'h_i', 'hombros');
        drawSeg(p.h_i, p.c_i, 'h_i', 'hombros');
        drawSeg(p.c_i, p.m_i, 'c_i', 'codos');
        drawSeg(p.eba, p.r_d, 'r_d', 'piernas');
        drawSeg(p.r_d, p.t_d, 'r_d', 'piernas');
        drawSeg(p.eba, p.r_i, 'r_i', 'piernas');
        drawSeg(p.r_i, p.t_i, 'r_i', 'piernas');

        ctx.restore();
    }

    function calcAng(a,b,c) {
        const v1={x:a.x-b.x, y:a.y-b.y}, v2={x:c.x-b.x, y:c.y-b.y};
        const dot = v1.x*v2.x + v1.y*v2.y;
        const m1 = Math.sqrt(v1.x**2 + v1.y**2), m2 = Math.sqrt(v2.x**2 + v2.y**2);
        return (m1*m2 === 0) ? 0 : Math.acos(Math.max(-1, Math.min(1, dot/(m1*m2))))*(180/Math.PI);
    }

    function toggleGrabacion() {
        if (!calibrado) return;
        analizandoRiesgo = !analizandoRiesgo;
        document.getElementById('recordBtn').classList.toggle('rec-active', analizandoRiesgo);
        if (analizandoRiesgo) {
            recordedChunks = [];
            mediaRecorder = new MediaRecorder(canvas.captureStream(30), { mimeType: 'video/webm' });
            mediaRecorder.ondataavailable = (e) => recordedChunks.push(e.data);
            mediaRecorder.onstop = () => {
                const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob(recordedChunks));
                a.download = `LYA_ADAPTIVE_${Date.now()}.webm`; a.click();
            };
            mediaRecorder.start();
        } else { mediaRecorder.stop(); }
    }

    async function cambiarCamara() {
        currentFacingMode = (currentFacingMode === "environment") ? "user" : "environment";
        iaActiva = false; 
        if(video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
        await encenderCamara();
    }

    // Escuchar cambios de orientación
    window.addEventListener('resize', ajustarResolucion);
</script>
</body>
</html>
