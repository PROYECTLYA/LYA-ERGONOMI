<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LYA-ERGO v25.2 | INDUSTRIAL PRECISION</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --accent: #00ff00; --bg: #0d1117; --danger: #ff3838; --warning: #fffa65; }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background-color: var(--bg); color: white; 
            overflow: hidden; font-family: 'Segoe UI', sans-serif;
        }

        /* Pantalla de Inicio */
        #menu-inicial { 
            position: fixed; inset: 0; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; 
            background: radial-gradient(circle, #161b22 0%, #0d1117 100%); z-index: 5000; 
        }

        /* Contenedor Principal */
        #contenedor-analisis { display: none; height: 100vh; width: 100vw; position: relative; flex-direction: row; }

        /* Área de Visualización */
        #canvas-wrapper {
            flex: 1; position: relative; display: flex;
            align-items: center; justify-content: center; background: #000;
        }
        canvas { max-width: 100%; max-height: 100%; object-fit: contain; }
        video { display: none; }

        /* BARRA LATERAL DERECHA (Mejora Tablet/Celular) */
        .barra-controles {
            width: 80px; height: 100%; background: rgba(22, 27, 34, 0.9);
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; gap: 20px; border-left: 1px solid #30363d; z-index: 4000;
        }

        .btn-circular { 
            width: 60px; height: 60px; border-radius: 50%; border: none; 
            font-size: 9px; font-weight: 900; color: white; 
            display: flex; align-items: center; justify-content: center; 
            flex-direction: column; transition: 0.2s; background: #21262d;
        }
        .btn-circular:active { transform: scale(0.9); }
        .rec-active { background: #fff !important; color: #f00 !important; border: 3px solid #f00 !important; animation: pulse 1s infinite; }

        .status-badge { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.8); padding: 8px 15px; border-radius: 8px; border-left: 4px solid var(--accent); font-size: 10px; z-index: 3000; }

        #orient-lock {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            z-index: 9999; flex-direction: column; align-items: center; justify-content: center; text-align: center;
        }
        
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255,0,0,0.7); } 70% { box-shadow: 0 0 0 10px rgba(255,0,0,0); } 100% { box-shadow: 0 0 0 0 rgba(255,0,0,0); } }
    </style>
</head>
<body>

<div id="orient-lock">
    <h2 style="color: var(--danger);">ROTACIÓN REQUERIDA</h2>
    <p>La auditoría solo es válida en modo <b>VERTICAL</b>.</p>
</div>

<div id="menu-inicial">
    <h1 style="color: var(--accent); font-weight: 900;">LYA-ERGO</h1>
    <p style="color: #8b949e; letter-spacing: 2px;">V19.1 - VALIDATED</p>
    <button class="btn btn-success p-3 m-2 w-75" onclick="prepararSistema('camara')">🎥 CÁMARA IA</button>
    <button class="btn btn-primary p-3 m-2 w-75" onclick="document.getElementById('fileInput').click()">📁 ANALIZAR VIDEO</button>
    <input type="file" id="fileInput" hidden accept="video/*" onchange="prepararSistema('archivo')">
</div>

<div id="contenedor-analisis">
    <div id="canvas-wrapper">
        <div class="status-badge" id="txt-status">IA EN ESPERA</div>
        <canvas id="output_canvas"></canvas>
    </div>
    
    <div class="barra-controles">
        <button class="btn-circular" style="background:#4b4b4b" onclick="location.reload()">SALIR</button>
        <button class="btn-circular" style="background:#00d2d3; color:#000;" onclick="cambiarCamara()">🔄<br>GIRAR</button>
        <button id="btn-calib" class="btn-circular" style="background:#f1c40f; color:#000;" onclick="activarIA()">⚖️<br>CALIB</button>
        <button id="recordBtn" class="btn-circular" style="background:#ff4d4d; opacity: 0.3;" onclick="toggleGrabacion()">🔴<br>AUDIT</button>
    </div>
</div>

<video id="input_video" playsinline muted></video>

<script>
    const video = document.getElementById('input_video');
    const canvas = document.getElementById('output_canvas');
    const ctx = canvas.getContext('2d');
    const txtStatus = document.getElementById('txt-status');
    
    let pose = null, iaActiva = false, calibrado = false, analizandoRiesgo = false;
    let currentFacingMode = "environment", baseAngles = {}, mediaRecorder, recordedChunks = [];
    let startTimeCalib = 0;

    // Umbrales de Semaforización Originales
    const TH = { cuello: 15, tronco: 20, hombros: 30, codos: 25, munecas: 22, piernas: 28, pies: 20 };

    function checkOrientation() {
        if (window.innerWidth > window.innerHeight) {
            document.getElementById('orient-lock').style.display = 'flex';
            if(analizandoRiesgo) toggleGrabacion();
        } else {
            document.getElementById('orient-lock').style.display = 'none';
        }
    }

    async function prepararSistema(fuente) {
        document.getElementById('menu-inicial').style.display = 'none';
        document.getElementById('contenedor-analisis').style.display = 'flex';
        checkOrientation();
        if (fuente === 'camara') await encenderCamara();
        else {
            video.src = URL.createObjectURL(document.getElementById('fileInput').files[0]);
            video.onloadedmetadata = () => { video.play(); loopPrevio(); };
        }
    }

    async function encenderCamara() {
        if(video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
        const stream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: currentFacingMode, width: {ideal: 1280}, height: {ideal: 720} } 
        });
        video.srcObject = stream;
        video.onloadedmetadata = () => { 
            canvas.width = video.videoWidth; 
            canvas.height = video.videoHeight;
            video.play(); 
            loopPrevio(); 
        };
    }

    function loopPrevio() { if (!iaActiva) { ctx.drawImage(video, 0, 0, canvas.width, canvas.height); requestAnimationFrame(loopPrevio); } }

    function activarIA() {
        txtStatus.innerText = "INICIALIZANDO...";
        pose = new Pose({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}` });
        pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.6 });
        pose.onResults(onResults);
        iaActiva = true;
        startTimeCalib = Date.now();
        document.getElementById('recordBtn').style.opacity = "1";
        
        async function runIA() { await pose.send({image: video}); requestAnimationFrame(runIA); }
        runIA();
    }

    function onResults(res) {
        if (!res.poseLandmarks) return;
        ctx.save();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(res.image, 0, 0, canvas.width, canvas.height);

        const lm = res.poseLandmarks;
        const w = canvas.width, h = canvas.height;
        const pt = (i) => ({ x: lm[i].x * w, y: lm[i].y * h });

        // JERARQUÍA ESQUELÉTICA RESPETADA
        const p = {
            cab: pt(0),
            cue: { x: (lm[11].x+lm[12].x)/2*w, y:(lm[11].y+lm[12].y)/2*h },
            trx: { x: (lm[11].x+lm[12].x)/2*w, y:(lm[11].y+lm[12].y)/2*h + 20 },
            abd: { x: (lm[23].x+lm[24].x)/2*w, y:(lm[23].y+lm[24].y)/2*h - 20 },
            eba: { x: (lm[23].x+lm[24].x)/2*w, y:(lm[23].y+lm[24].y)/2*h },
            h_d: pt(12), c_d: pt(14), m_d: pt(16), mano_d: pt(20),
            h_i: pt(11), c_i: pt(13), m_i: pt(15), mano_i: pt(19),
            r_d: pt(26), t_d: pt(28), pie_d: pt(32),
            r_i: pt(25), t_i: pt(27), pie_i: pt(31)
        };

        // CÁLCULOS INDIVIDUALES RESPETADOS
        const angles = {
            cue: calcAng(p.cab, p.cue, p.trx),
            abd: calcAng(p.trx, p.abd, p.eba),
            h_d: calcAng(p.trx, p.h_d, p.c_d), h_i: calcAng(p.trx, p.h_i, p.c_i),
            c_d: calcAng(p.h_d, p.c_d, p.m_d), c_i: calcAng(p.h_i, p.c_i, p.m_i),
            r_d: calcAng(p.eba, p.r_d, p.t_d), r_i: calcAng(p.eba, p.r_i, p.t_i)
        };

        if (!calibrado) {
            const t = Date.now() - startTimeCalib;
            if (t > 4000) { baseAngles = {...angles}; calibrado = true; txtStatus.innerText = "CALIBRADO"; }
            else { txtStatus.innerText = `CALIBRANDO BIOTIPO... ${Math.ceil((4000-t)/1000)}s`; }
        }

        // SEMAFORIZACIÓN RESPETADA
        const drawSeg = (p1, p2, angKey, groupKey) => {
            ctx.lineWidth = 6; ctx.lineCap = "round"; ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y);
            if (analizandoRiesgo && calibrado) {
                const diff = Math.abs(angles[angKey] - baseAngles[angKey]);
                const t = TH[groupKey];
                ctx.strokeStyle = diff > (t*2) ? "#ff3838" : (diff > t ? "#fffa65" : "#32ff7e");
            } else { ctx.strokeStyle = calibrado ? "#32ff7e" : "#4b4b4b"; }
            ctx.stroke();
        };

        // Dibujado completo del esqueleto
        drawSeg(p.cab, p.cue, 'cue', 'cuello');
        drawSeg(p.cue, p.trx, 'abd', 'tronco');
        drawSeg(p.trx, p.abd, 'abd', 'tronco');
        drawSeg(p.h_d, p.c_d, 'h_d', 'hombros');
        drawSeg(p.c_d, p.m_d, 'c_d', 'codos');
        drawSeg(p.h_i, p.c_i, 'h_i', 'hombros');
        drawSeg(p.c_i, p.m_i, 'c_i', 'codos');
        drawSeg(p.eba, p.r_d, 'r_d', 'piernas');
        drawSeg(p.eba, p.r_i, 'r_i', 'piernas');

        ctx.restore();
    }

    function calcAng(a,b,c) {
        const v1={x:a.x-b.x, y:a.y-b.y}, v2={x:c.x-b.x, y:c.y-b.y};
        const dot = v1.x*v2.x + v1.y*v2.y;
        const m1 = Math.sqrt(v1.x**2 + v1.y**2), m2 = Math.sqrt(v2.x**2 + v2.y**2);
        return (m1*m2 === 0) ? 0 : Math.acos(Math.max(-1, Math.min(1, dot/(m1*m2))))*(180/Math.PI);
    }

    function toggleGrabacion() {
        if (!calibrado || window.innerWidth > window.innerHeight) return;
        analizandoRiesgo = !analizandoRiesgo;
        document.getElementById('recordBtn').classList.toggle('rec-active', analizandoRiesgo);
        if (analizandoRiesgo) {
            recordedChunks = [];
            mediaRecorder = new MediaRecorder(canvas.captureStream(30), { mimeType: 'video/webm' });
            mediaRecorder.ondataavailable = (e) => recordedChunks.push(e.data);
            mediaRecorder.onstop = () => {
                const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob(recordedChunks));
                a.download = `ERGO_${Date.now()}.webm`; a.click();
            };
            mediaRecorder.start();
            txtStatus.innerText = "GRABANDO AUDITORÍA";
        } else { mediaRecorder.stop(); txtStatus.innerText = "AUDITORÍA GUARDADA"; }
    }

    async function cambiarCamara() {
        currentFacingMode = (currentFacingMode === "environment") ? "user" : "environment";
        await encenderCamara();
    }

    window.addEventListener('resize', checkOrientation);
</script>
</body>
</html>
