<script>
    const video = document.getElementById('input_video');
    const canvas = document.getElementById('output_canvas');
    const ctx = canvas.getContext('2d');
    const txtStatus = document.getElementById('txt-status');
    const progressBar = document.getElementById('bar-id');
    
    let pose = null, iaActiva = false, calibrado = false, analizandoRiesgo = false;
    let currentFacingMode = "environment", startTimeCalib = 0;
    let baseAngles = {}, mediaRecorder, recordedChunks = [];

    // 🔥 NUEVO: historial suavizado
    let historyAngles = {};

    // 🔥 NUEVO: reporte auditoría
    let reporteJSON = [];

    const TH = { cuello: 15, tronco: 20, hombros: 30, codos: 25, munecas: 22, piernas: 28, pies: 20 };

    // 🔥 NUEVO: función suavizado
    function smoothAngle(key, value) {
        if (!historyAngles[key]) historyAngles[key] = [];
        historyAngles[key].push(value);
        if (historyAngles[key].length > 5) historyAngles[key].shift();
        return historyAngles[key].reduce((a,b)=>a+b,0)/historyAngles[key].length;
    }

    // 🔥 NUEVO: validación postura calibración
    function posturaValida(angles) {
        return (
            angles.cue > 140 &&
            angles.abd > 140 &&
            angles.h_d > 120 &&
            angles.h_i > 120
        );
    }

    // 🔥 NUEVO: validación visibilidad
    function visibilidadOK(lm) {
        return lm.every(p => (p.visibility === undefined || p.visibility > 0.5));
    }

    async function prepararSistema(fuente) {
        document.getElementById('menu-inicial').style.display = 'none';
        document.getElementById('contenedor-analisis').style.display = 'block';

        try {
            if (fuente === 'camara') await encenderCamara();
            else {
                const file = document.getElementById('fileInput').files[0];
                video.src = URL.createObjectURL(file);
                video.onloadedmetadata = () => { video.play(); loopPrevio(); };
            }
        } catch (e) {
            alert("Error al iniciar cámara/video");
        }
    }

    async function encenderCamara() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: currentFacingMode } });
            video.srcObject = stream;
            video.onloadedmetadata = () => { video.play(); loopPrevio(); };
        } catch (e) {
            alert("No se pudo acceder a la cámara");
        }
    }

    function loopPrevio() { 
        if (!iaActiva) { 
            canvas.width = video.videoWidth; 
            canvas.height = video.videoHeight; 
            ctx.drawImage(video, 0, 0); 
            requestAnimationFrame(loopPrevio); 
        } 
    }

    function activarIA() {
        document.getElementById('loader-ia').style.display = 'flex';

        pose = new Pose({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}` });

        pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });

        pose.onResults(onResults);
        
        let p = 0;
        const iv = setInterval(() => { p += 10; progressBar.style.width = p+'%'; if(p>=100) clearInterval(iv); }, 80);

        setTimeout(() => { 
            document.getElementById('loader-ia').style.display='none'; 
            iaActiva=true; 
            startTimeCalib=Date.now(); 
            loopIA(); 
        }, 1200);
    }

    async function loopIA() { 
        if (iaActiva) { 
            await pose.send({image: video}); 
            requestAnimationFrame(loopIA); 
        } 
    }

    function onResults(res) {
        if (!res.poseLandmarks) return;

        // 🔥 VALIDACIÓN VISIBILIDAD
        if (!visibilidadOK(res.poseLandmarks)) {
            txtStatus.innerText = "VISIBILIDAD BAJA";
            return;
        }

        ctx.save();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(res.image, 0, 0);

        const lm = res.poseLandmarks;
        const w = canvas.width, h = canvas.height;
        const pt = (i) => ({ x: lm[i].x * w, y: lm[i].y * h });
        
        const p = {
            cab: pt(0),
            cue: { x: (lm[11].x+lm[12].x)/2*w, y:(lm[11].y+lm[12].y)/2*h },
            trx: { x: (lm[11].x+lm[12].x)/2*w, y:(lm[11].y+lm[12].y)/2*h + 20 },
            abd: { x: (lm[23].x+lm[24].x)/2*w, y:(lm[23].y+lm[24].y)/2*h - 20 },
            eba: { x: (lm[23].x+lm[24].x)/2*w, y:(lm[23].y+lm[24].y)/2*h },
            h_d: pt(12), c_d: pt(14), m_d: pt(16), mano_d: pt(20),
            h_i: pt(11), c_i: pt(13), m_i: pt(15), mano_i: pt(19),
            r_d: pt(26), t_d: pt(28), pie_d: pt(32),
            r_i: pt(25), t_i: pt(27), pie_i: pt(31)
        };

        let angles = {
            cue: calcAng(p.cab, p.cue, p.trx),
            abd: calcAng(p.trx, p.abd, p.eba),
            h_d: calcAng(p.trx, p.h_d, p.c_d),
            h_i: calcAng(p.trx, p.h_i, p.c_i),
            c_d: calcAng(p.h_d, p.c_d, p.m_d),
            c_i: calcAng(p.h_i, p.c_i, p.m_i),
            m_d: calcAng(p.c_d, p.m_d, p.mano_d),
            m_i: calcAng(p.c_i, p.m_i, p.mano_i),
            r_d: calcAng(p.eba, p.r_d, p.t_d),
            r_i: calcAng(p.eba, p.r_i, p.t_i),
            t_d: calcAng(p.r_d, p.t_d, p.pie_d),
            t_i: calcAng(p.r_i, p.t_i, p.pie_i)
        };

        // 🔥 SUAVIZADO GLOBAL
        Object.keys(angles).forEach(k=>{
            angles[k] = smoothAngle(k, angles[k]);
        });

        // 🔥 CALIBRACIÓN CONTROLADA
        if (!calibrado) {
            const t = Date.now() - startTimeCalib;

            if (!posturaValida(angles)) {
                txtStatus.innerText = "POSTURA INCORRECTA PARA CALIBRAR";
                return;
            }

            if (t > 4000) { 
                baseAngles = {...angles}; 
                calibrado = true; 
            } else { 
                txtStatus.innerText = `CALIBRANDO... ${Math.ceil((4000-t)/1000)}s`; 
            }
        }

        let scoreTotal = 0;

        const drawSeg = (p1, p2, angKey, groupKey) => {
            ctx.lineWidth = 6; ctx.lineCap = "round"; ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y);
            
            if (analizandoRiesgo && calibrado) {
                const diff = Math.abs(angles[angKey] - baseAngles[angKey]);
                const t = TH[groupKey];

                if (diff > t*2) { ctx.strokeStyle = "#ff3838"; scoreTotal += 2; }
                else if (diff > t) { ctx.strokeStyle = "#fffa65"; scoreTotal += 1; }
                else ctx.strokeStyle = "#32ff7e";

            } else { 
                ctx.strokeStyle = calibrado ? "#32ff7e" : "#4b4b4b"; 
            }
            ctx.stroke();
        };

        // (TU RENDER ORIGINAL)
        drawSeg(p.cab, p.cue, 'cue', 'cuello');
        drawSeg(p.cue, p.trx, 'abd', 'tronco');
        drawSeg(p.trx, p.abd, 'abd', 'tronco');
        drawSeg(p.abd, p.eba, 'abd', 'tronco');

        drawSeg(p.trx, p.h_d, 'h_d', 'hombros');
        drawSeg(p.h_d, p.c_d, 'h_d', 'hombros');
        drawSeg(p.c_d, p.m_d, 'c_d', 'codos');
        drawSeg(p.m_d, p.mano_d, 'm_d', 'munecas');

        drawSeg(p.trx, p.h_i, 'h_i', 'hombros');
        drawSeg(p.h_i, p.c_i, 'h_i', 'hombros');
        drawSeg(p.c_i, p.m_i, 'c_i', 'codos');
        drawSeg(p.m_i, p.mano_i, 'm_i', 'munecas');

        drawSeg(p.eba, p.r_d, 'r_d', 'piernas');
        drawSeg(p.r_d, p.t_d, 'r_d', 'piernas');
        drawSeg(p.t_d, p.pie_d, 't_d', 'pies');

        drawSeg(p.eba, p.r_i, 'r_i', 'piernas');
        drawSeg(p.r_i, p.t_i, 'r_i', 'piernas');
        drawSeg(p.t_i, p.pie_i, 't_i', 'pies');

        // 🔥 REGISTRO AUDITORÍA
        if (analizandoRiesgo) {
            reporteJSON.push({
                time: Date.now(),
                score: scoreTotal,
                angles: angles
            });
        }

        txtStatus.innerText = calibrado ? `SCORE: ${scoreTotal}` : txtStatus.innerText;

        ctx.restore();
    }

    // 🔥 EXPORT JSON JUNTO CON VIDEO
    function toggleGrabacion() {
        if (!calibrado) return;

        analizandoRiesgo = !analizandoRiesgo;
        document.getElementById('recordBtn').classList.toggle('rec-active', analizandoRiesgo);

        if (analizandoRiesgo) {
            recordedChunks = [];
            reporteJSON = [];

            mediaRecorder = new MediaRecorder(canvas.captureStream(30), { mimeType: 'video/webm' });
            mediaRecorder.ondataavailable = (e) => recordedChunks.push(e.data);

            mediaRecorder.onstop = () => {
                // VIDEO
                const a = document.createElement('a'); 
                a.href = URL.createObjectURL(new Blob(recordedChunks));
                a.download = `VIDEO_${Date.now()}.webm`; 
                a.click();

                // JSON
                const b = document.createElement('a');
                b.href = URL.createObjectURL(new Blob([JSON.stringify(reporteJSON,null,2)]));
                b.download = `REPORTE_${Date.now()}.json`;
                b.click();
            };

            mediaRecorder.start();
            txtStatus.innerText = "GRABANDO...";
        } else { 
            mediaRecorder.stop(); 
        }
    }
</script>
