<body>

<div id="loader-ia">
    <h3 style="color:#00ff00; letter-spacing: 4px; font-weight: 900;">LYA-AUDITOR ENGINE</h3>

</div>

<div id="menu-inicial">

    <div style="width: 85%; max-width: 320px; margin-bottom: 20px;">
        <label style="color: #8b949e; font-size: 0.7rem; display: block; text-align: left; margin-bottom: 5px;">PUESTO DE TRABAJO:</label>
        <input type="text" id="puestoTrabajo" placeholder="Ej: Operador Línea 4" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #30363d; background: #0d1117; color: white; margin-bottom: 10px;">

    <input type="file" id="fileInput" hidden accept="video/*" onchange="prepararSistema('archivo')">
</div>

<div id="contenedor-analisis">
    <div class="status-badge" id="txt-status">SISTEMA READY</div>
    <canvas id="output_canvas"></canvas>
    <video id="input_video" playsinline muted></video>
    <div class="barra-controles">
        <button class="btn-circular btn-dark" onclick="location.reload()">SALIR</button>
        <button class="btn-circular" style="background:#00d2d3; color:#000;" onclick="cambiarCamara()">🔄<br>GIRAR</button>
        <button id="btn-calib" class="btn-circular" style="background:#f1c40f; color:#000;" onclick="activarIA()">⚖️<br>CALIBRAR</button>
        <button id="recordBtn" class="btn-circular" style="background:#ff4d4d; opacity: 0.3;" onclick="toggleGrabacion()">🔴<br>AUDITAR</button>
    </div>
</div>

<script>
    // --- 1. VARIABLES GLOBALES ---
    const video = document.getElementById('input_video');
    const canvas = document.getElementById('output_canvas');
    const ctx = canvas.getContext('2d');
    const txtStatus = document.getElementById('txt-status');
    const TH = { tronco: 18, cuello: 12, hombros: 28, codos: 25, munecas: 20, piernas: 25, pies: 18 };
    const HISTORIAL_MAX = 20;
    // Nuevos umbrales específicos NOM-036
const NOM_LIMITS = {
    peso: { H: 25, M: 20, H45: 15, M45: 10 }, // Pesos máximos por género/edad
    masaAcumulada: { corta: 10000, larga: 6000 }, // kg por jornada (10m vs 20m)
    frecuenciaMax: 4 // ciclos por minuto aceptables
};

   // ... (variables anteriores)
let mediaRecorder;
let recordedChunks = [];
let baseAngles = {};
let angleBuffer = {};
let screenshotRiesgo = null; 
    let iaActiva = false; // Te falta esta
let calibrado = false; // Te falta esta
let startTimeCalib = 0; // Te falta esta
let currentFacingMode = "environment"; // Te falta esta
    let pose;


    let wbaStats = { 
        riesgoAltoTotal: 0, 
        framesAnalizados: 0, 
        zonasAfectadas: new Set(), 
        inicioAuditoria: null,
        ciclos: 0, 
        lastHandY: null,
        subiendo: false 
    };

    // --- 2. FUNCIONES DE VIDEO ---
    async function prepararSistema(fuente) {
        document.getElementById('menu-inicial').style.display = 'none';
        document.getElementById('contenedor-analisis').style.display = 'block';
        if (fuente === 'camara') { await encenderCamara(); } 
        else {
            const file = document.getElementById('fileInput').files[0];
            if (!file) return;
            video.src = URL.createObjectURL(file);
            video.onloadedmetadata = () => { configurarCanvas(); video.play(); requestAnimationFrame(loopVideoSimple); };
        }
    }

    async function encenderCamara() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: currentFacingMode, width: { ideal: 1280 }, height: { ideal: 720 } } 
            });
            video.srcObject = stream;
            video.onloadedmetadata = () => { configurarCanvas(); video.play(); requestAnimationFrame(loopVideoSimple); };
        } catch (e) { alert("Error al acceder a la cámara"); }
    }

    function configurarCanvas() {
        canvas.width = video.videoWidth; 
        canvas.height = video.videoHeight;
    }

    function loopVideoSimple() {
        if (!iaActiva) {
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            requestAnimationFrame(loopVideoSimple);
        }
    }


    

    // --- 3. CÁLCULOS BIOMECÁNICOS ---
    function calcAng3D(a,b,c) {
        const v1={x:a.x-b.x, y:a.y-b.y, z:a.z-b.z}, v2={x:c.x-b.x, y:c.y-b.y, z:c.z-b.z};
        const dot = v1.x*v2.x + v1.y*v2.y + v1.z*v2.z;
        const m1 = Math.sqrt(v1.x**2 + v1.y**2 + v1.z**2), m2 = Math.sqrt(v2.x**2 + v2.y**2 + v2.z**2);
        return (m1*m2 === 0) ? 0 : Math.acos(Math.max(-1, Math.min(1, dot/(m1*m2))))*(180/Math.PI);
    }

    
function onResults(res) {
    if (!res.poseLandmarks) return;
    ctx.save();
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Soporte para Modo Espejo (Cámara Frontal)
    if (currentFacingMode === "user") { 
        ctx.translate(canvas.width, 0); 
        ctx.scale(-1, 1); 
    }
    
    ctx.drawImage(res.image, 0, 0, canvas.width, canvas.height);

    const lm = res.poseLandmarks, w = canvas.width, h = canvas.height;
    const pt = (i) => ({ x: lm[i].x * w, y: lm[i].y * h, z: lm[i].z });
    
    // Estructura Biomecánica
    const p = {
        cab: pt(0), 
        cue: { x: (lm[11].x+lm[12].x)/2*w, y:(lm[11].y+lm[12].y)/2*h, z:(lm[11].z+lm[12].z)/2 },
        tor: { x: (lm[11].x+lm[12].x)/2*w, y:(lm[11].y+lm[12].y)/2*h + 40, z:(lm[11].z+lm[12].z)/2 },
        abd: { x: (lm[23].x+lm[24].x)/2*w, y:(lm[23].y+lm[24].y)/2*h - 30, z:(lm[23].z+lm[24].z)/2 },
        esp_baja: { x: (lm[23].x+lm[24].x)/2*w, y:(lm[23].y+lm[24].y)/2*h, z:(lm[23].z+lm[24].z)/2 },
        h_d: pt(12), c_d: pt(14), m_d: pt(16), mano_d: pt(20),
        h_i: pt(11), c_i: pt(13), m_i: pt(15), mano_i: pt(19),
        p_d: pt(24), r_d: pt(26), t_d: pt(28), pie_d: pt(32),
        p_i: pt(23), r_i: pt(25), t_i: pt(27), pie_i: pt(31)
    };

    // --- LÓGICA DE AUDITORÍA (CICLOS Y MASA ACUMULADA) ---
    if (analizandoRiesgo) {
        const currentHandY = (p.m_d.y + p.m_i.y) / 2;
        if (wbaStats.lastHandY !== null) {
            const desp = wbaStats.lastHandY - currentHandY;
            
            // Detección de ciclo de levantamiento
            if (desp > 50 && !wbaStats.subiendo) { 
                wbaStats.ciclos++; 
                wbaStats.subiendo = true; 
                
                // Cálculo de Masa Acumulada Proyectada (NOM-036)
                const pesoCarga = parseFloat(document.getElementById('pesoCarga').value) || 0;
                const minTranscurridos = (Date.now() - wbaStats.inicioAuditoria) / 60000;
                if(minTranscurridos > 0) {
                    // Proyección a jornada de 8 horas (480 min)
                    wbaStats.masaProyectada = Math.round((wbaStats.ciclos / minTranscurridos) * pesoCarga * 480);
                }
            } 
            else if (desp < -50) { wbaStats.subiendo = false; }
        }
        wbaStats.lastHandY = currentHandY;
    }

    // Cálculo de Ángulos actuales
    const currentAngles = {
        cue: calcAng3D(p.cab, p.cue, p.tor), 
        abd: calcAng3D(p.tor, p.abd, p.esp_baja),
        c_d: calcAng3D(p.h_d, p.c_d, p.m_d), 
        c_i: calcAng3D(p.h_i, p.c_i, p.m_i),
        m_d: calcAng3D(p.c_d, p.m_d, p.mano_d), 
        m_i: calcAng3D(p.c_i, p.m_i, p.mano_i),
        h_d: calcAng3D(p.p_d, p.h_d, p.c_d), 
        h_i: calcAng3D(p.p_i, p.h_i, p.c_i),
        r_d: calcAng3D(p.p_d, p.r_d, p.t_d), 
        r_i: calcAng3D(p.p_i, p.r_i, p.t_i),
        t_d: calcAng3D(p.r_d, p.t_d, p.pie_d), 
        t_i: calcAng3D(p.r_i, p.t_i, p.pie_i)
    };

    // Suavizado de datos (Buffer)
    Object.keys(currentAngles).forEach(k => {
        if (!angleBuffer[k]) angleBuffer[k] = [];
        angleBuffer[k].push(currentAngles[k]);
        if (angleBuffer[k].length > HISTORIAL_MAX) angleBuffer[k].shift();
    });

    // Calibración automática tras 3 segundos
    if (iaActiva && !calibrado && (Date.now() - startTimeCalib > 3000)) {
        Object.keys(angleBuffer).forEach(k => { 
            baseAngles[k] = angleBuffer[k].reduce((a,b)=>a+b,0) / angleBuffer[k].length; 
        });
        wbaStats.lastHandY = (p.m_d.y + p.m_i.y) / 2;
        calibrado = true; 
        document.getElementById('recordBtn').style.opacity = "1";
        txtStatus.innerText = "CALIBRADO - LISTO";
    }

    // --- DIBUJO DEL ESQUELETO Y EVALUACIÓN ---
    ctx.strokeStyle = "#00ff00"; ctx.lineWidth = 4;
    ctx.beginPath(); ctx.moveTo(p.h_i.x, p.h_i.y); ctx.lineTo(p.h_d.x, p.h_d.y); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(p.p_i.x, p.p_i.y); ctx.lineTo(p.p_d.x, p.p_d.y); ctx.stroke();

    // Evaluación por segmentos (Llamadas a drawV)
    drawV(p.cue, p.esp_baja, 'abd', 'tronco', lm[11], lm[23]);
    drawV(p.cue, p.cab, 'cue', 'cuello', lm[11], lm[0]);
    drawV(p.h_d, p.c_d, 'h_d', 'hombros', lm[12], lm[14]); 
    drawV(p.c_d, p.m_d, 'c_d', 'codos', lm[14], lm[16]);
    drawV(p.m_d, p.mano_d, 'm_d', 'munecas', lm[16], lm[20]);
    drawV(p.h_i, p.c_i, 'h_i', 'hombros', lm[11], lm[13]);
    drawV(p.c_i, p.m_i, 'c_i', 'codos', lm[13], lm[15]);
    drawV(p.m_i, p.mano_i, 'm_i', 'munecas', lm[15], lm[19]);
    drawV(p.p_d, p.r_d, 'r_d', 'piernas', lm[24], lm[26]); 
    drawV(p.r_d, p.t_d, 't_d', 'pies', lm[26], lm[28]);
    drawV(p.p_i, p.r_i, 'r_i', 'piernas', lm[23], lm[25]); 
    drawV(p.r_i, p.t_i, 't_i', 'pies', lm[25], lm[27]);

    // --- CAPTURA DE EVIDENCIA NOM-036 ---
    // Captura si hay riesgo crítico (Rojo) en tronco o cuello para el reporte técnico
    if (analizandoRiesgo && !screenshotRiesgo) {
        const zonasRojo = Array.from(wbaStats.zonasAfectadas);
        if (zonasRojo.includes('tronco') || zonasRojo.includes('cuello')) {
            screenshotRiesgo = canvas.toDataURL('image/jpeg', 0.8);
            console.log("Evidencia visual de postura crítica capturada.");
        }
    }

    ctx.restore();
}



    
    
const drawV = (p1, p2, angKey, groupKey, raw_lm1, raw_lm2) => {
    // 1. Dibujo de la línea base del esqueleto
    ctx.beginPath();
    ctx.lineCap = "round";
    ctx.moveTo(p1.x, p1.y);
    ctx.lineTo(p2.x, p2.y);

    // 2. Validación de visibilidad (Si MediaPipe no ve bien el punto, se dibuja gris)
    if (!raw_lm1 || !raw_lm2 || raw_lm1.visibility < 0.6 || raw_lm2.visibility < 0.6) {
        ctx.strokeStyle = "#4b4b4b"; 
        ctx.lineWidth = 4; 
        ctx.stroke();
        return; 
    }

    // 3. Cálculo del promedio de ángulos (con salvaguarda para evitar NaN)
    const buffer = angleBuffer[angKey] || [];
    const avgAngle = buffer.length > 0 
        ? buffer.reduce((a, b) => a + b, 0) / buffer.length 
        : 0;

    let color = "#00ff00"; // Verde: Riesgo Bajo / Aceptable
    let thickness = 4;
    let statusLabel = "ACEPTABLE";

    // 4. Lógica de evaluación de riesgo (Integración NOM-036 + WBA)
    if (analizandoRiesgo && calibrado) {
        const diff = Math.abs(avgAngle - (baseAngles[angKey] || avgAngle));
        const t = TH[groupKey] || 20; 

        // La NOM-036 penaliza más la flexión de tronco y cuello por ser origen de TME
        const esZonaCritica = (groupKey === 'tronco' || groupKey === 'cuello');
        const factorSeveridad = esZonaCritica ? 1.4 : 1.0;

        if (diff > (t * 2 * factorSeveridad)) { 
            wbaStats.zonasAfectadas.add(groupKey);
            color = "#ff3838"; 
            thickness = 10; 
            statusLabel = "MUY ALTO"; // Nivel de riesgo que exige corrección inmediata
        } else if (diff > (t * factorSeveridad)) {
            wbaStats.zonasAfectadas.add(groupKey); // También registramos riesgo medio
            color = "#f1c40f"; 
            thickness = 7; 
            statusLabel = "MEDIO"; // Nivel de riesgo que requiere corrección a corto plazo
        }
    }

    // 5. Aplicar estilo y dibujar línea de color
    ctx.strokeStyle = color; 
    ctx.lineWidth = thickness; 
    ctx.stroke();

    // 6. Dibujo de etiquetas con soporte para Modo Espejo
    if (calibrado) {
        const midX = (p1.x + p2.x) / 2;
        const midY = (p1.y + p2.y) / 2;
        
        ctx.save(); 

        // --- CORRECCIÓN DE MODO ESPEJO PARA TEXTO ---
        if (currentFacingMode === "user") {
            ctx.translate(midX, midY);
            ctx.scale(-1, 1);
            ctx.translate(-midX, -midY);
        }

        // Fondo de la etiqueta (Rectángulo translúcido)
        const rectW = 85;
        const rectH = 32;
        ctx.fillStyle = "rgba(0, 0, 0, 0.85)";
        ctx.beginPath(); 
        ctx.roundRect(midX + 10, midY - 16, rectW, rectH, 5); 
        ctx.fill();
        
        // Borde de la etiqueta del color del riesgo
        ctx.strokeStyle = color; 
        ctx.lineWidth = 1.5; 
        ctx.stroke();
        
        // Texto superior: Ángulo detectado
        ctx.fillStyle = "#ffffff"; 
        ctx.font = "bold 12px Arial";
        ctx.fillText(`${avgAngle.toFixed(1)}°`, midX + 16, midY - 2);
        
        // Texto inferior: Estatus de riesgo (Terminología NOM-036)
        ctx.fillStyle = color; 
        ctx.font = "900 9px Arial";
        ctx.fillText(statusLabel, midX + 16, midY + 11);

        ctx.restore(); 
    }
};



    
    function activarIA() {
        document.getElementById('loader-ia').style.display = 'flex';
        pose = new Pose({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}` });
        pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });
        pose.onResults((res) => {
            if (!iaActiva) { 
                document.getElementById('loader-ia').style.display = 'none';
                iaActiva = true; startTimeCalib = Date.now(); loopIA(); 
            }
            onResults(res);
        });
        pose.send({image: video});
    }

    async function loopIA() { if (iaActiva) { await pose.send({image: video}); requestAnimationFrame(loopIA); } }





    
function generarReporteWBA() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    
    // --- 1. CONFIGURACIÓN DE DATOS DINÁMICOS ---
    const puesto = (document.getElementById('puestoTrabajo')?.value || "OFICINA").toUpperCase();
    const peso = parseFloat(document.getElementById('pesoCarga')?.value) || 0;
    const msTranscurridos = wbaStats.inicioAuditoria ? (Date.now() - wbaStats.inicioAuditoria) : 0;
    const duracionSegundos = (msTranscurridos / 1000).toFixed(1);
    const frecuencia = (wbaStats.ciclos / (msTranscurridos / 60000 || 0.01)).toFixed(2);
    const fecha = new Date().toLocaleString();

    // Lógica de color de umbral dinámico (Semáforo NOM-036)
    let colorUmbral = [46, 204, 113]; // Verde (Bajo)
    let estatusTexto = "ACEPTABLE";

    if (wbaStats.zonasAfectadas.size > 2 || frecuencia > 5 || peso > 25) {
        colorUmbral = [231, 76, 60]; // Rojo (Alto)
        estatusTexto = "ALTO RIESGO";
    } else if (wbaStats.zonasAfectadas.size > 0 || frecuencia > 2) {
        colorUmbral = [230, 126, 34]; // Naranja (Moderado)
        estatusTexto = "RIESGO MEDIO";
    }

    // --- 2. ENCABEZADO ESTILO INDUSTRIAL ---
    doc.setFillColor(26, 32, 44); 
    doc.rect(0, 0, 210, 28, 'F');
    doc.setTextColor(46, 204, 113); 
    doc.setFontSize(22);
    doc.setFont(undefined, 'bold');
    doc.text("LYA – ERGONOMI", 105, 12, { align: "center" });
    
    doc.setTextColor(255, 255, 255);
    doc.setFontSize(11);
    doc.setFont(undefined, 'normal');
    doc.text("REPORTE MIXTO: WBA + NOM-036-STPS", 105, 22, { align: "center" });

    // --- 3. INFORMACIÓN GENERAL ---
    doc.setTextColor(0, 0, 0);
    doc.setFontSize(10);
    doc.text(`PUESTO: ${puesto}`, 15, 38);
    doc.text(`FECHA: ${fecha}`, 15, 45);
    doc.text(`DURACIÓN EVALUADA: ${duracionSegundos} s`, 15, 52);
    doc.text(`CICLOS DETECTADOS: ${wbaStats.ciclos}`, 145, 52);

    // --- 4. TABLA 1: ANÁLISIS DE CARGA (NOM-036) ---
    doc.autoTable({
        startY: 58,
        head: [['FACTOR ANALIZADO', 'VALOR OBTENIDO', 'ESTATUS NOM-036', 'CRITERIO']],
        body: [
            ['Peso de Carga', `${peso} kg`, peso <= 25 ? 'ACEPTABLE' : 'ALTO RIESGO', 'Límite máximo NOM'],
            ['Masa Acumulada', `${wbaStats.masaProyectada || 0} kg/jornada`, wbaStats.masaProyectada > 10000 ? 'ALTO RIESGO' : 'ACEPTABLE', 'Proyección 8h'],
            ['Frecuencia de Tarea', `${frecuencia} lev/min`, frecuencia <= 4 ? 'ESTABLE' : 'REVISAR', 'Ciclos detectados']
        ],
        headStyles: { fillColor: [52, 152, 219], fontSize: 9 },
        styles: { fontSize: 8, cellPadding: 2 }
    });

    // --- 5. TABLA 2: FACTORES INTEGRADOS ---
    doc.autoTable({
        startY: doc.lastAutoTable.finalY + 5,

function toggleGrabacion() {
    if (!calibrado) return;
    
    analizandoRiesgo = !analizandoRiesgo;
    const btn = document.getElementById('recordBtn');
    btn.classList.toggle('rec-active', analizandoRiesgo);

    if (analizandoRiesgo) {
        // --- 1. LIMPIEZA DE EVIDENCIA ANTERIOR ---
        screenshotRiesgo = null; 
        recordedChunks = [];

        // --- 2. SOLUCIÓN AL "ERROR ASESINO": CAPTURA DEL STREAM AQUÍ ---
        const stream = canvas.captureStream(30); 
        
        // --- 3. CONFIGURACIÓN DE FORMATO (WebM con fallback) ---
        let mimeType = 'video/webm; codecs=vp9';
        if (!MediaRecorder.isTypeSupported(mimeType)) {
            mimeType = 'video/webm';
        }
        // Si sigue sin soportar webm (como en iOS), podrías usar video/mp4
        if (!MediaRecorder.isTypeSupported(mimeType)) {
            mimeType = 'video/mp4';
        }

        try {
            // Inicializamos el recorder con el stream recién creado
            mediaRecorder = new MediaRecorder(stream, { mimeType });
            
            mediaRecorder.ondataavailable = (e) => { 
                if (e.data.size > 0) recordedChunks.push(e.data); 
            };
            
            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: mimeType });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                const extension = mimeType.includes('mp4') ? 'mp4' : 'webm';
                a.href = url; 
                a.download = `EVIDENCIA_LYA_${Date.now()}.${extension}`; 
                a.click();
            };

            mediaRecorder.start();

            // --- 4. REINICIO DE ESTADÍSTICAS ---
            wbaStats = { 
                riesgoAltoTotal: 0, 
                framesAnalizados: 0, 
                zonasAfectadas: new Set(), 
                inicioAuditoria: Date.now(), 
                ciclos: 0, 
                lastHandY: null, 
                subiendo: false 
            };
            
            txtStatus.innerText = "GRABANDO EVIDENCIA...";
            btn.innerHTML = "⏹️<br>DETENER";

        } catch (e) {
            console.error("Error al iniciar la grabación:", e);
            analizandoRiesgo = false;
            btn.classList.remove('rec-active');
            alert("No se pudo iniciar la grabación de video.");
        }

    } else {
        // --- 5. DETENER GRABACIÓN Y PROCESAR REPORTE ---
        if (mediaRecorder && mediaRecorder.state !== "inactive") { 
            mediaRecorder.stop(); 
        }
        
        setTimeout(() => { 
            generarReporteWBA(); 
            txtStatus.innerText = "COMPLETADO"; 
            btn.innerHTML = "🔴<br>AUDITAR"; 
        }, 600);
    }
}
