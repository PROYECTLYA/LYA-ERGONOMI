<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ERGO-SENSING v10.5</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #cont-video { position: relative; width: 100vw; height: 100vh; display: none; }
        video { display: none; }
        canvas { width: 100%; height: 100%; object-fit: contain; }
        .hud { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 5px; font-size: 12px; z-index: 10; border-left: 4px solid #0f0; }
        .controles { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: center; gap: 15px; z-index: 20; }
        .btn-c { width: 70px; height: 70px; border-radius: 50%; border: none; font-size: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div id="setup" class="container text-center mt-5">
    <h2 class="text-success">ERGO-SENSING PRO</h2>
    <p class="text-secondary">v10.5 - Hard Reset Mode</p>
    <hr style="border-color: #333;">
    <button class="btn btn-success btn-lg w-100 mb-3" onclick="forzarCamara()">🎥 1. FORZAR CÁMARA TRASERA</button>
    <div id="status" class="small text-warning">Esperando hardware...</div>
</div>

<div id="cont-video">
    <div class="hud" id="hud-txt">POSICIONE AL SUJETO</div>
    <canvas id="c_out"></canvas>
    <video id="v_in" playsinline muted></video>
    
    <div class="controles">
        <button class="btn-c btn-dark" onclick="location.reload()">REINICIAR</button>
        <button id="b-cal" class="btn-c" style="background:#f1c40f;" onclick="activarIA()">⚖️<br>CALIBRAR</button>
        <button id="b-rec" class="btn-c" style="background:#e74c3c; opacity:0.3;" onclick="toggleRec()">🔴<br>REC</button>
    </div>
</div>

<script>
    const v = document.getElementById('v_in');
    const c = document.getElementById('c_out');
    const ctx = c.getContext('2d');
    const status = document.getElementById('status');
    
    let pose = null;
    let stream = null;
    let iaActiva = false;
    let calibOk = false;
    let analizando = false;
    let baseA = {};
    let startT = 0;

    // --- PASO 1: CONEXIÓN LIMPIA ---
    async function forzarCamara() {
        status.innerText = "Limpiando sensores...";
        try {
            // Liberar cualquier rastro previo
            if(stream) stream.getTracks().forEach(t => t.stop());
            
            // Pedir cámara con constraints mínimos para asegurar respuesta
            stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } } 
            });
            
            v.srcObject = stream;
            v.onloadedmetadata = () => {
                v.play();
                document.getElementById('setup').style.display = 'none';
                document.getElementById('cont-video').style.display = 'block';
                requestAnimationFrame(loopPuro);
            };
        } catch (e) {
            status.innerHTML = `<span class="text-danger">ERROR: ${e.message}</span><br>Prueba reiniciar el celular.`;
        }
    }

    // Bucle de video sin IA (Cero carga de CPU)
    function loopPuro() {
        if(!v.paused && !iaActiva) {
            c.width = v.videoWidth; c.height = v.videoHeight;
            ctx.drawImage(v, 0, 0, c.width, c.height);
            requestAnimationFrame(loopPuro);
        }
    }

    // --- PASO 2: ACTIVACIÓN DE IA POR DEMANDA ---
    async function activarIA() {
        if(iaActiva) return;
        document.getElementById('hud-txt').innerText = "CARGANDO IA...";
        
        pose = new Pose({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}` });
        pose.setOptions({ modelComplexity: 0, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
        pose.onResults(procesarIA);
        
        iaActiva = true;
        startT = Date.now();
        loopIA();
    }

    async function loopIA() {
        if(!v.paused && iaActiva) {
            await pose.send({image: v});
            requestAnimationFrame(loopIA);
        }
    }

    function procesarIA(res) {
        if(!res.poseLandmarks) return;
        ctx.save();
        ctx.clearRect(0,0,c.width,c.height);
        ctx.drawImage(res.image, 0, 0, c.width, c.height);

        const lm = res.poseLandmarks;
        const w = c.width, h = c.height;
        const h_m = { x:(lm[11].x+lm[12].x)/2, y:(lm[11].y+lm[12].y)/2 };
        const c_m = { x:(lm[23].x+lm[24].x)/2, y:(lm[23].y+lm[24].y)/2 };

        if(!calibOk) {
            const segs = Math.max(0, Math.ceil((5000 - (Date.now() - startT)) / 1000));
            document.getElementById('hud-txt').innerText = `CALIBRANDO: ${segs}s`;
            if(segs <= 0) {
                baseA['cab'] = calcular(lm[0], h_m, c_m);
                baseA['abd'] = calcular(h_m, c_m, {x:c_m.x, y:c_m.y+1});
                calibOk = true;
                document.getElementById('hud-txt').innerText = "CALIBRACIÓN OK. PULSE REC.";
                document.getElementById('b-rec').style.opacity = "1";
            }
        }

        // Dibujo de interpretación (Gris -> Verde -> Semáforo)
        const dLine = (p1, p2, k) => {
            ctx.lineWidth = 6; ctx.beginPath();
            ctx.moveTo(p1.x*w, p1.y*h); ctx.lineTo(p2.x*w, p2.y*h);
            
            if(analizando) {
                const ang = (k==='cab') ? calcular(lm[0], h_m, c_m) : calcular(h_m, c_m, {x:c_m.x, y:c_m.y+1});
                const diff = Math.abs(ang - baseA[k]);
                ctx.strokeStyle = diff > 25 ? "#f00" : diff > 15 ? "#ff0" : "#0f0";
            } else {
                ctx.strokeStyle = calibOk ? "#0f0" : "#888";
            }
            ctx.stroke();
        };

        dLine(lm[0], h_m, 'cab');
        dLine(h_m, c_m, 'abd');
        ctx.restore();
    }

    function calcular(a,b,c) {
        const v1={x:a.x-b.x, y:a.y-b.y}, v2={x:c.x-b.x, y:c.y-b.y};
        const dot = v1.x*v2.x + v1.y*v2.y;
        const m1 = Math.sqrt(v1.x**2 + v1.y**2), m2 = Math.sqrt(v2.x**2 + v2.y**2);
        return Math.acos(Math.max(-1, Math.min(1, dot/(m1*m2+1e-6))))*(180/Math.PI);
    }

    function toggleRec() {
        if(!calibOk) return;
        analizando = !analizando;
        const btn = document.getElementById('b-rec');
        btn.style.background = analizando ? "#fff" : "#e74c3c";
        btn.style.color = analizando ? "#f00" : "#fff";
        document.getElementById('hud-txt').innerText = analizando ? "GRABANDO Y EVALUANDO RIESGO..." : "ANÁLISIS PAUSADO";
    }
</script>
</body>
</html>
