<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LYA-ERGO v24.0 | Side-Control Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --accent: #00ff00; --bg: #0d1117; }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background-color: var(--bg); color: white; 
            overflow: hidden; font-family: 'Segoe UI', sans-serif;
        }

        #main-container { display: flex; height: 100vh; width: 100vw; position: relative; }

        /* Área de video expandida */
        #view-area {
            flex: 1; position: relative; display: flex;
            align-items: center; justify-content: center;
            background: #000;
        }

        canvas { max-width: 100%; max-height: 100%; object-fit: contain; }

        /* BARRA LATERAL DERECHA - Centrada verticalmente */
        .controls-bar {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 1000;
            background: rgba(22, 27, 34, 0.7);
            padding: 15px 10px;
            border-radius: 40px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .btn-action {
            width: 55px; height: 55px; border-radius: 50%;
            border: 2px solid #30363d; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
            font-size: 9px; font-weight: bold; cursor: pointer;
            transition: all 0.2s; color: white; background: #21262d;
        }

        .btn-action:active { transform: scale(0.85); }
        .btn-rec.active { background: #ff4d4d !important; border-color: white; animation: blink 1s infinite; }
        
        /* Bloqueo por orientación */
        #orient-lock {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            z-index: 9999; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; padding: 20px;
        }

        #status-overlay {
            position: absolute; top: 10px; left: 10px; 
            color: var(--accent); font-size: 12px; font-weight: bold;
            text-shadow: 1px 1px 2px black; pointer-events: none;
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>

<div id="orient-lock">
    <h2 style="color: #ff4d4d;">⚠️ ROTACIÓN NO PERMITIDA</h2>
    <p>Por favor, coloca tu dispositivo en posición <b>VERTICAL</b> para poder auditar correctamente.</p>
</div>

<div id="main-container">
    <div id="view-area">
        <div id="status-overlay">STANDBY</div>
        <canvas id="output_canvas"></canvas>
    </div>
    
    <div class="controls-bar">
        <button class="btn-action" onclick="location.reload()" title="Salir">✖️</button>
        <button class="btn-action" style="color: #00d2d3;" onclick="switchCam()">🔄<br>GIRAR</button>
        <button id="btn-ia" class="btn-action" style="color: #f1c40f;" onclick="initIA()">⚖️<br>CALIB</button>
        <button id="btn-rec" class="btn-action btn-rec" style="opacity: 0.3;" onclick="toggleRec()">🔴<br>AUDIT</button>
    </div>
</div>

<video id="input_video" playsinline muted style="display:none"></video>

<script>
    const video = document.getElementById('input_video');
    const canvas = document.getElementById('output_canvas');
    const ctx = canvas.getContext('2d');
    const status = document.getElementById('status-overlay');
    const orientLock = document.getElementById('orient-lock');
    
    let pose, iaReady = false, isAuditing = false, facingMode = "environment";

    // Validar Orientación
    function checkOrientation() {
        if (window.innerWidth > window.innerHeight) {
            if (isAuditing) toggleRec(); // Detiene auditoría si giran el movil
            orientLock.style.display = 'flex';
        } else {
            orientLock.style.display = 'none';
        }
    }

    function resize() {
        if (!video.videoWidth) return;
        const container = document.getElementById('view-area');
        const ratio = video.videoWidth / video.videoHeight;
        let w = container.clientWidth;
        let h = w / ratio;
        if (h > container.clientHeight) { h = container.clientHeight; w = h * ratio; }
        canvas.width = video.videoWidth; 
        canvas.height = video.videoHeight;
        canvas.style.width = `${w}px`;
        canvas.style.height = `${h}px`;
    }

    async function startAuto() {
        const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: facingMode, width: {ideal: 640}, height: {ideal: 480} }
        });
        video.srcObject = stream;
        video.play();
        video.onloadeddata = () => { resize(); requestAnimationFrame(drawPreview); };
    }

    function drawPreview() {
        if (!iaReady) {
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            requestAnimationFrame(drawPreview);
        }
    }

    async function initIA() {
        status.innerText = "IA CARGANDO...";
        pose = new Pose({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}` });
        pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5 });
        pose.onResults(onResults);
        iaReady = true;
        document.getElementById('btn-rec').style.opacity = "1";
        status.innerText = "LISTO PARA AUDITAR";
        
        async function loop() { await pose.send({image: video}); requestAnimationFrame(loop); }
        loop();
    }

    function onResults(results) {
        ctx.save();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);
        // Lógica de dibujo original mantenida aquí...
        ctx.restore();
    }

    function toggleRec() {
        if (!iaReady || window.innerWidth > window.innerHeight) return;
        isAuditing = !isAuditing;
        document.getElementById('btn-rec').classList.toggle('active');
        status.innerText = isAuditing ? "GRABANDO AUDITORÍA..." : "PAUSADO";
    }

    async function switchCam() {
        facingMode = (facingMode === "user") ? "environment" : "user";
        startAuto();
    }

    window.addEventListener('resize', () => { resize(); checkOrientation(); });
    window.addEventListener('load', () => { startAuto(); checkOrientation(); });
</script>
</body>
</html>
