FINAL DOMINGO V2

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LYA-ERGO v22.0 | NOM-036 AI</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        * { box-sizing: border-box; }
        body { background-color: #0d1117; color: white; font-family: sans-serif; overflow: hidden; margin: 0; }
        #contenedor-analisis { width: 100vw; height: 100vh; position: relative; display: none; }
        canvas { width: 100%; height: 100%; object-fit: contain; }
        video { display: none; }
        #loader-ia { 
            display: none; position: fixed; top:0; left:0; width:100%; height:100%; 
            background: rgba(13, 17, 23, 0.98); z-index: 6000; 
            flex-direction: column; align-items: center; justify-content: center;
        }
        .status-badge { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 5px; border-left: 4px solid #00ff00; }
        .barra-controles { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; }
        .btn-circular { width: 70px; height: 70px; border-radius: 50%; border: none; font-weight: bold; cursor: pointer; }
        .rec-active { background: white !important; color: red !important; border: 4px solid red !important; }
        
        /* Estilos Menú Inicial */
        #menu-inicial { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .input-group-custom { width: 90%; max-width: 400px; background: #161b22; padding: 20px; border-radius: 10px; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; background: #0d1117; border: 1px solid #30363d; color: white; border-radius: 5px; }
    </style>
</head>
<body>

<div id="loader-ia">
    <h2 style="color:#00ff00">INICIANDO IA...</h2>
</div>

<div id="menu-inicial">
    <div class="input-group-custom">
        <h3 class="text-center mb-4">LYA-ERGO CONFIG</h3>
        <label>PUESTO DE TRABAJO</label>
        <input type="text" id="puestoTrabajo" placeholder="Ej. Estibador">
        <label>GÉNERO</label>
        <select id="genero">
            <option value="H">Masculino (25kg Max)</option>
            <option value="M">Femenino (15kg Max)</option>
        </select>
        <label>PESO DE CARGA (KG)</label>
        <input type="number" id="pesoCarga" value="10">
        <button class="btn btn-success w-100 mt-3" onclick="activarIA()">INICIAR CÁMARA</button>
    </div>
</div>

<div id="contenedor-analisis">
    <div class="status-badge" id="txt-status">ESPERANDO IA...</div>
    <video id="input_video" playsinline muted></video>
    <canvas id="output_canvas"></canvas>
    
    <div class="barra-controles">
        <button class="btn-circular btn-danger" onclick="detenerTodo()">SALIR</button>
        <button id="recordBtn" class="btn-circular btn-warning" style="opacity:0.3" onclick="toggleGrabacion()">REC</button>
    </div>
</div>

<script>
    const video = document.getElementById('input_video');
    const canvas = document.getElementById('output_canvas');
    const ctx = canvas.getContext('2d');
    const txtStatus = document.getElementById('txt-status');

    let configAuditoria = { peso: 0, genero: 'H', puesto: '', limiteLegal: 25 };
    let wbaStats = { riesgoAltoTotal: 0, framesAnalizados: 0, zonasAfectadas: new Set(), inicioAuditoria: null, ciclos: 0, lastHandY: null, subiendo: false };
    const TH = { tronco: 18, cuello: 12, hombros: 28, codos: 25, piernas: 25 };
    let baseAngles = {}, angleBuffer = {}, iaActiva = false, calibrado = false, analizandoRiesgo = false;
    let currentFacingMode = "environment", startTimeCalib = 0, pose = null, camera = null;

    function actualizarConfiguracion() {
        configAuditoria.peso = Math.max(0, parseFloat(document.getElementById('pesoCarga').value) || 0);
        configAuditoria.genero = document.getElementById('genero').value;
        configAuditoria.puesto = document.getElementById('puestoTrabajo').value || "No especificado";
        configAuditoria.limiteLegal = (configAuditoria.genero === 'H') ? 25 : 15;
    }

    function calcAng3D(a, b, c) {
        const v1 = { x: a.x - b.x, y: a.y - b.y, z: a.z - b.z }, 
              v2 = { x: c.x - b.x, y: c.y - b.y, z: c.z - b.z };
        const dot = v1.x * v2.x + v1.y * v2.y + v1.z * v2.z;
        const m1 = Math.sqrt(v1.x**2 + v1.y**2 + v1.z**2), 
              m2 = Math.sqrt(v2.x**2 + v2.y**2 + v2.z**2);
        return (m1 * m2 === 0) ? 0 : Math.acos(Math.max(-1, Math.min(1, dot / (m1 * m2)))) * (180 / Math.PI);
    }

    const drawV = (p1, p2, angKey, groupKey, raw_lm1, raw_lm2) => {
        if (!raw_lm1 || !raw_lm2) return;
        ctx.beginPath();
        ctx.moveTo(p1.x, p1.y);
        ctx.lineTo(p2.x, p2.y);
        const vis = (raw_lm1.visibility + raw_lm2.visibility) / 2;
        ctx.globalAlpha = Math.max(0.1, vis); 
        const buffer = angleBuffer[angKey] || [];
        if (buffer.length < 5) { ctx.strokeStyle = "#444"; ctx.stroke(); return; }

        const avgAngle = buffer.reduce((a, b) => a + b, 0) / buffer.length;
        let color = "#00ff00"; let thickness = 4;

        if (analizandoRiesgo && calibrado) {
            const diff = Math.abs(avgAngle - (baseAngles[angKey] || avgAngle));
            const sobrepesoCarga = configAuditoria.peso > configAuditoria.limiteLegal;
            const anguloCritico = diff > (TH[groupKey] * 2);
            if (sobrepesoCarga || anguloCritico) {
                color = "#ff3838"; thickness = 10; 
                wbaStats.zonasAfectadas.add(sobrepesoCarga ? "PESO" : groupKey.toUpperCase());
                wbaStats.riesgoAltoTotal++;
            } else if (diff > TH[groupKey]) {
                color = "#f1c40f"; thickness = 7;
            }
        }
        ctx.strokeStyle = color; ctx.lineWidth = thickness; ctx.lineCap = "round"; ctx.stroke();
        ctx.globalAlpha = 1.0;
    };

    function onResults(res) {
        if (!res.poseLandmarks) return;
        ctx.save();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(res.image, 0, 0, canvas.width, canvas.height);

        const lm = res.poseLandmarks, w = canvas.width, h = canvas.height;
        const pt = (i) => ({ x: lm[i].x * w, y: lm[i].y * h, z: lm[i].z });
        const p = {
            cab: pt(0), h_d: pt(12), h_i: pt(11), m_d: pt(16), m_i: pt(15),
            c_d: pt(14), c_i: pt(13), p_d: pt(24), p_i: pt(23),
            cue: { x: (lm[11].x + lm[12].x)/2*w, y: (lm[11].y + lm[12].y)/2*h },
            esp_baja: { x: (lm[23].x + lm[24].x)/2*w, y: (lm[23].y + lm[24].y)/2*h }
        };

        if (analizandoRiesgo) {
            const currentHandY = (p.m_d.y + p.m_i.y) / 2;
            const estaturaTorso = Math.abs(p.cue.y - p.esp_baja.y);
            const umbralMinimo = estaturaTorso * 0.3;
            if (wbaStats.lastHandY) {
                const diff = wbaStats.lastHandY - currentHandY;
                if (Math.abs(diff) > umbralMinimo) {
                    if (diff > umbralMinimo && !wbaStats.subiendo) { wbaStats.ciclos++; wbaStats.subiendo = true; }
                    else if (diff < -umbralMinimo) { wbaStats.subiendo = false; }
                }
            }
            wbaStats.lastHandY = currentHandY;
        }

        const currentAngles = { abd: calcAng3D(p.cab, p.cue, p.esp_baja), c_d: calcAng3D(p.h_d, p.c_d, p.m_d), c_i: calcAng3D(p.h_i, p.c_i, p.m_i) };
        Object.keys(currentAngles).forEach(k => {
            if (!angleBuffer[k]) angleBuffer[k] = [];
            angleBuffer[k].push(currentAngles[k]);
            if (angleBuffer[k].length > 15) angleBuffer[k].shift();
        });

        if (iaActiva && !calibrado && (Date.now() - startTimeCalib > 3000)) {
            Object.keys(angleBuffer).forEach(k => { baseAngles[k] = angleBuffer[k].reduce((a,b)=>a+b,0) / angleBuffer[k].length; });
            calibrado = true;
            document.getElementById('recordBtn').style.opacity = "1";
            txtStatus.innerText = "SISTEMA LISTO";
        }

        drawV(p.cue, p.esp_baja, 'abd', 'tronco', lm[11], lm[23]);
        drawV(p.h_d, p.c_d, 'c_d', 'codos', lm[12], lm[14]);
        drawV(p.h_i, p.c_i, 'c_i', 'codos', lm[11], lm[13]);

        ctx.restore();
        if (analizandoRiesgo) {
            ctx.fillStyle = "#00ff00"; ctx.font = "bold 24px sans-serif";
            ctx.fillText(`CICLOS: ${wbaStats.ciclos}`, 20, h - 40);
        }
    }

    async function activarIA() {
        actualizarConfiguracion();
        document.getElementById('menu-inicial').style.display = 'none';
        document.getElementById('contenedor-analisis').style.display = 'block';
        document.getElementById('loader-ia').style.display = 'flex';

        pose = new Pose({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}` });
        pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });
        pose.onResults(onResults);

        camera = new Camera(video, { onFrame: async () => { if (iaActiva) await pose.send({ image: video }); }, width: 1280, height: 720 });
        await camera.start();

        iaActiva = true;
        startTimeCalib = Date.now();
        document.getElementById('loader-ia').style.display = 'none';
        txtStatus.innerText = "CALIBRANDO...";
    }

    function toggleGrabacion() {
        if (!calibrado) return;
        analizandoRiesgo = !analizandoRiesgo;
        const btn = document.getElementById('recordBtn');
        if (analizandoRiesgo) {
            btn.classList.add('rec-active');
            wbaStats.inicioAuditoria = new Date();
        } else {
            btn.classList.remove('rec-active');
            generarReporteRapido();
        }
    }

    function generarReporteRapido() {
        alert(`REPORTE NOM-036:\n- Ciclos: ${wbaStats.ciclos}\n- Zonas Afectadas: ${Array.from(wbaStats.zonasAfectadas).join(', ') || 'Ninguna'}`);
    }

    async function detenerTodo() { location.reload(); }
</script>
</body>
</html>
