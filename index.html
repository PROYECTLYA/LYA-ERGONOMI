<style>
    /* --- CONFIGURACIÓN BASE --- */
    body { 
        background-color: #0d1117; 
        color: white; 
        margin: 0; 
        overflow: hidden; 
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
        height: 100vh;
        height: 100svh; 
    }

    /* --- MENÚ INICIAL (RESPONSIVO) --- */
    #menu-inicial { 
        display: flex; 
        width: 100%; 
        height: 100svh;
        flex-direction: column; 
        align-items: center; 
        justify-content: center; 
        background: radial-gradient(circle at center, #161b22 0%, #0d1117 100%); 
        position: fixed; 
        z-index: 5000; 
        padding: 20px;
        box-sizing: border-box;
        overflow-y: auto;
    }

    .logo-text { 
        color: #00ff00; 
        font-weight: 900; 
        letter-spacing: -1px; 
        margin: 0; 
        font-size: clamp(2.5rem, 10vw, 4rem);
        text-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
    }

    .sub-text { 
        color: #8b949e; 
        font-size: clamp(0.7rem, 2.5vw, 0.85rem);

        margin-bottom: 30px;

    }

    /* --- FORMULARIO Y CAMPOS --- */
    .form-control-custom {
        width: 100%; 
        padding: 10px; 
        border-radius: 8px; 
        border: 1px solid #30363d; 
        background: #0d1117; 
        color: white;
        box-sizing: border-box;
        font-size: 0.9rem;
        transition: all 0.3s ease;
    }

    .form-control-custom:focus {
        border-color: #00ff00 !important;
        box-shadow: 0 0 10px rgba(0, 255, 0, 0.1);
        outline: none;
    }

    /* --- BOTONES DE ACCIÓN --- */
    .btn-inicio { 
        flex: 1; 
        padding: 18px !important; 
        border-radius: 12px; 
        font-weight: 800; 
        font-size: 1rem; 
        border: none;
        transition: all 0.2s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        cursor: pointer;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .btn-inicio:hover { filter: brightness(1.1); transform: translateY(-2px); }
    .btn-inicio:active { transform: scale(0.96); }

    /* --- PANTALLA DE CARGA IA --- */
    #loader-ia { 
        display: none; 
        position: fixed; 
        top:0; left:0; width:100%; height:100svh;
        background: rgba(13, 17, 23, 0.95); 
        z-index: 9999; 
        flex-direction: column; 
        align-items: center; 
        justify-content: center; 
        backdrop-filter: blur(10px);
    }

    .progress-bar { 
        width: 100%; 
        height: 100%; 
        background: #00ff00; 
        transition: width 0.4s ease; 
        box-shadow: 0 0 15px #00ff00; 
    }

    /* --- CONTENEDOR DE ANÁLISIS --- */
    #contenedor-analisis { 
        display: none; 
        width: 100vw; 
        height: 100svh;
        position: relative; 
        background: #000; 
    }

    canvas { 
        width: 100%; 
        height: 100%; 
        object-fit: contain; 
        background: #000;
    }

    /* --- HUD Y STATUS --- */
    .status-badge { 
        position: absolute; 
        top: 25px; 
        left: 50%; 
        transform: translateX(-50%);
        background: rgba(13, 17, 23, 0.8);
        color: #00ff00;
        padding: 8px 20px;
        border-radius: 30px;
        font-weight: 800;
        font-size: 0.8rem;
        border: 1px solid rgba(0, 255, 0, 0.5);
        z-index: 7000;
        letter-spacing: 1px;
        backdrop-filter: blur(5px);
    }

    /* --- BARRA DE CONTROLES --- */
    .barra-controles {
        position: absolute;
        bottom: 40px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 20px;
        z-index: 7000;
        background: rgba(22, 27, 34, 0.8);
        padding: 15px 30px;
        border-radius: 100px;
        backdrop-filter: blur(15px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 20px 40px rgba(0,0,0,0.6);
    }

    .btn-circular {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        border: none;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-size: 0.55rem;
        font-weight: 900;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        background: #30363d;
        color: white;
    }

    .btn-circular span { font-size: 1.5rem; margin-bottom: 2px; }
    .btn-circular:disabled { opacity: 0.2; cursor: not-allowed; }
    
    /* Botón Auditar activo */
    .rec-active {
        background: #ff4d4d !important;
        animation: pulse-red 1.5s infinite;
        transform: scale(1.1);
    }

    @keyframes pulse-red {
        0% { box-shadow: 0 0 0 0 rgba(255, 77, 77, 0.7); }
        70% { box-shadow: 0 0 0 20px rgba(255, 77, 77, 0); }
        100% { box-shadow: 0 0 0 0 rgba(255, 77, 77, 0); }
    }

    /* Ajustes para pantallas pequeñas */
    @media (max-width: 600px) {
        .barra-controles { padding: 10px 20px; gap: 10px; bottom: 20px; }
        .btn-circular { width: 55px; height: 55px; }
        .d-flex.gap-2 { flex-direction: column; }
    }
</style>

<body>

<div id="loader-ia">
    <h3 style="color:#00ff00; letter-spacing: 4px; font-weight: 900;">LYA-AUDITOR ENGINE</h3>
    <div style="width: 75%; height: 6px; background: #21262d; border-radius: 10px; margin-top: 25px; overflow: hidden;">
        <div id="bar-id" class="progress-bar"></div>
    </div>
</div>

<div id="menu-inicial">
    <h1 class="logo-text">LYA-ERGO</h1>
    <p class="sub-text">Auditoría de Procesos NOM-036-STPS</p>
    
    <div style="width: 90%; max-width: 450px; background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1);">
        <div class="row">
            <div class="col-12 mb-3">
                <label style="color: #8b949e; font-size: 0.7rem; text-align: left; display: block;">EMPRESA / PLANTA:</label>

            <div class="col-md-6 mb-3">

            </div>

                <label style="color: #8b949e; font-size: 0.7rem; display: block;">ID / NOMBRE TRABAJADOR:</label>

            </div>

    </div>

    <div class="d-flex gap-2">
        <button class="btn-inicio" style="background:#27ae60; color:white; width: 180px;" onclick="prepararSistema('camara')">🎥 VIVO</button>
        <button class="btn-inicio" style="background:#2980b9; color:white; width: 180px;" onclick="validarYAbrirArchivo()">📁 ARCHIVO</button>
    </div>
    
    <input type="file" id="fileInput" hidden accept="video/*" onchange="prepararSistema('archivo')">
</div>

<div id="contenedor-analisis">
    <div class="status-badge" id="txt-status">IA DESCONECTADA</div>
    
    <canvas id="output_canvas"></canvas>
    <video id="input_video" playsinline muted style="display:none;"></video>
    
    <div class="barra-controles">
        <button class="btn-circular btn-dark" onclick="location.reload()">
            <span>✖</span><br>SALIR
        </button>
        <button class="btn-circular" style="background:#00d2d3; color:#000;" onclick="cambiarCamara()">
            <span>🔄</span><br>GIRAR
        </button>
        <button id="btn-calib" class="btn-circular" style="background:#f1c40f; color:#000;" onclick="iniciarCalibracion()">
            <span>⚖️</span><br>CALIBRAR
        </button>
        <button id="recordBtn" class="btn-circular" style="background:#ff4d4d; color: white; opacity: 0.3;" onclick="toggleAuditoria()" disabled>
            <span>🔴</span><br>AUDITAR
        </button>
    </div>
</div>

</body>
<script>
/**
 * 🏷️ BLOQUE 1: REFERENCIAS AL DOM Y CONFIGURACIÓN BASE
 * Selección de elementos de interfaz y definición de umbrales NOM-036.
 */
const video = document.getElementById('input_video');
const canvas = document.getElementById('output_canvas');
const ctx = canvas.getContext('2d');
const txtStatus = document.getElementById('txt-status');

// Umbrales de desviación permitidos (Grados) según NOM-036-STPS
const TH = { tronco: 18, cuello: 12, hombros: 15, codos: 25, munecas: 20, piernas: 25, pies: 18 };

/**
 * 🏷️ BLOQUE 2: ESTADO GLOBAL Y VARIABLES DE CONTROL
 * Gestión de banderas de IA, calibración, suavizado y almacenamiento de métricas.
 */

// 📊 Estadísticas de Auditoría (WBA - Work-Based Assessment)
let wbaStats = { 
    riesgoAltoTotal: 0,      // Acumulador de frames en zona roja
    framesAnalizados: 0,      // Total de frames durante la grabación
    zonasAfectadas: new Set(), // Registro único de partes del cuerpo en riesgo
    inicioAuditoria: null,   // Timestamp de inicio
    ciclos: 0,                // Contador de repeticiones de carga
    lastHandY: null,          // Referencia para detectar movimiento de manos
    subiendo: false,          // Flag para lógica de conteo de ciclos
    agarreSobreHombros: false // Flag específico para la alerta NOM-036
};

// 📐 Búferes para Suavizado de Ángulos y Posición
let baseAngles = {};         // Ángulos de referencia tras calibración
let angleBuffer = {};        // Historial de ángulos para media móvil
let posBuffer = {};          // Historial de coordenadas X, Y, Z
const HISTORIAL_MAX = 20;    // Frames para suavizado de rotación
const SUAVIZADO_POS = 5;     // Frames para promediar posición (evitar jitter)

// ⚙️ Control de Estado de IA y Hardware
let iaActiva = false;        // Indica si el motor MediaPipe está operando
let calibrado = false;       // Indica si ya se capturaron ángulos base
let analizandoRiesgo = false;// Activo solo durante la grabación (Auditar)
let currentFacingMode = "environment"; // Control de cámara
let startTimeCalib = 0;      // Timer para ventana de calibración

// 🎥 Gestión de Pose y Grabación
let pose;                    // Instancia de MediaPipe Pose
let mediaRecorder;           // Grabador de video del canvas
let recordedChunks = [];     // Fragmentos de video para descarga

/**
 * 🏷️ BLOQUE 3: GESTIÓN DE FUENTES DE VIDEO Y FLUJO INICIAL
 * Configuración de hardware, carga de archivos y validación de formularios.
 */

// Función principal de arranque tras validación
async function prepararSistema(fuente) {
    const campos = [
        { id: 'nombreEmpresa', label: 'EMPRESA' },
        { id: 'puestoTrabajo', label: 'PUESTO' },
        { id: 'nombreTrabajador', label: 'NOMBRE TRABAJADOR' },
        { id: 'edadTrabajador', label: 'EDAD' },
        { id: 'pesoCarga', label: 'PESO DE CARGA' }
    ];

    let faltantes = [];
    campos.forEach(campo => {
        const input = document.getElementById(campo.id);
        if (!input.value.trim()) {
            faltantes.push(campo.label);
            input.style.border = "2px solid #ff4d4d";
        } else {
            input.style.border = "1px solid #30363d";
        }
    });

    if (faltantes.length > 0) {
        alert("⛔ BLOQUEO DE SEGURIDAD:\nDebe completar los campos:\n" + faltantes.join("\n"));
        return;
    }

    document.getElementById('menu-inicial').style.display = 'none';
    document.getElementById('contenedor-analisis').style.display = 'block';
    
    if (fuente === 'camara') {
        await encenderCamara();
    } else {
        const file = document.getElementById('fileInput').files[0];
        if (!file) { location.reload(); return; }
        video.src = URL.createObjectURL(file);
        video.onloadedmetadata = () => { setupCanvas(); video.play(); activarIA(); };
    }
}

// Configura las dimensiones del canvas según la fuente de video
function setupCanvas() {
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
}

// Acceso a la cámara del dispositivo
async function encenderCamara() {
    try {
        if (video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
        const stream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: currentFacingMode, width: { ideal: 1280 }, height: { ideal: 720 } } 
        });
        video.srcObject = stream;
        video.onloadedmetadata = () => { setupCanvas(); video.play(); activarIA(); };
    } catch (e) { alert("Error al acceder a la cámara"); }
}

/**
 * 🏷️ BLOQUE 4: MOTOR MATEMÁTICO Y RENDIMIENTO VISUAL
 * Lógica de ángulos 3D y renderizado de vectores (Semáforo Dinámico).
 */

// Calcula el ángulo entre 3 puntos en espacio 3D
function calcAng3D(a,b,c) {
    const v1={x:a.x-b.x, y:a.y-b.y, z:a.z-b.z}, v2={x:c.x-b.x, y:c.y-b.y, z:c.z-b.z};
    const dot = v1.x*v2.x + v1.y*v2.y + v1.z*v2.z;
    const m1 = Math.sqrt(v1.x**2 + v1.y**2 + v1.z**2), m2 = Math.sqrt(v2.x**2 + v2.y**2 + v2.z**2);
    return (m1*m2 === 0) ? 0 : Math.acos(Math.max(-1, Math.min(1, dot/(m1*m2))))*(180/Math.PI);
}

// Dibuja el vector y evalúa el riesgo según umbrales TH
const drawV = (p1, p2, angKey, groupKey, raw_lm1, raw_lm2) => {
    if (!raw_lm1 || !raw_lm2 || raw_lm1.visibility < 0.5 || raw_lm2.visibility < 0.5) return; 

    const buffer = angleBuffer[angKey] || [];
    if (buffer.length === 0) return; 
    const avgAngle = buffer.reduce((a, b) => a + b, 0) / buffer.length;
    
    let color = "#00ff00", thickness = 4, statusLabel = "SEGURO";

    if (analizandoRiesgo && calibrado) {
        const diff = Math.abs(avgAngle - (baseAngles[angKey] || avgAngle));
        const t = TH[groupKey];
        wbaStats.framesAnalizados++;

        if (diff > (t * 2)) { 
            wbaStats.riesgoAltoTotal++; 
            wbaStats.zonasAfectadas.add(groupKey);
            color = "#ff3838"; thickness = 10; statusLabel = "CRÍTICO";
        } else if (diff > t) {
            color = "#f1c40f"; thickness = 7; statusLabel = "ADVERTENCIA";
        }
    }

    // Dibujo del vector con Glow
    ctx.shadowBlur = (color !== "#00ff00") ? 15 : 0;
    ctx.shadowColor = color;
    ctx.beginPath();
    ctx.strokeStyle = color; ctx.lineWidth = thickness; ctx.lineCap = "round";
    ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
    ctx.shadowBlur = 0;

    // Etiqueta HUD de datos
    if (calibrado) {
        const midX = (p1.x + p2.x) / 2, midY = (p1.y + p2.y) / 2;
        let offsetX = (groupKey === "munecas" || groupKey === "codos") ? 45 : 20;
        let offsetY = (groupKey === "piernas") ? 40 : -20;
        ctx.fillStyle = "rgba(13, 17, 23, 0.85)";
        ctx.beginPath(); ctx.roundRect(midX + offsetX, midY + offsetY, 95, 36, 8); ctx.fill();
        ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.stroke();
        ctx.fillStyle = "#ffffff"; ctx.font = "bold 11px 'Segoe UI'";
        ctx.fillText(`${avgAngle.toFixed(1)}°`, midX + offsetX + 8, midY + offsetY + 16);
        ctx.fillStyle = color; ctx.font = "900 9px 'Segoe UI'";
        ctx.fillText(statusLabel, midX + offsetX + 8, midY + offsetY + 28);
    }
};

/**
 * 🏷️ BLOQUE 5: PROCESAMIENTO DE RESULTADOS (IA HANDLER)
 * Recibe datos de MediaPipe, suaviza posiciones y gestiona cinemática de ciclos.
 */
function onResults(res) {
    if (!res || !res.poseLandmarks) { txtStatus.innerText = "BUSCANDO SUJETO..."; return; }
    
    const lm = res.poseLandmarks;
    const w = canvas.width; const h = canvas.height;

    ctx.save();
    ctx.clearRect(0, 0, w, h);
    if (currentFacingMode === "user") { ctx.translate(w, 0); ctx.scale(-1, 1); }
    ctx.drawImage(res.image, 0, 0, w, h);

    // Función de suavizado unificada
    const pt = (i) => {
        if (!posBuffer[i]) posBuffer[i] = { history: [] };
        if (lm[i].visibility > 0.5) {
            posBuffer[i].history.push({ x: lm[i].x * w, y: lm[i].y * h });
            if (posBuffer[i].history.length > SUAVIZADO_POS) posBuffer[i].history.shift();
        }
        const avgX = posBuffer[i].history.reduce((a, b) => a + b.x, 0) / (posBuffer[i].history.length || 1);
        const avgY = posBuffer[i].history.reduce((a, b) => a + b.y, 0) / (posBuffer[i].history.length || 1);
        return { x: avgX, y: avgY, z: lm[i].z };
    };

    // Mapeo anatómico
    const p = {
        cab: pt(0), h_d: pt(12), c_d: pt(14), m_d: pt(16), 
        h_i: pt(11), c_i: pt(13), m_i: pt(15), p_d: pt(24), 
        r_d: pt(26), t_d: pt(28), p_i: pt(23), r_i: pt(25), t_i: pt(27)
    };
    p.cue = { x: (p.h_d.x + p.h_i.x) / 2, y: (p.h_d.y + p.h_i.y) / 2, z: (p.h_d.z + p.h_i.z) / 2 };
    p.esp_baja = { x: (p.p_d.x + p.p_i.x) / 2, y: (p.p_d.y + p.p_i.y) / 2, z: (p.p_d.z + p.p_i.z) / 2 };
    p.tor = { x: p.cue.x, y: p.cue.y + (h * 0.05), z: p.cue.z };
    p.abd = { x: p.esp_baja.x, y: p.esp_baja.y - (h * 0.04), z: p.esp_baja.z };

    // Lógica NOM-036: Ciclos y Agarre Alto
    if (analizandoRiesgo) {
        const alturaRef = Math.abs(p.h_d.y - p.p_d.y);
        const currentHandY = (p.m_d.y + p.m_i.y) / 2;
        const umbral = alturaRef * 0.25; 
        if (wbaStats.lastHandY !== null) {
            const dif = wbaStats.lastHandY - currentHandY;
            if (dif > umbral && !wbaStats.subiendo) { wbaStats.ciclos++; wbaStats.subiendo = true; }
            else if (dif < -umbral) { wbaStats.subiendo = false; }
        }
        wbaStats.lastHandY = currentHandY;

        if (p.m_d.y < p.h_d.y || p.m_i.y < p.h_i.y) {
            wbaStats.zonasAfectadas.add("AGARRE ALTO");
            ctx.save(); if (currentFacingMode === "user") { ctx.scale(-1, 1); ctx.translate(-w, 0); }
            ctx.fillStyle = "#ff4d4d"; ctx.font = "900 14px Segoe UI";
            ctx.fillText("⚠️ RIESGO: AGARRE ALTO", 20, h - 100); ctx.restore();
        }
    }

    // Buffering de ángulos y fin de calibración
    const currentAngles = {
        cue: calcAng3D(p.cab, p.cue, p.tor), abd: calcAng3D(p.tor, p.abd, p.esp_baja),
        c_d: calcAng3D(p.h_d, p.c_d, p.m_d), c_i: calcAng3D(p.h_i, p.c_i, p.m_i),
        h_d: calcAng3D(p.p_d, p.h_d, p.c_d), h_i: calcAng3D(p.p_i, p.h_i, p.c_i),
        r_d: calcAng3D(p.p_d, p.r_d, p.t_d), r_i: calcAng3D(p.p_i, p.r_i, p.t_i)
    };
    Object.keys(currentAngles).forEach(k => {
        if (!angleBuffer[k]) angleBuffer[k] = [];
        angleBuffer[k].push(currentAngles[k]);
        if (angleBuffer[k].length > HISTORIAL_MAX) angleBuffer[k].shift();
    });

    if (iaActiva && !calibrado && (Date.now() - startTimeCalib > 3000)) {
        Object.keys(angleBuffer).forEach(k => { 
            baseAngles[k] = angleBuffer[k].reduce((a, b) => a + b, 0) / angleBuffer[k].length; 
        });
        calibrado = true; txtStatus.innerText = "CALIBRADO - LISTO";
    }

    // Dibujo del esqueleto
    drawV(p.cue, p.esp_baja, 'abd', 'tronco', lm[11], lm[23]);
    drawV(p.cue, p.cab, 'cue', 'cuello', lm[11], lm[0]);
    drawV(p.h_d, p.c_d, 'h_d', 'hombros', lm[12], lm[14]); 
    drawV(p.c_d, p.m_d, 'c_d', 'codos', lm[14], lm[16]);
    drawV(p.h_i, p.c_i, 'h_i', 'hombros', lm[11], lm[13]); 
    drawV(p.c_i, p.m_i, 'c_i', 'codos', lm[13], lm[15]);
    drawV(p.p_d, p.r_d, 'r_d', 'piernas', lm[24], lm[26]); 
    drawV(p.r_d, p.t_d, 'r_d', 'piernas', lm[26], lm[28]);
    drawV(p.p_i, p.r_i, 'r_i', 'piernas', lm[23], lm[25]); 
    drawV(p.r_i, p.t_i, 'r_i', 'piernas', lm[25], lm[27]);
    
    ctx.restore();
}

/**
 * 🏷️ BLOQUE 6: INICIALIZACIÓN DE MOTOR IA (MEDIAPIPE)
 */
let timeoutDeteccion;
async function activarIA() {
    const loader = document.getElementById('loader-ia');
    if (loader) loader.style.display = 'flex';
    calibrado = false; iaActiva = false;
    
    clearTimeout(timeoutDeteccion);
    timeoutDeteccion = setTimeout(() => {
        if (!iaActiva) { alert("⚠️ NO SE DETECTA SUJETO"); if (loader) loader.style.display = 'none'; }
    }, 5000);

    if (!pose) {
        pose = new Pose({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}` });
        pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
        pose.onResults((res) => {
            if (res.poseLandmarks) {
                if (!iaActiva) { 
                    iaActiva = true; startTimeCalib = Date.now(); 
                    if (loader) loader.style.display = 'none';
                    const btn = document.getElementById('recordBtn'); btn.disabled = false; btn.style.opacity = "1";
                }
                onResults(res);
            }
        });
    }

    async function procesarFrame() {
        if (document.getElementById('contenedor-analisis').style.display === 'block' && video.readyState >= 2) {
            await pose.send({ image: video });
            requestAnimationFrame(procesarFrame);
        }
    }
    setTimeout(procesarFrame, 800);
}

/**
 * 🏷️ BLOQUE 7: REPORTING PDF (NOM-036)
 * Genera el documento técnico con jsPDF.
 */
function generarReporteWBA() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const trab = document.getElementById('nombreTrabajador')?.value || "TRABAJADOR";
    const peso = document.getElementById('pesoCarga')?.value || 0;
    const genero = document.getElementById('generoTrabajador')?.value || "H";
    const porc = wbaStats.framesAnalizados > 0 ? ((wbaStats.riesgoAltoTotal / wbaStats.framesAnalizados) * 100).toFixed(1) : 0;
    const duracion = ((Date.now() - wbaStats.inicioAuditoria) / 60000).toFixed(2);
    const frecuencia = (wbaStats.ciclos / (duracion || 0.01)).toFixed(2);

    // Estética LYA
    doc.setFillColor(13, 17, 23); doc.rect(0, 0, 210, 25, 'F');
    doc.setTextColor(0, 255, 0); doc.setFontSize(20); doc.text("LYA – ERGONOMI", 105, 12, { align: "center" });
    
    // Tabla NOM-036
    doc.autoTable({
        startY: 30,
        head: [['MÉTRICA', 'VALOR REAL', 'LÍMITE NOM-036', 'ESTATUS']],
        body: [
            ['Carga', `${peso} kg`, genero === "H" ? "25 kg" : "15 kg", peso > (genero === "H" ? 25 : 15) ? "EXCEDE" : "OK"],
            ['Frecuencia', `${frecuencia}/min`, "5/min", frecuencia > 5 ? "ALTO" : "OK"],
            ['Riesgo Postural', `${porc}%`, "20%", porc > 20 ? "CRÍTICO" : "OK"]
        ],
        headStyles: { fillColor: [41, 128, 185] }
    });

    doc.save(`REPORTE_LYA_${trab.replace(/\s+/g, '_')}.pdf`);
}
    

/**
 * 🏷️ BLOQUE 8: CONTROL DE GRABACIÓN Y UTILERÍA
 */
function toggleGrabacion() {
    if (!calibrado) return;
    analizandoRiesgo = !analizandoRiesgo;
    const btn = document.getElementById('recordBtn');

    if (analizandoRiesgo) {
        recordedChunks = [];
        const stream = canvas.captureStream(30);
        mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
        mediaRecorder.ondataavailable = (e) => recordedChunks.push(e.data);
        mediaRecorder.onstop = descargarVideo;
        mediaRecorder.start();
        wbaStats.inicioAuditoria = Date.now();
        btn.innerHTML = "⏹️<br>DETENER"; btn.classList.add('rec-active');
    } else {
        btn.innerHTML = "🔴<br>AUDITAR"; btn.classList.remove('rec-active');
        if (mediaRecorder) mediaRecorder.stop();
        setTimeout(generarReporteWBA, 600);
    }
}

async function cambiarCamara() {
    currentFacingMode = (currentFacingMode === "environment") ? "user" : "environment";
    iaActiva = false;
    await encenderCamara();
}

function descargarVideo() {
    const blob = new Blob(recordedChunks, { type: 'video/webm' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `EVIDENCIA_LYA.webm`; a.click();
}

function validarYAbrirArchivo() {
    const ids = ['nombreEmpresa', 'puestoTrabajo', 'nombreTrabajador', 'edadTrabajador', 'pesoCarga'];
    const error = ids.some(id => !document.getElementById(id).value.trim());
    if (error) prepararSistema('archivo'); else document.getElementById('fileInput').click();
}
