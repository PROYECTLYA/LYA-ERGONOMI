<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LYA-ERGO v19.1 | PRECISIÓN INDUSTRIAL</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Ajuste de scroll y visualización general */
        body { background-color: #0d1117; color: white; margin: 0; min-height: 100vh; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
        
        #menu-inicial { display: flex; width: 100%; min-height: 100vh; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle, #161b22 0%, #0d1117 100%); position: fixed; top: 0; left: 0; z-index: 5000; }
        
        .logo-text { color: #00ff00; font-weight: 800; letter-spacing: 3px; margin-bottom: 0; }
        .sub-text { color: #8b949e; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 40px; }
        .btn-inicio { width: 85%; max-width: 320px; padding: 18px; margin: 10px; border-radius: 12px; font-weight: bold; border: none; font-size: 1.1rem; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }

        #loader-ia { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(13, 17, 23, 0.98); z-index: 6000; flex-direction: column; align-items: center; justify-content: center; }
        .progress-bar { width: 0%; height: 6px; background: #00ff00; transition: 0.4s; box-shadow: 0 0 20px #00ff00; margin-top: 20px; border-radius: 10px; }

        /* Contenedor adaptativo */
        #contenedor-analisis { 
            display: none; 
            width: 100vw; 
            height: 100vh; 
            height: -webkit-fill-available; /* Ajuste para navegadores móviles */
            position: relative; 
            background: #000; 
            flex-direction: column;
        }

        /* El canvas ahora ocupa el espacio disponible dejando lugar a los botones */
        #canvas-wrapper {
            flex: 1;
            width: 100%;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        canvas { max-width: 100%; max-height: 100%; object-fit: contain; }
        video { display: none; }

        .status-badge { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.8); padding: 8px 15px; border-radius: 8px; border-left: 4px solid #00ff00; font-size: 10px; z-index: 3000; }

        /* Barra de controles mejorada para móviles */
        .barra-controles { 
            background: rgba(22, 27, 34, 0.9);
            padding: 15px 5px;
            display: flex; 
            justify-content: center;
            align-items: center;
            gap: 10px; 
            z-index: 4000;
            width: 100%;
            border-top: 1px solid #30363d;
        }

        .btn-circular { width: 60px; height: 60px; border-radius: 50%; border: none; font-size: 8px; font-weight: 900; color: white; display: flex; align-items: center; justify-content: center; flex-direction: column; transition: 0.2s; }
        .btn-circular:active { transform: scale(0.9); }

        .rec-active { background: #fff !important; color: #f00 !important; border: 3px solid #f00 !important; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255,0,0,0.7); } 70% { box-shadow: 0 0 0 10px rgba(255,0,0,0); } 100% { box-shadow: 0 0 0 0 rgba(255,0,0,0); } }
    </style>
</head>
<body>

<div id="loader-ia">
    <h3 style="color:#00ff00; font-weight: 900;">MOTOR ERGONÓMICO LYA v19.1</h3>
    <div style="width: 70%; background: #21262d; border-radius: 10px;"><div id="bar-id" class="progress-bar"></div></div>
</div>

<div id="menu-inicial">
    <h1 class="logo-text">LYA-ERGO</h1>
    <p class="sub-text">SAFETY TUXTEPEC</p>
    <button class="btn-inicio" style="background:#27ae60; color:white;" onclick="prepararSistema('camara')">🎥 ABRIR CÁMARA IA</button>
    <button class="btn-inicio" style="background:#2980b9; color:white;" onclick="document.getElementById('fileInput').click()">📁 ANALIZAR VIDEO</button>
    <input type="file" id="fileInput" hidden accept="video/*" onchange="prepararSistema('archivo')">
</div>

<div id="contenedor-analisis">
    <div id="canvas-wrapper">
        <div class="status-badge" id="txt-status">IA EN ESPERA</div>
        <canvas id="output_canvas"></canvas>
    </div>
    <video id="input_video" playsinline muted></video>
    
    <div class="barra-controles">
        <button class="btn-circular btn-dark" onclick="location.reload()">SALIR</button>
        <button class="btn-circular" style="background:#00d2d3; color:#000;" onclick="cambiarCamara()">🔄<br>GIRAR</button>
        <button id="btn-calib" class="btn-circular" style="background:#f1c40f; color:#000;" onclick="activarIA()">⚖️<br>CALIBRAR</button>
        <button id="recordBtn" class="btn-circular" style="background:#ff4d4d; opacity: 0.3;" onclick="toggleGrabacion()">🔴<br>GRABAR</button>
    </div>
</div>

<script>
    const video = document.getElementById('input_video');
    const canvas = document.getElementById('output_canvas');
    const ctx = canvas.getContext('2d');
    const txtStatus = document.getElementById('txt-status');
    const progressBar = document.getElementById('bar-id');
    
    let pose = null, iaActiva = false, calibrado = false, analizandoRiesgo = false;
    let currentFacingMode = "environment", startTimeCalib = 0;
    let baseAngles = {}, mediaRecorder, recordedChunks = [];

    const TH = { cuello: 15, tronco: 20, hombros: 30, codos: 25, munecas: 22, piernas: 28, pies: 20 };

    async function prepararSistema(fuente) {
        document.getElementById('menu-inicial').style.display = 'none';
        document.getElementById('contenedor-analisis').style.display = 'flex';
        
        if (fuente === 'camara') await encenderCamara();
        else {
            const file = document.getElementById('fileInput').files[0];
            video.src = URL.createObjectURL(file);
            video.onloadedmetadata = () => { video.play(); loopPrevio(); };
        }
    }

    async function encenderCamara() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { 
                    facingMode: currentFacingMode,
                    width: { ideal: 1280 },
                    height: { ideal: 720 }
                } 
            });
            video.srcObject = stream;
            video.onloadedmetadata = () => { video.play(); loopPrevio(); };
        } catch (err) {
            alert("Error al acceder a la cámara: " + err);
        }
    }

    function loopPrevio() { 
        if (!iaActiva) { 
            // Ajustar resolución del canvas a la del video
            canvas.width = video.videoWidth; 
            canvas.height = video.videoHeight; 
            ctx.drawImage(video, 0, 0); 
            requestAnimationFrame(loopPrevio); 
        } 
    }

    function activarIA() {
        document.getElementById('loader-ia').style.display = 'flex';
        pose = new Pose({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}` });
        pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });
        pose.onResults(onResults);
        
        let p = 0;
        const iv = setInterval(() => { p += 10; progressBar.style.width = p+'%'; if(p>=100) clearInterval(iv); }, 80);
        setTimeout(() => { 
            document.getElementById('loader-ia').style.display='none'; 
            iaActiva=true; 
            startTimeCalib=Date.now(); 
            document.getElementById('recordBtn').style.opacity = "1";
            loopIA(); 
        }, 1200);
    }

    async function loopIA() { if (iaActiva) { await pose.send({image: video}); requestAnimationFrame(loopIA); } }

    function onResults(res) {
        if (!res.poseLandmarks) return;
        ctx.save();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(res.image, 0, 0);

        const lm = res.poseLandmarks;
        const w = canvas.width, h = canvas.height;
        const pt = (i) => ({ x: lm[i].x * w, y: lm[i].y * h });
        
        const p = {
            cab: pt(0),
            cue: { x: (lm[11].x+lm[12].x)/2*w, y:(lm[11].y+lm[12].y)/2*h },
            trx: { x: (lm[11].x+lm[12].x)/2*w, y:(lm[11].y+lm[12].y)/2*h + 20 },
            abd: { x: (lm[23].x+lm[24].x)/2*w, y:(lm[23].y+lm[24].y)/2*h - 20 },
            eba: { x: (lm[23].x+lm[24].x)/2*w, y:(lm[23].y+lm[24].y)/2*h },
            h_d: pt(12), c_d: pt(14), m_d: pt(16), mano_d: pt(20),
            h_i: pt(11), c_i: pt(13), m_i: pt(15), mano_i: pt(19),
            r_d: pt(26), t_d: pt(28), pie_d: pt(32),
            r_i: pt(25), t_i: pt(27), pie_i: pt(31)
        };

        const angles = {
            cue: calcAng(p.cab, p.cue, p.trx),
            abd: calcAng(p.trx, p.abd, p.eba),
            h_d: calcAng(p.trx, p.h_d, p.c_d),
            h_i: calcAng(p.trx, p.h_i, p.c_i),
            c_d: calcAng(p.h_d, p.c_d, p.m_d),
            c_i: calcAng(p.h_i, p.c_i, p.m_i),
            m_d: calcAng(p.c_d, p.m_d, p.mano_d),
            m_i: calcAng(p.c_i, p.m_i, p.mano_i),
            r_d: calcAng(p.eba, p.r_d, p.t_d),
            r_i: calcAng(p.eba, p.r_i, p.t_i),
            t_d: calcAng(p.r_d, p.t_d, p.pie_d),
            t_i: calcAng(p.r_i, p.t_i, p.pie_i)
        };

        if (!calibrado) {
            const t = Date.now() - startTimeCalib;
            if (t > 4000) { baseAngles = {...angles}; calibrado = true; }
            else { txtStatus.innerText = `CALIBRANDO BIOTIPO... ${Math.ceil((4000-t)/1000)}s`; }
        }

        const drawSeg = (p1, p2, angKey, groupKey) => {
            ctx.lineWidth = 6; ctx.lineCap = "round"; ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y);
            if (analizandoRiesgo && calibrado) {
                const diff = Math.abs(angles[angKey] - baseAngles[angKey]);
                const t = TH[groupKey];
                ctx.strokeStyle = diff > (t*2) ? "#ff3838" : (diff > t ? "#fffa65" : "#32ff7e");
            } else { ctx.strokeStyle = calibrado ? "#32ff7e" : "#4b4b4b"; }
            ctx.stroke();
        };

        drawSeg(p.cab, p.cue, 'cue', 'cuello');
        drawSeg(p.cue, p.trx, 'abd', 'tronco');
        drawSeg(p.trx, p.abd, 'abd', 'tronco');
        drawSeg(p.abd, p.eba, 'abd', 'tronco');
        drawSeg(p.trx, p.h_d, 'h_d', 'hombros');
        drawSeg(p.h_d, p.c_d, 'h_d', 'hombros');
        drawSeg(p.c_d, p.m_d, 'c_d', 'codos');
        drawSeg(p.m_d, p.mano_d, 'm_d', 'munecas');
        drawSeg(p.trx, p.h_i, 'h_i', 'hombros');
        drawSeg(p.h_i, p.c_i, 'h_i', 'hombros');
        drawSeg(p.c_i, p.m_i, 'c_i', 'codos');
        drawSeg(p.m_i, p.mano_i, 'm_i', 'munecas');
        drawSeg(p.eba, p.r_d, 'r_d', 'piernas');
        drawSeg(p.r_d, p.t_d, 'r_d', 'piernas');
        drawSeg(p.t_d, p.pie_d, 't_d', 'pies');
        drawSeg(p.eba, p.r_i, 'r_i', 'piernas');
        drawSeg(p.r_i, p.t_i, 'r_i', 'piernas');
        drawSeg(p.t_i, p.pie_i, 't_i', 'pies');

        ctx.restore();
    }

    function calcAng(a,b,c) {
        const v1={x:a.x-b.x, y:a.y-b.y}, v2={x:c.x-b.x, y:c.y-b.y};
        const dot = v1.x*v2.x + v1.y*v2.y;
        const m1 = Math.sqrt(v1.x**2 + v1.y**2), m2 = Math.sqrt(v2.x**2 + v2.y**2);
        const res = (m1*m2 === 0) ? 0 : Math.acos(Math.max(-1, Math.min(1, dot/(m1*m2))))*(180/Math.PI);
        return isNaN(res) ? 0 : res;
    }

    function toggleGrabacion() {
        if (!calibrado) return;
        analizandoRiesgo = !analizandoRiesgo;
        document.getElementById('recordBtn').classList.toggle('rec-active', analizandoRiesgo);
        if (analizandoRiesgo) {
            recordedChunks = [];
            mediaRecorder = new MediaRecorder(canvas.captureStream(30), { mimeType: 'video/webm' });
            mediaRecorder.ondataavailable = (e) => recordedChunks.push(e.data);
            mediaRecorder.onstop = () => {
                const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob(recordedChunks));
                a.download = `ERGO_REPORT_${Date.now()}.webm`; a.click();
            };
            mediaRecorder.start();
            txtStatus.innerText = "ESTADO: GRABANDO";
        } else { 
            mediaRecorder.stop(); 
            txtStatus.innerText = "SISTEMA LISTO"; 
        }
    }

    async function cambiarCamara() {
        currentFacingMode = (currentFacingMode === "environment") ? "user" : "environment";
        iaActiva = false; 
        if(video.srcObject) {
            video.srcObject.getTracks().forEach(track => track.stop());
        }
        await encenderCamara();
    }
</script>
</body>
</html>
