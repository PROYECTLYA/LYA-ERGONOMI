    canvas { width: 100%; height: 100%; object-fit: contain; }
    .status-badge { position: absolute; top: 25px; left: 50%; transform: translateX(-50%); background: rgba(13, 17, 23, 0.8); color: #00ff00; padding: 8px 20px; border-radius: 30px; font-weight: 800; border: 1px solid rgba(0, 255, 0, 0.5); z-index: 7000; }
    .barra-controles { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; z-index: 7000; background: rgba(22, 27, 34, 0.8); padding: 15px 25px; border-radius: 100px; backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
    .btn-circular { width: 60px; height: 60px; border-radius: 50%; border: none; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.55rem; font-weight: 900; cursor: pointer; background: #30363d; color: white; }
    .rec-active { background: #ff4d4d !important; animation: pulse-red 1.5s infinite; transform: scale(1.1); }
    .btn-video { background: black; border: 4px solid white; border-radius: 50%; width: 70px; height: 70px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: transform 0.2s; }
    .d-none { display: none !important; }
    @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(255, 77, 77, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(255, 77, 77, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 77, 77, 0); } }
    .plant-tip { font-size: 0.75rem; color: #f1c40f; margin-top: 15px; text-align: center; border: 1px dashed #f1c40f; padding: 10px; border-radius: 8px; max-width: 300px; }
</style>

<body>

<div id="loader-ia">

    <div style="width: 75%; height: 6px; background: #21262d; border-radius: 10px; margin-top: 25px; overflow: hidden;">

</div>

<div id="contenedor-analisis">

<div id="menu-inicial">
    <h1 class="logo-text">LYA-ERGO</h1>
    <p class="sub-text">Auditoría Ergonómica NOM-036-STPS</p>
    
    <div style="width: 90%; max-width: 450px; background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1);">
        <div class="row">

                <label style="color: #8b949e; font-size: 0.7rem;">EMPRESA / PLANTA:</label>

                    <option value="H">Hombre</option>

                <label style="color: #8b949e; font-size: 0.7rem;">EDAD:</label>
                <input type="number" id="edadTrabajador" min="15" max="80" class="form-control-custom">
            </div>
            <div class="col-12">
                <label style="color: #27ae60; font-size: 0.7rem; font-weight: bold;">PESO CARGA (KG):</label>
                <input type="number" id="pesoCarga" min="1" max="50" class="form-control-custom" style="border: 2px solid #27ae60 !important;">
            </div>
        </div>
    </div>

    <div class="d-flex gap-2">
        <button class="btn-inicio" style="background:#27ae60; color:white; width: 180px;" onclick="prepararSistema('camara')">🎥 VIVO</button>
        <button class="btn-inicio" style="background:#2980b9; color:white; width: 180px;" onclick="validarYAbrirArchivo()">📁 ARCHIVO</button>
    </div>
    <input type="file" id="fileInput" hidden accept="video/*" onchange="prepararSistema('archivo')">
</div>

<script>
/**
 * 🏷️ BLOQUE 1: CONSTANTES DE CONFIGURACIÓN Y NORMATIVA
 * Define referencias del DOM y umbrales angulares según NOM-036-STPS-2018.
 */
const video = document.getElementById('input_video');
const canvas = document.getElementById('output_canvas');
const ctx = canvas.getContext('2d');
const txtStatus = document.getElementById('txt-status');
const TH = { tronco: 18, cuello: 12, hombros: 15, codos: 25, munecas: 20, piernas: 25 };

/**
 * 🏷️ BLOQUE 2: GESTIÓN DE ESTADOS Y MEMORIA IA
 * Variables globales para estadísticas de riesgo, buffers de suavizado y control de flujo.
 */
let wbaStats = { riesgoAltoTotal: 0, framesAnalizados: 0, zonasAfectadas: new Set(), inicioAuditoria: null, ciclos: 0 };
let baseAngles = {};        
let angleBuffer = {};       
let posBuffer = {};         
const HISTORIAL_MAX = 15;   
const SUAVIZADO_POS = 5;    
let iaActiva = false;
let calibrado = false;
let analizandoRiesgo = false;
let currentFacingMode = "environment";
let pose;
let mediaRecorder;
let recordedChunks = [];
let hallazgosNormativos = [];

/**
 * 🏷️ BLOQUE 3: LÓGICA DE VALIDACIÓN NORMATIVA (LFT & NOM-036)
 * Función: validarNormativa()
 * Utilidad: Contrasta edad, género y carga contra los límites legales mexicanos.
 */
function validarNormativa() {
    hallazgosNormativos = []; 
    const edad = parseInt(document.getElementById('edadTrabajador').value);
    const genero = document.getElementById('generoTrabajador').value; 
    const peso = parseFloat(document.getElementById('pesoCarga').value);

    if (edad < 15) {
        hallazgosNormativos.push("INCUMPLIMIENTO CRÍTICO LFT: Trabajador menor de edad legal.");
    } else if (edad < 18) {
        hallazgosNormativos.push("OBSERVACIÓN LFT: Menor en edad de aprendizaje. Carga restringida.");
    }

    let limiteMax = (genero === "M") ? (edad < 18 ? 7 : (edad <= 45 ? 15 : 10)) : (edad < 18 ? 7 : (edad <= 45 ? 25 : 20));
    if (peso > limiteMax) {
        hallazgosNormativos.push(`INCUMPLIMIENTO NOM-036: Peso excede el límite de ${limiteMax}kg.`);
    }
    return { hallazgos: hallazgosNormativos, limite: limiteMax };
}

/**
 * 🏷️ BLOQUE 4: CÁLCULOS BIOMECÁNICOS Y RENDERIZADO
 * Función: calcAng3D(a, b, c) -> Calcula ángulos en espacio tridimensional.
 * Función: drawV() -> Dibuja vectores, aplica suavizado y semaforización de riesgo.
 */
function calcAng3D(a, b, c) {
    if(!a || !b || !c) return 0;
    const v1 = { x: a.x - b.x, y: a.y - b.y, z: a.z - b.z };
    const v2 = { x: c.x - b.x, y: c.y - b.y, z: c.z - b.z };
    const dot = v1.x * v2.x + v1.y * v2.y + v1.z * v2.z;
    const m1 = Math.sqrt(v1.x**2 + v1.y**2 + v1.z**2);
    const m2 = Math.sqrt(v2.x**2 + v2.y**2 + v2.z**2);
    const angle = Math.acos(Math.max(-1, Math.min(1, dot / (m1 * m2)))) * (180 / Math.PI);
    return isNaN(angle) ? 0 : angle;
}

const drawV = (p1, p2, angKey, groupKey, vis1, vis2) => {
    if (vis1 < 0.5 || vis2 < 0.5) return;
    const buffer = angleBuffer[angKey] || [];
    if (buffer.length === 0) return;
    const avgAngle = buffer.reduce((a, b) => a + b, 0) / buffer.length;

    let color = "#00ff00", thickness = 4, status = "SEGURO";
    if (analizandoRiesgo && calibrado) {
        const diff = Math.abs(avgAngle - (baseAngles[angKey] || avgAngle));
        const limit = TH[groupKey];
        wbaStats.framesAnalizados++;
        if (diff > (limit * 2)) {
            color = "#ff3838"; thickness = 10; status = "CRÍTICO";
            wbaStats.riesgoAltoTotal++;
            wbaStats.zonasAfectadas.add(groupKey);
        } else if (diff > limit) {
            color = "#f1c40f"; thickness = 6; status = "RIESGO";
        }
    }
    ctx.beginPath();
    ctx.strokeStyle = color; ctx.lineWidth = thickness; ctx.lineCap = "round";
    ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
    if (calibrado) {
        const mx = (p1.x + p2.x) / 2, my = (p1.y + p2.y) / 2;
        ctx.fillStyle = "rgba(0,0,0,0.7)";
        ctx.fillRect(mx + 10, my - 20, 70, 30);
        ctx.fillStyle = color; ctx.font = "bold 10px Arial";
        ctx.fillText(`${avgAngle.toFixed(0)}°`, mx + 15, my - 8);
        ctx.fillText(status, mx + 15, my + 5);
    }
};

/**
 * 🏷️ BLOQUE 5: MOTOR DE INFERENCIA IA (JERARQUÍA T)
 * Función: onResults(res)
 * Utilidad: Procesa landmarks de MediaPipe, calcula puntos estructurales (Sacro, Tórax) y orquesta el dibujo.
 */
function onResults(res) {
    const w = canvas.width, h = canvas.height;
    ctx.save();
    ctx.clearRect(0, 0, w, h);
    if (currentFacingMode === "user") { ctx.translate(w, 0); ctx.scale(-1, 1); }
    if (res.image) ctx.drawImage(res.image, 0, 0, w, h);
    if (!res.poseLandmarks) { txtStatus.innerText = "BUSCANDO TRABAJADOR..."; ctx.restore(); return; }

    const loader = document.getElementById('loader-ia');
    if (loader && loader.style.display !== 'none') loader.style.display = 'none';

    const lm = res.poseLandmarks;
    const pt = (i) => {
        if (!lm[i]) return { x: 0, y: 0, z: 0, v: 0 };
        if (!posBuffer[i]) posBuffer[i] = { h: [] };
        posBuffer[i].h.push({ x: lm[i].x * w, y: lm[i].y * h, z: lm[i].z });
        if (posBuffer[i].h.length > SUAVIZADO_POS) posBuffer[i].h.shift();
        const avg = posBuffer[i].h.reduce((a, b) => ({ x: a.x + b.x, y: a.y + b.y, z: a.z + b.z }), { x: 0, y: 0, z: 0 });
        return { x: avg.x / posBuffer[i].h.length, y: avg.y / posBuffer[i].h.length, z: avg.z / posBuffer[i].h.length, v: lm[i].visibility };
    };

    const p = { ore_d: pt(8), ore_i: pt(7), h_d: pt(12), h_i: pt(11), c_d: pt(14), c_i: pt(13), m_d: pt(16), m_i: pt(15), dedo_d: pt(20), dedo_i: pt(19), p_d: pt(24), p_i: pt(23), r_d: pt(26), r_i: pt(25), t_d: pt(28), t_i: pt(27), pie_d: pt(32), pie_i: pt(31) };
    p.centro_orejas = { x: (p.ore_d.x + p.ore_i.x) / 2, y: (p.ore_d.y + p.ore_i.y) / 2, z: (p.ore_d.z + p.ore_i.z) / 2 };
    p.cue = { x: (p.h_d.x + p.h_i.x) / 2, y: (p.h_d.y + p.h_i.y) / 2, z: (p.h_d.z + p.h_i.z) / 2 };
    p.sacro = { x: (p.p_d.x + p.p_i.x) / 2, y: (p.p_i.y + p.p_i.y) / 2, z: (p.p_d.z + p.p_i.z) / 2 };
    p.torax = { x: p.cue.x + (p.sacro.x - p.cue.x) * 0.3, y: p.cue.y + (p.sacro.y - p.cue.y) * 0.3, z: p.cue.z };
    p.abdomen = { x: p.cue.x + (p.sacro.x - p.cue.x) * 0.6, y: p.cue.y + (p.sacro.y - p.cue.y) * 0.6, z: p.cue.z };
    const vRef = { x: p.cue.x, y: p.cue.y + 100, z: p.cue.z };

    const angles = {
        cuello: calcAng3D(p.centro_orejas, p.cue, vRef),
        tronco: calcAng3D(p.cue, p.sacro, vRef),
        h_d: calcAng3D(p.cue, p.h_d, p.c_d), h_i: calcAng3D(p.cue, p.h_i, p.c_i),
        c_d: calcAng3D(p.h_d, p.c_d, p.m_d), c_i: calcAng3D(p.h_i, p.c_i, p.m_i),
        r_d: calcAng3D(p.p_d, p.r_d, p.t_d), r_i: calcAng3D(p.p_i, p.r_i, p.t_i)
    };

    Object.keys(angles).forEach(k => {
        if (!angleBuffer[k]) angleBuffer[k] = [];
        angleBuffer[k].push(angles[k]);
        if (angleBuffer[k].length > HISTORIAL_MAX) angleBuffer[k].shift();
    });

    drawV(p.ore_d, p.ore_i, 'cuello', 'cuello', p.ore_d.v, p.ore_i.v);
    drawV(p.centro_orejas, p.cue, 'cuello', 'cuello', 1, 1);
    drawV(p.cue, p.torax, 'tronco', 'tronco', 1, 1);
    drawV(p.torax, p.abdomen, 'tronco', 'tronco', 1, 1);
    drawV(p.abdomen, p.sacro, 'tronco', 'tronco', 1, 1);
    drawV(p.h_d, p.h_i, 'tronco', 'hombros', p.h_d.v, p.h_i.v);
    drawV(p.p_d, p.p_i, 'tronco', 'piernas', p.p_d.v, p.p_i.v);
    drawV(p.h_d, p.c_d, 'h_d', 'hombros', p.h_d.v, p.c_d.v);
    drawV(p.c_d, p.m_d, 'c_d', 'codos', p.c_d.v, p.m_d.v);
    drawV(p.p_d, p.r_d, 'r_d', 'piernas', p.p_d.v, p.r_d.v);
    drawV(p.r_d, p.t_d, 'r_d', 'piernas', p.r_d.v, p.t_d.v);
    ctx.restore();
}

/**
 * 🏷️ BLOQUE 6: SISTEMA DE CALIBRACIÓN Y AUDITORÍA
 * Función: iniciarCalibracion() -> Fija postura neutra del usuario.
 * Función: toggleAuditoria() -> Inicia/detiene captura de video y análisis de datos.
 */
function iniciarCalibracion() {
    if (!iaActiva) return;
    txtStatus.innerText = "⚖️ CALIBRANDO...";
    setTimeout(() => {
        Object.keys(angleBuffer).forEach(k => {
            baseAngles[k] = angleBuffer[k].reduce((a, b) => a + b, 0) / angleBuffer[k].length;
        });
        calibrado = true;
        document.getElementById('btn-calib').style.background = "#2ecc71";
        document.getElementById('recordBtn').disabled = false;
        document.getElementById('recordBtn').style.opacity = "1";
        txtStatus.innerText = "✅ CALIBRADO";
    }, 2000);
}

function toggleAuditoria() {
    if (!calibrado) return;
    analizandoRiesgo = !analizandoRiesgo;
    const btn = document.getElementById('recordBtn');
    if (analizandoRiesgo) {
        recordedChunks = [];
        mediaRecorder = new MediaRecorder(canvas.captureStream(30), { mimeType: 'video/webm' });
        mediaRecorder.ondataavailable = (e) => recordedChunks.push(e.data);
        mediaRecorder.onstop = descargarVideo;
        mediaRecorder.start();
        wbaStats.inicioAuditoria = Date.now();
        btn.innerHTML = "<span>⏹️</span>DETENER"; btn.classList.add('rec-active');
    } else {
        btn.innerHTML = "<span>🔴</span>AUDITAR"; btn.classList.remove('rec-active');
        if (mediaRecorder) mediaRecorder.stop();
        setTimeout(generarReporteWBA, 800);
    }
}

/**
 * 🏷️ BLOQUE 7: GENERACIÓN DE REPORTE TÉCNICO PDF
 * Función: generarReporteWBA()
 * Utilidad: Crea un documento PDF profesional integrando datos de planta, resultados IA y conclusiones legales.
 */
function generarReporteWBA() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const info = {
        emp: document.getElementById('nombreEmpresa')?.value.toUpperCase() || "N/A",
        trab: document.getElementById('nombreTrabajador')?.value || "N/A",
        peso: parseFloat(document.getElementById('pesoCarga')?.value) || 0,
        edad: parseInt(document.getElementById('edadTrabajador')?.value) || 0,
        gen: document.getElementById('generoTrabajador')?.value
    };

    let limite = (info.gen === 'H') ? (info.edad > 45 ? 20 : 25) : (info.edad > 45 ? 10 : 15);
    const porcRiesgo = wbaStats.framesAnalizados > 0 ? ((wbaStats.riesgoAltoTotal / wbaStats.framesAnalizados) * 100).toFixed(1) : 0;
    const cumple = (info.peso <= limite && porcRiesgo <= 20);

    doc.setFillColor(13, 17, 23); doc.rect(0, 0, 210, 40, 'F');
    doc.setTextColor(0, 255, 0); doc.setFontSize(16); doc.text("INFORME DE EVALUACIÓN ERGONÓMICA LYA-ERGO", 105, 20, { align: "center" });
    
    doc.autoTable({
        startY: 50,
        head: [['FACTOR', 'VALOR', 'LÍMITE', 'ESTADO']],
        body: [
            ['Masa Carga', `${info.peso}kg`, `${limite}kg`, info.peso > limite ? 'EXCEDE' : 'CUMPLE'],
            ['Riesgo Postural', `${porcRiesgo}%`, '20%', porcRiesgo > 20 ? 'ALTO' : 'BAJO']
        ]
    });

    doc.text(cumple ? "VERDICTO: OPERACIÓN SEGURA" : "VERDICTO: RIESGO DETECTADO", 15, doc.lastAutoTable.finalY + 20);
    doc.save(`Reporte_Ergo_${info.trab}.pdf`);
}

/**
 * 🏷️ BLOQUE 8: CONTROL DE HARDWARE Y CICLO DE VIDA
 * Función: prepararSistema() -> Valida formulario e inicializa cámara o carga de archivo.
 * Función: activarIA() -> Inicializa el modelo MediaPipe Pose y gestiona el bucle de procesamiento.
 * Función: descargarVideo() -> Exporta la evidencia visual en formato WEBM.
 */
async function prepararSistema(fuente) {
    const edadInput = document.getElementById('edadTrabajador');
    if (!/^\d{2}$/.test(edadInput.value.trim())) { alert("Edad inválida."); return; }
    
    document.getElementById('menu-inicial').style.display = 'none';
    document.getElementById('contenedor-analisis').style.display = 'block';

    if (fuente === 'camara') {
        video.srcObject = await navigator.mediaDevices.getUserMedia({ video: { facingMode: currentFacingMode } });
    } else {
        const file = document.getElementById('fileInput').files[0];
        if (file) video.src = URL.createObjectURL(file);
    }

    video.onloadedmetadata = async () => {
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        await video.play();
        activarIA();
    };
}

async function activarIA() {
    const loader = document.getElementById('loader-ia');
    loader.style.display = 'flex';
    pose = new Pose({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}` });
    pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5 });
    pose.onResults((res) => { iaActiva = true; onResults(res); });

    async function frameLoop() {
        if (!video.paused && !video.ended) {
            await pose.send({ image: video });
            requestAnimationFrame(frameLoop);
        }
    }
    frameLoop();
}

function descargarVideo() {
    const blob = new Blob(recordedChunks, { type: 'video/webm' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `EVIDENCIA_LYA_${Date.now()}.webm`;
    a.click();
}

function cambiarCamara() { currentFacingMode = currentFacingMode === "environment" ? "user" : "environment"; prepararSistema('camara'); }
function validarYAbrirArchivo() { document.getElementById('fileInput').click(); }
function togglePlay() { video.paused ? video.play() : video.pause(); }
function rewindVideo() { video.currentTime -= 5; }
function forwardVideo() { video.currentTime += 5; }

</script>
</body>
