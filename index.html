<script>
/**
 * 🏷️ VALIDACIÓN DE FORMULARIO
 */
const inputs = document.querySelectorAll('.form-val');
const btnVivo = document.getElementById('btn-vivo');
const btnArchivo = document.getElementById('btn-archivo');


function validarFormulario() {
    let completo = true;
    const inputsVal = document.querySelectorAll('.form-val');
    
    inputsVal.forEach(input => {
        const val = input.value.trim();
        if (val === "") {
            completo = false;
        }
        
        // Validación extra por tipo
        if (input.type === "number") {
            const num = parseFloat(val);
            if (isNaN(num) || num <= 0) completo = false;
        }
        
        // Validación de texto (pattern)
        if (input.hasAttribute('pattern')) {
            const reg = new RegExp("^" + input.getAttribute('pattern') + "$");
            if (!reg.test(val)) completo = false;
        }
    });
    
    const selectGen = document.getElementById('generoTrabajador');
    if(!selectGen.value) completo = false;

    btnVivo.disabled = !completo;
    btnArchivo.disabled = !completo;
    
    // Feedback visual de los botones
    btnVivo.style.opacity = completo ? "1" : "0.5";
    btnArchivo.style.opacity = completo ? "1" : "0.5";
}

// Escuchar todos los eventos relevantes
inputs.forEach(input => {
    input.addEventListener('input', validarFormulario);
    input.addEventListener('change', validarFormulario);
});
document.getElementById('generoTrabajador').addEventListener('change', validarFormulario);

// Ejecutar una vez al cargar por si hay autocompletado
validarFormulario();


/**
 * 🏷️ REFERENCIAS AL DOM Y CONFIGURACIÓN BASE
 */
    const video = document.getElementById('input_video');
    const canvas = document.getElementById('output_canvas');
    const ctx = canvas.getContext('2d');
    const txtStatus = document.getElementById('txt-status');

    const TH = { tronco: 18, cuello: 12, hombros: 28, codos: 25, munecas: 20, piernas: 25, pies: 18 };

    let wbaStats = { riesgoAltoTotal: 0, framesAnalizados: 0, zonasAfectadas: new Set(), inicioAuditoria: null, ciclos: 0, lastHandY: null, subiendo: false };
    let baseAngles = {}, angleBuffer = {};
    const HISTORIAL_MAX = 20; 
    let iaActiva = false, calibrado = false, analizandoRiesgo = false;
    let currentFacingMode = "environment", startTimeCalib = 0;
    let pose;
    let mediaRecorder;
    let recordedChunks = [];
    let posBuffer = {};
    const SUAVIZADO_POS = 5;

/**
 * 🏷️ GESTIÓN DE FUENTES DE VIDEO
 */
async function prepararSistema(fuente) {
    document.getElementById('menu-inicial').style.display = 'none';
    document.getElementById('contenedor-analisis').style.display = 'block';
    if (fuente === 'camara') {
        await encenderCamara();
        setTimeout(() => { activarIA(); }, 500);
    } else {
        const file = document.getElementById('fileInput').files[0];
        if (!file) return;
        if (video.src) URL.revokeObjectURL(video.src);
        video.src = URL.createObjectURL(file);
        video.onloadedmetadata = () => { 
            setupCanvas();
            video.play(); 
            activarIA();
        };
    }
}

    function setupCanvas() {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
    }
    
    async function encenderCamara() {
    loader.style.display = "none"; // Asegurar que el loader no se vea al inicio
        try {
            if (video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: currentFacingMode, width: { ideal: 1280 }, height: { ideal: 720 } } 
            });
            video.srcObject = stream;
            video.onloadedmetadata = () => { setupCanvas(); video.play(); requestAnimationFrame(loopVideoSimple); };
        } catch (e) { alert("Error al acceder a la cámara"); }
    }

  function loopVideoSimple() {
    if (!iaActiva) {
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        requestAnimationFrame(loopVideoSimple);
    }
}

/**
 * 🏷️ MOTOR MATEMÁTICO Y RENDERIZADO VISUAL
 */
    function calcAng3D(a,b,c) {
        const v1={x:a.x-b.x, y:a.y-b.y, z:a.z-b.z}, v2={x:c.x-b.x, y:c.y-b.y, z:c.z-b.z};
        const dot = v1.x*v2.x + v1.y*v2.y + v1.z*v2.z;
        const m1 = Math.sqrt(v1.x**2 + v1.y**2 + v1.z**2), m2 = Math.sqrt(v2.x**2 + v2.y**2 + v2.z**2);
        return (m1*m2 === 0) ? 0 : Math.acos(Math.max(-1, Math.min(1, dot/(m1*m2))))*(180/Math.PI);
    }


const drawV = (p1, p2, angKey, groupKey, raw1, raw2) => {
    if (!raw1 || !raw2 || raw1.visibility < 0.5 || raw2.visibility < 0.5) return;
    
    let color = "#00ff00";
    let thickness = 3;

    // Solo semaforizar e interpretar si ya está calibrado
    if (calibrado) {
        const buffer = angleBuffer[angKey] || [];
        const avg = buffer.length > 0 ? buffer.reduce((a, b) => a + b, 0) / buffer.length : 0;
        const diff = Math.abs(avg - (baseAngles[angKey] || avg));
        
        // Umbrales independientes por jerarquía muscular
        const t = TH[groupKey] || 20;
        if (diff > t * 2) { color = "#ff3838"; thickness = 7; }
        else if (diff > t) { color = "#f1c40f"; thickness = 5; }

        // Etiquetas: Solo visibles tras calibrar
        ctx.fillStyle = "rgba(0,0,0,0.6)";
        ctx.fillRect(p1.x + 10, p1.y - 15, 48, 18);
        ctx.fillStyle = "#fff";
        ctx.font = "bold 11px Arial";
        ctx.fillText(Math.round(avg) + "°", p1.x + 15, p1.y - 2);
    }

    ctx.beginPath();
    ctx.strokeStyle = color;
    ctx.lineWidth = thickness;
    ctx.moveTo(p1.x, p1.y);
    ctx.lineTo(p2.x, p2.y);
    ctx.stroke();
};

    const buffer = angleBuffer[angKey] || [];
    if (buffer.length === 0) return;

    const avgAngle = buffer.reduce((a, b) => a + b, 0) / buffer.length;
    let color = "#00ff00", thickness = 4, statusLabel = "SEGURO";
    if (analizandoRiesgo && calibrado) {
        const diff = Math.abs(avgAngle - (baseAngles[angKey] || avgAngle));
        const t = TH[groupKey];
        wbaStats.framesAnalizados++;
        if (diff > (t * 2)) { 
            wbaStats.riesgoAltoTotal++;
            wbaStats.zonasAfectadas.add(groupKey);
            color = "#ff3838"; thickness = 10; statusLabel = "CRÍTICO";
        } else if (diff > t) {
            color = "#f1c40f";
            thickness = 7; statusLabel = "ADVERTENCIA";
        }
    }

    ctx.beginPath();
    ctx.strokeStyle = color;
    ctx.lineWidth = thickness;
    ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y);
    ctx.stroke();

    if (calibrado) {
        const midX = (p1.x + p2.x) / 2, midY = (p1.y + p2.y) / 2;
        let offsetX = (groupKey === "munecas") ? 45 : 15;
        let offsetY = (groupKey === "munecas") ? 20 : -15;
        ctx.fillStyle = "rgba(0, 0, 0, 0.75)";
        ctx.beginPath(); ctx.roundRect(midX + offsetX, midY + offsetY, 90, 34, 5); ctx.fill();
        ctx.strokeStyle = color;
        ctx.lineWidth = 2; ctx.stroke();
        ctx.fillStyle = "#ffffff"; ctx.font = "bold 10px Segoe UI";
        ctx.fillText(`${avgAngle.toFixed(1)}°`, midX + offsetX + 5, midY + offsetY + 15);
        ctx.fillStyle = color; ctx.font = "900 8px Segoe UI";
        ctx.fillText(statusLabel, midX + offsetX + 5, midY + offsetY + 27);
    }
};

function onResults(res) {
    if (!res || !res.poseLandmarks) {
        txtStatus.innerText = "SUJETO PERDIDO";
        return;
    }
    
    const lm = res.poseLandmarks;
    const w = canvas.width;
    const h = canvas.height;

    if (!calibrado) {
        let tiempoRestante = Math.ceil((3000 - (Date.now() - startTimeCalib)) / 1000);
        txtStatus.innerText = `CALIBRANDO EN... ${tiempoRestante > 0 ? tiempoRestante : 0}s`;
    }

    ctx.save();
    ctx.clearRect(0, 0, w, h);
    if (currentFacingMode === "user") { 
        ctx.translate(w, 0);
        ctx.scale(-1, 1); 
    }
    
    ctx.drawImage(res.image, 0, 0, w, h);

    const pt = (i) => {
        const lmPoint = lm[i];
        if (!posBuffer[i]) {
            posBuffer[i] = { x: lmPoint.x * w, y: lmPoint.y * h, history: [] };
        }
        if (lmPoint.visibility >= 0.5) {
            posBuffer[i].history.push({ x: lmPoint.x * w, y: lmPoint.y * h });
            if (posBuffer[i].history.length > SUAVIZADO_POS) posBuffer[i].history.shift();
        }
        const avgX = posBuffer[i].history.reduce((a, b) => a + b.x, 0) / posBuffer[i].history.length;
        const avgY = posBuffer[i].history.reduce((a, b) => a + b.y, 0) / posBuffer[i].history.length;
        return { x: avgX, y: avgY, z: lmPoint.z, visibility: lmPoint.visibility };
    };

    
        const pt = (i) => ({ x: lm[i].x * canvas.width, y: lm[i].y * canvas.height, z: lm[i].z, visibility: lm[i].visibility });
        
        // JERARQUÍA MUSCULAR SEGÚN DIAGRAMA
        const p = {
            cab: pt(0),
            cue: { x: (lm[11].x + lm[12].x) / 2 * canvas.width, y: (lm[11].y + lm[12].y) / 2 * canvas.height },
            tor: { x: (lm[11].x + lm[12].x) / 2 * canvas.width, y: ((lm[11].y + lm[12].y) / 2 * canvas.height) + 35 },
            abd: { x: (lm[23].x + lm[24].x) / 2 * canvas.width, y: ((lm[23].y + lm[24].y) / 2 * canvas.height) - 30 },
            esp: { x: (lm[23].x + lm[24].x) / 2 * canvas.width, y: (lm[23].y + lm[24].y) / 2 * canvas.height },
            hd: pt(12), hi: pt(11), cd: pt(14), ci: pt(13), md: pt(16), mi: pt(15), 
            pd: pt(24), pi: pt(23), rd: pt(26), ri: pt(25), td: pt(28), ti: pt(27)
        };


    if (analizandoRiesgo) {
        const alturaTorso = Math.abs(p.h_d.y - p.p_d.y);
        const currentHandY = (p.m_d.y + p.m_i.y) / 2;
        const umbralMovimiento = alturaTorso * 0.3;
        if (wbaStats.lastHandY !== null) {
            const desplazamiento = wbaStats.lastHandY - currentHandY;
            if (desplazamiento > umbralMovimiento && !wbaStats.subiendo) {
                wbaStats.ciclos++;
                wbaStats.subiendo = true;
            } else if (desplazamiento < -umbralMovimiento) {
                wbaStats.subiendo = false;
            }
        }
        wbaStats.lastHandY = currentHandY;
    }

    const currentAngles = {
        cue: calcAng3D(p.cab, p.cue, p.tor), 
        abd: calcAng3D(p.tor, p.abd, p.esp_baja),
        c_d: calcAng3D(p.h_d, p.c_d, p.m_d), 
        c_i: calcAng3D(p.h_i, p.c_i, p.m_i),
        m_d: calcAng3D(p.c_d, p.m_d, p.mano_d), 
        m_i: calcAng3D(p.c_i, p.m_i, p.mano_i),
        h_d: calcAng3D(p.p_d, p.h_d, p.c_d), 
        h_i: calcAng3D(p.p_i, p.h_i, p.c_i),
        r_d: calcAng3D(p.p_d, p.r_d, p.t_d), 
        r_i: calcAng3D(p.p_i, p.r_i, p.t_i),
        t_d: calcAng3D(p.r_d, p.t_d, p.pie_d), 
        t_i: calcAng3D(p.r_i, p.t_i, p.pie_i)
    };
    Object.keys(currentAngles).forEach(k => {
        if (!angleBuffer[k]) angleBuffer[k] = [];
        angleBuffer[k].push(currentAngles[k]);
        if (angleBuffer[k].length > HISTORIAL_MAX) angleBuffer[k].shift();
    });

    if (iaActiva && !calibrado && (Date.now() - startTimeCalib > 3000)) {
        Object.keys(angleBuffer).forEach(k => { 
            baseAngles[k] = angleBuffer[k].reduce((a, b) => a + b, 0) / angleBuffer[k].length; 
        });
        wbaStats.lastHandY = (p.m_d.y + p.m_i.y) / 2;
        calibrado = true; 
        document.getElementById('recordBtn').style.opacity = "1";
        txtStatus.innerText = "CALIBRADO - LISTO";
    }

    ctx.strokeStyle = "#00ff00"; 
    ctx.lineWidth = 4;
    ctx.beginPath(); ctx.moveTo(p.h_i.x, p.h_i.y); ctx.lineTo(p.h_d.x, p.h_d.y); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(p.p_i.x, p.p_i.y); ctx.lineTo(p.p_d.x, p.p_d.y); ctx.stroke();

    drawV(p.cue, p.esp_baja, 'abd', 'tronco', lm[11], lm[23]);
    drawV(p.cue, p.cab, 'cue', 'cuello', lm[11], lm[0]);
    drawV(p.h_d, p.c_d, 'c_d', 'codos', lm[12], lm[14]); 
    drawV(p.c_d, p.m_d, 'c_d', 'codos', lm[14], lm[16]);
    drawV(p.h_i, p.c_i, 'c_i', 'codos', lm[11], lm[13]); 
    drawV(p.c_i, p.m_i, 'c_i', 'codos', lm[13], lm[15]);
    drawV(p.p_d, p.r_d, 'r_d', 'piernas', lm[24], lm[26]);
    drawV(p.r_d, p.t_d, 'r_d', 'piernas', lm[26], lm[28]);
    drawV(p.p_i, p.r_i, 'r_i', 'piernas', lm[23], lm[25]); 
    drawV(p.r_i, p.t_i, 'r_i', 'piernas', lm[25], lm[27]);
    
    ctx.restore();
}

/** * 🏷️ INICIALIZACIÓN DE IA
 */
let timeoutDeteccion; 

async function activarIA() {
    const loader = document.getElementById('loader-ia');
    if (loader) loader.style.display = 'flex';
    
    calibrado = false;
    iaActiva = false; 
    txtStatus.innerText = "BUSCANDO SUJETO...";

    clearTimeout(timeoutDeteccion);
    timeoutDeteccion = setTimeout(() => {
        if (!iaActiva) {
            if (loader) loader.style.display = 'none';
            alert("⚠️ NO SE HA DETECTADO EL SUJETO.");
            txtStatus.innerText = "SISTEMA READY (FALLÓ DETECCIÓN)";
        }
    }, 5000);

    if (!pose) {
        pose = new Pose({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}` });
        pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
        pose.onResults((res) => {
            if (res.poseLandmarks) {
                if (!iaActiva) {
                    if (loader) loader.style.display = 'none';
                    iaActiva = true; 
                    startTimeCalib = Date.now(); 
                    const btn = document.getElementById('recordBtn');
                    if (btn) { btn.disabled = false; btn.style.opacity = "1"; }
                }
                onResults(res);
            } else if (iaActiva) {
                txtStatus.innerText = "⚠️ SUJETO FUERA DE CUADRO";
            }
        });
    }

    async function procesarFrame() {
        if (document.getElementById('contenedor-analisis').style.display === 'block') {
            if (video.readyState >= 2) { await pose.send({ image: video }); }
            requestAnimationFrame(procesarFrame);
        }
    }
    setTimeout(() => { procesarFrame(); }, 800);
}

/**
 * 🏷️ REPORTE PDF
 */
function generarReporteWBA() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    
    const empresa = document.getElementById('nombreEmpresa')?.value || "N/A";
    const puesto = document.getElementById('puestoTrabajo')?.value || "N/A";
    const trabajador = document.getElementById('nombreTrabajador')?.value || "N/A";
    const peso = parseFloat(document.getElementById('pesoCarga')?.value) || 0;
    const porcentajeRiesgo = wbaStats.framesAnalizados > 0 ? ((wbaStats.riesgoAltoTotal / wbaStats.framesAnalizados) * 100).toFixed(1) : 0;
    const msTranscurridos = Date.now() - wbaStats.inicioAuditoria;
    const duracionMinutos = (msTranscurridos / 60000).toFixed(2);
    const frecuencia = (wbaStats.ciclos / (duracionMinutos || 0.01)).toFixed(2);
    const zonas = Array.from(wbaStats.zonasAfectadas).join(', ') || 'NINGUNA';

    doc.setFillColor(13, 17, 23); doc.rect(0, 0, 210, 25, 'F');
    doc.setTextColor(0, 255, 0); doc.setFontSize(20);
    doc.text("LYA – ERGONOMI", 105, 12, { align: "center" });
    doc.setTextColor(255, 255, 255); doc.setFontSize(10);
    doc.text("REPORTE MIXTO: WBA + NOM-036-STPS", 105, 18, { align: "center" });
    
    doc.setFillColor(5, 30, 85); doc.rect(10, 30, 190, 45, 'F');
    doc.setTextColor(255, 255, 255); doc.setFontSize(14); doc.setFont("helvetica", "bold");
    doc.text("RESULTADOS DE LA EVALUACIÓN", 105, 40, { align: "center" });
    
    doc.setFontSize(11); doc.setFont("helvetica", "normal");
    doc.text(`TRABAJADOR: ${trabajador}`, 20, 52);
    doc.text(`PUESTO: ${puesto}`, 20, 58);
    doc.text(`PLANTA: ${empresa}`, 20, 64);
    
    let recText = porcentajeRiesgo > 40 ? "⚠️ ALERTA: Rediseñar puesto." : "✅ ESTATUS: Postura aceptable.";
    doc.setTextColor(0, 255, 0); doc.text(`RECOMENDACIÓN: ${recText}`, 20, 70);

    doc.autoTable({
        startY: 80,
        head: [['FACTOR', 'VALOR', 'ESTATUS', 'CRITERIO']],
        body: [['Peso Carga', `${peso} kg`, peso > 25 ? 'EXCEDE' : 'OK', 'NOM-036']],
        headStyles: { fillColor: [41, 128, 185] }
    });

    doc.save(`REPORTE_LYA_${puesto.replace(/\s+/g, '_')}.pdf`);
}

/**
 * 🏷️ GRABACIÓN
 */
function toggleGrabacion() {
    if (!calibrado) return;
    analizandoRiesgo = !analizandoRiesgo;
    const btn = document.getElementById('recordBtn');

    if (analizandoRiesgo) {
        recordedChunks = [];
        const stream = canvas.captureStream(30); 
        const tipos = ['video/webm; codecs=vp9', 'video/webm', 'video/mp4'];
        const mimeType = tipos.find(t => MediaRecorder.isTypeSupported(t)) || '';
        mediaRecorder = new MediaRecorder(stream, { mimeType });
        mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
        mediaRecorder.onstop = descargarVideo; 
        mediaRecorder.start();

        wbaStats = { riesgoAltoTotal: 0, framesAnalizados: 0, zonasAfectadas: new Set(), inicioAuditoria: Date.now(), ciclos: 0, lastHandY: null, subiendo: false };
        txtStatus.innerText = "ANALIZANDO...";
        btn.innerHTML = "⏹️<br>DETENER";
        btn.classList.add('rec-active');
    } else {
        txtStatus.innerText = "PROCESANDO...";
        btn.innerHTML = "🔴<br>AUDITAR";
        btn.classList.remove('rec-active');
        if (mediaRecorder && mediaRecorder.state !== "inactive") { mediaRecorder.stop(); }
        setTimeout(() => { generarReporteWBA(); txtStatus.innerText = "FIN AUDITORÍA"; }, 600);
    }
}

async function cambiarCamara() {
    currentFacingMode = (currentFacingMode === "environment") ? "user" : "environment";
    iaActiva = false;
    if (video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
    await encenderCamara();
}

function descargarVideo() {
    if (recordedChunks.length === 0) return;
    const blob = new Blob(recordedChunks, { type: 'video/webm' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const puesto = document.getElementById('puestoTrabajo')?.value || "GENERAL";
    a.href = url;
    a.download = `EVIDENCIA_LYA_${puesto.replace(/\s+/g, '_')}.webm`;
    document.body.appendChild(a);
    a.click();
    setTimeout(() => { document.body.removeChild(a); window.URL.revokeObjectURL(url); }, 100);
}

let resizeTimer;
window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
        if (video.readyState >= 2) { setupCanvas(); }
    }, 300);
});
