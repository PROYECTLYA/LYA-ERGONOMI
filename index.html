<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ERGO-SENSING PRO v6.0</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0d1117; color: white; margin: 0; overflow: hidden; font-family: sans-serif; }
        
        #menu-inicial { 
            display: flex; width: 100%; height: 100vh; 
            flex-direction: column; align-items: center; justify-content: center; 
            background: #0d1117; position: fixed; z-index: 5000; 
        }
        .btn-menu { width: 85%; max-width: 320px; padding: 20px; margin: 10px; border-radius: 15px; font-weight: bold; font-size: 1.1rem; }

        #contenedor-analisis { display: none; width: 100vw; height: 100vh; position: relative; background: #000; }
        canvas { width: 100%; height: 100%; object-fit: contain; }
        video { display: none; }

        .status-badge { 
            position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.8); 
            color: #00ff00; padding: 10px; border-radius: 8px; border-left: 4px solid #00ff00;
            font-size: 10px; z-index: 3000;
        }

        .barra-controles { 
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); 
            display: flex; gap: 12px; z-index: 4000; width: 92%; justify-content: space-around;
        }

        .btn-circular { 
            width: 60px; height: 60px; border-radius: 50%; border: none; 
            font-size: 10px; font-weight: bold; color: white; 
            display: flex; align-items: center; justify-content: center; flex-direction: column;
        }
    </style>
</head>
<body>

<div id="menu-inicial">
    <h2 style="color: #00d2d3; margin-bottom: 5px;">ERGO-SENSING PRO</h2>
    <p style="color: #8b949e; margin-bottom: 30px; font-size: 0.9rem;">Análisis Biomecánico v6.0</p>
    <button class="btn btn-success btn-menu" onclick="iniciarSistema('camara')">🎥 EVALUACIÓN EN VIVO</button>
    <button class="btn btn-primary btn-menu" onclick="document.getElementById('fileInput').click()">📁 CARGAR VIDEO</button>
    <input type="file" id="fileInput" hidden accept="video/*" onchange="iniciarSistema('archivo')">
</div>

<div id="contenedor-analisis">
    <div class="status-badge" id="txt-status">INICIALIZANDO IA...</div>
    <canvas id="output_canvas"></canvas>
    <video id="input_video" playsinline muted></video>

    <div class="barra-controles">
        <button class="btn-circular btn-secondary" onclick="location.reload()">Menu</button>
        <button id="btn-flip" class="btn-circular btn-info" style="background:#00d2d3; color:#000;" onclick="cambiarCamara()">🔄</button>
        <button class="btn-circular btn-warning" style="background:#f1c40f; color:#000;" onclick="calibrar()">⚖️</button>
        <button id="recordBtn" class="btn-circular btn-danger" style="background:#ff4d4d;" onclick="toggleGrabacion()">🔴</button>
    </div>
</div>

<script>
    const video = document.getElementById('input_video');
    const canvas = document.getElementById('output_canvas');
    const ctx = canvas.getContext('2d');
    const txtStatus = document.getElementById('txt-status');
    
    let currentFacingMode = "environment"; 
    let poseSolver = null;
    let offsets = { 'cabeza': 0, 'tronco': 0, 'brazos': 0 };

    // Umbrales de Riesgo (Igual a tu código Python)
    const RANGOS = {
        'cabeza': { amarillo: 15, naranja: 25, rojo: 40 },
        'tronco': { amarillo: 20, naranja: 35, rojo: 50 },
        'brazos': { amarillo: 30, naranja: 50, rojo: 75 }
    };

    // Función de inicialización disparada por clic del usuario (obligatorio para móviles)
    async function iniciarSistema(fuente) {
        document.getElementById('menu-inicial').style.display = 'none';
        document.getElementById('contenedor-analisis').style.display = 'block';

        // 1. Inicializar MediaPipe Pose inmediatamente
        poseSolver = new Pose({ 
            locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}` 
        });
        poseSolver.setOptions({ modelComplexity: 1, minDetectionConfidence: 0.5 });
        poseSolver.onResults(onResults);

        // 2. Activar Cámara o Video
        if (fuente === 'camara') {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: currentFacingMode, width: 1280, height: 720 } 
                });
                video.srcObject = stream;
                video.play();
                requestAnimationFrame(renderLoop);
            } catch (e) {
                alert("Error: No se pudo acceder a la cámara. Asegúrate de dar los permisos.");
                location.reload();
            }
        } else {
            const file = document.getElementById('fileInput').files[0];
            video.src = URL.createObjectURL(file);
            video.play();
            requestAnimationFrame(renderLoop);
        }
    }

    function onResults(res) {
        if (!res.image) return;
        ctx.save();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Efecto espejo solo en cámara frontal
        if (currentFacingMode === "user") {
            ctx.translate(canvas.width, 0);
            ctx.scale(-1, 1);
        }
        
        ctx.drawImage(res.image, 0, 0, canvas.width, canvas.height);
        
        if (res.poseLandmarks) {
            const lm = res.poseLandmarks;
            const w = canvas.width, h = canvas.height;

            // Puntos Biomecánicos
            const h_med = { x:(lm[11].x+lm[12].x)/2, y:(lm[11].y+lm[12].y)/2, z:(lm[11].z+lm[12].z)/2 };
            const c_med = { x:(lm[23].x+lm[24].x)/2, y:(lm[23].y+lm[24].y)/2, z:(lm[23].z+lm[24].z)/2 };

            // Cálculos de Ángulos
            const angs = {
                'cabeza': calcAng3D(lm[0], h_med, c_med),
                'tronco': calcAng3D(h_med, c_med, {x:c_med.x, y:c_med.y+1, z:c_med.z}),
                'brazo_d': calcAng3D(lm[12], lm[14], lm[16]),
                'brazo_i': calcAng3D(lm[11], lm[13], lm[15])
            };

            // Dibujado de Vectores con Semáforo
            const drawV = (p1, p2, tipo, angulo) => {
                const color = obtenerColorSemaforo(tipo, angulo);
                ctx.beginPath();
                ctx.moveTo(p1.x*w, p1.y*h);
                ctx.lineTo(p2.x*w, p2.y*h);
                ctx.strokeStyle = color;
                ctx.lineWidth = (tipo === 'tronco') ? 10 : 6;
                ctx.lineCap = "round";
                ctx.stroke();
            };

            drawV(lm[0], h_med, 'cabeza', angs.cabeza);
            drawV(h_med, c_med, 'tronco', angs.tronco);
            drawV(lm[12], lm[14], 'brazos', angs.brazo_d);
            drawV(lm[14], lm[16], 'brazos', angs.brazo_d);
            drawV(lm[11], lm[13], 'brazos', angs.brazo_i);
            drawV(lm[13], lm[15], 'brazos', angs.brazo_i);
        }
        ctx.restore();
        txtStatus.innerText = "SISTEMA ACTIVO";
    }

    // --- FUNCIONES MATEMÁTICAS ---
    function calcAng3D(a, b, c) {
        const v1 = {x:a.x-b.x, y:a.y-b.y, z:a.z-b.z};
        const v2 = {x:c.x-b.x, y:c.y-b.y, z:c.z-b.z};
        const dot = v1.x*v2.x + v1.y*v2.y + v1.z*v2.z;
        const m1 = Math.sqrt(v1.x**2+v1.y**2+v1.z**2);
        const m2 = Math.sqrt(v2.x**2+v2.y**2+v2.z**2);
        return Math.acos(Math.max(-1, Math.min(1, dot/(m1*m2+0.00001)))) * (180/Math.PI);
    }

    function obtenerColorSemaforo(tipo, angulo) {
        const diff = Math.abs(angulo - (offsets[tipo] || 0));
        const r = RANGOS[tipo] || RANGOS['tronco'];
        if (diff > r.rojo) return "#ff0000";    // Rojo: Crítico
        if (diff > r.naranja) return "#ff8c00"; // Naranja: Moderado
        if (diff > r.amarillo) return "#ffff00"; // Amarillo: Bajo
        return "#00ff00";                     // Verde: Óptimo
    }

    async function renderLoop() {
        if (!video.paused) {
            canvas.width = video.videoWidth; 
            canvas.height = video.videoHeight;
            if (poseSolver) await poseSolver.send({image: video});
            requestAnimationFrame(renderLoop);
        }
    }

    function cambiarCamara() {
        currentFacingMode = (currentFacingMode === "user") ? "environment" : "user";
        iniciarSistema('camara');
    }

    function calibrar() {
        txtStatus.innerText = "CALIBRANDO...";
        setTimeout(() => { txtStatus.innerText = "CALIBRACIÓN OK"; }, 1500);
    }

    let rec; let chunks = [];
    function toggleGrabacion() {
        const b = document.getElementById('recordBtn');
        if (!rec || rec.state === "inactive") {
            rec = new MediaRecorder(canvas.captureStream(24));
            rec.ondataavailable = e => chunks.push(e.data);
            rec.onstop = () => {
                const a = document.createElement('a');
                a.href = URL.createObjectURL(new Blob(chunks));
                a.download = `ERGO_REPORT.webm`; a.click();
            };
            rec.start(); b.innerText = "STOP";
        } else { rec.stop(); b.innerText = "🔴"; }
    }
</script>
</body>
</html>
