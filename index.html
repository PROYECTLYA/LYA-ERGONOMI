<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LYA-ERGO v20 | AUDITORÍA</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>

<style>
body { margin:0; background:#000; color:#fff; font-family:sans-serif; overflow:hidden;}
#menu {display:flex; height:100vh; justify-content:center; align-items:center; flex-direction:column;}
button {padding:15px; margin:10px; font-weight:bold;}
canvas {width:100vw; height:100vh;}
#status {position:absolute; top:10px; left:10px; background:#000a; padding:10px;}
</style>
</head>

<body>

<div id="menu">
    <h1>LYA-ERGO v20</h1>
    <button onclick="startCamera()">INICIAR</button>
</div>

<div id="status">INICIALIZANDO...</div>
<video id="video" playsinline style="display:none;"></video>
<canvas id="canvas"></canvas>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const statusTxt = document.getElementById("status");

let pose, running=false, calibrated=false;
let baseAngles = {};
let history = {};
let report = [];
let analyzing=false;

const TH = { cuello:15, tronco:20, hombros:30, codos:25, munecas:22, piernas:28 };

async function startCamera(){
    document.getElementById("menu").style.display="none";
    try{
        const stream = await navigator.mediaDevices.getUserMedia({video:true});
        video.srcObject = stream;
        await video.play();
        initPose();
    }catch(e){
        alert("Error cámara");
    }
}

function initPose(){
    pose = new Pose({
        locateFile:(f)=>`https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}`
    });

    pose.setOptions({
        modelComplexity:1,
        smoothLandmarks:true,
        minDetectionConfidence:0.7,
        minTrackingConfidence:0.7
    });

    pose.onResults(onResults);
    running=true;
    loop();
}

async function loop(){
    if(!running) return;
    await pose.send({image:video});
    requestAnimationFrame(loop);
}

function smooth(key,val){
    if(!history[key]) history[key]=[];
    history[key].push(val);
    if(history[key].length>5) history[key].shift();
    return history[key].reduce((a,b)=>a+b)/history[key].length;
}

function calc(a,b,c){
    const v1={x:a.x-b.x,y:a.y-b.y};
    const v2={x:c.x-b.x,y:c.y-b.y};
    const dot=v1.x*v2.x+v1.y*v2.y;
    const m1=Math.hypot(v1.x,v1.y);
    const m2=Math.hypot(v2.x,v2.y);
    if(m1*m2===0) return 0;
    return Math.acos(Math.max(-1,Math.min(1,dot/(m1*m2))))*180/Math.PI;
}

function posturaValida(a){
    return (a.cue>140 && a.abd>140);
}

function visibilidadOK(lm){
    return lm.every(p=>p.visibility>0.6);
}

function onResults(res){
    if(!res.poseLandmarks) return;
    if(!visibilidadOK(res.poseLandmarks)){
        statusTxt.innerText="BAJA VISIBILIDAD";
        return;
    }

    canvas.width=video.videoWidth;
    canvas.height=video.videoHeight;
    ctx.drawImage(res.image,0,0);

    const lm=res.poseLandmarks;
    const p=i=>({x:lm[i].x*canvas.width,y:lm[i].y*canvas.height});

    const pts={
        cab:p(0),
        cue:{x:(lm[11].x+lm[12].x)/2*canvas.width,y:(lm[11].y+lm[12].y)/2*canvas.height},
        trx:p(12),
        abd:p(24),
        h:p(12), c:p(14), m:p(16)
    };

    let ang={
        cue:smooth("cue",calc(pts.cab,pts.cue,pts.trx)),
        abd:smooth("abd",calc(pts.cue,pts.trx,pts.abd)),
        codo:smooth("codo",calc(pts.h,pts.c,pts.m))
    };

    // CALIBRACIÓN CONTROLADA
    if(!calibrated){
        if(posturaValida(ang)){
            baseAngles={...ang};
            calibrated=true;
            statusTxt.innerText="CALIBRADO OK";
        }else{
            statusTxt.innerText="POSTURA INCORRECTA";
            return;
        }
    }

    let score=0;

    function evalSeg(a,key,th){
        const diff=Math.abs(a-baseAngles[key]);
        let color="#00ff00";
        if(diff>th*2){ color="red"; score+=2;}
        else if(diff>th){ color="yellow"; score+=1;}
        return color;
    }

    ctx.lineWidth=6;

    ctx.strokeStyle=evalSeg(ang.cue,"cue",TH.cuello);
    ctx.beginPath(); ctx.moveTo(pts.cab.x,pts.cab.y); ctx.lineTo(pts.cue.x,pts.cue.y); ctx.stroke();

    ctx.strokeStyle=evalSeg(ang.abd,"abd",TH.tronco);
    ctx.beginPath(); ctx.moveTo(pts.cue.x,pts.cue.y); ctx.lineTo(pts.abd.x,pts.abd.y); ctx.stroke();

    ctx.strokeStyle=evalSeg(ang.codo,"codo",TH.codos);
    ctx.beginPath(); ctx.moveTo(pts.h.x,pts.h.y); ctx.lineTo(pts.m.x,pts.m.y); ctx.stroke();

    // REGISTRO AUDITORÍA
    if(analyzing){
        report.push({
            time:Date.now(),
            angulos:ang,
            score:score
        });
    }

    statusTxt.innerText="SCORE: "+score;
}

// GRABACIÓN + REPORTE
document.body.onclick=()=>{
    analyzing=!analyzing;
    if(!analyzing){
        const blob=new Blob([JSON.stringify(report,null,2)],{type:"application/json"});
        const a=document.createElement("a");
        a.href=URL.createObjectURL(blob);
        a.download="reporte_ergo.json";
        a.click();
        report=[];
    }
};
</script>

</body>
</html>
