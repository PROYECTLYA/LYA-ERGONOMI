<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LYA-ERGO v21.5 | ULTRA STABLE</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0d1117; color: white; margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #menu-inicial { display: flex; width: 100%; height: 100vh; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle, #161b22 0%, #0d1117 100%); position: fixed; z-index: 5000; }
        .logo-text { color: #00ff00; font-weight: 800; letter-spacing: 3px; margin-bottom: 0; }
        .sub-text { color: #8b949e; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 40px; }
        .btn-inicio { width: 85%; max-width: 320px; padding: 18px; margin: 10px; border-radius: 12px; font-weight: bold; border: none; font-size: 1.1rem; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        #contenedor-analisis { display: none; width: 100vw; height: 100vh; position: relative; background: #000; }
        canvas { width: 100%; height: 100%; object-fit: contain; }
        video { display: none; }
        .status-badge { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.8); padding: 12px 20px; border-radius: 8px; border-left: 4px solid #00ff00; font-size: 11px; z-index: 3000; font-weight: bold; }
        .barra-controles { position: absolute; bottom: 35px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; z-index: 4000; width: 95%; justify-content: center; }
        .btn-circular { width: 68px; height: 68px; border-radius: 50%; border: none; font-size: 9px; font-weight: 900; color: white; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .rec-active { background: #fff !important; color: #f00 !important; border: 3px solid #f00 !important; animation: pulse-red 1.5s infinite; }
        #contador-calib { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 150px; font-weight: 900; color: #00ff00; text-shadow: 0 0 30px rgba(0,255,0,0.8); z-index: 5500; display: none; pointer-events: none; }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(255, 0, 0, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0); } }
    </style>
</head>
<body>

<div id="menu-inicial">
    <h1 class="logo-text">LYA-ERGO</h1>
    <p class="sub-text">Auditoría con Calibración Anti-Error</p>
    <button class="btn-inicio" style="background:#27ae60; color:white;" onclick="prepararSistema('camara')">VISTA EN VIVO</button>
    <button class="btn-inicio" style="background:#2980b9; color:white;" onclick="document.getElementById('fileInput').click()">SUBIR ARCHIVO</button>
    <input type="file" id="fileInput" hidden accept="video/*" onchange="prepararSistema('archivo')">
</div>

<div id="contenedor-analisis">
    <div class="status-badge" id="txt-status">SISTEMA STANDBY</div>
    <div id="contador-calib">3</div>
    <canvas id="output_canvas"></canvas>
    <video id="input_video" playsinline muted crossorigin="anonymous"></video>
    <div class="barra-controles">
        <button class="btn-circular btn-dark" onclick="location.reload()">SALIR</button>
        <button id="btn-calib" class="btn-circular" style="background:#f1c40f; color:#000;" onclick="activarIA()">CALIBRAR</button>
        <button id="recordBtn" class="btn-circular" style="background:#ff4d4d; opacity: 0.3;" onclick="toggleGrabacion()">AUDITAR</button>
    </div>
</div>

<script>
    const video = document.getElementById('input_video');
    const canvas = document.getElementById('output_canvas');
    const ctx = canvas.getContext('2d');
    const txtStatus = document.getElementById('txt-status');
    const contador = document.getElementById('contador-calib');
    
    let pose = null, iaActiva = false, calibrado = false, analizandoRiesgo = false;
    let baseAngles = {};
    let angleHistory = { h_d: [], h_i: [], c_d: [], c_i: [], cue: [], abd: [] };
    const SMOOTH_FACTOR = 8; // Suavizado de 8 frames para estabilidad total

    async function prepararSistema(fuente) {
        document.getElementById('menu-inicial').style.display = 'none';
        document.getElementById('contenedor-analisis').style.display = 'block';
        if (fuente === 'camara') {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: 1280, height: 720 } });
            video.srcObject = stream;
        } else {
            video.src = URL.createObjectURL(document.getElementById('fileInput').files[0]);
        }
        video.onloadeddata = () => { 
            canvas.width = video.videoWidth; 
            canvas.height = video.videoHeight;
            video.play(); 
            requestAnimationFrame(loopPreview); 
        };
    }

    function loopPreview() {
        if (!iaActiva) {
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            requestAnimationFrame(loopPreview);
        }
    }

    async function activarIA() {
        pose = new Pose({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}` });
        pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.8, minTrackingConfidence: 0.8 });
        pose.onResults(onResults);
        
        iaActiva = true;
        iniciarCuentaRegresiva();
        loopIA();
    }

    function iniciarCuentaRegresiva() {
        let cuenta = 3;
        contador.style.display = 'block';
        txtStatus.innerText = "PREPÁRATE: POSTURA NEUTRA";
        
        const timer = setInterval(() => {
            cuenta--;
            contador.innerText = cuenta;
            if (cuenta <= 0) {
                clearInterval(timer);
                contador.style.display = 'none';
                setTimeout(fijarCalibracion, 1500); // 1.5s extra de promediado silencioso
            }
        }, 1000);
    }

    function fijarCalibracion() {
        calibrado = true;
        txtStatus.innerText = "CALIBRACIÓN OK - LISTO";
        document.getElementById('recordBtn').style.opacity = "1";
    }

    async function loopIA() {
        if (iaActiva && !video.paused) {
            await pose.send({ image: video });
            requestAnimationFrame(loopIA);
        }
    }

    function getSmoothAngle(key, val) {
        angleHistory[key].push(val);
        if (angleHistory[key].length > SMOOTH_FACTOR) angleHistory[key].shift();
        return angleHistory[key].reduce((a, b) => a + b) / angleHistory[key].length;
    }

    function onResults(res) {
        if (!res.poseLandmarks) return;
        ctx.save();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(res.image, 0, 0, canvas.width, canvas.height);

        const lm = res.poseLandmarks;
        const w = canvas.width, h = canvas.height;
        const pt = (i) => ({ x: lm[i].x * w, y: lm[i].y * h, v: lm[i].visibility });

        // JERARQUÍA RÍGIDA PARA EVITAR RUPTURAS
        const p = {
            cab: pt(0),
            cue: { x: (lm[11].x + lm[12].x)/2 * w, y: (lm[11].y + lm[12].y)/2 * h, v: Math.min(lm[11].visibility, lm[12].visibility) },
            tor: { x: (lm[11].x + lm[12].x)/2 * w, y: (lm[11].y + lm[12].y)/2 * h + 50, v: 1 },
            abd: { x: (lm[23].x + lm[24].x)/2 * w, y: (lm[23].y + lm[24].y)/2 * h - 40, v: 1 },
            esp: { x: (lm[23].x + lm[24].x)/2 * w, y: (lm[23].y + lm[24].y)/2 * h, v: 1 },
            h_d: pt(12), c_d: pt(14), m_d: pt(16),
            h_i: pt(11), c_i: pt(13), m_i: pt(15)
        };

        const angles = {
            h_d: getSmoothAngle('h_d', calc2D({x: p.h_d.x, y: p.h_d.y + 100}, p.h_d, p.c_d)),
            h_i: getSmoothAngle('h_i', calc2D({x: p.h_i.x, y: p.h_i.y + 100}, p.h_i, p.c_i)),
            c_d: getSmoothAngle('c_d', calc2D(p.h_d, p.c_d, p.m_d)),
            c_i: getSmoothAngle('c_i', calc2D(p.h_i, p.c_i, p.m_i))
        };

        if (calibrado && Object.keys(baseAngles).length === 0) {
            for (let k in angles) baseAngles[k] = angles[k];
        }

        const drawSeg = (p1, p2, angKey, th) => {
            if (p1.v < 0.75 || p2.v < 0.75) return;
            ctx.beginPath();
            ctx.lineWidth = 12;
            ctx.lineCap = "round";
            ctx.moveTo(p1.x, p1.y);
            ctx.lineTo(p2.x, p2.y);

            if (analizandoRiesgo && calibrado) {
                const diff = Math.abs(angles[angKey] - baseAngles[angKey]);
                // ZONA MUERTA DE 10 GRADOS PARA EVITAR FALSOS AMARILLOS
                if (diff <= 10) ctx.strokeStyle = "#00ff00"; 
                else if (diff > th * 2) ctx.strokeStyle = "#ff0000";
                else if (diff > th) ctx.strokeStyle = "#ffff00";
                else ctx.strokeStyle = "#00ff00";
            } else {
                ctx.strokeStyle = calibrado ? "#00ff00" : "#ffffff44";
            }
            ctx.stroke();
        };

        // DIBUJO DEL ESQUELETO JERÁRQUICO
        drawSeg(p.cab, p.cue, 'cue', 15);
        drawSeg(p.cue, p.tor, 'cue', 15);
        drawSeg(p.tor, p.abd, 'abd', 15);
        drawSeg(p.abd, p.esp, 'abd', 15);
        
        drawSeg(p.h_d, p.c_d, 'h_d', 20);
        drawSeg(p.c_d, p.m_d, 'c_d', 20);
        drawSeg(p.h_i, p.c_i, 'h_i', 20);
        drawSeg(p.c_i, p.m_i, 'c_i', 20);

        ctx.restore();
    }

    function calc2D(a, b, c) {
        const v1 = { x: a.x - b.x, y: a.y - b.y };
        const v2 = { x: c.x - b.x, y: c.y - b.y };
        const dot = v1.x * v2.x + v1.y * v2.y;
        const m1 = Math.sqrt(v1.x**2 + v1.y**2), m2 = Math.sqrt(v2.x**2 + v2.y**2);
        return (m1 * m2 === 0) ? 0 : Math.acos(Math.max(-1, Math.min(1, dot / (m1 * m2)))) * (180 / Math.PI);
    }

    function toggleGrabacion() {
        if (!calibrado) return;
        analizandoRiesgo = !analizandoRiesgo;
        document.getElementById('recordBtn').classList.toggle('rec-active', analizandoRiesgo);
        txtStatus.innerText = analizandoRiesgo ? "AUDITANDO RIESGOS..." : "AUDITORÍA PAUSADA";
    }
</script>
</body>
</html>
