<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LYA-ERGO v17 | SAFETY TUXTEPEC</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background:#0d1117; color:white; margin:0; overflow:hidden; }

#menu-inicial {
display:flex; width:100%; height:100vh; flex-direction:column;
align-items:center; justify-content:center;
background:linear-gradient(rgba(0,0,0,0.6), rgba(13,17,23,0.9)),
url('https://i.ibb.co/qMwtNmk3/image.png');
background-size:cover;
}

.btn-inicio { width:280px; padding:18px; margin:10px; border-radius:15px; font-weight:bold; }

#contenedor-analisis { display:none; width:100vw; height:100vh; position:relative; background:#000; }

canvas { width:100%; height:100%; }
video { display:none; }

.status-badge {
position:absolute; top:20px; left:20px;
background:#000; padding:10px; border-radius:8px;
}

.barra-controles {
position:absolute; bottom:30px; left:50%;
transform:translateX(-50%); display:flex; gap:15px;
}

.btn-circular {
width:65px; height:65px; border-radius:50%;
border:none; font-size:10px; font-weight:bold;
}

.rec-active {
background:#fff !important;
color:#f00 !important;
border:3px solid red;
}
</style>
</head>

<body>

<div id="menu-inicial">
<h1>LYA-ERGO</h1>
<button class="btn btn-success btn-inicio" onclick="prepararSistema()">INICIAR</button>
</div>

<div id="contenedor-analisis">
<div id="txt-status" class="status-badge">IA READY</div>

<canvas id="output_canvas"></canvas>
<video id="input_video" autoplay playsinline></video>

<div class="barra-controles">
<button class="btn-circular btn-dark" onclick="location.reload()">SALIR</button>
<button class="btn-circular btn-warning" onclick="activarIA()">IA</button>
<button id="recordBtn" class="btn-circular btn-danger" onclick="toggleGrabacion()">REC</button>
</div>
</div>

<script>
const video = document.getElementById('input_video');
const canvas = document.getElementById('output_canvas');
const ctx = canvas.getContext('2d');
const statusTxt = document.getElementById('txt-status');

let pose, iaActiva=false;
let grabando=false, historial=[];

// INICIAR
async function prepararSistema(){
document.getElementById('menu-inicial').style.display='none';
document.getElementById('contenedor-analisis').style.display='block';

const stream = await navigator.mediaDevices.getUserMedia({video:true});
video.srcObject = stream;

video.onloadedmetadata = () => {
video.play();
iniciarPose();
};
}

// MEDIAPIPE
function iniciarPose(){
pose = new Pose({
locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
});

pose.setOptions({
modelComplexity:1,
smoothLandmarks:true
});

pose.onResults(onResults);
loop();
}

async function loop(){
if(iaActiva){
await pose.send({image:video});
}
requestAnimationFrame(loop);
}

function onResults(results){
canvas.width = video.videoWidth;
canvas.height = video.videoHeight;

ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.drawImage(results.image,0,0);

if(results.poseLandmarks){
analizarPostura(results.poseLandmarks);
}
}

// ANALISIS
function analizarPostura(lm){

const cuello = angulo(lm[0], lm[11], lm[12]);
const espalda = angulo(lm[11], lm[23], lm[24]);
const hombroDer = angulo(lm[12], lm[14], lm[16]);
const hombroIzq = angulo(lm[11], lm[13], lm[15]);
const rodillaDer = angulo(lm[24], lm[26], lm[28]);
const rodillaIzq = angulo(lm[23], lm[25], lm[27]);

const evalCuello = evaluar(cuello,15,30);
const evalEspalda = evaluar(espalda,20,40);
const evalBrazoDer = evaluar(hombroDer,30,60);
const evalBrazoIzq = evaluar(hombroIzq,30,60);
const evalPiernaDer = evaluar(rodillaDer,30,60);
const evalPiernaIzq = evaluar(rodillaIzq,30,60);

const evaluaciones={
cuello:evalCuello,
espalda:evalEspalda,
brazoDer:evalBrazoDer,
brazoIzq:evalBrazoIzq,
piernaDer:evalPiernaDer,
piernaIzq:evalPiernaIzq
};

dibujar(lm,evaluaciones);
guardarFrame(evaluaciones);

statusTxt.innerHTML=`
GLOBAL: ${global(evaluaciones)}<br>
Cuello: ${evalCuello}<br>
Espalda: ${evalEspalda}
`;
}

// DIBUJO
function dibujar(lm,e){
const c={BAJO:"#0f0",MEDIO:"#ff0",ALTO:"#f00"};

function l(i,j,n){
ctx.strokeStyle=c[n];
ctx.lineWidth=5;
ctx.beginPath();
ctx.moveTo(lm[i].x*canvas.width,lm[i].y*canvas.height);
ctx.lineTo(lm[j].x*canvas.width,lm[j].y*canvas.height);
ctx.stroke();
}

l(0,11,e.cuello);
l(11,23,e.espalda); l(12,24,e.espalda);
l(12,14,e.brazoDer); l(14,16,e.brazoDer);
l(11,13,e.brazoIzq); l(13,15,e.brazoIzq);
l(24,26,e.piernaDer); l(26,28,e.piernaDer);
l(23,25,e.piernaIzq); l(25,27,e.piernaIzq);
}

// EVALUACION
function evaluar(a,m,al){
if(a>al) return "ALTO";
if(a>m) return "MEDIO";
return "BAJO";
}

function global(e){
if(Object.values(e).includes("ALTO")) return "ALTO";
if(Object.values(e).includes("MEDIO")) return "MEDIO";
return "BAJO";
}

// ANGULO
function angulo(a,b,c){
const ab={x:a.x-b.x,y:a.y-b.y};
const cb={x:c.x-b.x,y:c.y-b.y};
const dot=ab.x*cb.x+ab.y*cb.y;
const magA=Math.sqrt(ab.x**2+ab.y**2);
const magB=Math.sqrt(cb.x**2+cb.y**2);
return Math.acos(dot/(magA*magB))*180/Math.PI;
}

// IA
function activarIA(){
iaActiva=true;
statusTxt.innerHTML="IA ACTIVA";
}

// GRABACION
function toggleGrabacion(){
grabando=!grabando;
const btn=document.getElementById("recordBtn");

if(grabando){
historial=[];
btn.classList.add("rec-active");
}else{
btn.classList.remove("rec-active");
generarReporte();
}
}

function guardarFrame(e){
if(!grabando) return;

historial.push({
t:new Date().toLocaleTimeString(),
...e
});
}

// REPORTE
function generarReporte(){
let csv="Tiempo,Cuello,Espalda,BrazoDer,BrazoIzq,PiernaDer,PiernaIzq\n";

historial.forEach(r=>{
csv+=`${r.t},${r.cuello},${r.espalda},${r.brazoDer},${r.brazoIzq},${r.piernaDer},${r.piernaIzq}\n`;
});

const blob=new Blob([csv],{type:"text/csv"});
const url=URL.createObjectURL(blob);

const a=document.createElement("a");
a.href=url;
a.download="reporte_ergonomico.csv";
a.click();
}
</script>

</body>
</html>
