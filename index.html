<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ERGO-SENSING PRO v3.1</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0d1117; color: white; font-family: 'Segoe UI', sans-serif; height: 100vh; margin: 0; display: flex; align-items: center; justify-content: center; }
        
        /* Menú de Inicio */
        #menu-inicial { text-align: center; background: #161b22; padding: 40px; border-radius: 20px; border: 1px solid #30363d; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .btn-menu { width: 280px; padding: 15px; margin: 10px; font-weight: bold; font-size: 1.1rem; border-radius: 10px; transition: 0.3s; }

        /* Contenedor de Análisis */
        #contenedor-analisis { display: none; position: relative; width: 100%; max-width: 1280px; margin: auto; }
        canvas { width: 100%; height: auto; border-radius: 10px; border: 2px solid #3498db; }
        video { display: none; }

        /* UI de Control */
        .status-badge { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.8); padding: 8px 15px; border-radius: 5px; border-left: 5px solid #00ff00; font-size: 0.9rem; z-index: 100; }
        .controls { position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: center; gap: 15px; z-index: 100; }
        .btn-ergo { padding: 10px 20px; border-radius: 50px; font-weight: bold; border: none; }
        .btn-record { background: #eb4034; color: white; }
        .btn-record.recording { animation: pulse 1.5s infinite; background: #fff; color: #000; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(0.95); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

<div id="menu-inicial">
    <h2 class="text-info mb-4">ERGO-SENSING AI</h2>
    <p class="text-muted mb-4">Seleccione el método de evaluación</p>
    <button class="btn btn-success btn-menu" onclick="seleccionarFuente('camara')">1. EVALUACIÓN EN VIVO</button>
    <br>
    <button class="btn btn-primary btn-menu" onclick="document.getElementById('fileInput').click()">2. CARGAR VIDEO</button>
    <input type="file" id="fileInput" hidden accept="video/*" onchange="seleccionarFuente('archivo')">
</div>

<div id="contenedor-analisis" class="p-2">
    <div class="status-badge" id="status">INICIALIZANDO...</div>
    <canvas id="output_canvas"></canvas>
    <video id="input_video" playsinline muted></video>

    <div class="controls">
        <button class="btn btn-dark btn-ergo" id="btn-back" onclick="regresarMenu()">⬅ Menú</button>
        <button class="btn btn-warning btn-ergo" id="btn-calib" onclick="iniciarCalibracion()">⚖️ Calibrar</button>
        <button id="recordBtn" class="btn-record btn-ergo" onclick="toggleGrabacion()">🔴 Iniciar Grabación</button>
    </div>
</div>

<script>
    const menu = document.getElementById('menu-inicial');
    const app = document.getElementById('contenedor-analisis');
    const video = document.getElementById('input_video');
    const canvas = document.getElementById('output_canvas');
    const ctx = canvas.getContext('2d');
    const status = document.getElementById('status');

    // --- MOTOR BIOMECÁNICO (Basado en tu original de Python) ---
    const THRESHOLDS = { 'tronco': { y: 20, r: 40 }, 'ext': { y: 30, r: 55 }, 'head': { y: 15, r: 25 } };
    let history = {};
    let offsets = {};
    let isCalibrating = false;
    let calibStart = 0;
    let calibBuffer = {};

    function filterPoint(id, p) {
        if (!history[id]) history[id] = [];
        history[id].push(p);
        if (history[id].length > 8) history[id].shift();
        return {
            x: history[id].reduce((a, b) => a + b.x, 0) / history[id].length,
            y: history[id].reduce((a, b) => a + b.y, 0) / history[id].length,
            z: history[id].reduce((a, b) => a + b.z, 0) / history[id].length
        };
    }

    function calcAngle3D(a, b, c) {
        const ba = { x: a.x-b.x, y: a.y-b.y, z: a.z-b.z }, bc = { x: c.x-b.x, y: c.y-b.y, z: c.z-b.z };
        const dot = ba.x*bc.x + ba.y*bc.y + ba.z*bc.z;
        const magA = Math.sqrt(ba.x**2 + ba.y**2 + ba.z**2), magB = Math.sqrt(bc.x**2 + bc.y**2 + bc.z**2);
        return Math.acos(Math.max(-1, Math.min(1, dot/(magA*magB)))) * (180/Math.PI);
    }

    function getColor(type, ang, off = 0) {
        const dev = Math.abs(ang - off), conf = THRESHOLDS[type];
        return dev > conf.r ? "#ff0000" : (dev > conf.y ? "#ffff00" : "#00ff00");
    }

    // --- CONFIGURACIÓN MEDIAPIPE ---
    const pose = new Pose({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}` });
    pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });

    pose.onResults((res) => {
        ctx.save();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(res.image, 0, 0, canvas.width, canvas.height);

        if (res.poseLandmarks) {
            const lm = res.poseLandmarks.map((p, i) => filterPoint(i, p));
            const w = canvas.width, h = canvas.height;

            const h_med = { x: (lm[11].x + lm[12].x)/2, y: (lm[11].y + lm[12].y)/2, z: (lm[11].z + lm[12].z)/2 };
            const c_med = { x: (lm[23].x + lm[24].x)/2, y: (lm[23].y + lm[24].y)/2, z: (lm[23].z + lm[24].z)/2 };
            const v_down = { x: c_med.x, y: c_med.y + 0.5, z: c_med.z };

            const angs = {
                head: calcAngle3D(lm[0], h_med, c_med),
                tronco: calcAngle3D(h_med, c_med, v_down),
                arm_r: calcAngle3D(lm[12], lm[14], lm[16]),
                arm_l: calcAngle3D(lm[11], lm[13], lm[15])
            };

            if (isCalibrating) {
                const elapsed = Date.now() - calibStart;
                status.innerText = `CALIBRANDO POSTURA: ${Math.ceil((5000-elapsed)/1000)}s`;
                Object.keys(angs).forEach(k => { if(!calibBuffer[k]) calibBuffer[k]=[]; calibBuffer[k].push(angs[k]); });
                if (elapsed >= 5000) {
                    Object.keys(calibBuffer).forEach(k => offsets[k] = calibBuffer[k].reduce((a,b)=>a+b,0)/calibBuffer[k].length);
                    isCalibrating = false; status.innerText = "SISTEMA ACTIVO";
                }
            }

            const draw = (p1, p2, color) => {
                ctx.beginPath(); ctx.moveTo(p1.x*w, p1.y*h); ctx.lineTo(p2.x*w, p2.y*h);
                ctx.strokeStyle = color; ctx.lineWidth = 5; ctx.lineCap = "round"; ctx.stroke();
            };

            draw(lm[0], h_med, getColor('head', angs.head, offsets.head));
            draw(h_med, c_med, getColor('tronco', angs.tronco, offsets.tronco));
            draw(lm[12], lm[14], getColor('ext', angs.arm_r, offsets.arm_r));
            draw(lm[14], lm[16], getColor('ext', angs.arm_r, offsets.arm_r));
            draw(lm[11], lm[13], getColor('ext', angs.arm_l, offsets.arm_l));
            draw(lm[13], lm[15], getColor('ext', angs.arm_l, offsets.arm_l));
        }
        ctx.restore();
    });

    // --- GESTIÓN DE FUENTES (MÉTODO 1 Y 2) ---
    let camera = null;
    let streamSource = "camara";

    async function seleccionarFuente(tipo) {
        menu.style.display = 'none';
        app.style.display = 'block';
        streamSource = tipo;

        if (tipo === 'camara') {
            camera = new Camera(video, {
                onFrame: async () => {
                    canvas.width = video.videoWidth; canvas.height = video.videoHeight;
                    await pose.send({image: video});
                },
                width: 1280, height: 720
            });
            camera.start();
            status.innerText = "CÁMARA EN VIVO ACTIVA";
        } else {
            const file = document.getElementById('fileInput').files[0];
            video.src = URL.createObjectURL(file);
            video.onloadedmetadata = () => {
                canvas.width = video.videoWidth; canvas.height = video.videoHeight;
                video.play();
                status.innerText = "PROCESANDO VIDEO CARGADO";
                processVideoFrame();
            };
        }
    }

    async function processVideoFrame() {
        if (!video.paused && !video.ended) {
            await pose.send({image: video});
            requestAnimationFrame(processVideoFrame);
        }
    }

    // --- GRABACIÓN Y DESCARGA AUTOMÁTICA ---
    let recorder;
    let chunks = [];
    function toggleGrabacion() {
        const btn = document.getElementById('recordBtn');
        if (btn.innerText.includes("Iniciar")) {
            chunks = [];
            const stream = canvas.captureStream(30);
            recorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
            recorder.ondataavailable = (e) => chunks.push(e.data);
            recorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `ERGO_EXPORT_${Date.now()}.webm`;
                a.click();
                status.innerText = "VIDEO GUARDADO";
            };
            recorder.start();
            btn.innerText = "⏹ Finalizar y Guardar";
            btn.classList.add('recording');
        } else {
            recorder.stop();
            btn.innerText = "🔴 Iniciar Grabación";
            btn.classList.remove('recording');
        }
    }

    function iniciarCalibracion() {
        isCalibrating = true; calibStart = Date.now(); calibBuffer = {};
    }

    function regresarMenu() {
        location.reload();
    }
</script>
</body>
</html>
