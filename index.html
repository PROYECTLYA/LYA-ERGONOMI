CODIGO 1 <!DOCTYPE html> 
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LYA-ERGO v20.2 | AUDITORÍA CERVECERA</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body { background-color: #0d1117; color: white; margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #menu-inicial { display: flex; width: 100%; height: 100vh; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle, #161b22 0%, #0d1117 100%); position: fixed; z-index: 5000; }
        .logo-text { color: #00ff00; font-weight: 800; letter-spacing: 3px; margin-bottom: 0; }
        .sub-text { color: #8b949e; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 40px; }
        .btn-inicio { width: 85%; max-width: 320px; padding: 18px; margin: 10px; border-radius: 12px; font-weight: bold; border: none; font-size: 1.1rem; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        #loader-ia { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(13, 17, 23, 0.98); z-index: 6000; flex-direction: column; align-items: center; justify-content: center; }
        .progress-bar { width: 0%; height: 6px; background: #00ff00; transition: 0.4s; box-shadow: 0 0 20px #00ff00; margin-top: 25px; border-radius: 10px; }
        #contenedor-analisis { display: none; width: 100vw; height: 100vh; position: relative; background: #000; }
        canvas { width: 100%; height: 100%; object-fit: contain; }
        video { display: none; }
        .status-badge { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.8); padding: 12px 20px; border-radius: 8px; border-left: 4px solid #00ff00; font-size: 10px; z-index: 3000; font-weight: bold; }
        .barra-controles { position: absolute; bottom: 35px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; z-index: 4000; width: 95%; justify-content: center; }
        .btn-circular { width: 68px; height: 68px; border-radius: 50%; border: none; font-size: 9px; font-weight: 900; color: white; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .rec-active { background: #fff !important; color: #f00 !important; border: 3px solid #f00 !important; animation: pulse-red 1.5s infinite; }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(255, 0, 0, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0); } }
    </style>
</head>
<body>

<div id="loader-ia">
    <h3 style="color:#00ff00; letter-spacing: 4px; font-weight: 900;">LYA-AUDITOR ENGINE</h3>
    <div style="width: 75%; height: 6px; background: #21262d; border-radius: 10px; margin-top: 25px; overflow: hidden;">
        <div id="bar-id" class="progress-bar"></div>
    </div>
</div>


<div id="menu-inicial">
    <h1 class="logo-text">LYA-ERGO</h1>
    <p class="sub-text">Auditoría de Procesos NOM-036</p>
    
    <div style="width: 90%; max-width: 450px; background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1);">
        <div class="row">
            <div class="col-12 mb-3">
                <label style="color: #8b949e; font-size: 0.7rem; text-align: left; display: block;">EMPRESA / PLANTA:</label>
                <input type="text" id="nombreEmpresa" placeholder="Ej: Cervecería Modelo" style="width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #30363d; background: #0d1117; color: white;">
            </div>
            
            <div class="col-md-6 mb-3">
                <label style="color: #8b949e; font-size: 0.7rem; display: block;">PUESTO DE TRABAJO:</label>
                <input type="text" id="puestoTrabajo" placeholder="Ej: Estibador" style="width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #30363d; background: #0d1117; color: white;">
            </div>
            <div class="col-md-6 mb-3">
                <label style="color: #8b949e; font-size: 0.7rem; display: block;">ID / NOMBRE TRABAJADOR:</label>
                <input type="text" id="nombreTrabajador" placeholder="Ej: Juan Pérez" style="width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #30363d; background: #0d1117; color: white;">
            </div>

            <div class="col-md-6 mb-3">
                <label style="color: #8b949e; font-size: 0.7rem; display: block;">GÉNERO:</label>
                <select id="generoTrabajador" style="width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #30363d; background: #0d1117; color: white;">
                    <option value="H">Hombre</option>
                    <option value="M">Mujer</option>
                </select>
            </div>
            <div class="col-md-6 mb-3">
                <label style="color: #8b949e; font-size: 0.7rem; display: block;">EDAD:</label>
                <input type="number" id="edadTrabajador" min="15" max="80" placeholder="Años" style="width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #30363d; background: #0d1117; color: white;">
            </div>

            <div class="col-12">
                <label style="color: #27ae60; font-size: 0.7rem; display: block; font-weight: bold;">PESO DE LA CARGA (KG):</label>
                <input type="number" id="pesoCarga" min="1" max="50" placeholder="Ej: 10" style="width: 100%; padding: 10px; border-radius: 8px; border: 2px solid #27ae60; background: #0d1117; color: white;">
            </div>
        </div>
    </div>

    <div class="d-flex gap-2">
        <button class="btn-inicio" style="background:#27ae60; color:white; width: 180px;" onclick="prepararSistema('camara')">🎥 VIVO</button>
        <button class="btn-inicio" style="background:#2980b9; color:white; width: 180px;" onclick="document.getElementById('fileInput').click()">📁 ARCHIVO</button>
    </div>
    <input type="file" id="fileInput" hidden accept="video/*" onchange="prepararSistema('archivo')">
</div>
    
<div id="contenedor-analisis">
    <div class="status-badge" id="txt-status">SISTEMA READY</div>
    
    <canvas id="output_canvas"></canvas>
    
    <video id="input_video" playsinline muted style="display:none;"></video>
    
    <div class="barra-controles">
        <button class="btn-circular btn-dark" onclick="location.reload()" title="Cerrar auditoría">
            <span>✖</span><br>SALIR
        </button>
        
        <button class="btn-circular" style="background:#00d2d3; color:#000;" onclick="cambiarCamara()">
            <span>🔄</span><br>GIRAR
        </button>
        
        <button id="btn-calib" class="btn-circular" style="background:#f1c40f; color:#000;" onclick="activarIA()">
            <span>⚖️</span><br>CALIBRAR
        </button>
        
        <button id="recordBtn" class="btn-circular" style="background:#ff4d4d; opacity: 0.3;" onclick="toggleGrabacion()" disabled>
            <span>🔴</span><br>AUDITAR
        </button>
    </div>
</div>


<script>
// --- 1. REFERENCIAS AL DOM Y CONFIGURACIÓN BASE ---
const video = document.getElementById('input_video');
const canvas = document.getElementById('output_canvas');
const ctx = canvas.getContext('2d');
const txtStatus = document.getElementById('txt-status');

// Umbrales de desviación (Grados) para activar alertas WBA (NOM-036)
const TH = { 
    tronco: 18, cuello: 12, hombros: 28, codos: 25, 
    munecas: 20, piernas: 25, pies: 18 
};

// --- 2. ESTADO DE LA IA Y CONTROL ---
let pose;
let iaActiva = false;
let calibrado = false;
let analizandoRiesgo = false;
let startTimeCalib = 0;
let currentFacingMode = "environment"; 
let screenshotRiesgo = null;
let mediaRecorder;
let recordedChunks = [];
let riskTimer = 0;
let lastCycleTime = 0;

// --- 3. DATOS DINÁMICOS DE AUDITORÍA ---
let datosAuditoria = {
    empresa: "", trabajador: "", puesto: "",
    edad: 0, genero: "H", peso: 0, limiteMax: 25
};

// --- 4. ESTADÍSTICAS Y BIOMECÁNICA ---
let baseAngles = {};  
let angleBuffer = {}; 
let wbaStats = { 
    zonasAfectadas: new Set(), 
    inicioAuditoria: null,
    ciclos: 0, 
    lastHandY: null,
    subiendo: false
};

// --- 5. INICIALIZACIÓN Y GESTIÓN DE CÁMARA ---
async function prepararSistema(fuente) {
    // Sincronización de datos del formulario
    datosAuditoria.empresa = (document.getElementById('nombreEmpresa')?.value || "GENERAL").toUpperCase();
    datosAuditoria.trabajador = (document.getElementById('nombreTrabajador')?.value || "OPERADOR").toUpperCase();
    datosAuditoria.puesto = (document.getElementById('puestoTrabajo')?.value || "PLANTA").toUpperCase();
    datosAuditoria.edad = parseInt(document.getElementById('edadTrabajador')?.value) || 30;
    datosAuditoria.genero = document.getElementById('generoTrabajador')?.value;
    datosAuditoria.peso = parseFloat(document.getElementById('pesoCarga')?.value) || 0;

    // Límite según NOM-036-STPS-2018
    if (datosAuditoria.genero === 'M') {
        datosAuditoria.limiteMax = (datosAuditoria.edad > 45) ? 15 : 20;
    } else {
        datosAuditoria.limiteMax = (datosAuditoria.edad > 45) ? 15 : 25;
    }

    document.getElementById('menu-inicial').style.display = 'none';
    document.getElementById('contenedor-analisis').style.display = 'block';

    if (fuente === 'camara') {
        await encenderCamara();
    } else {
        const file = document.getElementById('fileInput').files[0];
        if (!file) return location.reload();
        video.src = URL.createObjectURL(file);
        video.onloadedmetadata = () => { 
            configurarCanvas(); 
            video.play(); 
            requestAnimationFrame(loopVideoSimple); 
        };
    }
}

async function encenderCamara() {
    if (video.srcObject) {
        video.srcObject.getTracks().forEach(track => track.stop());
    }
    try {
        const constraints = { 
            video: { 
                facingMode: currentFacingMode, 
                width: { ideal: 1280 }, 
                height: { ideal: 720 },
                frameRate: { ideal: 30 }
            } 
        };
        const stream = await navigator.mediaDevices.getUserMedia(constraints);
        video.srcObject = stream;
        video.onloadedmetadata = () => { 
            configurarCanvas(); 
            video.play(); 
            requestAnimationFrame(loopVideoSimple); 
        };
    } catch (e) { 
        alert("Error al acceder a la cámara. Revisa los permisos."); 
    }
}

function configurarCanvas() {
    canvas.width = video.videoWidth; 
    canvas.height = video.videoHeight;
}

function loopVideoSimple() {
    if (!iaActiva) {
        ctx.save();
        if (currentFacingMode === "user") {
            ctx.translate(canvas.width, 0); ctx.scale(-1, 1);
        }
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        ctx.restore();
        requestAnimationFrame(loopVideoSimple);
    }
}

// --- 6. MOTOR DE IA (MEDIAPIPE) ---
async function activarIA() {
    if (iaActiva || pose) return; // Evitar múltiples instancias

    const loader = document.getElementById('loader-ia');
    const progressBar = document.getElementById('bar-id');
    if (loader) loader.style.display = 'flex';

    pose = new Pose({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
    });

    pose.setOptions({
        modelComplexity: 1,
        smoothLandmarks: true,
        enableSegmentation: false,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5
    });

    pose.onResults(onResults);

    let p = 0;
    const interval = setInterval(() => {
        p += 10;
        if (progressBar) progressBar.style.width = p + '%';
        if (p >= 100) {
            clearInterval(interval);
            setTimeout(() => {
                if (loader) loader.style.display = 'none';
                iniciarProcesamiento();
            }, 500);
        }
    }, 100);
}

async function iniciarProcesamiento() {
    iaActiva = true;
    calibrado = false; 
    startTimeCalib = Date.now();
    
    const recordBtn = document.getElementById('recordBtn');
    if (recordBtn) {
        recordBtn.disabled = false;
        recordBtn.style.opacity = "1";
    }

    async function prediccion() {
        if (!iaActiva || !pose) return;
        await pose.send({ image: video });
        
        if (video.requestVideoFrameCallback) {
            video.requestVideoFrameCallback(prediccion);
        } else {
            requestAnimationFrame(prediccion);
        }
    }
    prediccion();
}

async function cambiarCamara() {
    iaActiva = false;
    currentFacingMode = (currentFacingMode === "environment") ? "user" : "environment";
    await encenderCamara();
    // Pequeño delay para estabilidad del hardware antes de reanudar IA
    setTimeout(() => iniciarProcesamiento(), 500);
}

// --- 7. LÓGICA DE PROCESAMIENTO (onResults) ---
function onResults(results) {
    if (!results.poseLandmarks) {
        txtStatus.innerText = "BUSCANDO CUERPO...";
        return;
    }

    ctx.save();
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (currentFacingMode === "user") {
        ctx.translate(canvas.width, 0); ctx.scale(-1, 1);
    }

    ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);
    const lm = results.poseLandmarks;

    // Calibración
    if (!calibrado && iaActiva) {
        const tiempoPasado = Date.now() - startTimeCalib;
        const visibilidadOk = lm[11].visibility > 0.8 && lm[12].visibility > 0.8;

        if (!visibilidadOk) {
            txtStatus.innerText = "POR FAVOR, UBÍQUESE FRENTE A LA CÁMARA";
            startTimeCalib = Date.now();
        } else {
            txtStatus.innerText = `CALIBRANDO... ${Math.min(100, Math.round((tiempoPasado/3000)*100))}%`;
            if (tiempoPasado > 3000) {
                baseAngles = {
                    brazo_der: calcAng3D(lm[12], lm[14], lm[16]),
                    brazo_izq: calcAng3D(lm[11], lm[13], lm[15]),
                    tronco_der: calcAng3D(lm[12], lm[24], lm[26]),
                    tronco_izq: calcAng3D(lm[11], lm[23], lm[25])
                };
                calibrado = true;
                txtStatus.innerText = "SISTEMA LISTO - INICIE AUDITORÍA";
            }
        }
    }

    const p = (idx) => ({ x: lm[idx].x * canvas.width, y: lm[idx].y * canvas.height, z: lm[idx].z });

    // Dibujo de esqueleto y análisis de ángulos
    drawV(p(11), p(13), 'brazo_izq', 'codos', lm[11], lm[13]);
    drawV(p(12), p(14), 'brazo_der', 'codos', lm[12], lm[14]);
    drawV(p(12), p(24), 'tronco_der', 'tronco', lm[12], lm[24]);
    drawV(p(11), p(23), 'tronco_izq', 'tronco', lm[11], lm[23]);
    drawV(p(24), p(26), 'pierna_der', 'piernas', lm[24], lm[26]);
    drawV(p(23), p(25), 'pierna_izq', 'piernas', lm[23], lm[25]);

    if (analizandoRiesgo) {
        // Captura evidencia si riesgo persiste 1.5s
        if (wbaStats.zonasAfectadas.size >= 2 && !screenshotRiesgo) {
            if (riskTimer === 0) riskTimer = Date.now();
            if (Date.now() - riskTimer > 1500) screenshotRiesgo = canvas.toDataURL('image/jpeg', 0.6);
        } else { riskTimer = 0; }

        // Contador de Ciclos
        const handY = (lm[15].y + lm[16].y) / 2;
        const now = Date.now();
        if (wbaStats.lastHandY && handY < wbaStats.lastHandY - 0.08 && !wbaStats.subiendo) {
            wbaStats.subiendo = true;
        } else if (wbaStats.lastHandY && handY > wbaStats.lastHandY + 0.08 && wbaStats.subiendo) {
            if (now - lastCycleTime > 1200) {
                wbaStats.ciclos++;
                lastCycleTime = now;
                wbaStats.subiendo = false;
            }
        }
        wbaStats.lastHandY = handY;
    }
    ctx.restore();
}

// --- 8. FUNCIONES DE CÁLCULO ---
function calcAng3D(a, b, c) {
    const v1 = { x: a.x - b.x, y: a.y - b.y, z: a.z - b.z };
    const v2 = { x: c.x - b.x, y: c.y - b.y, z: c.z - b.z };
    const dot = v1.x * v2.x + v1.y * v2.y + v1.z * v2.z;
    const m1 = Math.sqrt(v1.x**2 + v1.y**2 + v1.z**2);
    const m2 = Math.sqrt(v2.x**2 + v2.y**2 + v2.z**2);
    return (m1 * m2 === 0) ? 0 : Math.acos(Math.max(-1, Math.min(1, dot / (m1 * m2)))) * (180 / Math.PI);
}

function getSmoothedAngle(key, newAngle) {
    if (!angleBuffer[key]) angleBuffer[key] = [];
    angleBuffer[key].push(newAngle);
    if (angleBuffer[key].length > 5) angleBuffer[key].shift();
    return angleBuffer[key].reduce((a, b) => a + b, 0) / angleBuffer[key].length;
}

const drawV = (p1, p2, angKey, groupKey, raw_lm1, raw_lm2) => {
    if (!p1 || !p2) return;
    const isVisible = raw_lm1.visibility > 0.6 && raw_lm2.visibility > 0.6;
    const currentAngle = getSmoothedAngle(angKey, calcAng3D(raw_lm1, {x:raw_lm1.x, y:raw_lm1.y+0.5, z:raw_lm1.z}, raw_lm2));

    let color = "#2ecc71";
    let thickness = 4;

    if (analizandoRiesgo && calibrado && isVisible) {
        const base = baseAngles[angKey] || currentAngle;
        const diff = Math.abs(currentAngle - base);
        const threshold = TH[groupKey] || 20;

        if (diff > threshold * 2) {
            color = "#e74c3c"; thickness = 8;
            wbaStats.zonasAfectadas.add(groupKey);
        } else if (diff > threshold) {
            color = "#f1c40f"; thickness = 6;
            wbaStats.zonasAfectadas.add(groupKey);
        }
    }

    ctx.beginPath();
    ctx.strokeStyle = isVisible ? color : "rgba(100,100,100,0.3)";
    ctx.lineWidth = thickness;
    ctx.moveTo(p1.x, p1.y);
    ctx.lineTo(p2.x, p2.y);
    ctx.stroke();
};

// --- 9. GRABACIÓN Y CIERRE ---
function toggleGrabacion() {
    if (!calibrado) return;
    const btn = document.getElementById('recordBtn');
    analizandoRiesgo = !analizandoRiesgo;
    btn.classList.toggle('rec-active', analizandoRiesgo);

    if (analizandoRiesgo) {
        recordedChunks = [];
        screenshotRiesgo = null;
        wbaStats.zonasAfectadas.clear();
        wbaStats.ciclos = 0;
        
        const stream = canvas.captureStream(30);
        mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
        mediaRecorder.ondataavailable = (e) => e.data.size > 0 && recordedChunks.push(e.data);
        mediaRecorder.onstop = () => {
            const blob = new Blob(recordedChunks, { type: 'video/webm' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `EVIDENCIA_NOM036_${Date.now()}.webm`;
            a.click();
        };
        mediaRecorder.start();
        btn.innerHTML = "⏹️<br>PARAR";
    } else {
        if (mediaRecorder) mediaRecorder.stop();
        btn.innerHTML = "🔴<br>AUDITAR";
        txtStatus.innerText = "GENERANDO REPORTE...";
        // Aquí llamarías a generarReporteWBA()
    }
}
</script>
</body>
</html>
