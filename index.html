<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ERGO-SENSING PRO v16.0</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0d1117; color: white; margin: 0; overflow: hidden; font-family: sans-serif; }
        #menu-inicial { display: flex; width: 100%; height: 100vh; flex-direction: column; align-items: center; justify-content: center; background: #0d1117; position: fixed; z-index: 5000; }
        .btn-inicio { width: 85%; max-width: 320px; padding: 18px; margin: 10px; border-radius: 12px; font-weight: bold; border: none; font-size: 1.1rem; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        #contenedor-analisis { display: none; width: 100vw; height: 100vh; position: relative; background: #000; }
        canvas { width: 100%; height: 100%; object-fit: contain; }
        video { display: none; }
        .status-badge { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.9); color: #fff; padding: 12px 18px; border-radius: 10px; border-left: 5px solid #00ff00; font-size: 11px; z-index: 3000; letter-spacing: 1px; }
        .barra-controles { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 12px; z-index: 4000; width: 95%; justify-content: center; }
        .btn-circular { width: 65px; height: 65px; border-radius: 50%; border: none; font-size: 10px; font-weight: bold; color: white; display: flex; align-items: center; justify-content: center; flex-direction: column; text-align: center; }
        .rec-active { background: #fff !important; color: #f00 !important; border: 2px solid #f00 !important; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

<div id="menu-inicial">
    <h1 style="color: #00ff00; margin-bottom: 5px;">ERGO-SENSING PRO</h1>
    <p style="color: #8b949e; margin-bottom: 30px; font-size: 0.9rem;">v16.0 - Motor de Análisis Biomecánico</p>
    <button class="btn-inicio" style="background:#27ae60; color:white;" onclick="prepararSistema('camara')">🎥 USAR CÁMARA</button>
    <button class="btn-inicio" style="background:#2980b9; color:white;" onclick="document.getElementById('fileInput').click()">📁 SUBIR VIDEO</button>
    <input type="file" id="fileInput" hidden accept="video/*" onchange="prepararSistema('archivo')">
</div>

<div id="contenedor-analisis">
    <div class="status-badge" id="txt-status">SISTEMA LISTO: CALIBRE POSICIÓN NEUTRA</div>
    <canvas id="output_canvas"></canvas>
    <video id="input_video" playsinline muted></video>
    <div class="barra-controles">
        <button class="btn-circular btn-dark" onclick="location.reload()">MENÚ</button>
        <button class="btn-circular" style="background:#00d2d3; color:#000;" onclick="cambiarCamara()">🔄<br>CAM</button>
        <button id="btn-calib" class="btn-circular" style="background:#f1c40f; color:#000;" onclick="activarIA()">⚖️<br>CALIB</button>
        <button id="recordBtn" class="btn-circular" style="background:#ff4d4d; opacity: 0.3;" onclick="toggleGrabacion()">🔴<br>REC</button>
    </div>
</div>

<script>
    const video = document.getElementById('input_video');
    const canvas = document.getElementById('output_canvas');
    const ctx = canvas.getContext('2d');
    const txtStatus = document.getElementById('txt-status');
    
    let pose = null, streamActual = null, currentFacingMode = "environment";
    let iaActiva = false, calibrado = false, analizandoRiesgo = false;
    let startTimeCalib = 0, baseAngles = {};
    let mediaRecorder, recordedChunks = [];

    // UMBRALES DINÁMICOS (Basado en Desviación Estándar de Postura)
    const TH = { 
        tronco: { amar: 15, rojo: 30 }, 
        cuello: { amar: 10, rojo: 20 },
        hombros: { amar: 25, rojo: 50 },
        piernas: { amar: 20, rojo: 40 }
    };

    async function prepararSistema(fuente) {
        document.getElementById('menu-inicial').style.display = 'none';
        document.getElementById('contenedor-analisis').style.display = 'block';
        if (fuente === 'camara') await encenderCamara();
        else {
            const file = document.getElementById('fileInput').files[0];
            if (file) { video.src = URL.createObjectURL(file); video.onloadedmetadata = () => { video.play(); requestAnimationFrame(loopVideoSimple); }; }
        }
    }

    async function encenderCamara() {
        try {
            if (streamActual) streamActual.getTracks().forEach(t => t.stop());
            streamActual = await navigator.mediaDevices.getUserMedia({ video: { facingMode: currentFacingMode, width: 1280, height: 720 } });
            video.srcObject = streamActual;
            video.onloadedmetadata = () => { video.play(); requestAnimationFrame(loopVideoSimple); };
        } catch (e) { alert("Error de cámara"); location.reload(); }
    }

    function loopVideoSimple() {
        if (!video.paused && !iaActiva) {
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            requestAnimationFrame(loopVideoSimple);
        }
    }

    function activarIA() {
        if (iaActiva) return;
        txtStatus.innerText = "CARGANDO MODELOS BIOMECÁNICOS...";
        setTimeout(() => {
            pose = new Pose({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}` });
            pose.setOptions({ modelComplexity: 1, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });
            pose.onResults(onResults);
            iaActiva = true; startTimeCalib = Date.now(); requestAnimationFrame(loopIA);
        }, 300);
    }

    async function loopIA() { if (!video.paused && iaActiva) { await pose.send({image: video}); requestAnimationFrame(loopIA); } }

    function onResults(res) {
        if (!res.poseLandmarks) return;
        ctx.save();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (currentFacingMode === "user") { ctx.translate(canvas.width, 0); ctx.scale(-1, 1); }
        ctx.drawImage(res.image, 0, 0, canvas.width, canvas.height);

        const lm = res.poseLandmarks;
        const w = canvas.width, h = canvas.height;
        const pt = (i) => ({ x: lm[i].x * w, y: lm[i].y * h });
        
        // --- PUNTOS DE INTERÉS ---
        const p = {
            cab: pt(0), cue: { x: (lm[11].x+lm[12].x)/2*w, y:(lm[11].y+lm[12].y)/2*h },
            tor: { x: (lm[11].x+lm[12].x)/2*w, y:(lm[11].y+lm[12].y)/2*h + 45 },
            abd: { x: (lm[23].x+lm[24].x)/2*w, y:(lm[23].y+lm[24].y)/2*h },
            h_d: pt(12), c_d: pt(14), m_d: pt(16), mano_d: pt(20),
            h_i: pt(11), c_i: pt(13), m_i: pt(15), mano_i: pt(19),
            eb_d: pt(24), r_d: pt(26), t_d: pt(28), pie_d: pt(32),
            eb_i: pt(23), r_i: pt(25), t_i: pt(27), pie_i: pt(31)
        };

        // --- CÁLCULOS ROBUSTOS (Independientes del ángulo de cámara) ---
        const vertical = (origin) => ({ x: origin.x, y: origin.y + 100 });

        const angles = {
            cue: calcAng(p.cab, p.cue, p.tor),
            abd: calcAng(p.cue, p.abd, vertical(p.abd)),
            // Elevación de hombros (Fatiga)
            h_d: calcAng(vertical(p.h_d), p.h_d, p.c_d),
            h_i: calcAng(vertical(p.h_i), p.h_i, p.c_i),
            // Flexión de extremidades
            c_d: calcAng(p.h_d, p.c_d, p.m_d),
            c_i: calcAng(p.h_i, p.c_i, p.m_i),
            r_d: calcAng(p.eb_d, p.r_d, p.t_d),
            r_i: calcAng(p.eb_i, p.r_i, p.t_i)
        };

        if (!calibrado) {
            const t = Date.now() - startTimeCalib;
            if (t > 5000) { baseAngles = {...angles}; calibrado = true; txtStatus.innerText = "SISTEMA CALIBRADO."; document.getElementById('recordBtn').style.opacity = "1"; }
            else { txtStatus.innerText = `CALIBRANDO... ${Math.ceil((5000-t)/1000)}s`; }
        }

        // --- DIBUJO CON LÓGICA DE ESPEJO ---
        const drawV = (p1, p2, val, group) => {
            ctx.lineWidth = 7; ctx.lineCap = "round"; ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y);
            if (analizandoRiesgo && calibrado) {
                const diff = Math.abs(angles[val] - baseAngles[val]);
                const t = TH[group];
                ctx.strokeStyle = diff > t.rojo ? "#ff3838" : diff > t.amar ? "#fffa65" : "#32ff7e";
            } else { ctx.strokeStyle = calibrado ? "#32ff7e" : "#4b4b4b"; }
            ctx.stroke();
        };

        // Renderizado Tronco
        drawV(p.cab, p.cue, 'cue', 'cuello');
        drawV(p.cue, p.tor, 'cue', 'cuello');
        drawV(p.tor, p.abd, 'abd', 'tronco');

        // Lado Derecho
        drawV(p.cue, p.h_d, 'h_d', 'hombros');
        drawV(p.h_d, p.c_d, 'h_d', 'hombros');
        drawV(p.c_d, p.m_d, 'c_d', 'piernas');
        drawV(p.m_d, p.mano_d, 'c_d', 'piernas');
        drawV(p.abd, p.eb_d, 'abd', 'tronco');
        drawV(p.eb_d, p.r_d, 'r_d', 'piernas');
        drawV(p.r_d, p.t_d, 'r_d', 'piernas');

        // Lado Izquierdo (Misma lógica, mismos umbrales)
        drawV(p.cue, p.h_i, 'h_i', 'hombros');
        drawV(p.h_i, p.c_i, 'h_i', 'hombros');
        drawV(p.c_i, p.m_i, 'c_i', 'piernas');
        drawV(p.m_i, p.mano_i, 'c_i', 'piernas');
        drawV(p.abd, p.eb_i, 'abd', 'tronco');
        drawV(p.eb_i, p.r_i, 'r_i', 'piernas');
        drawV(p.r_i, p.t_i, 'r_i', 'piernas');

        ctx.restore();
    }

    function calcAng(a,b,c) {
        const v1={x:a.x-b.x, y:a.y-b.y}, v2={x:c.x-b.x, y:c.y-b.y};
        const dot = v1.x*v2.x + v1.y*v2.y;
        const m1 = Math.sqrt(v1.x**2 + v1.y**2), m2 = Math.sqrt(v2.x**2 + v2.y**2);
        const d = m1 * m2; return d === 0 ? 0 : Math.acos(Math.max(-1, Math.min(1, dot/d)))*(180/Math.PI);
    }

    function toggleGrabacion() {
        if (!calibrado) return;
        analizandoRiesgo = !analizandoRiesgo;
        document.getElementById('recordBtn').classList.toggle('rec-active', analizandoRiesgo);
        if (analizandoRiesgo) {
            recordedChunks = [];
            const stream = canvas.captureStream(30);
            mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm; codecs=vp9' });
            mediaRecorder.ondataavailable = (e) => recordedChunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `ERGO_v16_${new Date().getTime()}.webm`;
                a.click();
            };
            mediaRecorder.start();
            txtStatus.innerText = "GRAVANDO Y ANALIZANDO BIOMECÁNICA...";
        } else {
            mediaRecorder.stop();
            txtStatus.innerText = "REPORTE GENERADO.";
        }
    }

    async function cambiarCamara() {
        currentFacingMode = (currentFacingMode === "environment") ? "user" : "environment";
        iaActiva = false; calibrado = false; await encenderCamara();
    }
</script>
</body>
</html>
