<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LYA-ERGO v26.9 | STABILITY PRO</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --accent: #00ff00; --warning: #ffff00; --danger: #ff0000; --panel: rgba(0, 0, 0, 0.95); }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; overflow: hidden; display: flex; flex-direction: column; }
        #canvas-wrapper { flex: 1; position: relative; display: flex; align-items: center; justify-content: center; filter: contrast(1.1) brightness(1.1); }
        canvas { max-width: 100%; max-height: 100%; object-fit: contain; }
        video { display: none; }
        .status-panel { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 8px; font-family: monospace; font-size: 11px; border-left: 3px solid var(--accent); color: white; pointer-events: none; z-index: 10; }
        .barra-mandos { background: var(--panel); border-top: 1px solid #333; display: flex; justify-content: space-around; align-items: center; padding: 10px 5px calc(15px + env(safe-area-inset-bottom)); z-index: 100; }
        .btn-lya { width: 70px; height: 70px; border-radius: 20px; border: 1px solid #444; background: #151515; color: white; font-size: 9px; font-weight: bold; display: flex; flex-direction: column; align-items: center; justify-content: center; text-transform: uppercase; transition: 0.2s; }
        .btn-lya:active { transform: scale(0.9); background: #333; }
        .btn-record.active { background: var(--danger); animation: pulse 1.5s infinite; border-color: white; }
        #splash { position: fixed; inset: 0; background: #0b0e14; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255,0,0,0.7); } 100% { box-shadow: 0 0 0 15px rgba(255,0,0,0); } }
    </style>
</head>
<body>

<div id="splash">
    <h2 style="color: var(--accent); font-weight: 900;">LYA-ERGO v26.9</h2>
    <p style="color: #555; font-size: 10px; margin-bottom: 40px;">SISTEMA ESTABILIZADO | FILTRO DE CONFIANZA</p>
    <div class="d-grid gap-3 w-75">
        <button class="btn btn-success btn-lg" onclick="arrancar('camara')">CÁMARA EN VIVO</button>
        <button class="btn btn-outline-light btn-lg" onclick="document.getElementById('fileInput').click()">ANALIZAR ARCHIVO</button>
    </div>
    <input type="file" id="fileInput" hidden accept="video/*" onchange="arrancar('archivo')">
</div>

<div id="canvas-wrapper">
    <div class="status-panel" id="ui-info">SISTEMA: STANDBY<br>FILTRO: ACTIVO</div>
    <canvas id="output_canvas"></canvas>
</div>

<div class="barra-mandos">
    <button class="btn-lya" onclick="location.reload()">ATRÁS</button>
    <button class="btn-lya" onclick="girarCamara()">GIRAR</button>
    <button id="calibBtn" class="btn-lya" style="color: var(--warning);" onclick="iniciarIA()">CALIBRAR</button>
    <button id="recBtn" class="btn-lya btn-record" onclick="toggleRecord()">AUDITAR</button>
</div>

<video id="input_video" playsinline muted></video>

<script>
    const video = document.getElementById('input_video');
    const canvas = document.getElementById('output_canvas');
    const ctx = canvas.getContext('2d');
    const info = document.getElementById('ui-info');
    
    let pose, active = false, calib = false, recording = false;
    let mode = "environment", currentStream = null, baseAngles = {}, recorder, chunks = [];

    const TH = { tronco: { mod: 20, ext: 45 }, muneca: { mod: 15, ext: 30 }, brazo: { mod: 30, ext: 60 } };
    const CONFIDENCIA_MINIMA = 0.55; // Filtro de estabilidad

    async function arrancar(type) {
        document.getElementById('splash').style.display = 'none';
        if(type === 'camara') await getStream();
        else {
            video.src = URL.createObjectURL(document.getElementById('fileInput').files[0]);
            video.onloadedmetadata = () => { syncSize(); video.play(); preLoop(); };
        }
    }

    async function getStream() {
        if (currentStream) currentStream.getTracks().forEach(track => track.stop());
        try {
            currentStream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: mode, width: { ideal: 1280 }, height: { ideal: 720 } } 
            });
            video.srcObject = currentStream;
            video.onloadedmetadata = () => { syncSize(); video.play(); preLoop(); };
        } catch (e) { alert("Error: " + e.name); }
    }

    function syncSize() { canvas.width = video.videoWidth; canvas.height = video.videoHeight; }
    function preLoop() { if (!active) { ctx.drawImage(video, 0, 0); requestAnimationFrame(preLoop); } }

    function iniciarIA() {
        pose = new Pose({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}` });
        pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
        pose.onResults(draw);
        active = true;
        const loop = async () => { await pose.send({image: video}); requestAnimationFrame(loop); };
        loop();
        setTimeout(() => { calib = true; info.innerHTML = "SISTEMA: ESTABILIZADO"; }, 3000);
    }

    function draw(res) {
        if (!res.poseLandmarks) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(res.image, 0, 0);

        const lm = res.poseLandmarks;
        const w = canvas.width, h = canvas.height;

        // Función de obtención de punto con validación de visibilidad
        const getV = (i) => (lm[i] && lm[i].visibility > CONFIDENCIA_MINIMA) ? { x: lm[i].x * w, y: lm[i].y * h, vis: true } : { vis: false };

        const p = {
            nariz: getV(0), oreja_i: getV(7), oreja_d: getV(8),
            h_i: getV(11), h_d: getV(12), c_i: getV(13), c_d: getV(14),
            m_i: getV(15), m_d: getV(16), d_i: getV(19), d_d: getV(20),
            cad_i: getV(23), cad_d: getV(24), r_i: getV(25), r_d: getV(26),
            t_i: getV(27), t_d: getV(28), p_i: getV(31), p_d: getV(32)
        };

        const calcAng = (a, b, c) => {
            if(!a.vis || !b.vis || !c.vis) return null;
            let ang = calc(a, b, c);
            return Math.abs(180 - ang);
        };

        const angulos = {
            tronco: (p.nariz.vis && p.h_i.vis && p.h_d.vis && p.cad_i.vis) ? calc(p.nariz, {x:(p.h_i.x+p.h_d.x)/2, y:(p.h_i.y+p.h_d.y)/2}, {x:(p.cad_i.x+p.cad_d.x)/2, y:(p.cad_i.y+p.cad_d.y)/2}) : null,
            brazo_i: calcAng(p.h_i, p.c_i, p.m_i), brazo_d: calcAng(p.h_d, p.c_d, p.m_d),
            muneca_i: calcAng(p.c_i, p.m_i, p.d_i), muneca_d: calcAng(p.c_d, p.m_d, p.d_d)
        };

        function vector(p1, p2, val, type) {
            if(!p1.vis || !p2.vis) return; // BLOQUEO DE INESTABILIDAD
            ctx.beginPath(); ctx.lineWidth = 6; ctx.lineCap = "round";
            ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y);
            
            if (recording && calib && type !== 'fijo' && val !== null) {
                const diff = Math.abs(val - (baseAngles[type] || 0));
                const limits = TH[type] || { mod: 25, ext: 50 };
                ctx.strokeStyle = diff > limits.ext ? "#ff0000" : (diff > limits.mod ? "#ffff00" : "#00ff00");
            } else { ctx.strokeStyle = "#00ff00"; }
            ctx.stroke();
        }

        // DIBUJO CON FILTRO DE VISIBILIDAD
        vector(p.oreja_i, p.oreja_d, 0, 'fijo');
        if(p.h_i.vis && p.h_d.vis && p.cad_i.vis && p.cad_d.vis) {
            const ch = { x:(p.h_i.x+p.h_d.x)/2, y:(p.h_i.y+p.h_d.y)/2, vis:true };
            const cp = { x:(p.cad_i.x+p.cad_d.x)/2, y:(p.cad_i.y+p.cad_d.y)/2, vis:true };
            vector(ch, cp, angulos.tronco, 'tronco');
            if(p.oreja_i.vis && p.oreja_d.vis) vector({x:(p.oreja_i.x+p.oreja_d.x)/2, y:(p.oreja_i.y+p.oreja_d.y)/2, vis:true}, ch, 0, 'fijo');
            
            // Lado Izquierdo
            vector(ch, p.h_i, 0, 'fijo'); vector(p.h_i, p.c_i, angulos.brazo_i, 'brazo');
            vector(p.c_i, p.m_i, angulos.muneca_i, 'muneca'); vector(p.m_i, p.d_i, 0, 'fijo');
            vector(cp, p.cad_i, 0, 'fijo'); vector(p.cad_i, p.r_i, 0, 'fijo');
            vector(p.r_i, p.t_i, 0, 'fijo'); vector(p.t_i, p.p_i, 0, 'fijo');

            // Lado Derecho
            vector(ch, p.h_d, 0, 'fijo'); vector(p.h_d, p.c_d, angulos.brazo_d, 'brazo');
            vector(p.c_d, p.m_d, angulos.muneca_d, 'muneca'); vector(p.m_d, p.d_d, 0, 'fijo');
            vector(cp, p.cad_d, 0, 'fijo'); vector(p.cad_d, p.r_d, 0, 'fijo');
            vector(p.r_d, p.t_d, 0, 'fijo'); vector(p.t_d, p.p_d, 0, 'fijo');
        }
    }

    function calc(a,b,c) {
        const v1={x:a.x-b.x, y:a.y-b.y}, v2={x:c.x-b.x, y:c.y-b.y};
        const dot = v1.x*v2.x + v1.y*v2.y;
        const m1 = Math.sqrt(v1.x**2 + v1.y**2), m2 = Math.sqrt(v2.x**2 + v2.y**2);
        return (m1*m2 === 0) ? 0 : Math.acos(Math.max(-1, Math.min(1, dot/(m1*m2))))*(180/Math.PI);
    }

    function toggleRecord() {
        if (!calib) return;
        recording = !recording;
        document.getElementById('recBtn').classList.toggle('active');
        if (recording) {
            chunks = []; recorder = new MediaRecorder(canvas.captureStream(30), { mimeType: 'video/webm' });
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                const blob = new Blob(chunks, {type: 'video/webm'});
                const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
                a.download = `LYA_AUDIT_STABLE_${Date.now()}.webm`; a.click();
            };
            recorder.start();
        } else { recorder.stop(); }
    }

    async function girarCamara() { mode = (mode === "environment") ? "user" : "environment"; await getStream(); }
    window.addEventListener('resize', syncSize);
</script>
</body>
</html>
