<!DOCTYPE html> 
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LYA-ERGO v20.2 | AUDITORÍA CERVECERA HIERÁRQUICA</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
   <style>
    body { background-color: #0d1117; color: white; margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; height: 100svh; }
    #menu-inicial { display: flex; width: 100%; height: 100svh; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle, #161b22 0%, #0d1117 100%); position: fixed; z-index: 5000; padding: 20px; box-sizing: border-box; overflow-y: auto; }
    .logo-text { color: #00ff00; font-weight: 800; letter-spacing: 3px; margin-bottom: 5px; font-size: clamp(2rem, 8vw, 3.5rem); text-align: center; }
    .sub-text { color: #8b949e; font-size: clamp(0.7rem, 2vw, 0.9rem); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 30px; text-align: center; }
    .btn-inicio { flex: 1; padding: 20px !important; border-radius: 15px; font-weight: 900; font-size: 1.1rem; border: none; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
    .btn-inicio:disabled { opacity: 0.5; cursor: not-allowed; filter: grayscale(0.5); }
    #loader-ia { display: none; position: fixed; top:0; left:0; width:100%; height:100svh; background: rgba(13, 17, 23, 0.98); z-index: 6000; flex-direction: column; align-items: center; justify-content: center; }
    .progress-bar { width: 0%; height: 6px; background: #00ff00; transition: 0.4s; box-shadow: 0 0 20px #00ff00; margin-top: 25px; border-radius: 10px; }
    #contenedor-analisis { display: none; width: 100vw; height: 100svh; position: relative; background: #000; }
    canvas { width: 100%; height: 100%; object-fit: contain; }
    .status-badge { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(0, 255, 0, 0.2); color: #00ff00; padding: 5px 15px; border-radius: 20px; font-weight: bold; border: 1px solid #00ff00; z-index: 7000; }
    .barra-controles { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; z-index: 7000; background: rgba(0, 0, 0, 0.6); padding: 15px 25px; border-radius: 50px; backdrop-filter: blur(8px); border: 1px solid rgba(255, 255, 255, 0.1); }
    .btn-circular { width: 65px; height: 65px; border-radius: 50%; border: none; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.6rem; font-weight: 800; cursor: pointer; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
    .rec-active { background: #ff4d4d !important; color: white !important; animation: pulse-red 1.5s infinite; }
    @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(255, 77, 77, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(255, 77, 77, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 77, 77, 0); } }
    input.form-val, select { background: #161b22 !important; border: 1px solid #30363d !important; color: #e6edf3 !important; }
</style> 
</head>
<body>

<div id="loader-ia">
    <h3 id="loader-msg" style="color:#00ff00; letter-spacing: 4px; font-weight: 900;">BUSCANDO SUJETO</h3>
    <div style="width: 75%; height: 6px; background: #21262d; border-radius: 10px; margin-top: 25px; overflow: hidden;">
        <div id="bar-id" class="progress-bar"></div>
    </div>
</div>

<div id="menu-inicial">
    <h1 class="logo-text">LYA-ERGO</h1>
    <p class="sub-text">Auditoría de Procesos NOM-036-STPS</p>
    <div style="width: 90%; max-width: 450px; background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1);">
        <div class="row">
            <div class="col-12 mb-3">
                <label style="color: #8b949e; font-size: 0.7rem; display: block;">EMPRESA / PLANTA:</label>
                <input type="text" id="nombreEmpresa" class="form-val" style="width: 100%; padding: 8px; border-radius: 6px;">
            </div>
            <div class="col-md-6 mb-3">
                <label style="color: #8b949e; font-size: 0.7rem; display: block;">PUESTO:</label>
                <input type="text" id="puestoTrabajo" class="form-val" style="width: 100%; padding: 8px; border-radius: 6px;">
            </div>
            <div class="col-md-6 mb-3">
                <label style="color: #8b949e; font-size: 0.7rem; display: block;">TRABAJADOR:</label>
                <input type="text" id="nombreTrabajador" class="form-val" style="width: 100%; padding: 8px; border-radius: 6px;">
            </div>
            <div class="col-md-6 mb-3">
                <label style="color: #8b949e; font-size: 0.7rem; display: block;">EDAD:</label>
                <input type="number" id="edadTrabajador" class="form-val" style="width: 100%; padding: 8px; border-radius: 6px;">
            </div>
            <div class="col-md-6 mb-3">
                <label style="color: #27ae60; font-size: 0.7rem; display: block;">PESO CARGA (KG):</label>
                <input type="number" id="pesoCarga" class="form-val" style="width: 100%; padding: 8px; border-radius: 6px;">
            </div>
        </div>
    </div>
    <div class="d-flex gap-2">
        <button id="btn-vivo" class="btn-inicio" style="background:#27ae60; color:white;" onclick="prepararSistema('camara')" disabled>🎥 VIVO</button>
        <button id="btn-archivo" class="btn-inicio" style="background:#2980b9; color:white;" onclick="document.getElementById('fileInput').click()" disabled>📁 ARCHIVO</button>
    </div>
    <input type="file" id="fileInput" hidden accept="video/*" onchange="prepararSistema('archivo')">
</div>
    
<div id="contenedor-analisis">
    <div class="status-badge" id="txt-status">SISTEMA READY</div>
    <canvas id="output_canvas"></canvas>
    <video id="input_video" playsinline muted style="display:none;"></video>
    <div class="barra-controles">
        <button class="btn-circular btn-dark" onclick="location.reload()"><span>✖</span><br>SALIR</button>
        <button class="btn-circular" style="background:#00d2d3; color:#000;" onclick="cambiarCamara()"><span>🔄</span><br>GIRAR</button>
        <button id="btn-calib" class="btn-circular" style="background:#f1c40f; color:#000;" onclick="iniciarCalibracion()"><span>⚖️</span><br>CALIBRAR</button>
        <button id="recordBtn" class="btn-circular" style="background:#ff4d4d; opacity: 0.3;" onclick="toggleGrabacion()" disabled><span>🔴</span><br>AUDITAR</button>
    </div>
</div>

<script>
    const inputs = document.querySelectorAll('.form-val');
    const btnVivo = document.getElementById('btn-vivo');
    const btnArchivo = document.getElementById('btn-archivo');
    const video = document.getElementById('input_video');
    const canvas = document.getElementById('output_canvas');
    const ctx = canvas.getContext('2d');
    const txtStatus = document.getElementById('txt-status');
    const loader = document.getElementById('loader-ia');
    const loaderMsg = document.getElementById('loader-msg');
    const TH = { tronco: 18, cuello: 12, hombros: 28, codos: 25, munecas: 20, piernas: 25, pies: 18 };
    
    let iaActiva = false, calibrado = false, analizandoRiesgo = false, procesandoCalib = false;
    let currentFacingMode = "environment", startTimeCalib = 0, pose;
    let wbaStats = { riesgoAltoTotal: 0, framesAnalizados: 0, zonasAfectadas: new Set(), inicioAuditoria: null };
    let baseAngles = {}, angleBuffer = {}, posBuffer = {};

    function validarFormulario() {
        let completo = Array.from(inputs).every(i => i.value.trim() !== "");
        btnVivo.disabled = btnArchivo.disabled = !completo;
    }
    inputs.forEach(i => i.addEventListener('input', validarFormulario));

    async function prepararSistema(fuente) {
        document.getElementById('menu-inicial').style.display = 'none';
        document.getElementById('contenedor-analisis').style.display = 'block';
        if (fuente === 'camara') { await encenderCamara(); activarIA(false); }
        else { /* Lógica Archivo */ }
    }

    async function encenderCamara() {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: currentFacingMode, width: 1280, height: 720 } });
        video.srcObject = stream;
        video.onloadedmetadata = () => { canvas.width = video.videoWidth; canvas.height = video.videoHeight; video.play(); };
    }

    function iniciarCalibracion() {
        procesandoCalib = true;
        calibrado = false;
        startTimeCalib = Date.now();
        loader.style.display = 'flex';
        loaderMsg.innerText = "BUSCANDO SUJETO...";
        
        setTimeout(() => {
            if (!iaActiva) {
                loader.style.display = 'none';
                procesandoCalib = false;
                alert("❌ FALLO DE RECONOCIMIENTO:\n1. Asegúrese de que el cuerpo completo sea visible.\n2. Mejore la iluminación frontal.\n3. Evite fondos con colores similares a la ropa.");
            }
        }, 5000);
    }

    function calcAng3D(a,b,c) {
        const v1={x:a.x-b.x, y:a.y-b.y, z:a.z-b.z}, v2={x:c.x-b.x, y:c.y-b.y, z:c.z-b.z};
        const dot = v1.x*v2.x + v1.y*v2.y + v1.z*v2.z;
        const m1 = Math.sqrt(v1.x**2 + v1.y**2 + v1.z**2), m2 = Math.sqrt(v2.x**2 + v2.y**2 + v2.z**2);
        return (m1*m2 === 0) ? 0 : Math.acos(Math.max(-1, Math.min(1, dot/(m1*m2))))*(180/Math.PI);
    }

    const drawV = (p1, p2, angKey, groupKey, lm1, lm2) => {
        if (!lm1 || !lm2 || lm1.visibility < 0.5 || lm2.visibility < 0.5) return;
        let color = "#00ff00", thickness = 3;
        
        if (calibrado && analizandoRiesgo) {
            const avgAngle = angleBuffer[angKey].reduce((a,b)=>a+b,0)/angleBuffer[angKey].length;
            const diff = Math.abs(avgAngle - baseAngles[angKey]);
            if (diff > TH[groupKey]*2) { color = "#ff3838"; thickness = 8; }
            else if (diff > TH[groupKey]) { color = "#f1c40f"; thickness = 5; }
        }

        ctx.beginPath(); ctx.strokeStyle = color; ctx.lineWidth = thickness;
        ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();

        if (calibrado) {
            ctx.fillStyle = "rgba(0,0,0,0.6)"; ctx.fillRect(p1.x+10, p1.y-10, 50, 20);
            ctx.fillStyle = "#fff"; ctx.font = "10px Arial";
            ctx.fillText(Math.round(angleBuffer[angKey].slice(-1))+"°", p1.x+15, p1.y+5);
        }
    };

    function onResults(res) {
        if (!res.poseLandmarks) { txtStatus.innerText = "BUSCANDO..."; return; }
        iaActiva = true;
        const lm = res.poseLandmarks;
        const w = canvas.width, h = canvas.height;

        if (procesandoCalib && !calibrado) {
            let seg = Math.ceil((3000 - (Date.now()-startTimeCalib))/1000);
            loaderMsg.innerText = "CALIBRANDO EN " + (seg > 0 ? seg : 0) + "s";
            if (Date.now() - startTimeCalib > 3000) { 
                calibrado = true; procesandoCalib = false; loader.style.display = 'none';
                document.getElementById('recordBtn').disabled = false; document.getElementById('recordBtn').style.opacity = "1";
                alert("✅ TODO LISTO: Sujeto identificado y base establecida.");
            }
        }

        ctx.clearRect(0,0,w,h);
        ctx.drawImage(res.image, 0,0,w,h);

        const pt = (i) => ({ x: lm[i].x*w, y: lm[i].y*h, z: lm[i].z, visibility: lm[i].visibility });
        const p = { 
            h_d: pt(12), c_d: pt(14), m_d: pt(16), h_i: pt(11), c_i: pt(13), m_i: pt(15),
            p_d: pt(24), r_d: pt(26), t_d: pt(28), p_i: pt(23), r_i: pt(25), t_i: pt(27)
        };

        const angles = { 
            c_d: calcAng3D(p.h_d, p.c_d, p.m_d), c_i: calcAng3D(p.h_i, p.c_i, p.m_i),
            r_d: calcAng3D(p.p_d, p.r_d, p.t_d), r_i: calcAng3D(p.p_i, p.r_i, p.t_i)
        };

        Object.keys(angles).forEach(k => {
            if (!angleBuffer[k]) angleBuffer[k] = [];
            angleBuffer[k].push(angles[k]); if(angleBuffer[k].length>20) angleBuffer[k].shift();
            if (calibrado && !baseAngles[k]) baseAngles[k] = angles[k];
        });

        drawV(p.h_d, p.c_d, 'c_d', 'codos', lm[12], lm[14]);
        drawV(p.c_d, p.m_d, 'c_d', 'codos', lm[14], lm[16]);
        drawV(p.p_d, p.r_d, 'r_d', 'piernas', lm[24], lm[26]);
        drawV(p.r_d, p.t_d, 'r_d', 'piernas', lm[26], lm[28]);
    }

    async function activarIA(showLoader = true) {
        if (showLoader) loader.style.display = 'flex';
        pose = new Pose({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}` });
        pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5 });
        pose.onResults(onResults);
        const procesar = async () => { if (video.readyState >= 2) await pose.send({ image: video }); requestAnimationFrame(procesar); };
        procesar();
    }
    
    function toggleGrabacion() { analizandoRiesgo = !analizandoRiesgo; document.getElementById('recordBtn').classList.toggle('rec-active'); }
    function cambiarCamara() { currentFacingMode = currentFacingMode === "environment" ? "user" : "environment"; encenderCamara(); }
</script>
</body>
</html>
