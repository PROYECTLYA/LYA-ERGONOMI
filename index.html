<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LYA-ERGO v21.9 | AUDITORÍA ESTABLE</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0d1117; color: white; margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #menu-inicial { display: flex; width: 100%; height: 100vh; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle, #161b22 0%, #0d1117 100%); position: fixed; z-index: 5000; }
        .logo-text { color: #00ff00; font-weight: 800; letter-spacing: 3px; margin-bottom: 0; }
        
        #pantalla-evaluacion { 
            display: none; position: fixed; top:0; left:0; width:100%; height:100%; 
            background: rgba(13, 17, 23, 0.95); z-index: 7000; 
            flex-direction: column; align-items: center; justify-content: center; 
        }
        .scanner-line { width: 80%; height: 3px; background: #00ff00; position: absolute; box-shadow: 0 0 20px #00ff00; animation: scan 2s infinite ease-in-out; }
        @keyframes scan { 0%, 100% { top: 35%; opacity: 0; } 50% { top: 65%; opacity: 1; } }

        #contenedor-analisis { display: none; width: 100vw; height: 100vh; position: relative; background: #000; }
        canvas { width: 100%; height: 100%; object-fit: contain; }
        video { display: none; }
        
        .status-badge { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.8); padding: 12px 20px; border-radius: 8px; border-left: 4px solid #00ff00; font-size: 10px; z-index: 3000; font-weight: bold; }
        .barra-controles { position: absolute; bottom: 35px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; z-index: 4000; width: 95%; justify-content: center; }
        .btn-circular { width: 68px; height: 68px; border-radius: 50%; border: none; font-size: 9px; font-weight: 900; color: white; display: flex; align-items: center; justify-content: center; flex-direction: column; transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .btn-eval { background: #00ff00; color: #000; width: auto; padding: 0 30px; border-radius: 35px; font-weight: bold; }
        .rec-active { background: #fff !important; color: #f00 !important; animation: pulse-red 1.5s infinite; }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(255, 0, 0, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0); } }
    </style>
</head>
<body>

<div id="pantalla-evaluacion">
    <div class="scanner-line"></div>
    <h2 id="eval-status-text" style="color:#00ff00; letter-spacing: 4px;">CALIBRANDO VECTORES</h2>
    <p style="color: #8b949e;" id="eval-subtext">PROCESANDO POSTURA INICIAL...</p>
</div>

<div id="menu-inicial">
    <h1 class="logo-text">LYA-ERGO</h1>
    <p class="sub-text">Auditoría Cervecería del Trópico</p>
    <button style="background:#27ae60; color:white; width:85%; max-width:320px; padding:18px; margin:10px; border-radius:12px; font-weight:bold; border:none;" onclick="prepararSistema('camara')">🎥 VISTA EN VIVO</button>
    <button style="background:#2980b9; color:white; width:85%; max-width:320px; padding:18px; margin:10px; border-radius:12px; font-weight:bold; border:none;" onclick="document.getElementById('fileInput').click()">📁 SUBIR EVIDENCIA</button>
    <input type="file" id="fileInput" hidden accept="video/*" onchange="prepararSistema('archivo')">
</div>

<div id="contenedor-analisis">
    <div class="status-badge" id="txt-status">ESPERANDO ACCIÓN</div>
    <canvas id="output_canvas"></canvas>
    <video id="input_video" playsinline muted></video>
    <div class="barra-controles" id="controles-dinamicos"></div>
</div>

<script>
    const video = document.getElementById('input_video');
    const canvas = document.getElementById('output_canvas');
    const ctx = canvas.getContext('2d');
    const pantallaEval = document.getElementById('pantalla-evaluacion');
    const controles = document.getElementById('controles-dinamicos');
    const txtStatus = document.getElementById('txt-status');
    
    let pose = null, iaActiva = false, modoEvidencia = false;
    let recordedChunks = [], mediaRecorder, grabando = false;
    let smoothBuffer = {};
    const BUF_SIZE = 6;

    const TH = { tronco: 25, cuello: 20, hombros: 35, codos: 50, munecas: 20, piernas: 30 };

    async function prepararSistema(fuente) {
        document.getElementById('menu-inicial').style.display = 'none';
        document.getElementById('contenedor-analisis').style.display = 'block';
        
        pose = new Pose({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}` });
        pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });
        pose.onResults(onResults);

        if (fuente === 'camara') {
            modoEvidencia = false;
            configurarBotonesVivo();
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            video.srcObject = stream;
            video.play();
            requestAnimationFrame(loopIA);
        } else {
            modoEvidencia = true;
            configurarBotonesEvidencia();
            video.src = URL.createObjectURL(document.getElementById('fileInput').files[0]);
            video.onloadedmetadata = () => {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                video.currentTime = 0.5; // Nos movemos al inicio para el anclaje
                txtStatus.innerText = "EVIDENCIA CARGADA - ANALICE POSTURA INICIAL";
                requestAnimationFrame(loopVistaPrevia);
            };
        }
    }

    function configurarBotonesEvidencia() {
        controles.innerHTML = `
            <button class="btn-circular btn-dark" onclick="location.reload()">SALIR</button>
            <button class="btn-circular" style="background:#2ecc71;" onclick="togglePlay()">⏯️</button>
            <button class="btn-circular btn-eval" id="btn-iniciar-eval" onclick="iniciarEvaluacionSequencial()">INICIAR EVALUACIÓN</button>
            <button class="btn-circular" id="btn-descarga" style="background:#2980b9; display:none;" onclick="gestionarGrabacion()">💾</button>
        `;
    }

    function configurarBotonesVivo() {
        controles.innerHTML = `
            <button class="btn-circular btn-dark" onclick="location.reload()">SALIR</button>
            <button id="btn-calib" class="btn-circular btn-eval" onclick="iaActiva = true; this.style.display='none';">ACTIVAR IA</button>
        `;
    }

    function togglePlay() { if(iaActiva) video.paused ? video.play() : video.pause(); }

    // --- CORRECCIÓN: Estabilización Secuencial (No se traba) ---
    async function iniciarEvaluacionSequencial() {
        pantallaEval.style.display = 'flex';
        iaActiva = true;
        
        // Procesamos exactamente 15 frames del inicio para llenar los buffers sin saturar la CPU
        for(let i=0; i<15; i++) {
            if (video.readyState >= 2) {
                await pose.send({ image: video });
            }
            await new Promise(r => setTimeout(r, 60)); // Pausa breve para que el navegador respire
        }

        document.getElementById('eval-status-text').innerText = "VECTORES LISTOS";
        setTimeout(() => {
            pantallaEval.style.display = 'none';
            document.getElementById('btn-descarga').style.display = 'flex';
            document.getElementById('btn-iniciar-eval').style.display = 'none';
            video.play();
            requestAnimationFrame(loopIA);
        }, 800);
    }

    function loopIA() {
        if (iaActiva && video.readyState >= 2) {
            pose.send({ image: video });
        }
        requestAnimationFrame(loopIA);
    }

    function loopVistaPrevia() {
        if (!iaActiva) {
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            requestAnimationFrame(loopVistaPrevia);
        }
    }

    function gestionarGrabacion() {
        if (!grabando) {
            recordedChunks = [];
            const stream = canvas.captureStream(30);
            mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm; codecs=vp9' });
            mediaRecorder.ondataavailable = (e) => recordedChunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `LYA_REPORTE_${Date.now()}.webm`;
                a.click();
            };
            mediaRecorder.start();
            grabando = true;
            document.getElementById('btn-descarga').classList.add('rec-active');
            txtStatus.innerText = "AUDITANDO Y GRABANDO...";
        } else {
            mediaRecorder.stop();
            grabando = false;
            document.getElementById('btn-descarga').classList.remove('rec-active');
            txtStatus.innerText = "REPORTE GENERADO";
        }
    }

    function getSmoothVal(key, newVal) {
        if (!smoothBuffer[key]) smoothBuffer[key] = [];
        smoothBuffer[key].push(newVal);
        if (smoothBuffer[key].length > BUF_SIZE) smoothBuffer[key].shift();
        return smoothBuffer[key].reduce((a, b) => a + b) / smoothBuffer[key].length;
    }

    function onResults(res) {
        if (!res.poseLandmarks) return;
        ctx.save();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(res.image, 0, 0, canvas.width, canvas.height);

        const lm = res.poseLandmarks;
        const w = canvas.width, h = canvas.height;
        const pt = (i) => ({ x: lm[i].x * w, y: lm[i].y * h, v: lm[i].visibility });

        // LÓGICA DE TRASO COMPLETO (JERARQUÍA ERGONÓMICA)
        const p = {
            cab: pt(0), 
            cue: { x: (lm[11].x+lm[12].x)/2*w, y:(lm[11].y+lm[12].y)/2*h },
            h_i: pt(11), h_d: pt(12),
            c_i: pt(13), c_d: pt(14),
            m_i: pt(15), m_d: pt(16),
            mano_i: pt(19), mano_d: pt(20),
            p_i: pt(23), p_d: pt(24),
            r_i: pt(25), r_d: pt(26),
            t_i: pt(27), t_d: pt(28),
            pie_i: pt(31), pie_d: pt(32)
        };
        p.esp = { x: (p.p_i.x + p.p_d.x)/2, y: (p.p_i.y + p.p_d.y)/2 };

        const calcAng = (a, b, c) => {
            const v1 = { x: a.x - b.x, y: a.y - b.y }, v2 = { x: c.x - b.x, y: c.y - b.y };
            const m1 = Math.sqrt(v1.x**2 + v1.y**2), m2 = Math.sqrt(v2.x**2 + v2.y**2);
            return Math.acos(Math.max(-1, Math.min(1, (v1.x*v2.x + v1.y*v2.y) / (m1 * m2)))) * (180 / Math.PI);
        };

        const angles = {
            cuello: getSmoothVal('cue', calcAng(p.cab, p.cue, {x: p.cue.x, y: p.cue.y + 100})),
            tronco: getSmoothVal('tro', calcAng(p.cue, p.esp, {x: p.esp.x, y: p.esp.y + 100})),
            h_d: getSmoothVal('hd', calcAng({x: p.h_d.x, y: p.h_d.y + 100}, p.h_d, p.c_d)),
            h_i: getSmoothVal('hi', calcAng({x: p.h_i.x, y: p.h_i.y + 100}, p.h_i, p.c_i))
        };

        const drawV = (p1, p2, val, limit) => {
            if (p1.v < 0.5 || p2.v < 0.5) return;
            ctx.lineWidth = 6;
            if (val > limit * 1.5) { ctx.strokeStyle = "#ff3838"; ctx.lineWidth = 12; }
            else if (val > limit) { ctx.strokeStyle = "#fffa65"; ctx.lineWidth = 9; }
            else { ctx.strokeStyle = "#32ff7e"; }
            ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
            ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(p1.x, p1.y, 3, 0, 7); ctx.fill();
        };

        // TRASOS COMPLETOS
        drawV(p.cab, p.cue, angles.cuello, TH.cuello);
        drawV(p.cue, p.esp, angles.tronco, TH.tronco);
        // Brazos
        drawV(p.h_d, p.c_d, angles.h_d, TH.hombros); drawV(p.c_d, p.m_d, 0, 180); drawV(p.m_d, p.mano_d, 0, 180);
        drawV(p.h_i, p.c_i, angles.h_i, TH.hombros); drawV(p.c_i, p.m_i, 0, 180); drawV(p.m_i, p.mano_i, 0, 180);
        // Piernas
        drawV(p.p_d, p.r_d, 0, 180); drawV(p.r_d, p.t_d, 0, 180); drawV(p.t_d, p.pie_d, 0, 180);
        drawV(p.p_i, p.r_i, 0, 180); drawV(p.r_i, p.t_i, 0, 180); drawV(p.t_i, p.pie_i, 0, 180);

        ctx.restore();
    }
</script>
</body>
</html>
