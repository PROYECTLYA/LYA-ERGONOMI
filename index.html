NUEVO AJUSTE
<!DOCTYPE html> 
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LYA-ERGO v20.2 | AUDITORÍA ERGONÓMICA</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
<style>
    /* Ajuste para Tablets */
    #menu-inicial { 
        display: flex; 
        width: 100%; 
        height: 100svh; 
        flex-direction: column; 
        align-items: center; 
        justify-content: center; 
        background: radial-gradient(circle, #161b22 0%, #0d1117 100%); 
        position: fixed; 
        z-index: 5000;
        padding: 20px;
        box-sizing: border-box;
        overflow-y: auto;
    }

    .logo-text { 
        color: #00ff00; 
        font-weight: 800; 
        font-size: clamp(2rem, 8vw, 3.5rem); 
        text-align: center;
    }

    .container-form {
        width: 100%;
        max-width: 550px;
        background: rgba(255,255,255,0.05); 
        padding: 25px; 
        border-radius: 20px; 
        border: 1px solid rgba(255,255,255,0.1);
    }

    #contenedor-analisis {
        display: none;
        width: 100vw;
        height: 100vh;
        background: #000;
        position: relative;
    }

    canvas {
        width: 100%;
        height: 100%;
        object-fit: contain;
    }

    .barra-controles {
        position: absolute;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 15px;
        z-index: 100;
    }

    .btn-circular {
        width: 70px;
        height: 70px;
        border-radius: 50%;
        border: none;
        font-size: 0.7rem;
        font-weight: bold;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
    }

    #loader-ia {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: #0d1117;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 6000;
    }
</style>
</head>
<body>

<div id="loader-ia">
    <h3 style="color:#00ff00;">LYA-AUDITOR ENGINE</h3>
    <p style="color: white;">Cargando Redes Neuronales...</p>
</div>

<div id="menu-inicial">
    <h1 class="logo-text">LYA-ERGO</h1>
    <p class="text-secondary mb-4">AUDITORÍA NOM-036-STPS</p>
    
    <div class="container-form">
        <div class="row g-3">
            <div class="col-12">
                <label class="text-secondary small">EMPRESA / PLANTA:</label>
                <input type="text" id="nombreEmpresa" class="form-control bg-dark text-white border-secondary">
            </div>
            <div class="col-6">
                <label class="text-secondary small">PUESTO:</label>
                <input type="text" id="puestoTrabajo" class="form-control bg-dark text-white border-secondary">
            </div>
            <div class="col-6">
                <label class="text-secondary small">PESO (KG):</label>
                <input type="number" id="pesoCarga" class="form-control bg-dark text-white border-success">
            </div>
        </div>
        
        <div class="d-flex gap-2 mt-4">
            <button class="btn btn-success w-100 py-3 fw-bold" onclick="prepararSistema('camara')">🎥 EN VIVO</button>
            <button class="btn btn-primary w-100 py-3 fw-bold" onclick="document.getElementById('fileInput').click()">📁 ARCHIVO</button>
        </div>
        <input type="file" id="fileInput" hidden accept="video/*" onchange="prepararSistema('archivo')">
    </div>
</div>

<div id="contenedor-analisis">
    <div id="txt-status" class="position-absolute top-0 start-50 translate-middle-x mt-3 badge bg-dark border border-success">SISTEMA READY</div>
    <canvas id="output_canvas"></canvas>
    <video id="input_video" playsinline muted style="display:none;"></video>
    
    <div class="barra-controles">
        <button class="btn-circular bg-danger text-white" onclick="location.reload()">✖<br>SALIR</button>
        <button class="btn-circular bg-info" onclick="cambiarCamara()">🔄<br>GIRAR</button>
        <button class="btn-circular bg-warning" onclick="activarIA()">⚖️<br>CALIBRAR</button>
        <button id="recordBtn" class="btn-circular bg-success text-white" onclick="toggleGrabacion()" disabled>🔴<br>AUDITAR</button>
    </div>
</div>

<script>
    const video = document.getElementById('input_video');
    const canvas = document.getElementById('output_canvas');
    const ctx = canvas.getContext('2d');
    let pose, iaActiva = false, calibrado = false, analizandoRiesgo = false;
    let currentFacingMode = "environment";
    let posBuffer = {};

    async function prepararSistema(fuente) {
        document.getElementById('menu-inicial').style.display = 'none';
        document.getElementById('contenedor-analisis').style.display = 'block';
        if (fuente === 'camara') await encenderCamara();
    }

    async function encenderCamara() {
        const stream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: currentFacingMode, width: 1280, height: 720 } 
        });
        video.srcObject = stream;
        video.onloadedmetadata = () => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            video.play();
            requestAnimationFrame(renderLoop);
        };
    }

    function renderLoop() {
        if (!iaActiva) {
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            requestAnimationFrame(renderLoop);
        }
    }

    function activarIA() {
        document.getElementById('loader-ia').style.display = 'flex';
        pose = new Pose({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}` });
        pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.6 });
        
        pose.onResults((res) => {
            document.getElementById('loader-ia').style.display = 'none';
            iaActiva = true;
            document.getElementById('recordBtn').disabled = false;
            drawResults(res);
        });

        const sendFrames = async () => {
            if (video.readyState >= 2) await pose.send({image: video});
            requestAnimationFrame(sendFrames);
        };
        sendFrames();
    }

    function drawResults(res) {
        ctx.save();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(res.image, 0, 0, canvas.width, canvas.height);
        
        if (res.poseLandmarks) {
            // Lógica de dibujo de esqueleto aquí...
            ctx.fillStyle = "#00ff00";
            res.poseLandmarks.forEach(pt => {
                if(pt.visibility > 0.5) ctx.fillRect(pt.x * canvas.width, pt.y * canvas.height, 5, 5);
            });
        }
        ctx.restore();
    }

    function toggleGrabacion() {
        analizandoRiesgo = !analizandoRiesgo;
        const btn = document.getElementById('recordBtn');
        btn.innerHTML = analizandoRiesgo ? "⏹️<br>PARAR" : "🔴<br>AUDITAR";
        btn.classList.toggle('bg-success');
        btn.classList.toggle('bg-danger');
        if(!analizandoRiesgo) alert("Auditoría Finalizada. Generando PDF...");
    }

    async function cambiarCamara() {
        currentFacingMode = (currentFacingMode === "environment") ? "user" : "environment";
        await encenderCamara();
    }
</script>
</body>
</html>
