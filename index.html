<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ERGO-SENSING PRO v8.5</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0d1117; color: white; margin: 0; overflow: hidden; font-family: sans-serif; }
        #menu-inicial { display: flex; width: 100%; height: 100vh; flex-direction: column; align-items: center; justify-content: center; background: #0d1117; position: fixed; z-index: 5000; }
        #contenedor-analisis { display: none; width: 100vw; height: 100vh; position: relative; background: #000; }
        canvas { width: 100%; height: 100%; object-fit: contain; }
        video { display: none; }
        .status-badge { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.85); color: #fff; padding: 12px; border-radius: 10px; border-left: 5px solid #00ff00; font-size: 11px; z-index: 3000; }
        .barra-controles { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 12px; z-index: 4000; }
        .btn-circular { width: 62px; height: 62px; border-radius: 50%; border: none; font-size: 10px; font-weight: bold; color: white; display: flex; align-items: center; justify-content: center; flex-direction: column; text-align: center; }
        .rec-active { background: #fff !important; color: #f00 !important; }
    </style>
</head>
<body>

<div id="menu-inicial">
    <h1 style="color: #00ff00;">ERGO-SENSING</h1>
    <p>v8.5 - Anti-Freeze Mode</p>
    <button class="btn btn-success p-3 w-75 mb-3" onclick="iniciarApp('camara')">🎥 INICIAR CÁMARA</button>
</div>

<div id="contenedor-analisis">
    <div class="status-badge" id="txt-status">PASO 1: POSICIONE AL SUJETO</div>
    <canvas id="output_canvas"></canvas>
    <video id="input_video" playsinline muted></video>
    <div class="barra-controles">
        <button class="btn-circular btn-dark" onclick="location.reload()">MENÚ</button>
        <button id="btn-calib" class="btn-circular" style="background:#f1c40f; color:#000;" onclick="activarIA()">⚖️<br>CALIB</button>
        <button id="recordBtn" class="btn-circular" style="background:#ff4d4d;" onclick="toggleGrabacion()">🔴<br>REC</button>
    </div>
</div>

<script>
    const video = document.getElementById('input_video');
    const canvas = document.getElementById('output_canvas');
    const ctx = canvas.getContext('2d');
    const txtStatus = document.getElementById('txt-status');
    
    let poseSolver = null;
    let streamActual = null;
    let IA_Cargada = false;
    let IA_Activa = false;
    let CalibracionFinalizada = false;
    let GrabandoYCalculando = false;
    
    let startTimeCalib = 0;
    let offsets = {}, bases = {};
    const THRESHOLDS = { 'cabeza': { amar: 15, rojo: 25 }, 'abdomen': { amar: 20, rojo: 40 }, 'ext': { amar: 30, rojo: 55 } };

    // 1. CARGA PREVIA SILENCIOSA (Para evitar el golpe de RAM al dar clic)
    function pre-cargarIA() {
        poseSolver = new Pose({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}` });
        poseSolver.setOptions({ modelComplexity: 0, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
        poseSolver.onResults(onResults);
        console.log("IA Pre-cargada en background");
    }
    pre-cargarIA();

    async function iniciarApp(fuente) {
        document.getElementById('menu-inicial').style.display = 'none';
        document.getElementById('contenedor-analisis').style.display = 'block';
        
        try {
            streamActual = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment", width: 640, height: 480 } 
            });
            video.srcObject = streamActual;
            video.onloadedmetadata = () => { 
                video.play(); 
                requestAnimationFrame(renderLoopSimple); 
            };
        } catch (e) { alert("Error al abrir cámara"); }
    }

    // Bucle ligero: Solo dibuja video, no analiza nada.
    function renderLoopSimple() {
        if (!video.paused && !IA_Activa) {
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            requestAnimationFrame(renderLoopSimple);
        }
    }

    function activarIA() {
        IA_Activa = true; 
        startTimeCalib = Date.now();
        txtStatus.innerText = "INICIANDO IA Y CALIBRANDO...";
        requestAnimationFrame(renderLoopIA);
    }

    async function renderLoopIA() {
        if (!video.paused && IA_Activa) {
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            
            // EL TRUCO: setTimeout libera el procesador un milisegundo para no congelar
            await poseSolver.send({image: video});
            
            if (IA_Activa) requestAnimationFrame(renderLoopIA);
        }
    }

    function onResults(res) {
        if (!res.poseLandmarks) return;
        
        ctx.save();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(res.image, 0, 0, canvas.width, canvas.height);

        const lm = res.poseLandmarks;
        const w = canvas.width, h = canvas.height;
        const pt = (i) => ({ x: lm[i].x * w, y: lm[i].y * h });
        
        // Puntos clave simplificados
        const h_m = { x:(lm[11].x+lm[12].x)/2, y:(lm[11].y+lm[12].y)/2, z:(lm[11].z+lm[12].z)/2 };
        const c_m = { x:(lm[23].x+lm[24].x)/2, y:(lm[23].y+lm[24].y)/2, z:(lm[23].z+lm[24].z)/2 };

        // Lógica de tiempo de calibración
        if (!CalibracionFinalizada) {
            const transcurrido = Date.now() - startTimeCalib;
            const segs = Math.max(0, Math.ceil((5000 - transcurrido) / 1000));
            txtStatus.innerText = `CALIBRANDO POSTURA: ${segs}s`;
            
            if (transcurrido > 5000) {
                // Guardar postura base
                offsets['cabeza'] = calcAng(lm[0], h_m, c_m);
                offsets['abdomen'] = calcAng(h_m, c_m, {x:c_m.x, y:c_m.y+0.5, z:c_m.z});
                CalibracionFinalizada = true;
                txtStatus.innerText = "POSTURA BASE FIJADA. LISTO PARA GRABAR.";
            }
        }

        // Dibujo de esqueleto
        const ph = {x:h_m.x*w, y:h_m.y*h}, pc = {x:c_m.x*w, y:c_m.y*h};
        let colorActual = CalibracionFinalizada ? "#00ff00" : "#888"; // Verde si terminó, gris si calibra

        const drawV = (p1, p2, k) => {
            ctx.lineWidth = 6; ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y);
            
            if (GrabandoYCalculando) {
                const angActual = (k === 'cabeza') ? calcAng(lm[0], h_m, c_m) : calcAng(h_m, c_m, {x:c_m.x, y:c_m.y+0.5, z:c_m.z});
                const diff = Math.abs(angActual - (offsets[k]||0));
                const c = THRESHOLDS[k] || THRESHOLDS['ext'];
                ctx.strokeStyle = diff > c.rojo ? "#f00" : diff > c.amar ? "#ff0" : "#0f0";
            } else {
                ctx.strokeStyle = colorActual;
            }
            ctx.stroke();
        };

        drawV(pt(0), ph, 'cabeza');
        drawV(ph, pc, 'abdomen');
        
        ctx.restore();
    }

    function calcAng(a,b,c) {
        const v1={x:a.x-b.x,y:a.y-b.y,z:a.z-b.z}, v2={x:c.x-b.x,y:c.y-b.y,z:c.z-b.z};
        const dot=v1.x*v2.x+v1.y*v2.y+v1.z*v2.z, m1=Math.sqrt(v1.x**2+v1.y**2+v1.z**2), m2=Math.sqrt(v2.x**2+v2.y**2+v2.z**2);
        return Math.acos(Math.max(-1,Math.min(1,dot/(m1*m2+1e-6))))*(180/Math.PI);
    }

    function toggleGrabacion() {
        if (!CalibracionFinalizada) return alert("Calibre primero.");
        const btn = document.getElementById('recordBtn');
        if (!GrabandoYCalculando) {
            GrabandoYCalculando = true;
            btn.classList.add('rec-active');
            txtStatus.innerText = "GRABANDO Y CALCULANDO...";
        } else {
            GrabandoYCalculando = false;
            btn.classList.remove('rec-active');
            txtStatus.innerText = "GRABACIÓN FINALIZADA.";
        }
    }
</script>
</body>
</html>
