<script>
/**
 * 🏷️ BLOQUE 1: CONFIGURACIÓN Y UMBRALES NOM-036
 * Define los límites de desviación angular permitidos para evitar riesgos.
 */
const video = document.getElementById('input_video');
const canvas = document.getElementById('output_canvas');
const ctx = canvas.getContext('2d');
const txtStatus = document.getElementById('txt-status');

// Umbrales de desviación (Grados) basados en NOM-036-STPS-2018
const TH = { tronco: 18, cuello: 12, hombros: 15, codos: 25, munecas: 20, piernas: 25 };

/**
 * 🏷️ BLOQUE 2: VARIABLES DE ESTADO Y ESTADÍSTICAS
 * Maneja el suavizado de la imagen y los acumuladores de riesgo.
 */
let wbaStats = { 
    riesgoAltoTotal: 0, 
    framesAnalizados: 0, 
    zonasAfectadas: new Set(), 
    inicioAuditoria: null, 
    ciclos: 0 
};

let baseAngles = {};        // Ángulos capturados en la calibración (postura neutra)
let angleBuffer = {};       // Búfer para media móvil de ángulos
let posBuffer = {};         // Búfer para suavizar el jitter de los puntos
const HISTORIAL_MAX = 15;   // Cuadros para suavizar ángulos
const SUAVIZADO_POS = 5;    // Cuadros para suavizar coordenadas

let iaActiva = false;
let calibrado = false;
let analizandoRiesgo = false;
let currentFacingMode = "environment";
let pose;
let mediaRecorder;
let recordedChunks = [];

/**
 * 🏷️ BLOQUE 3: MATEMÁTICAS DINÁMICAS
 * Funciones para cálculo de ángulos 3D y dibujo de vectores.
 */
function calcAng3D(a, b, c) {
    if(!a || !b || !c) return 0;
    const v1 = { x: a.x - b.x, y: a.y - b.y, z: a.z - b.z };
    const v2 = { x: c.x - b.x, y: c.y - b.y, z: c.z - b.z };
    const dot = v1.x * v2.x + v1.y * v2.y + v1.z * v2.z;
    const m1 = Math.sqrt(v1.x**2 + v1.y**2 + v1.z**2);
    const m2 = Math.sqrt(v2.x**2 + v2.y**2 + v2.z**2);
    const angle = Math.acos(Math.max(-1, Math.min(1, dot / (m1 * m2)))) * (180 / Math.PI);
    return isNaN(angle) ? 0 : angle;
}

const drawV = (p1, p2, angKey, groupKey, vis1, vis2) => {
    if (vis1 < 0.5 || vis2 < 0.5) return;

    const buffer = angleBuffer[angKey] || [];
    if (buffer.length === 0) return;
    const avgAngle = buffer.reduce((a, b) => a + b, 0) / buffer.length;

    let color = "#00ff00", thickness = 4, status = "SEGURO";

    if (analizandoRiesgo && calibrado) {
        const diff = Math.abs(avgAngle - (baseAngles[angKey] || avgAngle));
        const limit = TH[groupKey];
        wbaStats.framesAnalizados++;

        if (diff > (limit * 2)) {
            color = "#ff3838"; thickness = 10; status = "CRÍTICO";
            wbaStats.riesgoAltoTotal++;
            wbaStats.zonasAfectadas.add(groupKey);
        } else if (diff > limit) {
            color = "#f1c40f"; thickness = 6; status = "RIESGO";
        }
    }

    // Dibujo del vector
    ctx.beginPath();
    ctx.strokeStyle = color; ctx.lineWidth = thickness; ctx.lineCap = "round";
    ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();

    // Etiqueta de datos si está calibrado
    if (calibrado) {
        const mx = (p1.x + p2.x) / 2, my = (p1.y + p2.y) / 2;
        ctx.fillStyle = "rgba(0,0,0,0.7)";
        ctx.fillRect(mx + 10, my - 20, 70, 30);
        ctx.fillStyle = color; ctx.font = "bold 10px Arial";
        ctx.fillText(`${avgAngle.toFixed(0)}°`, mx + 15, my - 8);
        ctx.fillText(status, mx + 15, my + 5);
    }
};
/**
 * 🏷️ BLOQUE 4: PROCESAMIENTO DE IA (MEDIAPIPE HANDLER)
 * Transforma los puntos de la IA en el modelo jerárquico de la "T".
 */
function onResults(res) {
    if (!res.poseLandmarks) { txtStatus.innerText = "BUSCANDO TRABAJADOR..."; return; }
    txtStatus.innerText = analizandoRiesgo ? "🔴 AUDITANDO EN TIEMPO REAL" : "✅ IA LISTA - ESPERANDO AUDITORÍA";

    const lm = res.poseLandmarks;
    const w = canvas.width, h = canvas.height;

    ctx.save();
    ctx.clearRect(0, 0, w, h);
    if (currentFacingMode === "user") { ctx.translate(w, 0); ctx.scale(-1, 1); }
    ctx.drawImage(res.image, 0, 0, w, h);

    // Suavizado de posición (Helper)
    const pt = (i) => {
        if (!posBuffer[i]) posBuffer[i] = { h: [] };
        posBuffer[i].h.push({ x: lm[i].x * w, y: lm[i].y * h, z: lm[i].z });
        if (posBuffer[i].h.length > SUAVIZADO_POS) posBuffer[i].h.shift();
        const avg = posBuffer[i].h.reduce((a, b) => ({ x: a.x + b.x, y: a.y + b.y, z: a.z + b.z }), { x: 0, y: 0, z: 0 });
        const len = posBuffer[i].h.length;
        return { x: avg.x / len, y: avg.y / len, z: avg.z / len, v: lm[i].visibility };
    };

    // --- NODOS JERÁRQUICOS AMPLIADOS ---
    const p = {
        ore_d: pt(8), ore_i: pt(7), 
        h_d: pt(12), h_i: pt(11), 
        c_d: pt(14), c_i: pt(13), 
        m_d: pt(16), m_i: pt(15), 
        dedo_d: pt(20), dedo_i: pt(19),
        p_d: pt(24), p_i: pt(23),
        r_d: pt(26), r_i: pt(25),
        t_d: pt(28), t_i: pt(27),
        talon_d: pt(30), talon_i: pt(29),
        pie_d: pt(32), pie_i: pt(31)
    };

    // Centros de masa y Cuello
    p.cab = { x: (p.ore_d.x + p.ore_i.x) / 2, y: (p.ore_d.y + p.ore_i.y) / 2, z: (p.ore_d.z + p.ore_i.z) / 2 };
    p.cue = { x: (p.h_d.x + p.h_i.x) / 2, y: (p.h_d.y + p.h_i.y) / 2, z: (p.h_d.z + p.h_i.z) / 2 };
    p.esp = { x: (p.p_d.x + p.p_i.x) / 2, y: (p.p_d.y + p.p_i.y) / 2, z: (p.p_d.z + p.p_i.z) / 2 };

    // 📍 MEJORA DE LÓGICA: Referencia vertical absoluta para flexión de cuello
    const verticalRef = { x: p.cue.x, y: p.cue.y + 100, z: p.cue.z };

    // --- CÁLCULO Y ALMACENAMIENTO DE ÁNGULOS ---
    const currentAngles = {
        cuello: calcAng3D(p.cab, p.cue, verticalRef), // Detecta flexión/extensión real
        pecho: calcAng3D(p.h_d, p.cue, p.h_i),
        tronco: calcAng3D(p.cue, p.p_d, p.esp),
        h_d: calcAng3D(p.cue, p.h_d, p.c_d),
        h_i: calcAng3D(p.cue, p.h_i, p.c_i),
        c_d: calcAng3D(p.h_d, p.c_d, p.m_d),
        c_i: calcAng3D(p.h_i, p.c_i, p.m_i),
        m_d: calcAng3D(p.c_d, p.m_d, p.dedo_d),
        m_i: calcAng3D(p.c_i, p.m_i, p.dedo_i),
        r_d: calcAng3D(p.p_d, p.r_d, p.t_d),
        r_i: calcAng3D(p.p_i, p.r_i, p.t_i),
        t_d: calcAng3D(p.r_d, p.t_d, p.pie_d),
        t_i: calcAng3D(p.r_i, p.t_i, p.pie_i)
    };

    // Actualización de búferes de suavizado de ángulos
    Object.keys(currentAngles).forEach(k => {
        if (!angleBuffer[k]) angleBuffer[k] = [];
        angleBuffer[k].push(currentAngles[k]);
        if (angleBuffer[k].length > HISTORIAL_MAX) angleBuffer[k].shift();
    });

    // --- RENDERIZADO DE VECTORES ---
    // Pecho y Hombros
    drawV(p.h_d, p.h_i, 'pecho', 'hombros', p.h_d.v, p.h_i.v);
    
    // Brazos y Muñecas
    drawV(p.h_d, p.c_d, 'h_d', 'hombros', p.h_d.v, p.c_d.v);
    drawV(p.c_d, p.m_d, 'c_d', 'codos', p.c_d.v, p.m_d.v);
    drawV(p.m_d, p.dedo_d, 'm_d', 'munecas', p.m_d.v, p.dedo_d.v);
    
    drawV(p.h_i, p.c_i, 'h_i', 'hombros', p.h_i.v, p.c_i.v);
    drawV(p.c_i, p.m_i, 'c_i', 'codos', p.c_i.v, p.m_i.v);
    drawV(p.m_i, p.dedo_i, 'm_i', 'munecas', p.m_i.v, p.dedo_i.v);

    // Tronco y Cuello (Visual)
    drawV(p.cue, p.esp, 'tronco', 'tronco', 1, 1);
    drawV(p.cab, p.cue, 'cuello', 'cuello', 1, 1); // Vector visual del cuello

    // Piernas y Pies
    drawV(p.p_d, p.r_d, 'r_d', 'piernas', p.p_d.v, p.r_d.v);
    drawV(p.r_d, p.t_d, 'r_d', 'piernas', p.r_d.v, p.t_d.v);
    drawV(p.t_d, p.pie_d, 't_d', 'piernas', p.t_d.v, p.pie_d.v);
    
    drawV(p.p_i, p.r_i, 'r_i', 'piernas', p.p_i.v, p.r_i.v);
    drawV(p.r_i, p.t_i, 'r_i', 'piernas', p.r_i.v, p.t_i.v);
    drawV(p.t_i, p.pie_i, 't_i', 'piernas', p.t_i.v, p.pie_i.v);

    ctx.restore();
}

/**
 * 🏷️ BLOQUE 5: CONTROL DE CALIBRACIÓN Y AUDITORÍA
 */
function iniciarCalibracion() {
    if (!iaActiva) return;
    txtStatus.innerText = "⚖️ CALIBRANDO... MANTENGA POSTURA NEUTRA";
    
    setTimeout(() => {
        Object.keys(angleBuffer).forEach(k => {
            const avg = angleBuffer[k].reduce((a, b) => a + b, 0) / angleBuffer[k].length;
            baseAngles[k] = avg;
        });
        calibrado = true;
        document.getElementById('btn-calib').style.background = "#2ecc71";
        document.getElementById('recordBtn').disabled = false;
        document.getElementById('recordBtn').style.opacity = "1";
        txtStatus.innerText = "✅ CALIBRADO COMPLETADO";
    }, 2000);
}

function toggleAuditoria() {
    if (!calibrado) return;
    analizandoRiesgo = !analizandoRiesgo;
    const btn = document.getElementById('recordBtn');

    if (analizandoRiesgo) {
        recordedChunks = [];
        const stream = canvas.captureStream(30);
        mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
        mediaRecorder.ondataavailable = (e) => recordedChunks.push(e.data);
        mediaRecorder.onstop = descargarVideo;
        mediaRecorder.start();
        wbaStats.inicioAuditoria = Date.now();
        btn.innerHTML = "<span>⏹️</span>DETENER"; btn.classList.add('rec-active');
    } else {
        btn.innerHTML = "<span>🔴</span>AUDITAR"; btn.classList.remove('rec-active');
        if (mediaRecorder) mediaRecorder.stop();
        setTimeout(generarReporteWBA, 800);
    }
}

/**
 * 🏷️ BLOQUE 6: SISTEMA DE REPORTES PDF
 */
function generarReporteWBA() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    
    // Recolección de datos del formulario
    const info = {
        emp: document.getElementById('nombreEmpresa').value,
        puesto: document.getElementById('puestoTrabajo').value,
        trab: document.getElementById('nombreTrabajador').value,
        peso: parseFloat(document.getElementById('pesoCarga').value),
        gen: document.getElementById('generoTrabajador').value,
        edad: document.getElementById('edadTrabajador').value
    };

    const porcRiesgo = wbaStats.framesAnalizados > 0 ? ((wbaStats.riesgoAltoTotal / wbaStats.framesAnalizados) * 100).toFixed(1) : 0;
    const nivelRiesgo = porcRiesgo > 20 ? 'MUY ALTO' : (porcRiesgo > 5 ? 'MODERADO' : 'BAJO');
    const colorRiesgo = porcRiesgo > 20 ? [231, 76, 60] : (porcRiesgo > 5 ? [241, 196, 15] : [46, 204, 113]);

    // --- ENCABEZADO INSTITUCIONAL ---
    doc.setFillColor(13, 17, 23); doc.rect(0, 0, 210, 40, 'F');
    doc.setTextColor(0, 255, 0); doc.setFontSize(20); doc.text("INFORME DE EVALUACIÓN ERGONÓMICA", 105, 15, { align: "center" });
    doc.setFontSize(10); doc.setTextColor(255, 255, 255);
    doc.text(`CONFORME A LA NORMA OFICIAL MEXICANA NOM-036-1-STPS-2018`, 105, 22, { align: "center" });
    doc.text(`ID Reporte: LYA-${Date.now()}`, 105, 28, { align: "center" });

    // --- 1. DATOS DE IDENTIFICACIÓN ---
    doc.setTextColor(0, 0, 0); doc.setFontSize(12); doc.setFont("helvetica", "bold");
    doc.text("1. DATOS GENERALES Y DEL PUESTO", 15, 50);
    doc.autoTable({
        startY: 55,
        body: [
            ['Empresa/Planta:', info.emp, 'Fecha:', new Date().toLocaleDateString()],
            ['Trabajador:', info.trab, 'Edad:', info.edad],
            ['Puesto de Trabajo:', info.puesto, 'Género:', info.gen === 'H' ? 'Hombre' : 'Mujer']
        ],
        theme: 'plain', styles: { fontSize: 9 }
    });

    // --- 2. RESULTADOS DE LA EVALUACIÓN ---
    doc.text("2. ANÁLISIS DE RIESGO DETECTADO", 15, doc.lastAutoTable.finalY + 10);
    doc.autoTable({
        startY: doc.lastAutoTable.finalY + 15,
        head: [['FACTOR ANALIZADO', 'VALOR', 'LÍMITE NORMATIVO', 'ESTADO']],
        body: [
            ['Manejo Manual de Carga', `${info.peso} kg`, info.gen === 'H' ? '25 kg' : '15 kg', info.peso > (info.gen === 'H' ? 25 : 15) ? 'EXCEDE' : 'DENTRO DE LÍMITE'],
            ['Frecuencia de Postura Crítica', `${porcRiesgo}%`, 'máx. 20%', nivelRiesgo],
            ['Zonas de Mayor Tensión', Array.from(wbaStats.zonasAfectadas).join(', ') || 'Sin anomalías', 'N/A', '-']
        ],
        headStyles: { fillColor: colorRiesgo }
    });

    // --- 3. TABLA DE REFERENCIA NOM-036 (FIJA) ---
    doc.text("3. TABLA DE REFERENCIA TÉCNICA (POSTURAS)", 15, doc.lastAutoTable.finalY + 10);
    doc.setFont("helvetica", "normal"); doc.setFontSize(8);
    doc.text("Valores de umbral angular utilizados para la determinación de riesgo postural:", 15, doc.lastAutoTable.finalY + 15);
    
    doc.autoTable({
        startY: doc.lastAutoTable.finalY + 18,
        head: [['REGIÓN ANATÓMICA', 'ÁNGULO NEUTRO', 'UMBRAL RIESGO', 'TIPO DE LESIÓN ASOCIADA']],
        body: [
            ['Tronco/Espalda', '0° - 10°', '> 20° Flexión', 'Lumbalgia / Hernia Discal'],
            ['Cuello (Cervical)', '180°', '+/- 15° Desv.', 'Sindrome Cervical / Fatiga'],
            ['Hombros', 'Neutro', '> 15° Elevación', 'Tendinitis del Manguito Rotador'],
            ['Codos/Brazos', 'Neutro', '> 25° Flexión', 'Epicondilitis (Codo de Tenista)'],
            ['Muñecas', 'Plano', '> 20° Desv.', 'Síndrome del Túnel Carpiano']
        ],
        styles: { fillColor: [240, 240, 240], fontSize: 8 }
    });

    // --- 4. RECOMENDACIONES TÉCNICAS ---
    const recomendaciones = info.peso > (info.gen === 'H' ? 25 : 15) 
        ? "ALERTA: Reducir carga inmediatamente o implementar ayudas mecánicas (patines, montacargas)."
        : (porcRiesgo > 20 ? "RECOMIENDA: Rotación de personal y ejercicios de estiramiento cada 30 min." : "Sugerencia: Mantener técnica de levantamiento actual.");

    doc.setFont("helvetica", "bold");
    doc.text("4. CONCLUSIONES Y RECOMENDACIONES", 15, doc.lastAutoTable.finalY + 12);
    doc.setFont("helvetica", "normal"); doc.setFontSize(9);
    doc.rect(15, doc.lastAutoTable.finalY + 15, 180, 20);
    doc.text(doc.splitTextToSize(recomendaciones, 175), 20, doc.lastAutoTable.finalY + 22);

    // --- FIRMAS ---
    doc.line(40, 260, 90, 260); doc.text("Firma del Auditor", 50, 265);
    doc.line(120, 260, 170, 260); doc.text("Firma del Trabajador", 130, 265);

    doc.save(`REPORTE_NOM036_${info.trab}_${Date.now()}.pdf`);
}

/**
 * 🏷️ BLOQUE 7: GESTIÓN DE HARDWARE Y ARRANQUE
 */
async function prepararSistema(fuente) {
    // 1. Referencias a los campos numéricos para validación
    const edadInput = document.getElementById('edadTrabajador');
    const pesoInput = document.getElementById('pesoCarga');

    // 2. Validación de campos vacíos
    const ids = ['nombreEmpresa', 'puestoTrabajo', 'nombreTrabajador', 'edadTrabajador', 'pesoCarga'];
    const incompleto = ids.some(id => !document.getElementById(id).value.trim());
    
    if (incompleto) { 
        alert("⚠️ Por favor, complete todos los campos del formulario."); 
        return; 
    }

    // 3. Validación de Números Positivos (Garantiza integridad para la NOM-036)
    if (parseFloat(edadInput.value) <= 0 || parseFloat(pesoInput.value) <= 0) {
        alert("❌ La edad y el peso de la carga deben ser números positivos mayores a cero.");
        return;
    }

    // Si pasa las validaciones, cambiamos de pantalla
    document.getElementById('menu-inicial').style.display = 'none';
    document.getElementById('contenedor-analisis').style.display = 'block';

    if (fuente === 'camara') {
        const stream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: currentFacingMode, width: 1280, height: 720 } 
        });
        video.srcObject = stream;
    } else {
        const file = document.getElementById('fileInput').files[0];
        if (!file) { alert("Seleccione un archivo de video"); return; }

        // 4. Gestión de Memoria: Si ya había un video cargado antes, liberamos su URL
        if (video.src.startsWith('blob:')) {
            URL.revokeObjectURL(video.src);
        }

        video.src = URL.createObjectURL(file);
    }

    video.onloadedmetadata = () => {
        canvas.width = video.videoWidth; 
        canvas.height = video.videoHeight;
        video.play();
        activarIA();
    };
}

async function activarIA() {
    document.getElementById('loader-ia').style.display = 'flex';
    
    pose = new Pose({ 
        locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}` 
    });

    // AJUSTE DE SENSIBILIDAD: Bajamos a 0.4 para vectorizar partes parciales
    pose.setOptions({ 
        modelComplexity: 1, 
        smoothLandmarks: true, 
        enableSegmentation: false,
        minDetectionConfidence: 0.4, // Antes 0.6: Ahora detecta el cuerpo más rápido
        minTrackingConfidence: 0.4    // Antes 0.6: Mantiene el rastreo aunque se pierda parte del brazo
    });

    pose.onResults((res) => {
        iaActiva = true;
        document.getElementById('loader-ia').style.display = 'none';
        onResults(res);
    });

    async function frameLoop() {
        if (iaActiva) {
            await pose.send({ image: video });
        }
        requestAnimationFrame(frameLoop);
    }
    frameLoop();
}

function descargarVideo() {
    if (recordedChunks.length === 0) return;

    const blob = new Blob(recordedChunks, { type: 'video/webm' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; 
    a.download = `EVIDENCIA_LYA_${document.getElementById('nombreTrabajador').value}_${Date.now()}.webm`; 
    a.click();

    // 🧹 LIMPIEZA DE MEMORIA
    // Liberamos la URL del objeto después de 100ms para asegurar que la descarga inició
    setTimeout(() => {
        URL.revokeObjectURL(url);
        console.log("Memoria de blob de video liberada con éxito.");
    }, 100);
}



    
function cambiarCamara() {
    currentFacingMode = currentFacingMode === "environment" ? "user" : "environment";
    prepararSistema('camara');
}

function validarYAbrirArchivo() {
    document.getElementById('fileInput').click();
}
