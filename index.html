<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LYA-ERGO v23.0 | SCANNER EDITION</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0d1117; color: white; margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #menu-inicial { display: flex; width: 100%; height: 100vh; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle, #161b22 0%, #0d1117 100%); position: fixed; z-index: 5000; }
        .logo-text { color: #00ff00; font-weight: 800; letter-spacing: 3px; margin-bottom: 0; }
        .sub-text { color: #8b949e; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 40px; }
        .btn-inicio { width: 85%; max-width: 320px; padding: 18px; margin: 10px; border-radius: 12px; font-weight: bold; border: none; font-size: 1.1rem; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        
        /* Animación del Escáner */
        #scanner-line { 
            display: none; 
            position: absolute; 
            width: 100%; 
            height: 4px; 
            background: rgba(0, 255, 0, 0.6); 
            box-shadow: 0 0 20px #00ff00, 0 0 40px #00ff00; 
            z-index: 3500; 
            top: 0; 
        }

        #contenedor-analisis { display: none; width: 100vw; height: 100vh; position: relative; background: #000; }
        canvas { width: 100%; height: 100%; object-fit: contain; }
        video { display: none; }
        
        .status-badge { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.8); padding: 12px 20px; border-radius: 8px; border-left: 4px solid #00ff00; font-size: 10px; z-index: 3000; font-weight: bold; }
        .barra-controles { position: absolute; bottom: 35px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; z-index: 4000; width: 95%; justify-content: center; }
        .btn-circular { width: 68px; height: 68px; border-radius: 50%; border: none; font-size: 9px; font-weight: 900; color: white; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        
        #contador-auditoria { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); font-size: 160px; font-weight: 900; color: #ff0000; text-shadow: 0 0 40px rgba(255,0,0,0.6); z-index: 5500; display: none; pointer-events: none; }
        .rec-active { background: #fff !important; color: #f00 !important; border: 3px solid #f00 !important; animation: pulse-red 1.5s infinite; }
        
        @keyframes scannerMove {
            0% { top: 0%; }
            50% { top: 100%; }
            100% { top: 0%; }
        }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(255, 0, 0, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0); } }
    </style>
</head>
<body>

<div id="menu-inicial">
    <h1 class="logo-text">LYA-ERGO</h1>
    <p class="sub-text">Sistema de Escaneo Ergonómico</p>
    <button class="btn-inicio" style="background:#27ae60; color:white;" onclick="prepararSistema('camara')">VISTA EN VIVO</button>
    <button class="btn-inicio" style="background:#2980b9; color:white;" onclick="document.getElementById('fileInput').click()">SUBIR ARCHIVO</button>
    <input type="file" id="fileInput" hidden accept="video/*" onchange="prepararSistema('archivo')">
</div>

<div id="contenedor-analisis">
    <div id="scanner-line"></div>
    <div class="status-badge" id="txt-status">STANDBY</div>
    <div id="contador-auditoria">3</div>
    <canvas id="output_canvas"></canvas>
    <video id="input_video" playsinline muted crossorigin="anonymous"></video>
    
    <div class="barra-controles">
        <button class="btn-circular btn-dark" onclick="location.reload()">SALIR</button>
        <button class="btn-circular" style="background:#00d2d3; color:#000;" onclick="cambiarCamara()">GIRAR</button>
        <button id="btn-calib" class="btn-circular" style="background:#f1c40f; color:#000;" onclick="activarIA()">CALIBRAR</button>
        <button id="recordBtn" class="btn-circular" style="background:#ff4d4d; opacity: 0.3;" onclick="iniciarGrabacionConDelay()">AUDITAR</button>
    </div>
</div>

<script>
    const video = document.getElementById('input_video');
    const canvas = document.getElementById('output_canvas');
    const ctx = canvas.getContext('2d');
    const txtStatus = document.getElementById('txt-status');
    const displayContador = document.getElementById('contador-auditoria');
    const scanner = document.getElementById('scanner-line');
    
    let pose = null, iaActiva = false, calibrado = false, analizandoRiesgo = false;
    let currentFacingMode = "environment", startTimeCalib = 0;
    let baseAngles = {}, angleHistory = { h_d: [], h_i: [], c_d: [], c_i: [], cue: [], abd: [], m_d: [], m_i: [] };
    let mediaRecorder, recordedChunks = [];
    
    const SMOOTH_FACTOR = 10; 
    const TH = { tronco: 15, cuello: 12, hombros: 20, codos: 25, munecas: 20, piernas: 25 };

    async function prepararSistema(fuente) {
        document.getElementById('menu-inicial').style.display = 'none';
        document.getElementById('contenedor-analisis').style.display = 'block';
        if (fuente === 'camara') await encenderCamara();
        else {
            video.src = URL.createObjectURL(document.getElementById('fileInput').files[0]);
            video.onloadeddata = () => { 
                canvas.width = video.videoWidth; canvas.height = video.videoHeight;
                video.play(); requestAnimationFrame(loopPreview); 
            };
        }
    }

    async function encenderCamara() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: currentFacingMode, width: 1280, height: 720 } });
            video.srcObject = stream;
            video.onloadeddata = () => { 
                canvas.width = video.videoWidth; canvas.height = video.videoHeight;
                video.play(); requestAnimationFrame(loopPreview); 
            };
        } catch (e) { alert("Error: " + e.message); }
    }

    function loopPreview() { if (!iaActiva) { ctx.drawImage(video, 0, 0, canvas.width, canvas.height); requestAnimationFrame(loopPreview); } }

    async function activarIA() {
        pose = new Pose({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}` });
        pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });
        pose.onResults(onResults);
        
        iaActiva = true;
        startTimeCalib = Date.now();
        calibrado = false;
        
        // ACTIVAR ANIMACIÓN DE ESCÁNER
        scanner.style.display = "block";
        scanner.style.animation = "scannerMove 2.5s infinite linear";
        
        loopIA();
    }

    async function loopIA() { if (iaActiva && !video.paused) { await pose.send({ image: video }); requestAnimationFrame(loopIA); } }

    function getSmoothAngle(key, val) {
        if (!angleHistory[key]) angleHistory[key] = [];
        angleHistory[key].push(val);
        if (angleHistory[key].length > SMOOTH_FACTOR) angleHistory[key].shift();
        return angleHistory[key].reduce((a, b) => a + b) / angleHistory[key].length;
    }

    function iniciarGrabacionConDelay() {
        if (!calibrado || analizandoRiesgo) {
            if (analizandoRiesgo) detenerAuditoria();
            return;
        }
        let cuenta = 3;
        displayContador.style.display = 'block';
        displayContador.innerText = cuenta;
        const timer = setInterval(() => {
            cuenta--;
            displayContador.innerText = cuenta;
            if (cuenta <= 0) {
                clearInterval(timer);
                displayContador.style.display = 'none';
                empezarAuditoriaReal();
            }
        }, 1000);
    }

    function empezarAuditoriaReal() {
        analizandoRiesgo = true;
        document.getElementById('recordBtn').classList.add('rec-active');
        txtStatus.innerText = "REC: AUDITANDO";
        recordedChunks = [];
        mediaRecorder = new MediaRecorder(canvas.captureStream(30), { mimeType: 'video/webm' });
        mediaRecorder.ondataavailable = (e) => recordedChunks.push(e.data);
        mediaRecorder.onstop = () => {
            const blob = new Blob(recordedChunks, { type: 'video/webm' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
            a.download = `LYA_AUDIT_${Date.now()}.webm`; a.click();
        };
        mediaRecorder.start();
    }

    function detenerAuditoria() {
        analizandoRiesgo = false;
        document.getElementById('recordBtn').classList.remove('rec-active');
        txtStatus.innerText = "AUDITORÍA LISTA";
        if (mediaRecorder) mediaRecorder.stop();
    }

    function onResults(res) {
        if (!res.poseLandmarks) return;
        ctx.save();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (currentFacingMode === "user") { ctx.translate(canvas.width, 0); ctx.scale(-1, 1); }
        ctx.drawImage(res.image, 0, 0, canvas.width, canvas.height);

        const lm = res.poseLandmarks;
        const w = canvas.width, h = canvas.height;
        const pt = (i) => ({ x: lm[i].x * w, y: lm[i].y * h, z: lm[i].z, v: lm[i].visibility });

        const p = {
            cab: pt(0),
            cue: { x: (lm[11].x + lm[12].x)/2 * w, y: (lm[11].y + lm[12].y)/2 * h, v: 1 },
            tor: { x: (lm[11].x + lm[12].x)/2 * w, y: (lm[11].y + lm[12].y)/2 * h + 40, v: 1 },
            abd: { x: (lm[23].x + lm[24].x)/2 * w, y: (lm[23].y + lm[24].y)/2 * h - 30, v: 1 },
            esp: { x: (lm[23].x + lm[24].x)/2 * w, y: (lm[23].y + lm[24].y)/2 * h, v: 1 },
            h_d: pt(12), c_d: pt(14), m_d: pt(16), mano_d: pt(20),
            h_i: pt(11), c_i: pt(13), m_i: pt(15), mano_i: pt(19),
            p_d: pt(24), r_d: pt(26), p_i: pt(23), r_i: pt(25)
        };

        const angles = {
            cue: getSmoothAngle('cue', calcAng3D(p.cab, p.cue, p.tor)),
            abd: getSmoothAngle('abd', calcAng3D(p.tor, p.abd, p.esp)),
            h_d: getSmoothAngle('h_d', calcAng3D({x:p.h_d.x, y:p.h_d.y+100, z:p.h_d.z}, p.h_d, p.c_d)),
            h_i: getSmoothAngle('h_i', calcAng3D({x:p.h_i.x, y:p.h_i.y+100, z:p.h_i.z}, p.h_i, p.c_i)),
            c_d: getSmoothAngle('c_d', calcAng3D(p.h_d, p.c_d, p.m_d)),
            c_i: getSmoothAngle('c_i', calcAng3D(p.h_i, p.c_i, p.m_i)),
            m_d: getSmoothAngle('m_d', calcAng3D(p.c_d, p.m_d, p.mano_d, true)),
            m_i: getSmoothAngle('m_i', calcAng3D(p.c_i, p.m_i, p.mano_i, true))
        };

        if (!calibrado) {
            const trans = Date.now() - startTimeCalib;
            if (trans > 5000) {
                for (let k in angles) baseAngles[k] = angles[k];
                calibrado = true;
                scanner.style.display = "none"; // QUITAR ESCÁNER AL TERMINAR
                txtStatus.innerText = "CALIBRACIÓN COMPLETA";
                document.getElementById('recordBtn').style.opacity = "1";
            } else { txtStatus.innerText = "ESCANEO BIOMÉTRICO... " + Math.ceil((5000 - trans) / 1000); }
        }

        const drawSeg = (p1, p2, angKey, groupKey) => {
            if (p1.v < 0.7 || p2.v < 0.7) return;
            ctx.beginPath();
            ctx.lineWidth = 12;
            ctx.lineCap = "round";
            ctx.moveTo(p1.x, p1.y);
            ctx.lineTo(p2.x, p2.y);

            if (analizandoRiesgo) {
                const diff = Math.abs(angles[angKey] - baseAngles[angKey]);
                const threshold = TH[groupKey];
                if (diff <= 10) ctx.strokeStyle = "#00ff00"; 
                else if (diff > threshold * 2) ctx.strokeStyle = "#ff0000";
                else if (diff > threshold) ctx.strokeStyle = "#ffff00";
                else ctx.strokeStyle = "#00ff00";
            } else { ctx.strokeStyle = calibrado ? "#00ff0077" : "#4b4b4b"; }
            ctx.stroke();
        };

        // Renderizado del esqueleto
        drawSeg(p.cab, p.cue, 'cue', 'cuello');
        drawSeg(p.cue, p.tor, 'cue', 'cuello');
        drawSeg(p.tor, p.abd, 'abd', 'tronco');
        drawSeg(p.abd, p.esp, 'abd', 'tronco');
        drawSeg(p.h_d, p.c_d, 'h_d', 'hombros'); drawSeg(p.c_d, p.m_d, 'c_d', 'codos'); drawSeg(p.m_d, p.mano_d, 'm_d', 'munecas');
        drawSeg(p.h_i, p.c_i, 'h_i', 'hombros'); drawSeg(p.c_i, p.m_i, 'c_i', 'codos'); drawSeg(p.m_i, p.mano_i, 'm_i', 'munecas');
        drawSeg(p.esp, p.p_d, 'abd', 'piernas'); drawSeg(p.p_d, p.r_d, 'abd', 'piernas');
        drawSeg(p.esp, p.p_i, 'abd', 'piernas'); drawSeg(p.p_i, p.r_i, 'abd', 'piernas');

        ctx.restore();
    }

    function calcAng3D(a, b, c, isHand = false) {
        const zF = isHand ? 0.01 : 0.05; 
        const v1 = { x: a.x - b.x, y: a.y - b.y, z: (a.z - b.z) * zF };
        const v2 = { x: c.x - b.x, y: c.y - b.y, z: (c.z - b.z) * zF };
        const dot = v1.x * v2.x + v1.y * v2.y + v1.z * v2.z;
        const m1 = Math.sqrt(v1.x**2 + v1.y**2 + v1.z**2), m2 = Math.sqrt(v2.x**2 + v2.y**2 + v2.z**2);
        return (m1 * m2 === 0) ? 0 : Math.acos(Math.max(-1, Math.min(1, dot / (m1 * m2)))) * (180 / Math.PI);
    }

    async function cambiarCamara() {
        currentFacingMode = (currentFacingMode === "environment") ? "user" : "environment";
        if (video.srcObject) { video.srcObject.getTracks().forEach(t => t.stop()); await encenderCamara(); }
    }
</script>
</body>
</html>
