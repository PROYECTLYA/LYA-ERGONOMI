<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ERGO-SENSING PRO v7 EMPRESA</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>

<style>
body{margin:0;background:#0d1117;color:#fff;font-family:sans-serif}

#menu{
    position:fixed;
    width:100%;height:100vh;
    display:flex;flex-direction:column;
    justify-content:center;align-items:center;
    z-index:10;
}

.btn{
    padding:18px;
    margin:10px;
    width:260px;
    border:none;
    border-radius:12px;
    font-weight:bold;
}

#canvas{width:100vw;height:100vh}
video{display:none}

#status{
    position:absolute;
    top:10px;left:10px;
    background:#000;padding:10px;
}
</style>
</head>

<body>

<!-- MENU -->
<div id="menu">
    <h2 style="color:#00d2d3">ERGO-SENSING PRO</h2>
    <button class="btn" style="background:#27ae60" onclick="start('camara')">🎥 CAMARA</button>
    <button class="btn" style="background:#2980b9" onclick="file.click()">📁 VIDEO</button>
    <input type="file" id="file" hidden accept="video/*" onchange="start('video')">
</div>

<div id="status">LISTO</div>
<video id="video" playsinline muted></video>
<canvas id="canvas"></canvas>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const statusTxt = document.getElementById('status');

let stream = null;
let pose = null;

// =========================
// BUFFER (PYTHON STYLE)
// =========================
const BUFFER_SIZE = 8;
const historial = Array.from({length:33}, ()=>[]);
const ultimosAngulos = {};

const THRESHOLDS = {
    cabeza:{yellow:15, red:25},
    abdomen:{yellow:20, red:40},
    extremities:{yellow:30, red:55},
    default:{yellow:20, red:45}
};

// =========================
// FILTRO
// =========================
function filtrar(i,p){
    const h = historial[i];
    h.push(p);
    if(h.length>BUFFER_SIZE) h.shift();

    let x=0,y=0,z=0;
    h.forEach(e=>{x+=e.x;y+=e.y;z+=e.z});

    return {x:x/h.length,y:y/h.length,z:z/h.length};
}

// =========================
// ANGULO
// =========================
function angulo(a,b,c){
    const v1={x:a.x-b.x,y:a.y-b.y,z:a.z-b.z};
    const v2={x:c.x-b.x,y:c.y-b.y,z:c.z-b.z};

    const dot=v1.x*v2.x+v1.y*v2.y+v1.z*v2.z;
    const m1=Math.hypot(v1.x,v1.y,v1.z);
    const m2=Math.hypot(v2.x,v2.y,v2.z);

    if(m1===0||m2===0) return 0;

    let cos=dot/(m1*m2);
    cos=Math.max(-1,Math.min(1,cos));

    return Math.acos(cos)*180/Math.PI;
}

// =========================
// COLOR (MISMO PYTHON)
// =========================
function color(parte,ang,vis){

    if(vis<0.4){
        ang = ultimosAngulos[parte] || 0;
    }else{
        ultimosAngulos[parte]=ang;
    }

    let conf;

    if(THRESHOLDS[parte]){
        conf=THRESHOLDS[parte];
    }else if(/mano|pie|codo|rodilla/.test(parte)){
        conf=THRESHOLDS.extremities;
    }else{
        conf=THRESHOLDS.default;
    }

    if(ang>conf.red) return "red";
    if(ang>conf.yellow) return "yellow";
    return "lime";
}

// =========================
// START (FIX PRINCIPAL)
// =========================
async function start(tipo){

    document.getElementById('menu').style.display="none";

    pose = new Pose({
        locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}`
    });

    pose.setOptions({
        modelComplexity:2,
        smoothLandmarks:true,
        minDetectionConfidence:0.5,
        minTrackingConfidence:0.6
    });

    pose.onResults(render);

    if(tipo==="camara"){
        stream = await navigator.mediaDevices.getUserMedia({video:true});
        video.srcObject = stream;
    }else{
        video.src = URL.createObjectURL(file.files[0]);
    }

    video.play();
    requestAnimationFrame(loop);
}

// =========================
// RENDER
// =========================
function render(res){

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    ctx.drawImage(res.image,0,0,canvas.width,canvas.height);

    if(!res.poseLandmarks) return;

    const lm = res.poseLandmarks;
    const p = {};

    for(let i=0;i<33;i++){
        p[i]=filtrar(i,lm[i]);
    }

    const pt=i=>({x:p[i].x*canvas.width,y:p[i].y*canvas.height});
    const v=i=>lm[i].visibility;

    const h_med = {
        x:(p[11].x+p[12].x)/2,
        y:(p[11].y+p[12].y)/2,
        z:(p[11].z+p[12].z)/2
    };

    const c_med = {
        x:(p[23].x+p[24].x)/2,
        y:(p[23].y+p[24].y)/2,
        z:(p[23].z+p[24].z)/2
    };

    const angCabeza = angulo(p[0],h_med,c_med);
    const angTronco = angulo(h_med,c_med,{x:c_med.x,y:c_med.y+0.5,z:c_med.z});

    function draw(a,b,tipo,angVal,vis){
        ctx.beginPath();
        ctx.moveTo(a.x,a.y);
        ctx.lineTo(b.x,b.y);
        ctx.strokeStyle=color(tipo,angVal,vis);
        ctx.lineWidth=6;
        ctx.stroke();
    }

    draw(pt(0),{x:h_med.x*canvas.width,y:h_med.y*canvas.height},"cabeza",angCabeza,v(0));
    draw({x:h_med.x*canvas.width,y:h_med.y*canvas.height},{x:c_med.x*canvas.width,y:c_med.y*canvas.height},"abdomen",angTronco,1);

    statusTxt.innerText="ACTIVO";
}

// =========================
// LOOP
// =========================
async function loop(){
    if(!video.paused){
        await pose.send({image:video});
    }
    requestAnimationFrame(loop);
}
</script>

</body>
</html>
