<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LYA-ERGO v23.0 | MOTOR DINÁMICO CORREGIDO</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0d1117; color: white; margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #menu-inicial { display: flex; width: 100%; height: 100vh; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle, #161b22 0%, #0d1117 100%); position: fixed; z-index: 5000; }
        .logo-text { color: #00ff00; font-weight: 800; letter-spacing: 3px; margin-bottom: 0; }
        #pantalla-evaluacion { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(13, 17, 23, 0.95); z-index: 7000; flex-direction: column; align-items: center; justify-content: center; }
        .scanner-line { width: 80%; height: 3px; background: #00ff00; position: absolute; box-shadow: 0 0 20px #00ff00; animation: scan 2s infinite ease-in-out; }
        @keyframes scan { 0%, 100% { top: 30%; opacity: 0; } 50% { top: 70%; opacity: 1; } }
        #contenedor-analisis { display: none; width: 100vw; height: 100vh; position: relative; background: #000; }
        canvas { width: 100%; height: 100%; object-fit: contain; }
        video { display: none; }
        .status-badge { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.8); padding: 12px 20px; border-radius: 8px; border-left: 4px solid #00ff00; font-size: 10px; z-index: 3000; font-weight: bold; }
        .barra-controles { position: absolute; bottom: 35px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; z-index: 4000; width: 95%; justify-content: center; }
        .btn-circular { width: 68px; height: 68px; border-radius: 50%; border: none; font-size: 9px; font-weight: 900; color: white; display: flex; align-items: center; justify-content: center; flex-direction: column; transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .btn-eval { background: #00ff00; color: #000; width: auto; padding: 0 30px; border-radius: 35px; font-weight: bold; }
        .rec-active { background: #fff !important; color: #f00 !important; animation: pulse-red 1.5s infinite; }
    </style>
</head>
<body>

<div id="pantalla-evaluacion">
    <div class="scanner-line"></div>
    <h2 id="eval-status-text" style="color:#00ff00; letter-spacing: 4px;">ANCLANDO POSTURA</h2>
    <p style="color: #8b949e;" id="eval-subtext">Calculando offset de reposo...</p>
</div>

<div id="menu-inicial">
    <h1 class="logo-text">LYA-ERGO</h1>
    <p class="sub-text">Cervecería del Trópico | v23.0</p>
    <button style="background:#2980b9; color:white; width:85%; max-width:320px; padding:18px; margin:10px; border-radius:12px; font-weight:bold; border:none;" onclick="document.getElementById('fileInput').click()">📁 SUBIR EVIDENCIA</button>
    <input type="file" id="fileInput" hidden accept="video/*" onchange="prepararSistema()">
</div>

<div id="contenedor-analisis">
    <div class="status-badge" id="txt-status">SISTEMA CALIBRADO</div>
    <canvas id="output_canvas"></canvas>
    <video id="input_video" playsinline muted></video>
    <div class="barra-controles" id="controles-dinamicos"></div>
</div>

<script>
    const video = document.getElementById('input_video');
    const canvas = document.getElementById('output_canvas');
    const ctx = canvas.getContext('2d');
    const pantallaEval = document.getElementById('pantalla-evaluacion');
    const controles = document.getElementById('controles-dinamicos');
    const txtStatus = document.getElementById('txt-status');
    
    let pose = null, iaActiva = false;
    let smoothBuffer = {};
    const BUF_SIZE = 8;

    // UMBRALES CORREGIDOS: Menos sensibles para evitar rojos en reposo
    const TH = { 
        cuello: 25, 
        tronco: 15, // Medido entre segmentos, no contra la vertical pura
        extremidades: 140 // Para codos y rodillas (180 es recto)
    };

    async function prepararSistema() {
        document.getElementById('menu-inicial').style.display = 'none';
        document.getElementById('contenedor-analisis').style.display = 'block';
        
        pose = new Pose({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}` });
        pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.75, minTrackingConfidence: 0.75 });
        pose.onResults(onResults);

        configurarBotonesEvidencia();
        video.src = URL.createObjectURL(document.getElementById('fileInput').files[0]);
        video.onloadedmetadata = () => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            video.currentTime = 0.5; 
            requestAnimationFrame(loopVistaPrevia);
        };
    }

    function configurarBotonesEvidencia() {
        controles.innerHTML = `
            <button class="btn-circular btn-dark" onclick="location.reload()">SALIR</button>
            <button class="btn-circular" style="background:#2ecc71;" onclick="togglePlay()">⏯️</button>
            <button class="btn-circular btn-eval" id="btn-iniciar-eval" onclick="iniciarEvaluacion()">ANALIZAR REPOSO E INICIAR</button>
        `;
    }

    function togglePlay() { video.paused ? video.play() : video.pause(); }

    async function iniciarEvaluacion() {
        pantallaEval.style.display = 'flex';
        iaActiva = true;
        // Llenar buffers con la postura inicial para "anclar" el verde
        for(let i=0; i<15; i++) {
            await pose.send({ image: video });
            await new Promise(r => setTimeout(r, 40));
        }
        pantallaEval.style.display = 'none';
        document.getElementById('btn-iniciar-eval').style.display = 'none';
        video.play();
        requestAnimationFrame(loopProcesamiento);
    }

    function loopProcesamiento() {
        if (iaActiva && video.readyState >= 2) {
            pose.send({ image: video });
        }
        requestAnimationFrame(loopProcesamiento);
    }

    function loopVistaPrevia() {
        if (!iaActiva) {
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            requestAnimationFrame(loopVistaPrevia);
        }
    }

    function getSmoothVal(key, newVal) {
        if (!smoothBuffer[key]) smoothBuffer[key] = [];
        smoothBuffer[key].push(newVal);
        if (smoothBuffer[key].length > BUF_SIZE) smoothBuffer[key].shift();
        return smoothBuffer[key].reduce((a, b) => a + b) / smoothBuffer[key].length;
    }

    // Función matemática para ángulos entre 3 puntos (Codos, Rodillas)
    function calcAngle3P(p1, p2, p3) {
        const v1 = { x: p1.x - p2.x, y: p1.y - p2.y };
        const v2 = { x: p3.x - p2.x, y: p3.y - p2.y };
        const dot = v1.x * v2.x + v1.y * v2.y;
        const m1 = Math.sqrt(v1.x**2 + v1.y**2);
        const m2 = Math.sqrt(v2.x**2 + v2.y**2);
        return Math.acos(Math.max(-1, Math.min(1, dot / (m1 * m2)))) * (180 / Math.PI);
    }

    function onResults(res) {
        if (!res.poseLandmarks) return;
        ctx.save();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(res.image, 0, 0, canvas.width, canvas.height);

        const lm = res.poseLandmarks;
        const w = canvas.width, h = canvas.height;
        const pt = (i) => ({ x: lm[i].x * w, y: lm[i].y * h, v: lm[i].visibility });

        // Estructura de puntos basada en el diagrama
        const P = {
            cab: pt(0), 
            cue: { x: (lm[11].x+lm[12].x)/2*w, y:(lm[11].y+lm[12].y)/2*h },
            h_i: pt(11), h_d: pt(12),
            c_i: pt(13), c_d: pt(14),
            m_i: pt(15), m_d: pt(16),
            p_i: pt(23), p_d: pt(24),
            r_i: pt(25), r_d: pt(26),
            t_i: pt(27), t_d: pt(28)
        };

        // Segmentos del torso dinámicos
        const mid_hip = { x: (P.p_i.x + P.p_d.x)/2, y: (P.p_i.y + P.p_d.y)/2 };
        P.torax = { x: P.cue.x, y: P.cue.y + (mid_hip.y - P.cue.y) * 0.3 };
        P.abdomen = { x: P.cue.x, y: P.cue.y + (mid_hip.y - P.cue.y) * 0.7 };
        P.esp_baja = mid_hip;

        // --- CÁLCULOS SEGMENTADOS ---
        const ang_cuel = getSmoothVal('c', calcAngle3P(P.cab, P.cue, P.torax));
        // El tronco se mide por su desviación de la vertical local
        const ang_tron = getSmoothVal('t', Math.abs(P.torax.x - P.esp_baja.x) / 5); 

        const drawSegment = (p1, p2, ang, type) => {
            if (p1.v < 0.75 || p2.v < 0.75) { ctx.strokeStyle = "#576574"; } // Gris si no es visible
            else {
                if (type === 'torso') {
                    ctx.strokeStyle = ang > TH.tronco ? "#ff3838" : "#32ff7e";
                } else if (type === 'ext') {
                    ctx.strokeStyle = ang < TH.extremidades ? "#ff3838" : "#32ff7e";
                } else {
                    ctx.strokeStyle = ang > TH.cuello ? "#ff3838" : "#32ff7e";
                }
            }
            ctx.lineWidth = 8;
            ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
            ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(p1.x, p1.y, 4, 0, 7); ctx.fill();
        };

        // Dibujo siguiendo el diagrama
        drawSegment(P.cab, P.cue, ang_cuel, 'cuello');
        drawSegment(P.cue, P.torax, ang_tron, 'torso');
        drawSegment(P.torax, P.abdomen, ang_tron, 'torso');
        drawSegment(P.abdomen, P.esp_baja, ang_tron, 'torso');

        // Brazos (Cálculo de ángulo de codo)
        const ang_c_d = getSmoothVal('cd', calcAngle3P(P.h_d, P.c_d, P.m_d));
        const ang_c_i = getSmoothVal('ci', calcAngle3P(P.h_i, P.c_i, P.m_i));
        drawSegment(P.h_d, P.c_d, 180, 'ext'); drawSegment(P.c_d, P.m_d, ang_c_d, 'ext');
        drawSegment(P.h_i, p.c_i, 180, 'ext'); drawSegment(P.c_i, P.m_i, ang_c_i, 'ext');

        // Piernas (Cálculo de ángulo de rodilla)
        const ang_r_d = getSmoothVal('rd', calcAngle3P(P.p_d, P.r_d, P.t_d));
        const ang_r_i = getSmoothVal('ri', calcAngle3P(P.p_i, P.r_i, P.t_i));
        drawSegment(P.p_d, P.r_d, 180, 'ext'); drawSegment(P.r_d, P.t_d, ang_r_d, 'ext');
        drawSegment(P.p_i, P.r_i, 180, 'ext'); drawSegment(P.r_i, P.t_i, ang_r_i, 'ext');

        ctx.restore();
    }
</script>
</body>
</html>
