<script>
/******************************************************************************
 * 🟢 INICIO: CÓDIGO GENERAL (NÚCLEO DEL SISTEMA LYA-ERGO IA)
 * Contiene configuraciones, motores de cálculo, IA y validaciones normativas.
 ******************************************************************************/

/**
 * 🏷️ BLOQUE 1: CONFIGURACIÓN Y UMBRALES NOM-036
 */
const video = document.getElementById('input_video');
const canvas = document.getElementById('output_canvas');
const ctx = canvas.getContext('2d');
const txtStatus = document.getElementById('txt-status');

// Umbrales de desviación (Grados) basados en NOM-036-1-STPS-2018
const TH = { tronco: 18, cuello: 12, hombros: 15, codos: 25, munecas: 20, piernas: 25 };

/**
 * 🏷️ BLOQUE 2: VARIABLES DE ESTADO Y ESTADÍSTICAS
 */
let wbaStats = { 
    riesgoAltoTotal: 0, 
    framesAnalizados: 0, 
    zonasAfectadas: new Set(), 
    inicioAuditoria: null, 
    ciclos: 0 
};

let baseAngles = {};        // Ángulos capturados en la calibración (postura neutra)
let angleBuffer = {};       // Búfer para media móvil de ángulos
let posBuffer = {};         // Búfer para suavizar el jitter de los puntos
const HISTORIAL_MAX = 15;   // Cuadros para suavizar ángulos
const SUAVIZADO_POS = 5;    // Cuadros para suavizar coordenadas

let iaActiva = false;
let calibrado = false;
let analizandoRiesgo = false;
let currentFacingMode = "environment";
let pose;
let mediaRecorder;
let recordedChunks = [];
let hallazgosNormativos = [];

/**
 * LÓGICA DE VALIDACIÓN NORMATIVA (NOM-036 & LFT)
 */
function validarNormativa() {
    hallazgosNormativos = []; 
    const edad = parseInt(document.getElementById('edadTrabajador').value);
    const genero = document.getElementById('generoTrabajador').value; 
    const peso = parseFloat(document.getElementById('pesoCarga').value);

    // --- Validación LFT (Edad) ---
    if (edad < 15) {
        hallazgosNormativos.push("INCUMPLIMIENTO CRÍTICO LFT: Trabajador menor de edad legal (menor a 15 años).");
    } else if (edad < 18) {
        hallazgosNormativos.push("OBSERVACIÓN LFT: Menor en edad de aprendizaje (15-17 años). Carga restringida.");
    }

    // --- Validación NOM-036 (Peso vs Género/Edad) ---
    let limiteMax = 0;
    if (genero === "M") { 
        if (edad < 18) limiteMax = 7;
        else if (edad <= 45) limiteMax = 15;
        else limiteMax = 10;
    } else { 
        if (edad < 18) limiteMax = 7;
        else if (edad <= 45) limiteMax = 25;
        else limiteMax = 20;
    }

    if (peso > limiteMax) {
        hallazgosNormativos.push(`INCUMPLIMIENTO NOM-036: Peso de ${peso}kg excede el límite de ${limiteMax}kg para este perfil.`);
    }
    
    return { hallazgos: hallazgosNormativos, limite: limiteMax };
}

/**
 * 🏷️ BLOQUE 3: MATEMÁTICAS DINÁMICAS (CÁLCULOS 3D)
 */
function calcAng3D(a, b, c) {
    if(!a || !b || !c) return 0;
    const v1 = { x: a.x - b.x, y: a.y - b.y, z: a.z - b.z };
    const v2 = { x: c.x - b.x, y: c.y - b.y, z: c.z - b.z };
    const dot = v1.x * v2.x + v1.y * v2.y + v1.z * v2.z;
    const m1 = Math.sqrt(v1.x**2 + v1.y**2 + v1.z**2);
    const m2 = Math.sqrt(v2.x**2 + v2.y**2 + v2.z**2);
    const angle = Math.acos(Math.max(-1, Math.min(1, dot / (m1 * m2)))) * (180 / Math.PI);
    return isNaN(angle) ? 0 : angle;
}

const drawV = (p1, p2, angKey, groupKey, vis1, vis2) => {
    if (vis1 < 0.5 || vis2 < 0.5) return;

    const buffer = angleBuffer[angKey] || [];
    if (buffer.length === 0) return;
    const avgAngle = buffer.reduce((a, b) => a + b, 0) / buffer.length;

    let color = "#00ff00", thickness = 4, status = "SEGURO";

    if (analizandoRiesgo && calibrado) {
        const diff = Math.abs(avgAngle - (baseAngles[angKey] || avgAngle));
        const limit = TH[groupKey];
        wbaStats.framesAnalizados++;

        if (diff > (limit * 2)) {
            color = "#ff3838"; thickness = 10; status = "CRÍTICO";
            wbaStats.riesgoAltoTotal++;
            wbaStats.zonasAfectadas.add(groupKey);
        } else if (diff > limit) {
            color = "#f1c40f"; thickness = 6; status = "RIESGO";
        }
    }

    ctx.beginPath();
    ctx.strokeStyle = color; ctx.lineWidth = thickness; ctx.lineCap = "round";
    ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();

    if (calibrado) {
        const mx = (p1.x + p2.x) / 2, my = (p1.y + p2.y) / 2;
        ctx.fillStyle = "rgba(0,0,0,0.7)";
        ctx.fillRect(mx + 10, my - 20, 70, 30);
        ctx.fillStyle = color; ctx.font = "bold 10px Arial";
        ctx.fillText(`${avgAngle.toFixed(0)}°`, mx + 15, my - 8);
        ctx.fillText(status, mx + 15, my + 5);
    }
};

/**
 * 🏷️ BLOQUE 4: PROCESAMIENTO DE IA (REDISEÑO JERÁRQUICO "T")
 */
function onResults(res) {
    const w = canvas.width, h = canvas.height;
    ctx.save();
    ctx.clearRect(0, 0, w, h);
    if (currentFacingMode === "user") { ctx.translate(w, 0); ctx.scale(-1, 1); }
    if (res.image) ctx.drawImage(res.image, 0, 0, w, h);

    if (!res.poseLandmarks) { 
        txtStatus.innerText = "BUSCANDO TRABAJADOR..."; 
        ctx.restore(); return; 
    }

    const loader = document.getElementById('loader-ia');
    if (loader && loader.style.display !== 'none') loader.style.display = 'none';

    const lm = res.poseLandmarks;
    const pt = (i) => {
        if (!lm[i]) return { x: 0, y: 0, z: 0, v: 0 };
        if (!posBuffer[i]) posBuffer[i] = { h: [] };
        posBuffer[i].h.push({ x: lm[i].x * w, y: lm[i].y * h, z: lm[i].z });
        if (posBuffer[i].h.length > SUAVIZADO_POS) posBuffer[i].h.shift();
        const len = posBuffer[i].h.length;
        const avg = posBuffer[i].h.reduce((a, b) => ({ x: a.x + b.x, y: a.y + b.y, z: a.z + b.z }), { x: 0, y: 0, z: 0 });
        return { x: avg.x / len, y: avg.y / len, z: avg.z / len, v: lm[i].visibility };
    };

    const p = {
        ore_d: pt(8), ore_i: pt(7), h_d: pt(12), h_i: pt(11), 
        c_d: pt(14), c_i: pt(13), m_d: pt(16), m_i: pt(15), 
        dedo_d: pt(20), dedo_i: pt(19), p_d: pt(24), p_i: pt(23),
        r_d: pt(26), r_i: pt(25), t_d: pt(28), t_i: pt(27)
    };

    p.centro_orejas = { x: (p.ore_d.x + p.ore_i.x) / 2, y: (p.ore_d.y + p.ore_i.y) / 2, z: (p.ore_d.z + p.ore_i.z) / 2 };
    p.cue = { x: (p.h_d.x + p.h_i.x) / 2, y: (p.h_d.y + p.h_i.y) / 2, z: (p.h_d.z + p.h_i.z) / 2 };
    p.esp_baja = { x: (p.p_d.x + p.p_i.x) / 2, y: (p.p_d.y + p.p_i.y) / 2, z: (p.p_d.z + p.p_i.z) / 2 };
    p.torax = { x: p.cue.x + (p.esp_baja.x - p.cue.x) * 0.3, y: p.cue.y + (p.esp_baja.y - p.cue.y) * 0.3, z: p.cue.z };
    p.abdomen = { x: p.cue.x + (p.esp_baja.x - p.cue.x) * 0.6, y: p.cue.y + (p.esp_baja.y - p.cue.y) * 0.6, z: p.cue.z };

    const verticalRef = { x: p.cue.x, y: p.cue.y + 100, z: p.cue.z };

    const currentAngles = {
        cuello: calcAng3D(p.centro_orejas, p.cue, verticalRef),
        tronco: calcAng3D(p.cue, p.esp_baja, verticalRef),
        h_d: calcAng3D(p.cue, p.h_d, p.c_d), hombros: calcAng3D(p.cue, p.h_d, p.c_d),
        h_i: calcAng3D(p.cue, p.h_i, p.c_i), c_d: calcAng3D(p.h_d, p.c_d, p.m_d),
        c_i: calcAng3D(p.h_i, p.c_i, p.m_i), r_d: calcAng3D(p.p_d, p.r_d, p.t_d),
        r_i: calcAng3D(p.p_i, p.r_i, p.t_i)
    };

    Object.keys(currentAngles).forEach(k => {
        if (!angleBuffer[k]) angleBuffer[k] = [];
        angleBuffer[k].push(currentAngles[k]);
        if (angleBuffer[k].length > HISTORIAL_MAX) angleBuffer[k].shift();
    });

    drawV(p.ore_d, p.ore_i, 'cuello', 'cuello', p.ore_d.v, p.ore_i.v); 
    drawV(p.centro_orejas, p.cue, 'cuello', 'cuello', 1, 1);
    drawV(p.cue, p.torax, 'tronco', 'tronco', 1, 1);
    drawV(p.torax, p.abdomen, 'tronco', 'tronco', 1, 1);
    drawV(p.abdomen, p.esp_baja, 'tronco', 'tronco', 1, 1);
    drawV(p.h_d, p.h_i, 'tronco', 'hombros', p.h_d.v, p.h_i.v);
    drawV(p.h_d, p.c_d, 'h_d', 'hombros', p.h_d.v, p.c_d.v);
    drawV(p.h_i, p.c_i, 'h_i', 'hombros', p.h_i.v, p.c_i.v);
    drawV(p.c_d, p.m_d, 'c_d', 'codos', p.c_d.v, p.m_d.v);
    drawV(p.c_i, p.m_i, 'c_i', 'codos', p.c_i.v, p.m_i.v);
    drawV(p.p_d, p.r_d, 'r_d', 'piernas', p.p_d.v, p.r_d.v);
    drawV(p.p_i, p.r_i, 'r_i', 'piernas', p.p_i.v, p.r_i.v);
    drawV(p.r_d, p.t_d, 'r_d', 'piernas', p.r_d.v, p.t_d.v);
    drawV(p.r_i, p.t_i, 'r_i', 'piernas', p.r_i.v, p.t_i.v);

    ctx.restore();
}

/**
 * MOTOR DE ARRANQUE IA (Mediapipe)
 */
async function activarIA() {
    const loader = document.getElementById('loader-ia');
    loader.style.display = 'flex';
    if (pose) { try { await pose.close(); } catch(e) {} }

    pose = new Pose({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}` });
    pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
    pose.onResults((res) => {
        if (loader.style.display !== 'none') loader.style.display = 'none';
        iaActiva = true; onResults(res);
    });

    async function frameLoop() {
        if (video.paused || video.ended) return;
        try { await pose.send({ image: video }); } catch (e) {}
        if (iaActiva) requestAnimationFrame(frameLoop);
        else setTimeout(frameLoop, 500);
    }
    frameLoop();
}

/******************************************************************************
 * 🔴 TERMINA: CÓDIGO GENERAL (NÚCLEO)
 ******************************************************************************/
/******************************************************************************
 * 🔵 FUNCIONALIDAD: BOTÓN "INICIAR EN VIVO"
 * Gestiona cámara, grabación, interfaz y arranque del motor de IA.
 ******************************************************************************/

async function iniciarEnVivo() {
    // 1. Validación de Formulario (Requisito de acceso)
    const formValido = document.getElementById('nombreTrabajador').value.trim() !== "" &&
                       document.getElementById('edadTrabajador').value !== "" &&
                       document.getElementById('pesoCarga').value !== "";

    if (!formValido) {
        alert("⚠️ Por favor, completa todos los campos del formulario antes de iniciar.");
        return;
    }

    // 2. Ejecutar validación normativa antes de iniciar
    const diagnostico = validarNormativa();
    console.log("Diagnóstico inicial LFT/NOM-036:", diagnostico);

    // 3. Configuración de Interfaz
    document.getElementById('menu-principal').style.display = 'none';
    document.getElementById('container-ia').style.display = 'block';
    document.getElementById('btn-detener').style.display = 'inline-block';
    document.getElementById('btn-capturar-base').style.display = 'inline-block';
    
    txtStatus.innerText = "INICIALIZANDO CÁMARA...";

    // 4. Acceso a la Cámara
    try {
        const stream = await navigator.mediaDevices.getUserMedia({
            video: {
                facingMode: currentFacingMode,
                width: { ideal: 1280 },
                height: { ideal: 720 }
            },
            audio: false
        });

        video.srcObject = stream;
        
        // 5. Configuración de Grabación (MediaRecorder)
        recordedChunks = [];
        mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp8' });
        
        mediaRecorder.ondataavailable = (event) => {
            if (event.data.size > 0) recordedChunks.push(event.data);
        };

        mediaRecorder.onstop = () => {
            const blob = new Blob(recordedChunks, { type: 'video/webm' });
            console.log("Grabación finalizada. Tamaño:", blob.size);
        };

        mediaRecorder.start();

        // 6. Encendido del Motor de IA
        video.onloadedmetadata = () => {
            video.play();
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            activarIA(); // Llama al núcleo del sistema
        };

    } catch (err) {
        console.error("Error al acceder a la cámara:", err);
        alert("No se pudo acceder a la cámara. Por favor, verifica los permisos.");
        regresarAlMenu();
    }
}

/**
 * Función auxiliar para cambiar entre cámara frontal y trasera
 */
async function alternarCamara() {
    currentFacingMode = (currentFacingMode === "environment") ? "user" : "environment";
    if (iaActiva) {
        // Reiniciar stream con la nueva cámara
        const stream = video.srcObject;
        if (stream) stream.getTracks().forEach(track => track.stop());
        iniciarEnVivo();
    }
}

/******************************************************************************
 * 📁 FUNCIONALIDAD: BOTÓN "SUBIR VIDEO" (ARCHIVO)
 * Gestiona la carga de archivos locales, validación y enlace con el motor de IA.
 ******************************************************************************/

async function iniciarDesdeArchivo() {
    // 1. Validación de Formulario (Requisito de acceso)
    const formValido = document.getElementById('nombreTrabajador').value.trim() !== "" &&
                       document.getElementById('edadTrabajador').value !== "" &&
                       document.getElementById('pesoCarga').value !== "";

    if (!formValido) {
        alert("⚠️ Por favor, completa todos los campos del formulario antes de subir el archivo.");
        return;
    }

    // 2. Crear input de archivo dinámicamente
    const fileInput = document.createElement('input');
    fileInput.type = 'file';
    fileInput.accept = 'video/*'; // Restricción para aceptar solo archivos de video

    fileInput.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        // 3. Preparación de Interfaz para modo Archivo
        document.getElementById('menu-principal').style.display = 'none';
        document.getElementById('container-ia').style.display = 'block';
        document.getElementById('btn-detener').style.display = 'inline-block';
        document.getElementById('btn-capturar-base').style.display = 'inline-block';
        
        txtStatus.innerText = "CARGANDO ARCHIVO DE VIDEO...";

        // 4. Carga del Video en el elemento fuente
        const url = URL.createObjectURL(file);
        video.srcObject = null; // Limpiar stream de cámara si existía
        video.src = url;
        video.muted = true; // Asegurar reproducción fluida
        video.loop = false;

        // 5. Ejecutar validación normativa inicial
        const diagnostico = validarNormativa();
        console.log("Diagnóstico preventivo para archivo:", diagnostico);

        // 6. Sincronización con el Motor de IA
        video.onloadedmetadata = () => {
            video.play();
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            // Iniciar procesamiento de vectores sobre el archivo cargado
            activarIA(); 
            console.log(`Procesando archivo: ${file.name} (${video.videoWidth}x${video.videoHeight})`);
        };

        // Manejo de finalización del video
        video.onended = () => {
            txtStatus.innerText = "ANÁLISIS DE ARCHIVO FINALIZADO";
            console.log("El video ha terminado de procesarse.");
        };
    };

    // Lanzar el selector de archivos
    fileInput.click();
}

/**
 * Función auxiliar para limpiar recursos al cerrar el video
 */
function liberarRecursosVideo() {
    if (video.src) {
        URL.revokeObjectURL(video.src);
        video.src = "";
    }
}
    /******************************************************************************
 * 📁 TERMINA BOTÓN "SUBIR VIDEO" (ARCHIVO)
 * Gestiona la carga de archivos locales, validación y enlace con el motor de IA.
 ******************************************************************************/

</script>
