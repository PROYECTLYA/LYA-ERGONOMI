    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

   <style>
    body { background-color: #0d1117; color: white; margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; height: 100vh; height: 100svh; }
    #menu-inicial { display: flex; width: 100%; height: 100svh; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle, #161b22 0%, #0d1117 100%); position: fixed; z-index: 5000; padding: 20px; box-sizing: border-box; overflow-y: auto; }
    .logo-text { color: #00ff00; font-weight: 800; letter-spacing: 3px; margin-bottom: 5px; font-size: clamp(2rem, 8vw, 3.5rem); text-align: center; }
    .sub-text { color: #8b949e; font-size: clamp(0.7rem, 2vw, 0.9rem); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 30px; text-align: center; }
    .btn-inicio { flex: 1; padding: 20px !important; border-radius: 15px; font-weight: 900; font-size: 1.1rem; border: none; transition: transform 0.2s, box-shadow 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
    .btn-inicio:active { transform: scale(0.95); }
    #loader-ia { display: none; position: fixed; top:0; left:0; width:100%; height:100svh; background: rgba(13, 17, 23, 0.98); z-index: 6000; flex-direction: column; align-items: center; justify-content: center; }
    .progress-bar { width: 0%; height: 6px; background: #00ff00; transition: 0.4s; box-shadow: 0 0 20px #00ff00; margin-top: 25px; border-radius: 10px; }
    #contenedor-analisis { display: none; width: 100vw; height: 100svh; position: relative; background: #000; }
    canvas { width: 100%; height: 100%; object-fit: contain; }
    video { display: none; }
    .status-badge { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(0, 255, 0, 0.2); color: #00ff00; padding: 5px 15px; border-radius: 20px; font-weight: bold; border: 1px solid #00ff00; z-index: 7000; }
    .barra-controles { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; z-index: 7000; background: rgba(0, 0, 0, 0.6); padding: 15px 25px; border-radius: 50px; backdrop-filter: blur(8px); border: 1px solid rgba(255, 255, 255, 0.1); }
    .btn-circular { width: 65px; height: 65px; border-radius: 50%; border: none; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.6rem; font-weight: 800; cursor: pointer; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
    .btn-circular span { font-size: 1.4rem; margin-bottom: 2px; }
    .rec-active { background: #ff4d4d !important; color: white !important; animation: pulse-red 1.5s infinite; }
    input[type="text"], input[type="number"], select { background: #161b22 !important; border: 1px solid #30363d !important; color: #e6edf3 !important; }
    input:focus { border-color: #00ff00 !important; outline: none; }
</style> 
</head>
<body>

<div id="loader-ia">
    <h3 style="color:#00ff00; letter-spacing: 4px; font-weight: 900;">LYA-AUDITOR ENGINE</h3>
    <div style="width: 75%; height: 6px; background: #21262d; border-radius: 10px; margin-top: 25px; overflow: hidden;">
        <div id="bar-id" class="progress-bar"></div>
    </div>
</div>

<div id="menu-inicial">
    <h1 class="logo-text">LYA-ERGO</h1>
    <p class="sub-text">Auditoría de Procesos NOM-036-STPS</p>
    <div style="width: 90%; max-width: 450px; background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1);">
        <div class="row">
            <div class="col-12 mb-3">
                <label style="color: #8b949e; font-size: 0.7rem;">EMPRESA / PLANTA:</label>
                <input type="text" id="nombreEmpresa" placeholder="Ej: Cervecería Modelo">
            </div>
            <div class="col-md-6 mb-3">
                <label style="color: #8b949e; font-size: 0.7rem;">PUESTO DE TRABAJO:</label>
                <input type="text" id="puestoTrabajo" placeholder="Ej: Estibador">
            </div>
            <div class="col-md-6 mb-3">
                <label style="color: #8b949e; font-size: 0.7rem;">ID / NOMBRE TRABAJADOR:</label>
                <input type="text" id="nombreTrabajador" placeholder="Ej: Juan Pérez">
            </div>
            <div class="col-md-6 mb-3">
                <label style="color: #8b949e; font-size: 0.7rem;">GÉNERO:</label>
                <select id="generoTrabajador">
                    <option value="H">Hombre</option>
                    <option value="M">Mujer</option>
                </select>
            </div>
            <div class="col-md-6 mb-3">
                <label style="color: #8b949e; font-size: 0.7rem;">EDAD:</label>
                <input type="number" id="edadTrabajador" min="15" max="80" placeholder="Años">
            </div>
            <div class="col-12">
                <label style="color: #27ae60; font-size: 0.7rem; font-weight: bold;">PESO DE LA CARGA (KG):</label>
                <input type="number" id="pesoCarga" min="1" max="50" placeholder="Ej: 10">
            </div>
        </div>
    </div>
    <div class="d-flex gap-2">
        <button class="btn-inicio" style="background:#27ae60; color:white;" onclick="prepararSistema('camara')">🎥 VIVO</button>
        <button class="btn-inicio" style="background:#2980b9; color:white;" onclick="validarYAbrirArchivo()">📁 ARCHIVO</button>
    </div>
    <input type="file" id="fileInput" hidden accept="video/*" onchange="prepararSistema('archivo')">
</div>

<div id="contenedor-analisis">
    <div class="status-badge" id="txt-status">SISTEMA READY</div>
    <div id="lya-main-wrapper" style="position: relative; width: 100%; height: 100vh; background: #000; overflow: hidden;">
        <canvas id="output_canvas"></canvas>
        <canvas id="vector_plane" width="250" height="180" style="position: absolute; top: 20px; right: 20px; background: rgba(0, 0, 0, 0.9); border: 2px solid #00FF00; border-radius: 12px; z-index: 10000; pointer-events: none;"></canvas>
    </div>
    <video id="input_video" playsinline muted style="display:none;"></video>
    <div class="barra-controles">
        <button class="btn-circular btn-dark" onclick="location.reload()"><span>✖</span><br>SALIR</button>
        <button class="btn-circular" style="background:#00d2d3; color:#000;" onclick="cambiarCamara()"><span>🔄</span><br>GIRAR</button>
        <button id="btn-calib" class="btn-circular" style="background:#f1c40f; color:#000;" onclick="activarIA()"><span>⚖️</span><br>CALIBRAR</button>
        <button id="recordBtn" class="btn-circular" style="background:#ff4d4d; opacity: 0.3;" onclick="toggleGrabacion()" disabled><span>🔴</span><br>AUDITAR</button>
    </div>
</div>

<script>
    const video = document.getElementById('input_video');
    const canvas = document.getElementById('output_canvas');
    const ctx = canvas.getContext('2d');
    const txtStatus = document.getElementById('txt-status');
    const TH = { tronco: 18, cuello: 12, hombros: 15, codos: 25, munecas: 20, piernas: 25, pies: 18 };

    let wbaStats = { riesgoAltoTotal: 0, framesAnalizados: 0, zonasAfectadas: new Set(), inicioAuditoria: null, ciclos: 0, lastHandY: null, subiendo: false, agarreSobreHombros: false };
    let baseAngles = {}, angleBuffer = {}, posBuffer = {};
    const HISTORIAL_MAX = 20, SUAVIZADO_POS = 5;
    let estadoActual = "PASIVO", iaActiva = false, calibrado = false, analizandoRiesgo = false;
    let currentFacingMode = "environment", startTimeCalib = 0;
    let pose, mediaRecorder, recordedChunks = [];

    async function prepararSistema(fuente) {
        const campos = [
            { id: 'nombreEmpresa', label: 'EMPRESA' },
            { id: 'puestoTrabajo', label: 'PUESTO' },
            { id: 'nombreTrabajador', label: 'NOMBRE TRABAJADOR' },
            { id: 'edadTrabajador', label: 'EDAD' },
            { id: 'pesoCarga', label: 'PESO DE CARGA' }
        ];
        let faltantes = [];
        campos.forEach(campo => {
            const val = document.getElementById(campo.id).value.trim();
            if (!val) { faltantes.push(campo.label); document.getElementById(campo.id).style.border = "2px solid #ff4d4d"; }
            else { document.getElementById(campo.id).style.border = "1px solid #30363d"; }
        });
        if (faltantes.length > 0) { alert("⛔ Debe completar todos los campos."); return; }

        document.getElementById('menu-inicial').style.display = 'none';
        document.getElementById('contenedor-analisis').style.display = 'block';
        
        if (fuente === 'camara') {
            await encenderCamara();
        } else {
            const file = document.getElementById('fileInput').files[0];
            if (!file) { location.reload(); return; }
            video.src = URL.createObjectURL(file);
            video.onloadedmetadata = () => { setupCanvas(); video.play(); requestAnimationFrame(loopVideoSimple); };
        }
    }

    async function encenderCamara() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: currentFacingMode, width: 1280, height: 720 } });
            video.srcObject = stream;
            video.onloadedmetadata = () => { setupCanvas(); video.play(); requestAnimationFrame(loopVideoSimple); };
        } catch (e) { alert("Error al acceder a la cámara"); }
    }

    function loopVideoSimple() {
        if (!iaActiva) {
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            requestAnimationFrame(loopVideoSimple);
        }
    }

    async function activarIA() {
        const loader = document.getElementById('loader-ia');
        if (loader) loader.style.display = 'flex';
        
        calibrado = false;
        iaActiva = false; 
        txtStatus.innerText = "BUSCANDO SUJETO...";

        if (!pose) {
            pose = new Pose({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}` });
            pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
            pose.onResults(onResultsHandler);
        }

        setTimeout(() => { procesarFrame(); }, 800);
    }

    function onResultsHandler(res) {
        if (res.poseLandmarks) {
            if (!iaActiva) {
                document.getElementById('loader-ia').style.display = 'none';
                iaActiva = true;
                startTimeCalib = Date.now();
            }
            onResults(res);
        } else if (iaActiva) {
            txtStatus.innerText = "⚠️ SUJETO FUERA DE CUADRO";
        }
    }

    async function procesarFrame() {
        if (document.getElementById('contenedor-analisis').style.display === 'block' && video.readyState >= 2) {
            await pose.send({ image: video });
            requestAnimationFrame(procesarFrame);
        }
    }

    function setupCanvas() { canvas.width = video.videoWidth; canvas.height = video.videoHeight; }
    
    function calcAng3D(a,b,c) {
        const v1={x:a.x-b.x, y:a.y-b.y, z:a.z-b.z}, v2={x:c.x-b.x, y:c.y-b.y, z:c.z-b.z};
        const dot = v1.x*v2.x + v1.y*v2.y + v1.z*v2.z;
        const m1 = Math.sqrt(v1.x**2 + v1.y**2 + v1.z**2), m2 = Math.sqrt(v2.x**2 + v2.y**2 + v2.z**2);
        return (m1*m2 === 0) ? 0 : Math.acos(Math.max(-1, Math.min(1, dot/(m1*m2))))*(180/Math.PI);
    }

    const drawV = (p1, p2, angKey, groupKey, raw_lm1, raw_lm2) => {
        if (!raw_lm1 || !raw_lm2 || raw_lm1.visibility < 0.5 || raw_lm2.visibility < 0.5) return;
        const buffer = angleBuffer[angKey] || [];
        if (buffer.length === 0) return;
        const avgAngle = buffer.reduce((a, b) => a + b, 0) / buffer.length;
        let color = "#00ff00", thickness = 4, statusLabel = "SEGURO";
        if (analizandoRiesgo && calibrado) {
            const diff = Math.abs(avgAngle - (baseAngles[angKey] || avgAngle));
            const t = TH[groupKey];
            wbaStats.framesAnalizados++;
            if (diff > (t * 2)) { 
                wbaStats.riesgoAltoTotal++;
                wbaStats.zonasAfectadas.add(groupKey);
                color = "#ff3838"; thickness = 10; statusLabel = "CRÍTICO";
            } else if (diff > t) {
                color = "#f1c40f"; thickness = 7; statusLabel = "ADVERTENCIA";
            }
        }
        ctx.shadowBlur = (color !== "#00ff00") ? 15 : 0;
        ctx.shadowColor = color;
        ctx.beginPath();
        ctx.strokeStyle = color;
        ctx.lineWidth = thickness;
        ctx.lineCap = "round";
        ctx.moveTo(p1.x, p1.y); 
        ctx.lineTo(p2.x, p2.y);
        ctx.stroke();
        ctx.shadowBlur = 0;
        if (calibrado) {
            const midX = (p1.x + p2.x) / 2, midY = (p1.y + p2.y) / 2;
            let offsetX = (groupKey === "munecas" || groupKey === "codos") ? 45 : 20;
            let offsetY = (groupKey === "piernas") ? 40 : -20;
            ctx.fillStyle = "rgba(13, 17, 23, 0.85)";
            ctx.beginPath(); 
            ctx.roundRect(midX + offsetX, midY + offsetY, 95, 36, 8); 
            ctx.fill();
            ctx.strokeStyle = color; 
            ctx.lineWidth = 2; 
            ctx.stroke();
            ctx.fillStyle = "#ffffff";
            ctx.font = "bold 11px 'Segoe UI', sans-serif";
            ctx.fillText(`${avgAngle.toFixed(1)}°`, midX + offsetX + 8, midY + offsetY + 16);
            ctx.fillStyle = color; 
            ctx.font = "900 9px 'Segoe UI', sans-serif";
            ctx.fillText(statusLabel, midX + offsetX + 8, midY + offsetY + 28);
        }
    };

    function onResults(res) {
        if (!res || !res.poseLandmarks) { txtStatus.innerText = "SUJETO PERDIDO"; return; }
        const lm = res.poseLandmarks;
        const w = canvas.width, h = canvas.height;
        if (!calibrado) {
            let tiempoRestante = Math.ceil((3000 - (Date.now() - startTimeCalib)) / 1000);
            txtStatus.innerText = `CALIBRANDO EN... ${tiempoRestante > 0 ? tiempoRestante : 0}s`;
        }
        ctx.save();
        ctx.clearRect(0, 0, w, h);
        if (currentFacingMode === "user") { ctx.translate(w, 0); ctx.scale(-1, 1); }
        ctx.drawImage(res.image, 0, 0, w, h);
        const pt = (i) => {
            const lmPoint = lm[i];
            if (!posBuffer[i]) posBuffer[i] = { x: lmPoint.x * w, y: lmPoint.y * h, history: [] };
            if (lmPoint.visibility > 0.5) posBuffer[i].history.push({ x: lmPoint.x * w, y: lmPoint.y * h });
            if (posBuffer[i].history.length > SUAVIZADO_POS) posBuffer[i].history.shift();
            const avgX = posBuffer[i].history.reduce((a, b) => a + b.x, 0) / posBuffer[i].history.length;
            const avgY = posBuffer[i].history.reduce((a, b) => a + b.y, 0) / posBuffer[i].history.length;
            return { x: avgX, y: avgY, z: lmPoint.z, visibility: lmPoint.visibility };
        };
        const p = {
            cab: pt(0), cue: { x: (lm[11].x + lm[12].x) / 2 * w, y: (lm[11].y + lm[12].y) / 2 * h, z: (lm[11].z + lm[12].z) / 2 },
            tor: { x: (lm[11].x + lm[12].x) / 2 * w, y: (lm[11].y + lm[12].y) / 2 * h + 40, z: (lm[11].z + lm[12].z) / 2 },
            abd: { x: (lm[23].x + lm[24].x) / 2 * w, y: (lm[23].y + lm[24].y) / 2 * h - 30, z: (lm[23].z + lm[24].z) / 2 },
            esp_baja: { x: (lm[23].x + lm[24].x) / 2 * w, y: (lm[23].y + lm[24].y) / 2 * h, z: (lm[23].z + lm[24].z) / 2 },
            h_d: pt(12), c_d: pt(14), m_d: pt(16), mano_d: pt(20), h_i: pt(11), c_i: pt(13), m_i: pt(15), mano_i: pt(19),
            p_d: pt(24), r_d: pt(26), t_d: pt(28), pie_d: pt(32), p_i: pt(23), r_i: pt(25), t_i: pt(27), pie_i: pt(31)
        };
        if (analizandoRiesgo) {
            const alturaTorso = Math.abs(p.h_d.y - p.p_d.y);
            const currentHandY = (p.m_d.y + p.m_i.y) / 2;
            const umbralMovimiento = alturaTorso * 0.3;
            if (wbaStats.lastHandY !== null) {
                const desplazamiento = wbaStats.lastHandY - currentHandY;
                if (desplazamiento > umbralMovimiento && !wbaStats.subiendo) { wbaStats.ciclos++; wbaStats.subiendo = true; }
                else if (desplazamiento < -umbralMovimiento) { wbaStats.subiendo = false; }
            }
            wbaStats.lastHandY = currentHandY;
            if (p.m_d.y < p.h_d.y || p.m_i.y < p.h_i.y) {
                wbaStats.agarreSobreHombros = true; wbaStats.zonasAfectadas.add("AGARRE ALTO");
                ctx.fillStyle = "rgba(255, 0, 0, 0.7)"; ctx.font = "bold 20px Segoe UI"; ctx.fillText("⚠️ AGARRE SOBRE HOMBROS", 30, 100);
            }
        }
        const currentAngles = {
            cue: calcAng3D(p.cab, p.cue, p.tor), abd: calcAng3D(p.tor, p.abd, p.esp_baja),
            c_d: calcAng3D(p.h_d, p.c_d, p.m_d), c_i: calcAng3D(p.h_i, p.c_i, p.m_i),
            m_d: calcAng3D(p.c_d, p.m_d, p.mano_d), m_i: calcAng3D(p.c_i, p.m_i, p.mano_i),
            h_d: calcAng3D(p.p_d, p.h_d, p.c_d), h_i: calcAng3D(p.p_i, p.h_i, p.c_i),
            r_d: calcAng3D(p.p_d, p.r_d, p.t_d), r_i: calcAng3D(p.p_i, p.r_i, p.t_i),
            t_d: calcAng3D(p.r_d, p.t_d, p.pie_d), t_i: calcAng3D(p.r_i, p.t_i, p.pie_i)
        };
        Object.keys(currentAngles).forEach(k => {
            if (!angleBuffer[k]) angleBuffer[k] = [];
            angleBuffer[k].push(currentAngles[k]);
            if (angleBuffer[k].length > HISTORIAL_MAX) angleBuffer[k].shift();
        });
        if (iaActiva && !calibrado && (Date.now() - startTimeCalib > 3000)) {
            Object.keys(angleBuffer).forEach(k => { 
                baseAngles[k] = angleBuffer[k].reduce((a, b) => a + b, 0) / angleBuffer[k].length; 
            });
            wbaStats.lastHandY = (p.m_d.y + p.m_i.y) / 2;
            calibrado = true; document.getElementById('recordBtn').style.opacity = "1"; document.getElementById('recordBtn').disabled = false;
            txtStatus.innerText = "CALIBRADO - LISTO";
        }
        ctx.strokeStyle = "rgba(0, 255, 0, 0.5)"; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(p.h_i.x, p.h_i.y); ctx.lineTo(p.h_d.x, p.h_d.y); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(p.p_i.x, p.p_i.y); ctx.lineTo(p.p_d.x, p.p_d.y); ctx.stroke();
        drawV(p.cue, p.esp_baja, 'abd', 'tronco', lm[11], lm[23]);
        drawV(p.cue, p.cab, 'cue', 'cuello', lm[11], lm[0]);
        drawV(p.p_d, p.h_d, 'h_d', 'hombros', lm[24], lm[12]);
        drawV(p.p_i, p.h_i, 'h_i', 'hombros', lm[23], lm[11]);
        drawV(p.h_d, p.c_d, 'c_d', 'codos', lm[12], lm[14]);
        drawV(p.c_d, p.m_d, 'c_d', 'codos', lm[14], lm[16]);
        drawV(p.h_i, p.c_i, 'c_i', 'codos', lm[11], lm[13]); 
        drawV(p.c_i, p.m_i, 'c_i', 'codos', lm[13], lm[15]);
        drawV(p.p_d, p.r_d, 'r_d', 'piernas', lm[24], lm[26]); 
        drawV(p.r_d, p.t_d, 'r_d', 'piernas', lm[26], lm[28]);
        drawV(p.p_i, p.r_i, 'r_i', 'piernas', lm[23], lm[25]); 
        drawV(p.r_i, p.t_i, 'r_i', 'piernas', lm[25], lm[27]);
        ctx.restore();
    }

    function toggleGrabacion() {
        if (!calibrado) return;
        analizandoRiesgo = !analizandoRiesgo;
        const btn = document.getElementById('recordBtn');
        if (analizandoRiesgo) {
            recordedChunks = [];
            const stream = canvas.captureStream(30); 
            mediaRecorder = new MediaRecorder(stream);
            mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
            mediaRecorder.onstop = descargarVideo; 
            mediaRecorder.start();
            wbaStats = { riesgoAltoTotal: 0, framesAnalizados: 0, zonasAfectadas: new Set(), inicioAuditoria: Date.now(), ciclos: 0, lastHandY: null, subiendo: false };
            txtStatus.innerText = "ANALIZANDO...";
            btn.innerHTML = "⏹️<br>DETENER"; btn.classList.add('rec-active');
        } else {
            txtStatus.innerText = "PROCESANDO...";
            btn.innerHTML = "🔴<br>AUDITAR"; btn.classList.remove('rec-active');
            if (mediaRecorder && mediaRecorder.state !== "inactive") mediaRecorder.stop();
            setTimeout(() => { generarReporteWBA(); txtStatus.innerText = "FIN AUDITORÍA"; }, 600);
        }
    }

    function generarReporteWBA() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const empresa = document.getElementById('nombreEmpresa').value;
        const trabajador = document.getElementById('nombreTrabajador').value;
        const peso = document.getElementById('pesoCarga').value;
        const porcentajeRiesgo = ((wbaStats.riesgoAltoTotal / wbaStats.framesAnalizados) * 100).toFixed(1);
        doc.text("REPORTE NOM-036-STPS", 105, 20, { align: "center" });
        doc.text(`Empresa: ${empresa}`, 20, 40);
        doc.text(`Trabajador: ${trabajador}`, 20, 50);
        doc.text(`Peso Carga: ${peso} kg`, 20, 60);
        doc.text(`Ciclos: ${wbaStats.ciclos}`, 20, 70);
        doc.text(`Exposición Crítica: ${porcentajeRiesgo}%`, 20, 80);
        doc.save(`REPORTE_${trabajador}.pdf`);
    }

    async function cambiarCamara() {
        currentFacingMode = (currentFacingMode === "environment") ? "user" : "environment";
        iaActiva = false;
        if (video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
        await encenderCamara();
    }

    function descargarVideo() {
        const blob = new Blob(recordedChunks, { type: 'video/webm' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = `EVIDENCIA_LYA.webm`;
        a.click();
    }

    function validarYAbrirArchivo() {
        const campos = ['nombreEmpresa', 'puestoTrabajo', 'nombreTrabajador', 'edadTrabajador', 'pesoCarga'];
        let error = false;
        campos.forEach(id => { if (!document.getElementById(id).value.trim()) error = true; });
        if (error) alert("Complete los campos."); else document.getElementById('fileInput').click();
    }
</script>
</body>
</html>
