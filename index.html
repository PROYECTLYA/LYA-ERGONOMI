<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LYA-ERGO v16.8 | BIOMECÁNICA TOTAL</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0d1117; color: white; margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        
        #menu-inicial { 
            display: flex; width: 100%; height: 100vh; flex-direction: column; 
            align-items: center; justify-content: center; position: fixed; z-index: 5000;
            background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(13, 17, 23, 0.9)), 
                              url('https://i.ibb.co/qMwtNmk3/image.png'); 
            background-size: cover; background-position: center;
        }

        .logo-text { color: #00ff00; font-weight: 900; letter-spacing: 5px; font-size: 3rem; text-shadow: 0 0 20px rgba(0,255,0,0.5); }
        .sub-text { color: #ffffff; font-size: 1rem; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 40px; background: rgba(0,0,0,0.5); padding: 5px 15px; border-left: 4px solid #00ff00; }
        
        .btn-inicio { width: 85%; max-width: 320px; padding: 18px; margin: 10px; border-radius: 15px; font-weight: bold; border: 1px solid rgba(255,255,255,0.2); backdrop-filter: blur(10px); }
        
        #loader-ia { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: #0d1117; z-index: 6000; flex-direction: column; align-items: center; justify-content: center; }
        .progress-bar { width: 0%; height: 100%; background: #00ff00; box-shadow: 0 0 15px #00ff00; transition: 0.3s; }

        #contenedor-analisis { display: none; width: 100vw; height: 100vh; position: relative; background: #000; }
        canvas { width: 100%; height: 100%; object-fit: contain; }
        video { display: none; }
        
        .status-badge { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.8); padding: 10px 15px; border-radius: 5px; border-left: 4px solid #00ff00; font-size: 11px; z-index: 3000; }
        .barra-controles { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; z-index: 4000; }
        .btn-circular { width: 65px; height: 65px; border-radius: 50%; border: none; font-size: 9px; font-weight: 800; color: white; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .rec-active { background: #fff !important; color: #f00 !important; border: 3px solid #f00 !important; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255,0,0,0.7); } 70% { box-shadow: 0 0 0 10px rgba(255,0,0,0); } 100% { box-shadow: 0 0 0 0 rgba(255,0,0,0); } }
    </style>
</head>
<body>

<div id="loader-ia">
    <h3 style="color:#00ff00; letter-spacing: 2px;">INICIALIZANDO LYA-IA ENGINE</h3>
    <div style="width: 70%; height: 8px; background: #21262d; border-radius: 10px; margin-top: 20px; overflow: hidden;">
        <div id="bar-id" class="progress-bar"></div>
    </div>
</div>

<div id="menu-inicial">
    <h1 class="logo-text">LYA-ERGO</h1>
    <p class="sub-text">CERVECERÍA DEL TRÓPICO</p>
    <button class="btn-inicio" style="background: rgba(39, 174, 96, 0.8);" onclick="prepararSistema('camara')">🎥 INICIAR CÁMARA</button>
    <button class="btn-inicio" style="background: rgba(41, 128, 185, 0.8);" onclick="document.getElementById('fileInput').click()">📁 SUBIR VIDEO</button>
    <input type="file" id="fileInput" hidden accept="video/*" onchange="prepararSistema('archivo')">
</div>

<div id="contenedor-analisis">
    <div class="status-badge" id="txt-status">IA STANDBY</div>
    <canvas id="output_canvas"></canvas>
    <video id="input_video" playsinline muted></video>
    <div class="barra-controles">
        <button class="btn-circular btn-dark" onclick="location.reload()">SALIR</button>
        <button class="btn-circular" style="background:#00d2d3; color:black;" onclick="cambiarCamara()">🔄<br>GIRAR</button>
        <button id="btn-calib" class="btn-circular" style="background:#f1c40f; color:black;" onclick="activarIA()">⚖️<br>CALIBRAR</button>
        <button id="recordBtn" class="btn-circular" style="background:#ff4d4d; opacity: 0.3;" onclick="toggleGrabacion()">🔴<br>GRABAR</button>
    </div>
</div>

<script>
    const video = document.getElementById('input_video');
    const canvas = document.getElementById('output_canvas');
    const ctx = canvas.getContext('2d');
    const txtStatus = document.getElementById('txt-status');
    const progressBar = document.getElementById('bar-id');
    
    let pose = null, iaActiva = false, calibrado = false, analizandoRiesgo = false;
    let currentFacingMode = "environment", startTimeCalib = 0;
    let baseAngles = {}, mediaRecorder, recordedChunks = [];

    // UMBRALES DE TOLERANCIA (TH) POR SEGMENTO
    const TH = { 
        cuello: 12, 
        tronco: 15, 
        hombros: 25, 
        muñecas: 15, 
        piernas: 20, 
        pies: 15 
    };

    async function prepararSistema(fuente) {
        document.getElementById('menu-inicial').style.display = 'none';
        document.getElementById('contenedor-analisis').style.display = 'block';
        if (fuente === 'camara') await encenderCamara();
        else {
            const file = document.getElementById('fileInput').files[0];
            video.src = URL.createObjectURL(file);
            video.onloadedmetadata = () => { video.play(); loopPrevio(); };
        }
    }

    async function encenderCamara() {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: currentFacingMode } });
        video.srcObject = stream;
        video.onloadedmetadata = () => { video.play(); loopPrevio(); };
    }

    function loopPrevio() {
        if (!iaActiva) {
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0);
            requestAnimationFrame(loopPrevio);
        }
    }

    function activarIA() {
        document.getElementById('loader-ia').style.display = 'flex';
        let p = 0;
        const interval = setInterval(() => { p += 5; progressBar.style.width = p+'%'; if(p>=100) clearInterval(interval); }, 50);

        pose = new Pose({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}` });
        pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });
        pose.onResults(onResults);

        setTimeout(() => {
            document.getElementById('loader-ia').style.display = 'none';
            iaActiva = true; startTimeCalib = Date.now(); loopIA();
        }, 1500);
    }

    async function loopIA() { if (iaActiva) { await pose.send({image: video}); requestAnimationFrame(loopIA); } }

    function onResults(res) {
        if (!res.poseLandmarks) return;
        ctx.save();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(res.image, 0, 0);

        const lm = res.poseLandmarks;
        const w = canvas.width, h = canvas.height;
        const pt = (i) => ({ x: lm[i].x * w, y: lm[i].y * h });
        
        // MAPEADO DE PUNTOS BIOMECÁNICOS
        const p = {
            cab: pt(0), 
            cue: { x: (lm[11].x+lm[12].x)/2*w, y:(lm[11].y+lm[12].y)/2*h },
            tor: { x: (lm[11].x+lm[12].x)/2*w, y:(lm[11].y+lm[12].y)/2*h + 50 },
            abd: { x: (lm[23].x+lm[24].x)/2*w, y:(lm[23].y+lm[24].y)/2*h },
            h_d: pt(12), c_d: pt(14), m_d: pt(16), mano_d: pt(20),
            h_i: pt(11), c_i: pt(13), m_i: pt(15), mano_i: pt(19),
            eb_d: pt(24), r_d: pt(26), t_d: pt(28), pie_d: pt(32),
            eb_i: pt(23), r_i: pt(25), t_i: pt(27), pie_i: pt(31)
        };

        const vertical = (o) => ({ x: o.x, y: o.y + 100 });

        // CÁLCULOS INDEPENDIENTES POR SEGMENTO
        const angles = {
            cue: calcAng(p.cab, p.cue, p.tor),
            abd: calcAng(p.cue, p.abd, vertical(p.abd)),
            h_d: calcAng(vertical(p.h_d), p.h_d, p.c_d),
            h_i: calcAng(vertical(p.h_i), p.h_i, p.c_i),
            m_d: calcAng(p.c_d, p.m_d, p.mano_d), // Muñeca Derecha
            m_i: calcAng(p.c_i, p.m_i, p.mano_i), // Muñeca Izquierda
            r_d: calcAng(p.eb_d, p.r_d, p.t_d),
            r_i: calcAng(p.eb_i, p.r_i, p.t_i),
            p_d: calcAng(p.r_d, p.t_d, p.pie_d), // Tobillo/Pie Derecho
            p_i: calcAng(p.r_i, p.t_i, p.pie_i)  // Tobillo/Pie Izquierdo
        };

        if (!calibrado) {
            const t = Date.now() - startTimeCalib;
            if (t > 4000) { baseAngles = {...angles}; calibrado = true; document.getElementById('recordBtn').style.opacity="1"; }
            else { txtStatus.innerText = `CALIBRANDO... ${Math.ceil((4000-t)/1000)}s`; }
        }

        // FUNCIÓN DE SEMAFORIZACIÓN INDEPENDIENTE
        const drawSemaforo = (p1, p2, angKey, group) => {
            ctx.lineWidth = 6; ctx.lineCap = "round";
            ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y);
            
            if (analizandoRiesgo && calibrado) {
                const diff = Math.abs(angles[angKey] - baseAngles[angKey]);
                const t = TH[group];
                if (diff > t * 2.2) ctx.strokeStyle = "#ff3838"; // CRÍTICO (ROJO)
                else if (diff > t) ctx.strokeStyle = "#fffa65";   // ADVERTENCIA (AMARILLO)
                else ctx.strokeStyle = "#32ff7e";                // SEGURO (VERDE)
            } else {
                ctx.strokeStyle = calibrado ? "#00ff00" : "#4b4b4b";
            }
            ctx.stroke();
        };

        // RENDERIZADO DEL ESQUELETO CON SEMAFORIZACIÓN APLICADA
        drawSemaforo(p.cab, p.cue, 'cue', 'cuello');
        drawSemaforo(p.cue, p.abd, 'abd', 'tronco');
        
        // Brazos y Muñecas
        drawSemaforo(p.h_d, p.c_d, 'h_d', 'hombros');
        drawSemaforo(p.c_d, p.m_d, 'm_d', 'muñecas'); // Segmento Muñeca D
        drawSemaforo(p.m_d, p.mano_d, 'm_d', 'muñecas'); 

        drawSemaforo(p.h_i, p.c_i, 'h_i', 'hombros');
        drawSemaforo(p.c_i, p.m_i, 'm_i', 'muñecas'); // Segmento Muñeca I
        drawSemaforo(p.m_i, p.mano_i, 'm_i', 'muñecas');

        // Piernas y Pies
        drawSemaforo(p.eb_d, p.r_d, 'r_d', 'piernas');
        drawSemaforo(p.r_d, p.t_d, 'p_d', 'pies');    // Segmento Tobillo D
        drawSemaforo(p.t_d, p.pie_d, 'p_d', 'pies');

        drawSemaforo(p.eb_i, p.r_i, 'r_i', 'piernas');
        drawSemaforo(p.r_i, p.t_i, 'p_i', 'pies');    // Segmento Tobillo I
        drawSemaforo(p.t_i, p.pie_i, 'p_i', 'pies');

        ctx.restore();
    }

    function calcAng(a,b,c) {
        const v1={x:a.x-b.x, y:a.y-b.y}, v2={x:c.x-b.x, y:c.y-b.y};
        const dot = v1.x*v2.x + v1.y*v2.y;
        const m1 = Math.sqrt(v1.x**2 + v1.y**2), m2 = Math.sqrt(v2.x**2 + v2.y**2);
        return (m1*m2 === 0) ? 0 : Math.acos(Math.max(-1, Math.min(1, dot/(m1*m2))))*(180/Math.PI);
    }

    function toggleGrabacion() {
        analizandoRiesgo = !analizandoRiesgo;
        document.getElementById('recordBtn').classList.toggle('rec-active');
        if (analizandoRiesgo) {
            recordedChunks = [];
            mediaRecorder = new MediaRecorder(canvas.captureStream(30), { mimeType: 'video/webm' });
            mediaRecorder.ondataavailable = (e) => recordedChunks.push(e.data);
            mediaRecorder.onstop = () => {
                const a = document.createElement('a');
                a.href = URL.createObjectURL(new Blob(recordedChunks));
                a.download = `ERGO_REPORT_${Date.now()}.webm`; a.click();
            };
            mediaRecorder.start();
            txtStatus.innerText = "ANALIZANDO RIESGOS...";
        } else {
            mediaRecorder.stop();
            txtStatus.innerText = "SISTEMA READY";
        }
    }

    async function cambiarCamara() {
        currentFacingMode = currentFacingMode === "environment" ? "user" : "environment";
        iaActiva = false; await encenderCamara();
    }
</script>
</body>
</html>
