<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ergo-Sensing Mobile PRO</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body { background-color: #0d1117; color: white; font-family: sans-serif; overflow-x: hidden; }
        .container-video { position: relative; width: 100%; max-width: 720px; margin: auto; background: #000; border-radius: 15px; overflow: hidden; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        video { width: 100%; height: auto; display: none; }
        .controls-overlay { position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: center; gap: 15px; z-index: 10; }
        .btn-record { width: 60px; height: 60px; border-radius: 50%; border: 4px solid white; background: red; transition: 0.3s; }
        .btn-record.recording { border-radius: 10px; transform: scale(0.8); background: #fff; }
        .status-badge { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.6); padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="container py-3 text-center">
    <h4 class="text-info mb-3">ERGO-SENSING AI MOBILE</h4>
    
    <div class="container-video">
        <video id="input_video" autoplay playsinline></video>
        <canvas id="output_canvas"></canvas>
        
        <div id="status" class="status-badge text-warning">INICIALIZANDO...</div>

        <div class="controls-overlay">
            <button class="btn btn-dark btn-sm" onclick="cambiarCamara()">🔄 Girar</button>
            <button id="recordBtn" class="btn-record" onclick="toggleGrabacion()"></button>
            <button class="btn btn-dark btn-sm" onclick="reiniciarCalibracion()">⚖️ Calibrar</button>
        </div>
    </div>

    <div class="mt-3 small text-muted">
        Presiona el círculo rojo para grabar el análisis con vectores.
    </div>
</div>

<script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const recordBtn = document.getElementById('recordBtn');
    
    let currentFacingMode = "user"; // "user" es frontal, "environment" es trasera
    let mediaRecorder;
    let recordedChunks = [];
    let isRecording = false;
    let camera;

    // --- LÓGICA DE MEDIAPIPE ---
    const pose = new Pose({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
    });
    pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5 });

    // --- PUNTOS VIRTUALES Y DIBUJO ---
    const puntoMedio = (p1, p2) => ({ x: (p1.x + p2.x) / 2, y: (p1.y + p2.y) / 2 });

    pose.onResults((results) => {
        canvasCtx.save();
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

        if (results.poseLandmarks) {
            const lm = results.poseLandmarks;
            const w = canvasElement.width;
            const h = canvasElement.height;

            const cuello = puntoMedio(lm[11], lm[12]);
            const caderaMedia = puntoMedio(lm[23], lm[24]);
            const torax = { x: cuello.x + (caderaMedia.x - cuello.x) * 0.33, y: cuello.y + (caderaMedia.y - cuello.y) * 0.33 };
            const abdomen = { x: cuello.x + (caderaMedia.x - cuello.x) * 0.66, y: cuello.y + (caderaMedia.y - cuello.y) * 0.66 };

            const draw = (p1, p2, color = "#00FF00") => {
                canvasCtx.beginPath();
                canvasCtx.moveTo(p1.x * w, p1.y * h);
                canvasCtx.lineTo(p2.x * w, p2.y * h);
                canvasCtx.strokeStyle = color;
                canvasCtx.lineWidth = 4;
                canvasCtx.stroke();
            };

            // Dibujo Jerárquico
            draw(lm[0], cuello, "#3498db");
            draw(cuello, torax, "#3498db");
            draw(torax, abdomen, "#3498db");
            draw(abdomen, caderaMedia, "#3498db");
            
            // Hombros y Brazos
            draw(cuello, lm[11]); draw(cuello, lm[12]);
            draw(lm[12], lm[14]); draw(lm[14], lm[16]);
            draw(lm[11], lm[13]); draw(lm[13], lm[15]);
        }
        canvasCtx.restore();
    });

    // --- GESTIÓN DE CÁMARA ---
    function iniciarCamara() {
        if (camera) camera.stop();
        
        camera = new Camera(videoElement, {
            onFrame: async () => {
                canvasElement.width = videoElement.videoWidth;
                canvasElement.height = videoElement.videoHeight;
                await pose.send({image: videoElement});
            },
            facingMode: currentFacingMode,
            width: 1280, height: 720
        });
        camera.start();
        document.getElementById('status').innerText = currentFacingMode === "user" ? "CÁMARA FRONTAL" : "CÁMARA TRASERA";
    }

    function cambiarCamara() {
        currentFacingMode = currentFacingMode === "user" ? "environment" : "user";
        iniciarCamara();
    }

    // --- LÓGICA DE GRABACIÓN (VIDEO CON VECTORES) ---
    function toggleGrabacion() {
        if (!isRecording) {
            startRecording();
        } else {
            stopRecording();
        }
    }

    function startRecording() {
        recordedChunks = [];
        const stream = canvasElement.captureStream(30); // Captura el canvas (Video + Vectores)
        mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp8' });

        mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
        mediaRecorder.onstop = saveVideo;

        mediaRecorder.start();
        isRecording = true;
        recordBtn.classList.add('recording');
        document.getElementById('status').innerText = "🔴 GRABANDO...";
    }

    function stopRecording() {
        mediaRecorder.stop();
        isRecording = false;
        recordBtn.classList.remove('recording');
        document.getElementById('status').innerText = "SISTEMA ACTIVO";
    }

    function saveVideo() {
        const blob = new Blob(recordedChunks, { type: 'video/webm' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `Analisis_Ergo_${Date.now()}.webm`;
        a.click();
    }

    function reiniciarCalibracion() { location.reload(); }

    // Iniciar al cargar
    iniciarCamara();
</script>

</body>
</html>
