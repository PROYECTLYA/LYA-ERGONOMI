<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LYA-ERGO v16.6 | SAFETY TUXTEPEC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background-color: #0d1117; 
            color: white; 
            margin: 0; 
            overflow: hidden; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
        }
        
        /* CONTENEDOR PRINCIPAL CON TU IMAGEN */
        #menu-inicial { 
            display: flex; 
            width: 100%; 
            height: 100vh; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            position: fixed; 
            z-index: 5000;
            
            /* ENLACE DIRECTO A TU IMAGEN DE IBBC */
            background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.8)), 
                              url('https://i.ibb.co/qMwtNmk3/image.png'); 
            background-repeat: no-repeat;
            background-position: center center;
            background-size: cover;
        }

        /* ESTILO DEL LOGO Y TEXTO */
        .logo-text { 
            color: #00ff00; 
            font-weight: 900; 
            letter-spacing: 8px; 
            font-size: 4rem; 
            text-shadow: 0 0 30px rgba(0,255,0,0.6);
            margin-bottom: 0;
        }
        
        .sub-text { 
            color: #ffffff; 
            font-size: 1.4rem; 
            letter-spacing: 5px; 
            margin-bottom: 50px; 
            font-weight: 700;
            text-transform: uppercase;
            border-top: 2px solid #00ff00;
            padding-top: 10px;
        }
        
        /* BOTONES CON EFECTO CRISTAL */
        .btn-inicio { 
            width: 85%; 
            max-width: 350px; 
            padding: 22px; 
            margin: 12px; 
            border-radius: 15px; 
            font-weight: 800; 
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .btn-cam { background: rgba(25, 135, 84, 0.8); color: white; }
        .btn-vid { background: rgba(13, 110, 253, 0.8); color: white; }
        
        .btn-inicio:hover { 
            transform: translateY(-3px); 
            box-shadow: 0 10px 20px rgba(0,255,0,0.3); 
            border-color: #00ff00;
            filter: brightness(1.2);
        }

        #contenedor-analisis { display: none; width: 100vw; height: 100vh; background: #000; }
        canvas { width: 100%; height: 100%; object-fit: contain; }
    </style>
</head>
<body>

<div id="menu-inicial">
    <h1 class="logo-text">LYA-ERGO</h1>
    <p class="sub-text">SAFETY TUXTEPEC</p>
    
    <button class="btn-inicio btn-cam" onclick="iniciarSistema('cam')">🎥 ABRIR CÁMARA IA</button>
    <button class="btn-inicio btn-vid" onclick="document.getElementById('fileInput').click()">📁 ANALIZAR VIDEO</button>
    
    <input type="file" id="fileInput" hidden accept="video/*" onchange="iniciarSistema('vid')">
    
    <div style="position: absolute; bottom: 30px; opacity: 0.7; font-size: 0.9rem; font-weight: bold; letter-spacing: 2px;">
        CERVECERÍA DEL TRÓPICO
    </div>
</div>

<div id="contenedor-analisis">
    <canvas id="output_canvas"></canvas>
</div>

<script>
    function iniciarSistema(modo) {
        console.log("Iniciando modo: " + modo);
        document.getElementById('menu-inicial').style.fadeOut; // Efecto visual
        setTimeout(() => {
            document.getElementById('menu-inicial').style.display = 'none';
            document.getElementById('contenedor-analisis').style.display = 'block';
            alert("Sistema LYA-ERGO listo para análisis ergonómico.");
        }, 300);
    }
</script>

</body>
</html>
